<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>♔ SATRANÇ PRO - 4:3 Masa | Bot ile Oyna ♚</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2f2a 0%, #051a15 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Georgia', serif;
            padding: 20px;
        }

        /* Ana layout - 4:3 masa + sağ panel */
        .game-layout {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 30px;
            background: #1e1a1ecc;
            padding: 25px 40px;
            border-radius: 48px;
            backdrop-filter: blur(2px);
            border: 1px solid #e6b422;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6);
        }

        /* 4:3 Masa */
        .board-frame {
            background: #2b1e12;
            padding: 12px;
            border-radius: 20px;
            box-shadow: inset 0 0 0 3px #c9a03d, 0 15px 30px black;
        }

        canvas {
            display: block;
            background: #f0d9b5;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        /* Sağ panel - Yenilen taşlar */
        .capture-panel {
            background: linear-gradient(145deg, #241f26, #110e14);
            border-radius: 28px;
            padding: 20px 18px;
            min-width: 150px;
            border: 1px solid #e6b422;
            box-shadow: 0 10px 25px black;
        }

        .capture-panel h3 {
            text-align: center;
            color: #FFD966;
            font-size: 1.1rem;
            margin: 0 0 15px 0;
            border-bottom: 2px solid #c9a03d;
            padding-bottom: 5px;
        }

        .captured-pieces {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            min-height: 200px;
        }

        .piece-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 4px gold);
        }

        /* Alt bilgi çubuğu */
        .info-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            backdrop-filter: blur(12px);
            padding: 8px 25px;
            border-radius: 40px;
            color: #ffdf9c;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 100;
            white-space: nowrap;
            border: 1px solid #e6b422;
        }

        .reset-btn {
            position: fixed;
            bottom: 20px;
            right: 25px;
            background: #c2410c;
            padding: 8px 25px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            border: none;
            box-shadow: 0 4px 0 #632818;
        }

        .reset-btn:active {
            transform: translateY(2px);
        }

        /* Lobi */
        .lobby {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 3, 12, 0.97);
            backdrop-filter: blur(18px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .lobby h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #FFE6A3, #E6B422);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }

        .diff-group {
            display: flex;
            gap: 25px;
            margin: 30px;
        }

        .diff-item {
            background: #2a242f;
            padding: 12px 32px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            color: #e6c87e;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .diff-item.active {
            background: #e67e22;
            color: white;
            border-color: gold;
        }

        .lobby-start {
            background: #27ae60;
            padding: 14px 50px;
            font-size: 1.5rem;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 0 #1e6b3e;
        }

        @media (max-width: 800px) {
            .game-layout { gap: 15px; padding: 15px 20px; }
            .capture-panel { min-width: 100px; padding: 12px; }
            .piece-icon { font-size: 1.3rem; }
            .diff-item { padding: 8px 18px; font-size: 1rem; }
            .lobby h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="game-layout">
    <div class="board-frame">
        <canvas id="chessCanvas" width="640" height="640"></canvas>
    </div>
    <div class="capture-panel">
        <h3>⚫ YENİLEN SİYAH</h3>
        <div class="captured-pieces" id="capturedList"></div>
    </div>
</div>
<div class="info-bar" id="statusText">♔ BEYAZ'ın Turu</div>
<button class="reset-btn" id="resetButton">🔄 YENİ OYUN</button>

<div id="lobbyMenu" class="lobby">
    <h1>♔ SATRANÇ PRO ♚</h1>
    <div class="diff-group">
        <div class="diff-item" data-diff="easy">🟢 EASY</div>
        <div class="diff-item active" data-diff="normal">🟡 NORMAL</div>
        <div class="diff-item" data-diff="hard">🔴 HARD</div>
    </div>
    <div class="lobby-start" id="lobbyStartBtn">🎯 OYUNA BAŞLA</div>
    <div style="margin-top: 25px; color:#b89a60;">4:3 Masa | Işıklı Hamleler | Bot AI</div>
</div>

<script>
    (function(){
        // Canvas
        const canvas = document.getElementById('chessCanvas');
        const ctx = canvas.getContext('2d');
        const capturedDiv = document.getElementById('capturedList');
        const statusSpan = document.getElementById('statusText');
        const lobbyDiv = document.getElementById('lobbyMenu');
        const lobbyStart = document.getElementById('lobbyStartBtn');
        const resetBtn = document.getElementById('resetButton');
        
        const BOARD_SIZE = 640;
        const CELL_SIZE = 80;
        
        let gameActive = true;
        let difficulty = 'normal';
        let currentTurn = 'white'; // white her zaman başlar
        let selectedRow = null, selectedCol = null;
        let validMoves = [];
        let board = Array(8).fill().map(() => Array(8).fill(null));
        let whiteCaptured = []; // beyazın yediği siyah taşlar
        
        // Animasyon
        let animMove = null;
        
        // Taş sembolleri
        const symbols = {
            'king_w': '♔', 'queen_w': '♕', 'rook_w': '♖', 'bishop_w': '♗', 'knight_w': '♘', 'pawn_w': '♙',
            'king_b': '♚', 'queen_b': '♛', 'rook_b': '♜', 'bishop_b': '♝', 'knight_b': '♞', 'pawn_b': '♟'
        };
        
        // ----- TAHTA BAŞLANGICI -----
        function initBoard() {
            let b = Array(8).fill().map(() => Array(8).fill(null));
            // Piyonlar
            for(let i=0;i<8;i++) {
                b[1][i] = {type:'pawn', color:'black'};
                b[6][i] = {type:'pawn', color:'white'};
            }
            // Arka sıra
            const pieces = ['rook','knight','bishop','queen','king','bishop','knight','rook'];
            for(let i=0;i<8;i++) {
                b[0][i] = {type:pieces[i], color:'black'};
                b[7][i] = {type:pieces[i], color:'white'};
            }
            return b;
        }
        
        // ----- SATRANÇ KURALLARI -----
        function isClearLine(r1,c1,r2,c2,boardState) {
            let dr = r1===r2 ? 0 : (r2>r1 ? 1 : -1);
            let dc = c1===c2 ? 0 : (c2>c1 ? 1 : -1);
            let r = r1+dr, c = c1+dc;
            while(!(r===r2 && c===c2)) {
                if(boardState[r][c] !== null) return false;
                r += dr; c += dc;
            }
            return true;
        }
        
        function isValidMoveBasic(piece, fr, fc, tr, tc, boardState) {
            let target = boardState[tr][tc];
            if(target && target.color === piece.color) return false;
            let dr = tr-fr, dc = tc-fc;
            let adr = Math.abs(dr), adc = Math.abs(dc);
            
            switch(piece.type) {
                case 'pawn':
                    let dir = piece.color === 'white' ? -1 : 1;
                    let startRow = piece.color === 'white' ? 6 : 1;
                    if(dc===0 && !target && dr===dir) return true;
                    if(dc===0 && !target && fr===startRow && dr===2*dir && !boardState[fr+dir][fc]) return true;
                    if(adc===1 && dr===dir && target && target.color !== piece.color) return true;
                    return false;
                case 'knight':
                    return (adr===2 && adc===1) || (adr===1 && adc===2);
                case 'king':
                    if(adr<=1 && adc<=1) return true;
                    if(dc===2 && dr===0 && !target && !boardState[fr][fc+1]) return true;
                    if(dc===-2 && dr===0 && !target && !boardState[fr][fc-1]) return true;
                    return false;
                case 'queen':
                    if(fr===tr || fc===tc || adr===adc) return isClearLine(fr,fc,tr,tc,boardState);
                    return false;
                case 'rook':
                    if(fr===tr || fc===tc) return isClearLine(fr,fc,tr,tc,boardState);
                    return false;
                case 'bishop':
                    if(adr===adc) return isClearLine(fr,fc,tr,tc,boardState);
                    return false;
                default: return false;
            }
        }
        
        function isSquareAttacked(boardState, row, col, byColor) {
            for(let i=0;i<8;i++) {
                for(let j=0;j<8;j++) {
                    let p = boardState[i][j];
                    if(p && p.color === byColor && isValidMoveBasic(p,i,j,row,col,boardState)) {
                        return true;
                    }
                }
            }
            return false;
        }
        
        function doesMoveLeaveKingInCheck(boardState, fr, fc, tr, tc, color) {
            let clone = copyBoard(boardState);
            clone[tr][tc] = clone[fr][fc];
            clone[fr][fc] = null;
            let kingPos = findKing(clone, color);
            if(!kingPos) return true;
            return isSquareAttacked(clone, kingPos.row, kingPos.col, color === 'white' ? 'black' : 'white');
        }
        
        function getValidMovesForPiece(row, col, boardState) {
            let piece = boardState[row][col];
            if(!piece) return [];
            let moves = [];
            for(let i=0;i<8;i++) {
                for(let j=0;j<8;j++) {
                    if(isValidMoveBasic(piece, row, col, i, j, boardState) && !doesMoveLeaveKingInCheck(boardState, row, col, i, j, piece.color)) {
                        moves.push({row:i, col:j});
                    }
                }
            }
            // Rok
            if(piece.type === 'king') {
                let r = piece.color === 'white' ? 7 : 0;
                if(col === 4) {
                    if(!boardState[r][7] && !boardState[r][6] && !boardState[r][5] && !isSquareAttacked(boardState,r,5, piece.color==='white'?'black':'white') && !isSquareAttacked(boardState,r,6, piece.color==='white'?'black':'white')) {
                        moves.push({row:r, col:6});
                    }
                    if(!boardState[r][0] && !boardState[r][1] && !boardState[r][2] && !boardState[r][3] && !isSquareAttacked(boardState,r,2, piece.color==='white'?'black':'white') && !isSquareAttacked(boardState,r,3, piece.color==='white'?'black':'white')) {
                        moves.push({row:r, col:2});
                    }
                }
            }
            return moves;
        }
        
        function getAllMoves(color, boardState) {
            let moves = [];
            for(let i=0;i<8;i++) {
                for(let j=0;j<8;j++) {
                    let p = boardState[i][j];
                    if(p && p.color === color) {
                        let mvs = getValidMovesForPiece(i,j,boardState);
                        mvs.forEach(mv => moves.push({from:{row:i,col:j}, to:mv}));
                    }
                }
            }
            return moves;
        }
        
        function findKing(boardState, color) {
            for(let i=0;i<8;i++) for(let j=0;j<8;j++) if(boardState[i][j] && boardState[i][j].type==='king' && boardState[i][j].color===color) return {row:i, col:j};
            return null;
        }
        
        function copyBoard(b) { return b.map(row=>row.map(cell=>cell? {...cell}:null)); }
        
        // ----- HAMLE YAPMA -----
        function makeMove(fr, fc, tr, tc, isBot = false) {
            let piece = board[fr][fc];
            if(!piece || (!isBot && piece.color !== currentTurn)) return false;
            let moves = getValidMovesForPiece(fr, fc, board);
            if(!moves.some(m => m.row===tr && m.col===tc)) return false;
            
            let captured = board[tr][tc];
            
            // Animasyon başlat
            animMove = {
                fromX: fc*CELL_SIZE, fromY: fr*CELL_SIZE,
                toX: tc*CELL_SIZE, toY: tr*CELL_SIZE,
                progress: 0,
                captured: captured
            };
            
            if(captured) {
                if(captured.color === 'black') whiteCaptured.push(captured.type);
                updateCapturedUI();
            }
            
            // Hamleyi uygula
            board[tr][tc] = piece;
            board[fr][fc] = null;
            
            // Rok
            if(piece.type === 'king' && Math.abs(tc - fc) === 2) {
                let rookCol = tc === 6 ? 7 : 0;
                let newRookCol = tc === 6 ? 5 : 3;
                let rook = board[tr][rookCol];
                if(rook && rook.type === 'rook') {
                    board[tr][newRookCol] = rook;
                    board[tr][rookCol] = null;
                }
            }
            
            currentTurn = currentTurn === 'white' ? 'black' : 'white';
            updateStatusText();
            
            // Şah mat kontrolü
            let nextMoves = getAllMoves(currentTurn, board);
            if(nextMoves.length === 0) {
                gameActive = false;
                statusSpan.innerHTML = currentTurn === 'white' ? '🏆 SİYAH KAZANDI! (Şah Mat) 🏆' : '🏆 BEYAZ KAZANDI! (Şah Mat) 🏆';
            }
            return true;
        }
        
        // ----- BOT AI -----
        function botMove() {
            if(!gameActive || currentTurn !== 'black' || animMove) return;
            let moves = getAllMoves('black', board);
            if(moves.length === 0) return;
            
            let chosen = null;
            if(difficulty === 'easy') {
                chosen = moves[Math.floor(Math.random() * moves.length)];
            } else if(difficulty === 'normal') {
                let captures = moves.filter(m => board[m.to.row][m.to.col] !== null);
                if(captures.length && Math.random() < 0.5) chosen = captures[Math.floor(Math.random() * captures.length)];
                else chosen = moves[Math.floor(Math.random() * moves.length)];
            } else {
                let captures = moves.filter(m => board[m.to.row][m.to.col] !== null);
                if(captures.length) chosen = captures[Math.floor(Math.random() * captures.length)];
                else chosen = moves[Math.floor(Math.random() * moves.length)];
            }
            
            if(chosen) {
                makeMove(chosen.from.row, chosen.from.col, chosen.to.row, chosen.to.col, true);
                drawBoard();
            }
        }
        
        function updateCapturedUI() {
            capturedDiv.innerHTML = whiteCaptured.map(t => `<span class="piece-icon">${symbols[t+'_b']}</span>`).join('');
        }
        
        function updateStatusText() {
            if(gameActive) statusSpan.innerHTML = currentTurn === 'white' ? '♔ BEYAZ\'ın Turu' : '♚ SİYAH\'ın Turu';
        }
        
        // ----- ÇİZİM -----
        function drawBoard() {
            ctx.clearRect(0,0,BOARD_SIZE,BOARD_SIZE);
            // Kareler
            for(let i=0;i<8;i++) {
                for(let j=0;j<8;j++) {
                    let isLight = (i+j)%2 === 0;
                    let color = isLight ? '#F0D9B5' : '#B58863';
                    if(selectedRow === i && selectedCol === j) color = '#D6E05C';
                    else if(validMoves.some(m=>m.row===i && m.col===j)) color = '#7BCB5E';
                    ctx.fillStyle = color;
                    ctx.fillRect(j*CELL_SIZE, i*CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    ctx.strokeStyle = '#b89a60';
                    ctx.strokeRect(j*CELL_SIZE, i*CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            }
            
            // Taşları çiz
            for(let i=0;i<8;i++) {
                for(let j=0;j<8;j++) {
                    let p = board[i][j];
                    if(!p) continue;
                    let x = j*CELL_SIZE, y = i*CELL_SIZE;
                    if(animMove && animMove.fromX === j*CELL_SIZE && animMove.fromY === i*CELL_SIZE) {
                        let t = animMove.progress;
                        x = x + (animMove.toX - x) * t;
                        y = y + (animMove.toY - y) * t;
                    }
                    if(animMove && animMove.toX === j*CELL_SIZE && animMove.toY === i*CELL_SIZE && animMove.progress < 0.95) continue;
                    
                    let sym = symbols[`${p.type}_${p.color === 'white' ? 'w' : 'b'}`];
                    ctx.font = `bold ${CELL_SIZE * 0.68}px 'Segoe UI', 'Noto Sans'`;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.color === 'white' ? '#FFD700' : '#5a4a2a';
                    ctx.fillStyle = p.color === 'white' ? '#FFFFFF' : '#1A1510';
                    ctx.fillText(sym, x+CELL_SIZE*0.18, y+CELL_SIZE*0.82);
                    ctx.shadowBlur = 0;
                }
            }
            
            if(animMove) {
                animMove.progress += 0.2;
                if(animMove.progress >= 1) {
                    animMove = null;
                    if(gameActive && currentTurn === 'black') setTimeout(() => botMove(), 80);
                }
            }
            requestAnimationFrame(() => {});
        }
        
        // ----- OYUNU SIfIRLA -----
        function resetGame() {
            board = initBoard();
            currentTurn = 'white';
            selectedRow = null;
            selectedCol = null;
            validMoves = [];
            whiteCaptured = [];
            animMove = null;
            gameActive = true;
            updateCapturedUI();
            updateStatusText();
            drawBoard();
        }
        
        // ----- TIKLAMA -----
        canvas.addEventListener('click', (e) => {
            if(!gameActive || animMove || currentTurn !== 'white') return;
            let rect = canvas.getBoundingClientRect();
            let scale = BOARD_SIZE / rect.width;
            let clickX = (e.clientX - rect.left) * scale;
            let clickY = (e.clientY - rect.top) * scale;
            let col = Math.floor(clickX / CELL_SIZE);
            let row = Math.floor(clickY / CELL_SIZE);
            if(row>=0 && row<8 && col>=0 && col<8) {
                if(selectedRow !== null && validMoves.some(m => m.row===row && m.col===col)) {
                    makeMove(selectedRow, selectedCol, row, col);
                    selectedRow = null;
                    validMoves = [];
                    drawBoard();
                    if(gameActive && currentTurn === 'black' && !animMove) setTimeout(() => botMove(), 100);
                } else {
                    let piece = board[row][col];
                    if(piece && piece.color === currentTurn) {
                        selectedRow = row;
                        selectedCol = col;
                        validMoves = getValidMovesForPiece(row, col, board);
                    } else {
                        selectedRow = null;
                        validMoves = [];
                    }
                    drawBoard();
                }
            }
        });
        
        // Lobi
        document.querySelectorAll('.diff-item').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.diff-item').forEach(d => d.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.getAttribute('data-diff');
            });
        });
        
        lobbyStart.addEventListener('click', () => {
            lobbyDiv.style.display = 'none';
            resetGame();
        });
        
        resetBtn.addEventListener('click', () => {
            if(lobbyDiv.style.display !== 'none') lobbyDiv.style.display = 'none';
            resetGame();
        });
        
        // Başlat
        resetGame();
        drawBoard();
    })();
</script>
</body>
</html>
