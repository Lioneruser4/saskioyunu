<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Şaşki - Professional Checkers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Ana Konteyner */
        .game-container {
            width: 100%;
            max-width: 550px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Loading Screen */
        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loader {
            width: 80px;
            height: 80px;
            position: relative;
        }

        .loader::before, .loader::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }

        .loader::before {
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .loader::after {
            width: 60%;
            height: 60%;
            background: white;
            top: 20%;
            left: 20%;
            animation-delay: 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
        }

        .loading-text {
            margin-top: 30px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* Ana Menü */
        .main-menu {
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .main-menu.show {
            opacity: 1;
            transform: translateY(0);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid gold;
            object-fit: cover;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: bold;
            font-size: 16px;
        }

        .user-stats {
            font-size: 12px;
            opacity: 0.8;
        }

        .language-selector {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 25px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: white;
            color: #764ba2;
        }

        .difficulty-section {
            margin: 20px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            opacity: 0.8;
        }

        .difficulty-buttons {
            display: flex;
            gap: 10px;
        }

        .diff-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .diff-btn.easy {
            background: #4caf50;
            color: white;
        }

        .diff-btn.normal {
            background: #ff9800;
            color: white;
        }

        .diff-btn.hard {
            background: #f44336;
            color: white;
        }

        .diff-btn.active {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 2px solid gold;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
            margin-bottom: auto;
        }

        .menu-btn {
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .menu-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .menu-btn.primary {
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            color: white;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
        }

        .menu-btn.secondary {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
        }

        .menu-btn.locked {
            background: #555;
            color: #aaa;
            cursor: not-allowed;
        }

        /* Oyun Ekranı */
        .game-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .game-screen.active {
            display: flex;
        }

        .game-header {
            padding: 15px;
            background: rgba(0,0,0,0.3);
        }

        .player-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 10px 15px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-info img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        .player-details {
            display: flex;
            flex-direction: column;
        }

        .player-name {
            font-weight: bold;
            font-size: 14px;
        }

        .turn-indicator {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            background: rgba(0,0,0,0.5);
        }

        .turn-indicator.active {
            background: #ffd700;
            color: #000;
            animation: pulse 1s infinite;
        }

        .timer-box {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 5px 15px;
            text-align: center;
            min-width: 70px;
        }

        .timer-value {
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
        }

        .timer-label {
            font-size: 10px;
            opacity: 0.7;
        }

        .game-board-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            background: #d4b48c;
            border-radius: 12px;
            padding: 4px;
            gap: 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: min(450px, 85vw);
            height: min(450px, 85vw);
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }

        .cell.light {
            background: #f0d9b5;
        }

        .cell.dark {
            background: #b58863;
        }

        .cell.valid-move {
            background: rgba(76, 175, 80, 0.6) !important;
            animation: glow 0.5s ease-in-out infinite alternate;
        }

        .cell.capture-move {
            background: rgba(244, 67, 54, 0.7) !important;
            animation: pulse-red 0.5s ease-in-out infinite alternate;
        }

        .cell.must-move {
            background: rgba(255, 215, 0, 0.7) !important;
            animation: pulse-gold 0.3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px #4caf50; }
            to { box-shadow: 0 0 20px #4caf50; }
        }

        @keyframes pulse-red {
            from { box-shadow: 0 0 5px #f44336; }
            to { box-shadow: 0 0 20px #f44336; }
        }

        @keyframes pulse-gold {
            from { box-shadow: 0 0 5px gold; transform: scale(1); }
            to { box-shadow: 0 0 25px gold; transform: scale(1.02); }
        }

        .piece {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .piece:active {
            transform: scale(1.05);
        }

        .piece.black {
            background: radial-gradient(circle at 35% 35%, #444, #111);
            border: 1px solid #666;
        }

        .piece.white {
            background: radial-gradient(circle at 35% 35%, #fff, #ddd);
            border: 1px solid #999;
        }

        .piece.king::after {
            content: '👑';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            text-shadow: 0 0 3px gold;
        }

        .piece.black.king::after {
            filter: drop-shadow(0 0 2px gold);
        }

        /* Yan panel - Yenilen taşlar */
        .captured-area {
            display: flex;
            gap: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            margin: 5px 10px;
        }

        .captured-group {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        .captured-group span {
            font-size: 12px;
            margin-right: 8px;
        }

        .captured-piece-mini {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Bilgi mesajları */
        .notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #ffd700;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }

        @keyframes slideUp {
            from {
                bottom: 0;
                opacity: 0;
            }
            to {
                bottom: 100px;
                opacity: 1;
            }
        }

        /* Kazanma animasyonu */
        .winner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.5s;
        }

        .winner-content {
            text-align: center;
            animation: bounceIn 0.6s;
        }

        .trophy-icon {
            font-size: 80px;
            animation: trophyBounce 1s infinite;
        }

        .winner-text {
            font-size: 28px;
            margin: 20px 0;
            background: linear-gradient(45deg, gold, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes trophyBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Ses butonu */
        .sound-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 500px) {
            .timer-value {
                font-size: 18px;
            }
            .player-name {
                font-size: 12px;
            }
            .captured-piece-mini {
                width: 25px;
                height: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- Loading -->
        <div class="loading-screen" id="loadingScreen">
            <div class="loader"></div>
            <div class="loading-text">ŞAŞKI</div>
        </div>

        <!-- Ana Menü -->
        <div class="main-menu" id="mainMenu">
            <div class="header">
                <div class="user-profile">
                    <img id="userAvatar" src="" alt="Profile">
                    <div class="user-info">
                        <div class="user-name" id="userName">Player</div>
                        <div class="user-stats" id="userStats">⭐ 0 | 🏆 0</div>
                    </div>
                </div>
                <div class="language-selector">
                    <button class="lang-btn" data-lang="az">AZ</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
            </div>

            <div class="difficulty-section">
                <div class="section-title" id="difficultyLabel">⚡ ZORLUK SEVİYESİ ⚡</div>
                <div class="difficulty-buttons">
                    <button class="diff-btn easy" data-diff="easy">🟢 EASY</button>
                    <button class="diff-btn normal active" data-diff="normal">🟠 NORMAL</button>
                    <button class="diff-btn hard" data-diff="hard">🔴 HARD</button>
                </div>
            </div>

            <div class="menu-buttons">
                <button class="menu-btn primary" id="playVsAI">🤖 BOT İLE OYNA</button>
                <button class="menu-btn secondary" id="playVsFriend">👥 ARKADAŞ İLE</button>
                <button class="menu-btn locked" id="rankedBtn" disabled>🔒 DERECELİ (YAKINDA)</button>
            </div>
        </div>

        <!-- Oyun Ekranı -->
        <div class="game-screen" id="gameScreen">
            <div class="game-header">
                <div class="player-card">
                    <div class="player-info">
                        <img id="gamePlayerAvatar" src="">
                        <div class="player-details">
                            <div class="player-name" id="gamePlayerName">Siz</div>
                            <div class="turn-indicator" id="playerTurnIndicator">●</div>
                        </div>
                    </div>
                    <div class="timer-box">
                        <div class="timer-value" id="playerTimer">30</div>
                        <div class="timer-label">saniye</div>
                    </div>
                </div>
            </div>

            <div class="captured-area">
                <div class="captured-group">
                    <span>🎯 Yenilen:</span>
                    <div id="capturedWhite" style="display: flex; flex-wrap: wrap; gap: 5px;"></div>
                </div>
                <div class="captured-group">
                    <span>🎯 Yenilen:</span>
                    <div id="capturedBlack" style="display: flex; flex-wrap: wrap; gap: 5px;"></div>
                </div>
            </div>

            <div class="game-board-container">
                <div class="board" id="board"></div>
            </div>

            <div class="game-header" style="margin-top: auto;">
                <div class="player-card">
                    <div class="player-info">
                        <img id="gameOpponentAvatar" src="">
                        <div class="player-details">
                            <div class="player-name" id="gameOpponentName">Bot</div>
                            <div class="turn-indicator" id="opponentTurnIndicator">○</div>
                        </div>
                    </div>
                    <div class="timer-box">
                        <div class="timer-value" id="opponentTimer">30</div>
                        <div class="timer-label">saniye</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="sound-btn" id="soundBtn">🔊</button>

    <script src="game.js"></script>
</body>
</html>
