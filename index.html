<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BACKROOMS - THE POOLROOMS</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  }

  .hud-item {
    background: rgba(0,0,0,0.6);
    border: 1px solid #d4a017;
    border-radius: 8px;
    padding: 6px 14px;
    color: #d4a017;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 1px;
    backdrop-filter: blur(4px);
  }

  #key-status {
    color: #d4a017;
  }

  #key-status.has-key {
    color: #2ecc71;
    border-color: #2ecc71;
  }

  #danger-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background: radial-gradient(circle, transparent 30%, rgba(192,57,43,0) 70%);
    transition: all 0.1s;
  }

  #danger-overlay.active {
    background: radial-gradient(circle, rgba(192,57,43,0.3) 0%, rgba(192,57,43,0.6) 100%);
    animation: pulse 0.3s infinite;
  }

  /* Screens */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: all 0.3s;
  }

  .screen.hidden {
    display: none;
  }

  #menu-screen {
    background: radial-gradient(ellipse at center, #0a0800 0%, #000 100%);
  }

  #loading-screen {
    background: #000;
  }

  #caught-screen, #win-screen {
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(8px);
  }

  .game-title {
    font-size: clamp(48px, 15vw, 120px);
    color: #d4a017;
    text-shadow: 0 0 30px #d4a017, 0 0 60px rgba(212,160,23,0.5);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    letter-spacing: 8px;
    margin-bottom: 20px;
    animation: flicker 3s infinite;
  }

  .game-sub {
    color: #8a6800;
    font-size: 14px;
    letter-spacing: 4px;
    margin-bottom: 40px;
  }

  .btn {
    background: #d4a017;
    border: none;
    padding: 14px 48px;
    font-size: 20px;
    font-weight: bold;
    color: #000;
    border-radius: 8px;
    cursor: pointer;
    margin: 10px;
    font-family: 'Courier New', monospace;
    transition: transform 0.1s, background 0.2s;
  }

  .btn:active {
    transform: scale(0.96);
    background: #b8860b;
  }

  .btn-secondary {
    background: transparent;
    border: 2px solid #d4a017;
    color: #d4a017;
  }

  .loading-bar {
    width: 300px;
    height: 4px;
    background: #1a1400;
    border-radius: 2px;
    overflow: hidden;
    margin: 20px;
  }

  .loading-progress {
    width: 0%;
    height: 100%;
    background: #d4a017;
    transition: width 0.2s;
    box-shadow: 0 0 10px #d4a017;
  }

  .caught-icon, .win-icon {
    font-size: 80px;
    margin-bottom: 20px;
  }

  .caught-title {
    font-size: 48px;
    color: #c0392b;
    margin-bottom: 10px;
  }

  .win-title {
    font-size: 48px;
    color: #2ecc71;
    margin-bottom: 10px;
  }

  /* Mobile controls */
  #mobile-controls {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    pointer-events: none;
    z-index: 15;
  }

  .control-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(212,160,23,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    color: #d4a017;
    pointer-events: auto;
    touch-action: none;
    backdrop-filter: blur(4px);
  }

  .control-btn:active {
    background: rgba(212,160,23,0.3);
    transform: scale(0.95);
  }

  #joystick-area {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    border: 2px solid rgba(212,160,23,0.3);
    position: relative;
    pointer-events: auto;
    touch-action: none;
  }

  #joystick-handle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #d4a017, #8a6800);
    position: absolute;
    top: 35px;
    left: 35px;
    pointer-events: none;
  }

  .controls-hint {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #5a4a1a;
    font-size: 10px;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 5px;
    pointer-events: none;
    z-index: 15;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; text-shadow: 0 0 30px #d4a017; }
    96% { opacity: 0.7; text-shadow: 0 0 10px #d4a017; }
    98% { opacity: 0.9; text-shadow: 0 0 20px #d4a017; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  @media (pointer: fine) {
    #mobile-controls { display: none; }
    .controls-hint { display: block; }
  }

  @media (pointer: coarse) {
    .controls-hint { display: none; }
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div class="hud-item" id="key-status">🔑 ANAHTAR YOK</div>
  <div class="hud-item" id="distance">📏 ?</div>
</div>
<div id="danger-overlay"></div>

<div id="mobile-controls">
  <div id="joystick-area">
    <div id="joystick-handle"></div>
  </div>
  <div class="control-btn" id="jump-btn">▲</div>
  <div class="control-btn" id="run-btn">⚡</div>
</div>
<div class="controls-hint">WASD + MOUSE | SPACE Zıpla | SHIFT Koş | E Etkileşim</div>

<div id="loading-screen" class="screen">
  <div class="game-title">BACKROOMS</div>
  <div class="loading-bar"><div class="loading-progress" id="loadProgress"></div></div>
  <div class="game-sub" id="loadText">YÜKLENİYOR...</div>
</div>

<div id="menu-screen" class="screen hidden">
  <div class="game-title">BACKROOMS</div>
  <div class="game-sub">LEVEL 0 — THE POOLROOMS</div>
  <button class="btn" id="playBtn">🎮 OFFLINE OYNA</button>
</div>

<div id="caught-screen" class="screen hidden">
  <div class="caught-icon">💀</div>
  <div class="caught-title">YAKALANDIN</div>
  <div class="game-sub">CANAVAR SENİ BULDU</div>
  <button class="btn" id="retryBtn">🔄 TEKRAR DENE</button>
  <button class="btn btn-secondary" id="menuBtn">🏠 ANA MENÜ</button>
</div>

<div id="win-screen" class="screen hidden">
  <div class="win-icon">🔑🏃</div>
  <div class="win-title">KAÇTIN!</div>
  <div class="game-sub">ANAHTARI ALIP ÇIKMAYI BAŞARDIN</div>
  <button class="btn" id="winRetryBtn">🔄 TEKRAR OYNA</button>
  <button class="btn btn-secondary" id="winMenuBtn">🏠 ANA MENÜ</button>
</div>

<script src="game.js"></script>
</body>
</html>
