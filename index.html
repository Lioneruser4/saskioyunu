<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO DAR KANYON · Stratejik Engeller · 45 saniye</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0b1d29;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 5px;
        }
        .pro-frame {
            width: min(340px, 95vw);
            background: #0f3143;
            border-radius: 56px 56px 32px 32px;
            padding: 18px 8px 20px 8px;
            box-shadow: 0 35px 40px -15px black, inset 0 -5px 15px #5ab3ff;
            border: 3px solid #60aeff;
        }
        .screen {
            position: relative;
            width: 100%;
            aspect-ratio: 320 / 760;
            background: #124f6e;
            border-radius: 44px;
            padding: 6px;
            box-shadow: inset 0 0 0 5px #bae0ff, inset 0 0 35px #1b7099;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #22638b 0%, #0c3d55 100%);
            border-radius: 38px;
            border: 4px solid #ffd37c;
            cursor: default;
            touch-action: pan-y pinch-zoom;
        }
        .dashboard {
            margin: 16px 4px 5px 4px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .emoji-bar {
            background: #093141;
            border-radius: 70px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #fcb13b;
            box-shadow: inset 0 3px 12px #2782aa;
        }
        .emoji-bar .label {
            color: white;
            font-weight: 700;
            background: #1c698c;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            letter-spacing: 0.5px;
            text-shadow: 2px 2px 0 #063c50;
        }
        .emoji-set {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .emoji-btn {
            font-size: 2rem;
            background: #1b6c91;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            box-shadow: 0 5px 0 #073342, 0 6px 10px black;
            transition: 0.06s;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .emoji-btn.selected {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #073342, 0 6px 10px black;
            background: #ffaa2b;
            border: 3px solid #fff6d1;
        }
        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .pro-btn {
            background: #fff0cb;
            border: none;
            border-radius: 60px;
            padding: 14px 0;
            font-weight: 800;
            font-size: 1.25rem;
            color: #022c3a;
            box-shadow: 0 7px 0 #8a521a, 0 8px 18px black;
            flex: 1;
            display: flex;
                align-items: center;
            justify-content: center;
            gap: 6px;
            border: 2px solid #ffd77c;
            cursor: pointer;
            transition: 0.05s;
        }
        .pro-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #8a521a, 0 8px 18px black;
        }
        .timer-box {
            background: #032b39;
            padding: 14px 15px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #fabe4e;
            color: #fcf3cf;
            font-weight: bold;
            font-size: 1.25rem;
            text-shadow: 2px 2px 0 #1f4457;
            margin-top: 6px;
        }
        .timer-fill {
            height: 16px;
            background: #ffe6a3;
            border-radius: 30px;
            width: 100%;
            box-shadow: inset 0 2px 6px #4d3d1b;
            transition: width 0.1s;
        }
        .footer-note {
            text-align: center;
            color: #bce0ff;
            margin-top: 12px;
            font-weight: 500;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="pro-frame">
    <div class="screen">
        <canvas id="gameCanvas" width="320" height="760"></canvas>
    </div>

    <div class="dashboard">
        <div class="emoji-bar">
            <span class="label">🇹🇷 TOP</span>
            <div class="emoji-set">
                <button class="emoji-btn selected" data-emoji="🇹🇷">🇹🇷</button>
                <button class="emoji-btn" data-emoji="🇯🇵">🇯🇵</button>
                <button class="emoji-btn" data-emoji="🇩🇪">🇩🇪</button>
                <button class="emoji-btn" data-emoji="🇧🇷">🇧🇷</button>
                <button class="emoji-btn" data-emoji="🇺🇸">🇺🇸</button>
                <button class="emoji-btn" data-emoji="⚽">⚽</button>
                <button class="emoji-btn" data-emoji="🐺">🐺</button>
                <button class="emoji-btn" data-emoji="🦅">🦅</button>
                <button class="emoji-btn" data-emoji="👾">👾</button>
            </div>
        </div>

        <div class="action-row">
            <button class="pro-btn" id="startBtn">🚦 BAŞLAT 45sn</button>
            <button class="pro-btn" id="addBallBtn">➕ TOP EKLE</button>
            <button class="pro-btn" id="resetBtn">⟲ YENİ OYUN</button>
        </div>

        <div class="timer-box" id="statusMsg">
            <span>⏳ 45s</span>
            <span>🎯 HEDEF ÇUKUR</span>
        </div>
        <div class="timer-fill" id="timerFill" style="width:100%"></div>
    </div>
    <div class="footer-note">
        ⬇️ 45sn · stratejik engeller (dönen, sabit, dar) · sadece butonla top eklenir · profesyonel fizik
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 320, CH = 760;
        canvas.width = CW; canvas.height = CH;

        // --- Oyun değişkenleri ---
        let balls = [];
        let winnerIndex = -1;
        let gameActive = false;
        let startTime = null;
        let elapsedSeconds = 0;
        const RACE_DURATION = 45;
        const BALL_RADIUS = 12;

        const GRAVITY = 0.19;
        const GROUND_Y = CH - 30;

        let cameraY = 0;
        const CAM_SMOOTH = 0.05;

        let selectedEmoji = '🇹🇷';

        // --- HEDEF (dar çukur) - 16500 derinlik ---
        const TARGET_PIT = {
            x: CW/2 - 19,
            y: 16500,
            w: 38,
            h: 16,
        };

        // ========== PROFESYONEL ENGEL TASARIMI ==========
        // Her engel bilinçli yerleştirildi, rastgele değil!
        let obstacles = [];

        function buildObstacles() {
            obstacles = [
                // BÖLGE 1: Giriş (0-2000) - hafif engeller
                { type: 'fixed', x: 100, y: 400, w: 70, h: 8, angle: 0.1 },
                { type: 'spinner', x: 220, y: 750, w: 60, h: 8, angle: 0.5, spinSpeed: 0.02 },
                { type: 'fixed', x: 150, y: 1100, w: 8, h: 90, angle: 0.2 },
                { type: 'spinner', x: 270, y: 1500, w: 55, h: 7, angle: 1.0, spinSpeed: -0.025 },
                { type: 'fixed', x: 60, y: 1800, w: 80, h: 7, angle: -0.2 },
                
                // BÖLGE 2: Orta bölge (2000-5000) - dönen ve sabit karışık
                { type: 'spinner', x: 190, y: 2300, w: 75, h: 8, angle: 0.3, spinSpeed: 0.018 },
                { type: 'fixed', x: 80, y: 2800, w: 45, h: 7, angle: 0.5 },
                { type: 'fixed', x: 250, y: 3200, w: 7, h: 110, angle: 0.0 },
                { type: 'spinner', x: 140, y: 3700, w: 90, h: 8, angle: 0.8, spinSpeed: 0.022 },
                { type: 'fixed', x: 220, y: 4200, w: 60, h: 7, angle: -0.3 },
                { type: 'spinner', x: 70, y: 4700, w: 65, h: 8, angle: 1.4, spinSpeed: -0.02 },
                
                // BÖLGE 3: Yoğun bölge (5000-8000) - çapraz ve dikey
                { type: 'fixed', x: 120, y: 5300, w: 8, h: 130, angle: 0.3 },
                { type: 'fixed', x: 210, y: 5800, w: 8, h: 140, angle: -0.2 },
                { type: 'spinner', x: 160, y: 6400, w: 85, h: 9, angle: 0.0, spinSpeed: 0.03 },
                { type: 'fixed', x: 50, y: 6900, w: 70, h: 8, angle: 0.6 },
                { type: 'spinner', x: 280, y: 7400, w: 55, h: 8, angle: 2.0, spinSpeed: -0.028 },
                { type: 'fixed', x: 190, y: 7800, w: 7, h: 100, angle: 0.4 },
                
                // BÖLGE 4: Kıvrımlı bölge (8000-11000)
                { type: 'spinner', x: 100, y: 8300, w: 70, h: 7, angle: 0.7, spinSpeed: 0.017 },
                { type: 'fixed', x: 240, y: 8800, w: 60, h: 7, angle: -0.5 },
                { type: 'spinner', x: 70, y: 9300, w: 80, h: 8, angle: 1.2, spinSpeed: 0.025 },
                { type: 'fixed', x: 170, y: 9800, w: 8, h: 120, angle: 0.15 },
                { type: 'fixed', x: 290, y: 10200, w: 50, h: 7, angle: 0.3 },
                { type: 'spinner', x: 130, y: 10700, w: 95, h: 8, angle: 0.9, spinSpeed: -0.02 },
                
                // BÖLGE 5: Labirent (11000-13500)
                { type: 'fixed', x: 80, y: 11200, w: 8, h: 150, angle: 0.0 },
                { type: 'fixed', x: 200, y: 11700, w: 8, h: 140, angle: 0.2 },
                { type: 'spinner', x: 260, y: 12200, w: 70, h: 8, angle: 0.4, spinSpeed: 0.022 },
                { type: 'fixed', x: 140, y: 12700, w: 70, h: 7, angle: -0.4 },
                { type: 'spinner', x: 40, y: 13200, w: 65, h: 8, angle: 1.8, spinSpeed: 0.018 },
                
                // BÖLGE 6: Son bölge (13500-16200) - çok dar, zorlu
                { type: 'fixed', x: 110, y: 13700, w: 8, h: 130, angle: 0.1 },
                { type: 'spinner', x: 220, y: 14200, w: 80, h: 8, angle: 0.6, spinSpeed: -0.025 },
                { type: 'fixed', x: 180, y: 14700, w: 55, h: 7, angle: 0.5 },
                { type: 'spinner', x: 90, y: 15200, w: 100, h: 8, angle: 1.3, spinSpeed: 0.02 },
                { type: 'fixed', x: 260, y: 15700, w: 8, h: 110, angle: -0.1 },
                { type: 'spinner', x: 150, y: 16200, w: 70, h: 8, angle: 0.2, spinSpeed: 0.015 },
                
                // Hedefe yakın son 3 engel
                { type: 'fixed', x: 120, y: 16400, w: 40, h: 7, angle: 0.0 },
                { type: 'fixed', x: 200, y: 16450, w: 40, h: 7, angle: 0.0 },
                { type: 'spinner', x: 160, y: 16580, w: 70, h: 8, angle: 0.5, spinSpeed: 0.03 }
            ];
            // toplam 40 özenle yerleştirilmiş engel
        }
        buildObstacles();

        // --- Emoji seçim ---
        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedEmoji = btn.getAttribute('data-emoji');
            });
        });

        const statusDiv = document.getElementById('statusMsg');
        const timerFill = document.getElementById('timerFill');

        // --- SADECE BUTONLA TOP EKLEME (canvas dokunma devre dışı) ---
        document.getElementById('addBallBtn').addEventListener('click', () => {
            if (winnerIndex !== -1) return;
            
            // Topu üst bölgeye ekle (çeşitlilik için)
            let worldX = CW/2 + (Math.random() - 0.5) * 50;
            worldX = Math.min(Math.max(worldX, BALL_RADIUS + 15), CW - BALL_RADIUS - 15);
            const worldY = cameraY + 150 + Math.random() * 250;
            
            balls.push({
                emoji: selectedEmoji,
                x: worldX,
                y: worldY,
                vx: (Math.random() - 0.5) * 1.4,
                vy: 1.2 + Math.random() * 2.0,
                radius: BALL_RADIUS
            });
        });

        // BAŞLAT butonu
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!gameActive && winnerIndex === -1) {
                if (balls.length === 0) {
                    statusDiv.innerHTML = `<span>⚠️ TOP EKLE</span><span></span>`;
                    return;
                }
                gameActive = true;
                if (startTime === null) startTime = performance.now();
            }
        });

        // Sıfırla
        document.getElementById('resetBtn').addEventListener('click', () => {
            balls = [];
            winnerIndex = -1;
            gameActive = false;
            startTime = null;
            elapsedSeconds = 0;
            cameraY = 0;
            buildObstacles();
            statusDiv.innerHTML = `<span>⏳ 45s</span><span>🎯 HEDEF ÇUKUR</span>`;
            timerFill.style.width = '100%';
        });

        // --- GELİŞMİŞ ÇARPIŞMA SİSTEMİ ---
        function rotatePoint(cx, cy, x, y, angle) {
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            const dx = x - cx;
            const dy = y - cy;
            return { x: cx + dx * cos - dy * sin, y: cy + dx * sin + dy * cos };
        }

        function ballObstacleCollision(ball, ob) {
            const cx = ob.x, cy = ob.y, w = ob.w, h = ob.h, angle = ob.angle || 0;
            
            // topu engelin lokal uzayına çevir
            const local = rotatePoint(cx, cy, ball.x, ball.y, -angle);
            
            const left = cx - w/2;
            const right = cx + w/2;
            const top = cy - h/2;
            const bottom = cy + h/2;
            
            const closestX = Math.max(left, Math.min(local.x, right));
            const closestY = Math.max(top, Math.min(local.y, bottom));
            
            let dx = local.x - closestX;
            let dy = local.y - closestY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < ball.radius && dist > 0.001) {
                const overlap = ball.radius - dist;
                const nx = dx / dist;
                const ny = dy / dist;
                
                // konum düzeltme (lokal)
                const newLocalX = local.x + nx * overlap;
                const newLocalY = local.y + ny * overlap;
                
                // dünyaya geri çevir
                const world = rotatePoint(cx, cy, newLocalX, newLocalY, angle);
                ball.x = world.x;
                ball.y = world.y;

                // hız tepkisi
                let vLocal = rotatePoint(0, 0, ball.vx, ball.vy, -angle);
                let vn = vLocal.x * nx + vLocal.y * ny;
                
                if (vn < 0) {
                    let vt_x = vLocal.x - vn * nx;
                    let vt_y = vLocal.y - vn * ny;
                    let vn_new = -vn * 0.52;
                    
                    vLocal.x = vt_x + vn_new * nx;
                    vLocal.y = vt_y + vn_new * ny;
                    
                    let vWorld = rotatePoint(0, 0, vLocal.x, vLocal.y, angle);
                    ball.vx = vWorld.x * 0.98;
                    ball.vy = vWorld.y * 0.98;
                }
                return true;
            }
            return false;
        }

        function ballBallCollision() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i], b2 = balls[j];
                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let minDist = b1.radius + b2.radius;
                    
                    if (dist < minDist && dist > 0.001) {
                        let overlap = (minDist - dist) / 2;
                        let nx = dx / dist;
                        let ny = dy / dist;
                        
                        b1.x -= nx * overlap;
                        b1.y -= ny * overlap;
                        b2.x += nx * overlap;
                        b2.y += ny * overlap;

                        let v1n = b1.vx * nx + b1.vy * ny;
                        let v2n = b2.vx * nx + b2.vy * ny;
                        let v1t_x = b1.vx - v1n * nx;
                        let v1t_y = b1.vy - v1n * ny;
                        let v2t_x = b2.vx - v2n * nx;
                        let v2t_y = b2.vy - v2n * ny;

                        let v1n_after = (v1n + v2n) / 2;
                        let v2n_after = v1n_after;

                        b1.vx = v1t_x + v1n_after * nx;
                        b1.vy = v1t_y + v1n_after * ny;
                        b2.vx = v2t_x + v2n_after * nx;
                        b2.vy = v2t_y + v2n_after * ny;
                    }
                }
            }
        }

        // --- Fizik güncelleme ---
        function update() {
            if (!gameActive || winnerIndex !== -1) return;

            if (startTime !== null) {
                const now = performance.now();
                elapsedSeconds = (now - startTime) / 1000;
                if (elapsedSeconds >= RACE_DURATION) {
                    gameActive = false;
                    statusDiv.innerHTML = `<span>⏱️ SÜRE DOLDU</span><span></span>`;
                    timerFill.style.width = '0%';
                    return;
                } else {
                    const percent = ((RACE_DURATION - elapsedSeconds) / RACE_DURATION) * 100;
                    timerFill.style.width = percent + '%';
                    statusDiv.innerHTML = `<span>⏳ ${(RACE_DURATION - elapsedSeconds).toFixed(1)}s</span><span>🎯 ${balls.length} top</span>`;
                }
            }

            // yerçekimi ve hareket
            for (let b of balls) {
                b.vy += GRAVITY;
                b.x += b.vx;
                b.y += b.vy;

                b.vx *= 0.997;
                b.vy *= 0.997;

                // duvarlar (kenarlar)
                if (b.x - b.radius < 10) { b.x = 10 + b.radius; b.vx *= -0.4; }
                if (b.x + b.radius > CW - 10) { b.x = CW - 10 - b.radius; b.vx *= -0.4; }
                if (b.y + b.radius > GROUND_Y + 16000) { b.y = GROUND_Y + 16000 - b.radius; b.vy *= -0.3; }
            }

            ballBallCollision();

            // çarpışma iterasyonu (4 kez)
            for (let iter = 0; iter < 4; iter++) {
                for (let b of balls) {
                    for (let ob of obstacles) {
                        ballObstacleCollision(b, ob);
                    }
                }
            }

            // dönen engeller
            obstacles.forEach(ob => { if (ob.type === 'spinner') ob.angle += ob.spinSpeed; });

            // hedef kontrolü
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                if (b.x > TARGET_PIT.x && b.x < TARGET_PIT.x + TARGET_PIT.w &&
                    b.y > TARGET_PIT.y && b.y < TARGET_PIT.y + TARGET_PIT.h) {
                    if (winnerIndex === -1 && gameActive) {
                        winnerIndex = i;
                        gameActive = false;
                        statusDiv.innerHTML = `<span>🏆 KAZANAN</span><span>${b.emoji}</span>`;
                        timerFill.style.width = '0%';
                        break;
                    }
                }
            }

            // kamera (en dipteki top)
            if (balls.length > 0) {
                let lowestY = Math.max(...balls.map(b => b.y));
                let targetCamera = Math.max(0, lowestY - CH * 0.45);
                cameraY += (targetCamera - cameraY) * CAM_SMOOTH;
            }
        }

        // --- Çizim ---
        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // arkaplan
            ctx.fillStyle = '#1c5c81';
            ctx.fillRect(0, 0, CW, CH);
            for (let i = 0; i < 25; i++) {
                ctx.fillStyle = '#a0d6ff20';
                ctx.fillRect(0, i*70 - cameraY*0.3, CW, 15);
            }

            // hedef çukur
            ctx.save();
            const pitY = TARGET_PIT.y - cameraY;
            if (pitY + TARGET_PIT.h > 0 && pitY < CH) {
                ctx.fillStyle = '#d64824';
                ctx.shadowColor = '#ffb45e';
                ctx.shadowBlur = 45;
                ctx.fillRect(TARGET_PIT.x, pitY, TARGET_PIT.w, TARGET_PIT.h);
                ctx.font = 'bold 28px sans-serif';
                ctx.fillStyle = '#ffffe0';
                ctx.fillText('🕳️', TARGET_PIT.x+2, pitY-20);
            }
            ctx.restore();

            // engeller
            obstacles.forEach(ob => {
                const scY = ob.y - cameraY;
                if (scY + ob.h/2 < 0 || scY - ob.h/2 > CH) return;
                
                ctx.save();
                ctx.translate(ob.x, scY);
                ctx.rotate(ob.angle || 0);
                ctx.fillStyle = ob.type === 'spinner' ? '#d9782b' : '#b84cd8';
                ctx.shadowColor = '#101c24';
                ctx.shadowBlur = 24;
                ctx.shadowOffsetY = 5;
                ctx.fillRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                ctx.strokeStyle = '#ffe89c';
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 20;
                ctx.strokeRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                ctx.restore();
            });

            // toplar
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                const scrX = b.x;
                const scrY = b.y - cameraY;
                if (scrY + b.radius < 0 || scrY - b.radius > CH) continue;

                ctx.shadowColor = '#001d2b';
                ctx.shadowBlur = 24;
                ctx.shadowOffsetY = 6;
                ctx.beginPath();
                ctx.arc(scrX, scrY, b.radius+2, 0, 2*Math.PI);
                ctx.fillStyle = '#ffffe5';
                ctx.fill();

                ctx.font = `${b.radius+9}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Twemoji Mozilla", "Android Emoji", Emoji, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = i === winnerIndex ? 'gold' : '#003144';
                ctx.fillStyle = i === winnerIndex ? '#ffffc2' : 'white';
                ctx.fillText(b.emoji, scrX, scrY-2);

                if (i === winnerIndex) {
                    ctx.font = '28px sans-serif';
                    ctx.fillStyle = '#ffdb70';
                    ctx.fillText('👑', scrX-14, scrY-54);
                }
            }

            // üst fade
            const grad = ctx.createLinearGradient(0, 0, 0, 80);
            grad.addColorStop(0, '#01212b');
            grad.addColorStop(1, '#01212b00');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CW, 80);

            requestAnimationFrame(draw);
        }

        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
        draw();
    })();
