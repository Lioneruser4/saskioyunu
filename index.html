<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Takipçi Takip Sistemi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-info h2 { font-size: 18px; color: #333; }
        .profile-info p { color: #666; font-size: 14px; }
        .input-group {
            margin-bottom: 15px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.98); }
        .account-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .account-card h3 { font-size: 16px; margin-bottom: 5px; }
        .account-card p { font-size: 12px; color: #666; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 8px;
        }
        .badge.increase { background: #d4edda; color: #155724; }
        .badge.decrease { background: #f8d7da; color: #721c24; }
        .silent-mode {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .toggle {
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle.active { background: #667eea; }
        .toggle::after {
            content: '';
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.3s;
        }
        .toggle.active::after { left: 25px; }
        .notification-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .notification-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .status { color: #28a745; font-weight: bold; }
        @media (max-width: 480px) {
            body { padding: 10px; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="loginCard">
            <h2 style="text-align: center; margin-bottom: 20px;">🔐 Telegram ile Giriş</h2>
            <button onclick="loginWithTelegram()">Telegram ile Giriş Yap</button>
        </div>

        <div id="mainContent" style="display: none;">
            <div class="card">
                <div class="profile" id="profileInfo"></div>
                
                <div class="input-group">
                    <input type="text" id="instagramUsername" placeholder="Instagram kullanıcı adı (örn: ornek_hesap)">
                </div>
                <button onclick="addAccount()">➕ Takip Etmeye Başla</button>
                
                <div class="silent-mode">
                    <span>🔕 Sessiz Mod (Bildirimleri Kapat)</span>
                    <div id="silentToggle" class="toggle" onclick="toggleSilentMode()"></div>
                </div>
            </div>

            <div class="card">
                <h3>📊 Takip Edilen Hesaplar</h3>
                <div id="accountsList"></div>
            </div>

            <div class="card">
                <h3>🔔 Son Değişiklikler</h3>
                <div id="notifications" class="notification-list"></div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let silentMode = localStorage.getItem('silentMode') === 'true';
        
        // Telegram Web App entegrasyonu
        const tg = window.Telegram?.WebApp;
        
        function loginWithTelegram() {
            if (tg) {
                tg.ready();
                const initData = tg.initDataUnsafe;
                if (initData && initData.user) {
                    verifyUser(initData.user);
                }
            } else {
                // Demo mod - gerçek kullanıcı bilgisi için Telegram'dan alınmalı
                const demoUser = {
                    id: 123456789,
                    first_name: "Demo",
                    username: "demo_user",
                    photo_url: "https://via.placeholder.com/60"
                };
                verifyUser(demoUser);
            }
        }
        
        async function verifyUser(user) {
            try {
                const response = await fetch('/api/verify-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: user.id })
                });
                const data = await response.json();
                if (data.success) {
                    currentUser = { ...user, ...data.user };
                    showMainContent();
                }
            } catch (error) {
                console.error('Login error:', error);
            }
        }
        
        function showMainContent() {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            const profileHtml = `
                <img class="profile-img" src="${currentUser.photo_url || 'https://via.placeholder.com/60'}" alt="Profile">
                <div class="profile-info">
                    <h2>${currentUser.first_name} ${currentUser.last_name || ''}</h2>
                    <p>@${currentUser.username || 'kullanici'}</p>
                </div>
            `;
            document.getElementById('profileInfo').innerHTML = profileHtml;
            
            document.getElementById('silentToggle').classList.toggle('active', silentMode);
            loadAccounts();
        }
        
        async function addAccount() {
            const username = document.getElementById('instagramUsername').value.trim();
            if (!username) {
                alert('Lütfen Instagram kullanıcı adı girin');
                return;
            }
            
            const response = await fetch('/api/add-account', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    telegram_id: currentUser.id,
                    instagram_username: username
                })
            });
            
            if (response.ok) {
                document.getElementById('instagramUsername').value = '';
                loadAccounts();
                addNotification('Yeni hesap takip ediliyor: @' + username);
            } else {
                alert('Hesap eklenirken hata oluştu');
            }
        }
        
        async function loadAccounts() {
            const response = await fetch(`/api/tracked-accounts/${currentUser.id}`);
            const accounts = await response.json();
            
            const accountsHtml = accounts.map(acc => `
                <div class="account-card">
                    <h3>@${acc.instagram_username}</h3>
                    <p>Takipçi: ${acc.last_followers || acc.initial_followers}</p>
                    <p>Eklenme: ${new Date(acc.added_at).toLocaleString('tr-TR')}</p>
                </div>
            `).join('');
            
            document.getElementById('accountsList').innerHTML = accountsHtml || '<p style="text-align:center;color:#666;">Henüz takip edilen hesap yok</p>';
        }
        
        function addNotification(message, type = 'info') {
            const notifDiv = document.getElementById('notifications');
            const notifItem = document.createElement('div');
            notifItem.className = 'notification-item';
            notifItem.innerHTML = `
                <span>${new Date().toLocaleTimeString('tr-TR')}</span>
                <div>${message}</div>
            `;
            notifDiv.insertBefore(notifItem, notifDiv.firstChild);
            
            // Sessiz modda değilse bildirim göster
            if (!silentMode && 'Notification' in window && Notification.permission === 'granted') {
                new Notification('Takipçi Takip', { body: message });
            }
        }
        
        function toggleSilentMode() {
            silentMode = !silentMode;
            localStorage.setItem('silentMode', silentMode);
            document.getElementById('silentToggle').classList.toggle('active', silentMode);
            addNotification(silentMode ? 'Sessiz mod aktif' : 'Sessiz mod pasif');
        }
        
        // Bildirim izni iste
        if ('Notification' in window && Notification.permission !== 'denied') {
            Notification.requestPermission();
        }
        
        // Sayfa yüklendiğinde Telegram Web App'i kontrol et
        if (tg) {
            tg.ready();
            if (tg.initDataUnsafe?.user) {
                verifyUser(tg.initDataUnsafe.user);
            }
        }
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
