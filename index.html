<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milyonçu AZ - Sıralama</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-start: #0a1a2f;
            --bg-end: #0d2b4b;
            --gold: #ffd966;
            --gold-light: #ffb347;
            --card-bg: rgba(255,255,255,0.05);
        }

        body {
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            color: white;
        }

        .leaderboard-page {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 16px 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .back-btn {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--gold);
        }

        .header h1 {
            flex: 1;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gold);
        }

        .leaderboard-list {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.2);
            margin-bottom: 20px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            animation: slideIn 0.3s;
        }

        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: rgba(255,215,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--gold);
        }

        .rank-1 .rank-badge { background: linear-gradient(145deg, #ffd966, #ffb347); color: #0a1a2f; }
        .rank-2 .rank-badge { background: linear-gradient(145deg, #c0c0c0, #a0a0a0); color: #0a1a2f; }
        .rank-3 .rank-badge { background: linear-gradient(145deg, #cd7f32, #b06d2b); color: #0a1a2f; }

        .player-avatar {
            width: 48px;
            height: 48px;
            border-radius: 48px;
            background: linear-gradient(145deg, var(--gold), var(--gold-light));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-avatar span {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0a1a2f;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .player-date {
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .player-score {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .current-user {
            background: rgba(255,215,0,0.2);
            border-radius: 40px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid var(--gold);
            margin-top: auto;
        }

        .current-rank {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gold);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="leaderboard-page">
        <div class="header">
            <div class="back-btn" onclick="window.location.href='lobi.html'">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h1><i class="fas fa-trophy"></i> TOP 10</h1>
        </div>

        <div class="leaderboard-list" id="leaderboardList">
            <div style="text-align:center; padding:40px;">Yüklənir...</div>
        </div>

        <div class="current-user" id="currentUser">
            <span>Sizin sıranız: <span id="userName"></span></span>
            <span class="current-rank" id="userRank">#0</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user || {
            id: Math.floor(Math.random() * 1000000),
            first_name: 'İstifadəçi',
            last_name: '',
            photo_url: null
        };

        function loadLeaderboard() {
            try {
                const leaderboard = JSON.parse(localStorage.getItem('milyoncu_leaderboard') || '[]');
                const list = document.getElementById('leaderboardList');
                
                if (leaderboard.length === 0) {
                    list.innerHTML = '<div style="text-align:center; padding:40px;">Hələ oyunçu yoxdur</div>';
                    return;
                }
                
                list.innerHTML = '';
                
                leaderboard.slice(0, 10).forEach((player, index) => {
                    const div = document.createElement('div');
                    div.className = `leaderboard-item rank-${index + 1}`;
                    
                    let avatarHtml = '';
                    if (player.photo_url) {
                        avatarHtml = `<img src="${player.photo_url}" style="width:100%; height:100%; object-fit:cover;">`;
                    } else {
                        avatarHtml = `<span>${player.name.charAt(0)}</span>`;
                    }
                    
                    const date = new Date(player.date).toLocaleDateString('az');
                    
                    div.innerHTML = `
                        <div class="rank-badge">${index + 1}</div>
                        <div class="player-avatar">${avatarHtml}</div>
                        <div class="player-info">
                            <div class="player-name">${player.name}</div>
                            <div class="player-date">${date}</div>
                        </div>
                        <div class="player-score">
                            <i class="fas fa-coins"></i> ${player.score}
                        </div>
                    `;
                    list.appendChild(div);
                });
                
                // İstifadəçinin sırası
                const userRank = leaderboard.findIndex(p => p.id === user.id) + 1;
                document.getElementById('userRank').innerText = userRank ? `#${userRank}` : '#0';
                document.getElementById('userName').innerText = user.first_name;
                
            } catch (e) {}
        }

        loadLeaderboard();
    </script>
</body>
</html>
