<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hareket Takip - Tam Şekil Algılama | Tam Ekran Kamera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Tam ekran kamera container */
        .fullscreen-camera {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        canvas, video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        video {
            filter: brightness(1.02) contrast(1.05);
            z-index: 1;
        }

        canvas {
            z-index: 2;
            pointer-events: none;
        }

        /* Şeffaf kontrol paneli - ekranın altında, tam ekranı engellemez */
        .control-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-top: 1px solid rgba(72, 255, 120, 0.4);
            font-weight: 500;
            pointer-events: auto;
        }

        .stats {
            display: flex;
            gap: 1.8rem;
            color: #eef5ff;
            text-shadow: 0 1px 3px black;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .stats span {
            color: #4affb5;
            font-weight: bold;
            font-size: 1.2rem;
            margin-left: 6px;
            background: #000000aa;
            padding: 2px 10px;
            border-radius: 30px;
            letter-spacing: 0.5px;
        }

        button {
            background: #1e3a3a;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.1s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
        }

        button:active {
            transform: scale(0.96);
            background: #0f2a2a;
        }

        .status {
            background: #0a1a1acc;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #bbffdd;
            font-family: monospace;
        }

        .fps-meter {
            font-family: monospace;
            font-weight: bold;
            background: #000000aa;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .object-shape-badge {
            background: #1e5a3acc;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.75rem;
        }

        @media (max-width: 700px) {
            .stats { gap: 0.8rem; font-size: 0.7rem;}
            .stats span { font-size: 1rem; padding: 2px 6px;}
            .control-overlay { padding: 8px 12px; gap: 8px; }
            button { padding: 6px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="fullscreen-camera">
    <div class="video-wrapper">
        <video id="video" autoplay playsinline muted style="width:100%; height:100%; object-fit: cover;"></video>
        <canvas id="overlayCanvas" style="width:100%; height:100%; object-fit: cover;"></canvas>
    </div>
</div>

<div class="control-overlay">
    <div class="stats">
        <div>🎯 TAKİP EDİLEN NESNE: <span id="objectCount">0</span></div>
        <div>📊 HAREKET ALANI: <span id="motionScore">0</span> px</div>
    </div>
    <div class="status" id="camStatus">📷 KAMERA BAŞLATILIYOR...</div>
    <div class="fps-meter" id="fpsDisplay">⚡ 0 FPS</div>
    <button id="resetBtn">⟳ YENİDEN BAŞLAT</button>
</div>

<script>
    (function(){
        // ---- DOM ELEMANLARI ----
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlayCanvas');
        const ctx = canvas.getContext('2d');
        const objectCountSpan = document.getElementById('objectCount');
        const motionScoreSpan = document.getElementById('motionScore');
        const camStatusDiv = document.getElementById('camStatus');
        const fpsDisplaySpan = document.getElementById('fpsDisplay');
        const resetBtn = document.getElementById('resetBtn');

        // ---- PERFORMANS & ALGILAMA AYARLARI ----
        let animationFrameId = null;
        let processingFrame = false;
        let lastTimestamp = 0;
        let frameCount = 0;
        let fps = 0;
        
        // Hareket algılama değişkenleri
        let previousGrayFrame = null;      // önceki gri kare (blurlanmış)
        let width = 0, height = 0;
        let active = true;
        
        // ÖNEMLİ AYARLAR: TEK BÜTÜN NESNE ŞEKLİNİ ALMAK İÇİN
        const MOTION_THRESHOLD = 32;        // hareket hassasiyeti (düşük gürültü)
        const MIN_OBJECT_AREA = 500;        // minimum alan (küçük parçaları reddeder, büyük nesneyi alır)
        const MAX_OBJECTS = 1;              // SADECE EN BÜYÜK NESNEYİ TAKİP ET (tek nesne)
        const BLUR_KERNEL = 3;              // hafif bulanıklaştırma ile gürültü azalt
        
        // Şekil takibi için kontur noktaları (kenar tespiti için)
        let lastTrackedContour = null;      // bir önceki kontur (isteğe bağlı)
        
        // ---- KAMERA BAŞLAT (Tam ekran uyumlu, düşük gecikme) ----
        async function initCamera() {
            try {
                camStatusDiv.innerHTML = "🎥 Kamera izni isteniyor...";
                // Tam ekran performans için ideal çözünürlük: cihaza göre maksimum hız
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280, max: 1920 },
                        height: { ideal: 720, max: 1080 },
                        frameRate: { ideal: 30, max: 60 },
                        facingMode: "environment"  // arka kamera öncelikli
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                await video.play();
                
                // Video boyutları hazır olunca canvas boyutlarını ayarla
                video.addEventListener('loadedmetadata', () => {
                    width = video.videoWidth;
                    height = video.videoHeight;
                    
                    // Canvas tam çözünürlük (şekil çizimi için net)
                    canvas.width = width;
                    canvas.height = height;
                    
                    // Önceki kareyi temizle
                    previousGrayFrame = null;
                    
                    camStatusDiv.innerHTML = "✅ TAKİP AKTİF | TEK NESNE ŞEKLİ İZLENİYOR";
                    
                    // Döngüyü başlat
                    if(animationFrameId) cancelAnimationFrame(animationFrameId);
                    animationFrameId = requestAnimationFrame(motionTrackingLoop);
                });
                
            } catch (err) {
                console.error("Kamera hatası:", err);
                camStatusDiv.innerHTML = "❌ KAMERA HATASI | İzin vermelisiniz";
                alert("Kamera erişimi gerekli! Lütfen izin verin ve sayfayı yenileyin.");
            }
        }
        
        // ---- HIZLI GRİ TON DÖNÜŞÜMÜ (ImageData -> Uint8Array) ----
        function toGrayscaleFast(imageData) {
            const data = imageData.data;
            const len = data.length;
            const gray = new Uint8Array(imageData.width * imageData.height);
            for (let i = 0, j = 0; i < len; i += 4, j++) {
                // luminance 0.299R + 0.587G + 0.114B
                gray[j] = (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114) | 0;
            }
            return gray;
        }
        
        // ---- 3x3 ORTALAMA BLUR (gürültü azaltma, şekil bütünlüğü için) ----
        function applyFastBlur(gray, w, h) {
            const blurred = new Uint8Array(w * h);
            for (let y = 1; y < h-1; y++) {
                const rowOff = y * w;
                for (let x = 1; x < w-1; x++) {
                    let sum = 0;
                    const idx = rowOff + x;
                    sum += gray[idx - w - 1];
                    sum += gray[idx - w];
                    sum += gray[idx - w + 1];
                    sum += gray[idx - 1];
                    sum += gray[idx];
                    sum += gray[idx + 1];
                    sum += gray[idx + w - 1];
                    sum += gray[idx + w];
                    sum += gray[idx + w + 1];
                    blurred[idx] = (sum / 9) | 0;
                }
            }
            // Kenar kopyalama (basit)
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    if (y === 0 || y === h-1 || x === 0 || x === w-1) {
                        blurred[y*w + x] = gray[y*w + x];
                    }
                }
            }
            return blurred;
        }
        
        // ---- HAREKET FARKI MASKESİ (binary) ----
        function computeMotionMask(prevGray, currGray, w, h, threshold) {
            const mask = new Uint8Array(w * h);
            let motionPixelCount = 0;
            for (let i = 0; i < w * h; i++) {
                const diff = Math.abs(currGray[i] - prevGray[i]);
                if (diff > threshold) {
                    mask[i] = 255;
                    motionPixelCount++;
                } else {
                    mask[i] = 0;
                }
            }
            return { mask, motionPixelCount };
        }
        
        // ---- GENİŞLETME (Dilation) işlemi: hareket bölgesini birleştir, parçaları bütünleştir ----
        // Bu sayede küçük parçalar birleşir ve TEK bir büyük nesne şekli oluşur
        function dilateMask(mask, w, h, iterations = 2) {
            let temp = new Uint8Array(mask);
            for (let iter = 0; iter < iterations; iter++) {
                const dilated = new Uint8Array(w * h);
                for (let y = 1; y < h-1; y++) {
                    for (let x = 1; x < w-1; x++) {
                        const idx = y * w + x;
                        if (temp[idx] === 255) {
                            // 3x3 komşuluğa yay
                            dilated[idx] = 255;
                            dilated[idx - 1] = 255;
                            dilated[idx + 1] = 255;
                            dilated[idx - w] = 255;
                            dilated[idx + w] = 255;
                            dilated[idx - w - 1] = 255;
                            dilated[idx - w + 1] = 255;
                            dilated[idx + w - 1] = 255;
                            dilated[idx + w + 1] = 255;
                        }
                    }
                }
                temp = dilated;
            }
            return temp;
        }
        
        // ---- EROZYON (Erosion) ile küçük gürültüleri temizle (isteğe bağlı) ----
        function erodeMask(mask, w, h, iterations = 1) {
            let temp = new Uint8Array(mask);
            for (let iter = 0; iter < iterations; iter++) {
                const eroded = new Uint8Array(w * h);
                for (let y = 1; y < h-1; y++) {
                    for (let x = 1; x < w-1; x++) {
                        const idx = y * w + x;
                        if (temp[idx] === 255 &&
                            temp[idx-1] === 255 && temp[idx+1] === 255 &&
                            temp[idx-w] === 255 && temp[idx+w] === 255) {
                            eroded[idx] = 255;
                        }
                    }
                }
                temp = eroded;
            }
            return temp;
        }
        
        // ---- BAĞLI BİLEŞEN BULMA (Connected Components) + EN BÜYÜK NESNEYİ SEÇ ----
        // SADECE en büyük alana sahip TEK nesneyi döndürür (tam şekil)
        function findLargestObject(mask, w, h, minArea) {
            // Union-Find (4 komşuluk)
            const parent = new Array(w * h);
            for (let i = 0; i < w*h; i++) parent[i] = i;
            
            function find(a) {
                while(parent[a] !== a) {
                    parent[a] = parent[parent[a]];
                    a = parent[a];
                }
                return a;
            }
            function union(a,b) {
                const ra = find(a);
                const rb = find(b);
                if(ra !== rb) parent[rb] = ra;
            }
            
            // First pass: 4-komşuluk birleştirme
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = y * w + x;
                    if (mask[idx] === 255) {
                        if (x > 0 && mask[idx-1] === 255) union(idx, idx-1);
                        if (y > 0 && mask[idx-w] === 255) union(idx, idx-w);
                    }
                }
            }
            
            // Bileşenleri topla (alan, bounding box, ve tüm üye piksellerin listesi - kontur için)
            const components = new Map(); // root -> {pixelIndices, minX, maxX, minY, maxY, count}
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = y * w + x;
                    if (mask[idx] === 255) {
                        const root = find(idx);
                        if (!components.has(root)) {
                            components.set(root, {
                                pixelIndices: [idx],
                                minX: x, maxX: x,
                                minY: y, maxY: y,
                                count: 1
                            });
                        } else {
                            const comp = components.get(root);
                            comp.pixelIndices.push(idx);
                            comp.minX = Math.min(comp.minX, x);
                            comp.maxX = Math.max(comp.maxX, x);
                            comp.minY = Math.min(comp.minY, y);
                            comp.maxY = Math.max(comp.maxY, y);
                            comp.count++;
                        }
                    }
                }
            }
            
            // En büyük bileşeni bul (alan = count)
            let largest = null;
            let maxArea = 0;
            for (let [_, comp] of components.entries()) {
                const area = comp.count;
                if (area > maxArea && area >= minArea) {
                    maxArea = area;
                    largest = comp;
                }
            }
            
            if (!largest) return null;
            
            // Şekil konturunu hesapla: basitçe bounding box değil, gerçek kontur noktaları (kenar pikseller)
            // Hareket maskesinin dış hatlarını almak için "Marching squares" mantığı basit: 
            // Kenar pikselleri: en az bir komşusu 0 olan mask pikselleri.
            const edgePoints = [];
            const pixelSet = new Set(largest.pixelIndices);
            
            for (let idx of largest.pixelIndices) {
                const x = idx % w;
                const y = Math.floor(idx / w);
                // 4 yönde komşuluktan herhangi biri maskede yoksa kenar noktası
                if (x === 0 || x === w-1 || y === 0 || y === h-1) {
                    edgePoints.push({x, y});
                    continue;
                }
                let isEdge = false;
                if (!pixelSet.has(idx-1)) isEdge = true;
                if (!pixelSet.has(idx+1)) isEdge = true;
                if (!pixelSet.has(idx-w)) isEdge = true;
                if (!pixelSet.has(idx+w)) isEdge = true;
                if (isEdge) edgePoints.push({x, y});
            }
            
            // kontur noktalarını sıralamak için basit bir convex hull gerekmez; ama tüm kenar noktalarını çiz
            // şeklin tamamını görselleştirmek için tüm kenar noktaları birleşik bir çokgen gibi çizilecek.
            // Ancak daha düzgün görünüm için bounding box + kontur çizgisi yapabiliriz.
            // Ama istenen "nesnenin şeklini alsın" -> hareket eden alanın tüm dış hatlarını çizelim.
            
            return {
                boundingBox: {
                    x: largest.minX,
                    y: largest.minY,
                    w: largest.maxX - largest.minX + 1,
                    h: largest.maxY - largest.minY + 1
                },
                contourPoints: edgePoints,
                area: maxArea,
                pixelCount: largest.count
            };
        }
        
        // ---- ŞEKLİ ÇİZ: YEŞİL KONTUR (tam dış hat) + Dolgu efekti ----
        function drawShape(objectData) {
            if (!objectData) return;
            
            const { boundingBox, contourPoints, area } = objectData;
            
            // 1. Nesnenin dış hatlarını yeşil çizgi ile çiz (gerçek şekil)
            if (contourPoints && contourPoints.length > 10) {
                // Kontur noktalarını küçük noktalar veya çizgi bağlantısı yapmak için:
                // Basitçe her kenar noktasını küçük yuvarlaklarla işaretleme, çok yoğun olmasın.
                ctx.beginPath();
                ctx.strokeStyle = "#2eff9e";
                ctx.lineWidth = 3;
                ctx.shadowBlur = 0;
                
                // Daha iyi görsel: dış hatları birleştirmek için convex hull yapmadan tüm noktaları küçük dairelerle işaretle
                // Bu şeklin şeklini tam olarak gösterir.
                for (let i = 0; i < contourPoints.length; i += 2) { // her 2 noktada bir çizim hızı
                    const p = contourPoints[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
                    ctx.fillStyle = "#4affb5";
                    ctx.fill();
                }
                
                // Ayrıca kalın bir dış çizgi için bounding box değil, kontur noktalarını takip eden bir çizgi çizelim
                // (Komşuluk bağlantısı yapmak performanslı değil, ancak şekil belli olsun diye bounding box ekstra)
                // Ama daha temiz: bounding box'ı da çizelim ama saydam yeşil dolgu ile.
                ctx.beginPath();
                ctx.strokeStyle = "#1eff8e";
                ctx.lineWidth = 2.5;
                ctx.setLineDash([5, 8]);
                ctx.strokeRect(boundingBox.x, boundingBox.y, boundingBox.w, boundingBox.h);
                ctx.setLineDash([]);
                
                // Bounding box içine hafif dolgu (şeffaf yeşil)
                ctx.fillStyle = "#1eff8e22";
                ctx.fillRect(boundingBox.x, boundingBox.y, boundingBox.w, boundingBox.h);
                
                // Merkeze bir etiket
                const centerX = boundingBox.x + boundingBox.w/2;
                const centerY = boundingBox.y + boundingBox.h/2;
                ctx.font = "bold 16px 'Segoe UI'";
                ctx.fillStyle = "#ffffff";
                ctx.shadowBlur = 4;
                ctx.fillText("🔘 TAKİPTE", centerX - 35, centerY - 8);
                ctx.font = "bold 12px monospace";
                ctx.fillStyle = "#bbffaa";
                ctx.fillText(`alan:${area}px`, centerX - 25, centerY + 12);
                
            } else {
                // Eğer kontur yoksa sadece bounding box çiz
                ctx.beginPath();
                ctx.strokeStyle = "#4affb5";
                ctx.lineWidth = 3;
                ctx.strokeRect(boundingBox.x, boundingBox.y, boundingBox.w, boundingBox.h);
                ctx.fillStyle = "#4affb522";
                ctx.fillRect(boundingBox.x, boundingBox.y, boundingBox.w, boundingBox.h);
            }
            
            // Üst bilgi: "TEK NESNE TAKİBİ"
            ctx.font = "bold 15px monospace";
            ctx.fillStyle = "#e0ffc0";
            ctx.shadowBlur = 2;
            ctx.fillText("⚡ HAREKET EDEN NESNE ŞEKLİ", 18, 42);
        }
        
        // ---- ANA TAKİP DÖNGÜSÜ (Gecikmesiz, sadece TEK NESNE) ----
        async function motionTrackingLoop(timestamp) {
            if (!active) return;
            if (!video.videoWidth || !video.videoHeight) {
                animationFrameId = requestAnimationFrame(motionTrackingLoop);
                return;
            }
            
            if (processingFrame) {
                animationFrameId = requestAnimationFrame(motionTrackingLoop);
                return;
            }
            
            processingFrame = true;
            
            // FPS hesaplama
            frameCount++;
            const now = performance.now();
            if (now - lastTimestamp >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTimestamp = now;
                fpsDisplaySpan.innerText = `⚡ ${fps} FPS`;
            }
            
            try {
                // Mevcut kareyi al
                const offCanvas = new OffscreenCanvas(width, height);
                const offCtx = offCanvas.getContext('2d');
                offCtx.drawImage(video, 0, 0, width, height);
                const currentImageData = offCtx.getImageData(0, 0, width, height);
                const currGray = toGrayscaleFast(currentImageData);
                const currBlurred = applyFastBlur(currGray, width, height);
                
                // İlk kare ise sadece kaydet
                if (previousGrayFrame === null) {
                    previousGrayFrame = currBlurred;
                    processingFrame = false;
                    animationFrameId = requestAnimationFrame(motionTrackingLoop);
                    return;
                }
                
                // Hareket maskesi hesapla
                let { mask, motionPixelCount } = computeMotionMask(previousGrayFrame, currBlurred, width, height, MOTION_THRESHOLD);
                
                // Hareket skoru göster
                motionScoreSpan.innerText = motionPixelCount;
                
                // Eğer hareket çok azsa, temizle
                if (motionPixelCount < 80) {
                    ctx.clearRect(0, 0, width, height);
                    objectCountSpan.innerText = "0";
                    previousGrayFrame = currBlurred;
                    processingFrame = false;
                    animationFrameId = requestAnimationFrame(motionTrackingLoop);
                    return;
                }
                
                // Morfolojik işlemler: genişletme (dilation) ile parçaları birleştir → TEK BÜYÜK NESNE
                let dilatedMask = dilateMask(mask, width, height, 2);
                // Hafif erozyon ile gürültüyü azalt
                let cleanedMask = erodeMask(dilatedMask, width, height, 1);
                // Tekrar genişletme (bütünlük için)
                let finalMask = dilateMask(cleanedMask, width, height, 1);
                
                // EN BÜYÜK NESNEYİ BUL (sadece bir tane, şekil konturu ile)
                const largestObject = findLargestObject(finalMask, width, height, MIN_OBJECT_AREA);
                
                if (largestObject && largestObject.area >= MIN_OBJECT_AREA) {
                    objectCountSpan.innerText = "1";
                    // Canvas temizle ve şekli çiz
                    ctx.clearRect(0, 0, width, height);
                    drawShape(largestObject);
                } else {
                    objectCountSpan.innerText = "0";
                    ctx.clearRect(0, 0, width, height);
                    ctx.font = "18px monospace";
                    ctx.fillStyle = "#88aaffcc";
                    ctx.fillText("🔍 Hareket eden büyük nesne yok...", 30, 70);
                }
                
                // Güncel kareyi kaydet
                previousGrayFrame = currBlurred;
                
            } catch (err) {
                console.warn("Takip hatası:", err);
            } finally {
                processingFrame = false;
            }
            
            animationFrameId = requestAnimationFrame(motionTrackingLoop);
        }
        
        // ---- SIFIRLAMA (kamerayı yeniden başlat) ----
        function fullReset() {
            if(animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if(video.srcObject) {
                const tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                video.srcObject = null;
            }
            previousGrayFrame = null;
            processingFrame = false;
            if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
            objectCountSpan.innerText = "0";
            motionScoreSpan.innerText = "0";
            fpsDisplaySpan.innerText = "⚡ 0 FPS";
            camStatusDiv.innerHTML = "🔄 SIFIRLANIYOR...";
            setTimeout(() => {
                initCamera();
            }, 150);
        }
        
        resetBtn.addEventListener('click', fullReset);
        
        // Sayfa kapanırken stream'i durdur
        window.addEventListener('beforeunload', () => {
            if(video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
        });
        
        // Başlat
        initCamera();
    })();
</script>
</body>
</html>
