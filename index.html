<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLAST ULTRA | Premium Block Oyunu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #0B0E17;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: pan-y pinch-zoom;
        }

        /* ANA KONTEYNER */
        #game-container {
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            background: radial-gradient(circle at 50% 0%, #1A1F35, #0C0F1A);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* CUSTOM SCROLLBAR */
        #game-container::-webkit-scrollbar {
            width: 5px;
        }
        #game-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        #game-container::-webkit-scrollbar-thumb {
            background: #FFD966;
            border-radius: 10px;
        }

        /* STATUS BAR - PREMIUM */
        .status-bar {
            background: rgba(30, 35, 59, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 217, 102, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .level-info {
            background: linear-gradient(145deg, #2D3450, #1E233B);
            padding: 12px 25px;
            border-radius: 40px;
            color: #FFD966;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 217, 102, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 12px;
        }

        .stat-item {
            background: linear-gradient(145deg, #2D3450, #1E233B);
            padding: 12px 20px;
            border-radius: 40px;
            color: #FFD966;
            font-weight: 800;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 217, 102, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* LOBBY EKRANI - PREMIUM */
        .lobby-screen {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lobby-header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 15px;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-title {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD966, #FF9347, #FF6B95);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 10px 30px rgba(255,215,0,0.3);
            letter-spacing: 2px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .title-badge {
            background: rgba(255, 217, 102, 0.15);
            padding: 8px 25px;
            border-radius: 50px;
            color: #FFD966;
            font-weight: 600;
            font-size: 14px;
            display: inline-block;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 217, 102, 0.3);
        }

        .player-card {
            background: linear-gradient(145deg, rgba(30, 35, 59, 0.9), rgba(19, 23, 43, 0.9));
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 217, 102, 0.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease 0.1s both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #FFD966, #FF9347);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 900;
            color: #0C0F1A;
            border: 3px solid #FFF;
            box-shadow: 0 10px 20px rgba(255,215,0,0.3);
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            color: #FFF;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .player-stats {
            display: flex;
            gap: 15px;
        }

        .player-stat {
            background: rgba(45, 52, 80, 0.5);
            padding: 6px 15px;
            border-radius: 30px;
            color: #FFD966;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255, 217, 102, 0.3);
        }

        .section-title {
            color: #FFF;
            font-size: 22px;
            font-weight: 800;
            margin: 25px 0 20px;
            padding-left: 10px;
            border-left: 5px solid #FFD966;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            animation: slideRight 0.6s ease 0.2s both;
        }

        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 30px;
        }

        .level-card {
            background: linear-gradient(145deg, rgba(30, 35, 59, 0.9), rgba(19, 23, 43, 0.9));
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px 15px;
            text-align: center;
            border: 1px solid rgba(255, 217, 102, 0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: cardPop 0.5s ease;
            animation-fill-mode: both;
        }

        .level-card:nth-child(1) { animation-delay: 0.1s; }
        .level-card:nth-child(2) { animation-delay: 0.15s; }
        .level-card:nth-child(3) { animation-delay: 0.2s; }
        .level-card:nth-child(4) { animation-delay: 0.25s; }
        .level-card:nth-child(5) { animation-delay: 0.3s; }
        .level-card:nth-child(6) { animation-delay: 0.35s; }

        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .level-card:active {
            transform: scale(0.95) translateY(5px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
            border-color: #FFD966;
        }

        .level-card.locked {
            opacity: 0.5;
            filter: grayscale(1);
        }

        .level-number {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #2D3450, #1E233B);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 30px;
            font-weight: 900;
            color: #FFF;
            border: 2px solid rgba(255, 217, 102, 0.3);
        }

        .level-card.unlocked .level-number {
            background: linear-gradient(145deg, #FFD966, #FF9347);
            color: #0C0F1A;
            border-color: #FFF;
            box-shadow: 0 10px 20px rgba(255,215,0,0.3);
        }

        .level-name {
            color: #FFF;
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 10px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .level-goal {
            background: rgba(45, 52, 80, 0.5);
            padding: 6px 15px;
            border-radius: 30px;
            color: #FFD966;
            font-weight: 700;
            font-size: 14px;
            display: inline-block;
            border: 1px solid rgba(255, 217, 102, 0.3);
        }

        .lobby-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: auto;
            padding-top: 25px;
            animation: slideUp 0.6s ease 0.4s both;
        }

        .lobby-btn {
            background: linear-gradient(145deg, rgba(30, 35, 59, 0.95), rgba(19, 23, 43, 0.95));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 217, 102, 0.3);
            border-radius: 30px;
            padding: 20px;
            color: #FFF;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .lobby-btn:active {
            transform: scale(0.95);
            background: linear-gradient(145deg, #FFD966, #FF9347);
            color: #0C0F1A;
        }

        /* OYUN EKRANI - PREMIUM */
        .game-screen {
            min-height: 100%;
            display: none;
            flex-direction: column;
            padding: 15px 15px 30px;
            animation: fadeIn 0.5s ease;
        }

        .game-header {
            background: rgba(30, 35, 59, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 217, 102, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .back-btn {
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #2D3450, #1E233B);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFD966;
            font-size: 30px;
            cursor: pointer;
            border: 1px solid rgba(255, 217, 102, 0.3);
            transition: all 0.2s ease;
        }

        .back-btn:active {
            transform: scale(0.9);
            background: #FFD966;
            color: #0C0F1A;
        }

        .level-badge {
            background: linear-gradient(145deg, #FFD966, #FF9347);
            padding: 12px 35px;
            border-radius: 40px;
            color: #0C0F1A;
            font-weight: 900;
            font-size: 22px;
            border: 2px solid #FFF;
            box-shadow: 0 10px 20px rgba(255,215,0,0.3);
        }

        .goal-card {
            background: linear-gradient(145deg, #1E233B, #13172B);
            border-radius: 35px;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 217, 102, 0.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease;
        }

        .goal-text {
            color: #FFF;
            font-weight: 700;
            font-size: 18px;
            opacity: 0.9;
        }

        .goal-value {
            color: #FFD966;
            font-weight: 900;
            font-size: 32px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        /* OYUN TAHTASI - PREMIUM */
        .board-container {
            background: linear-gradient(145deg, #0F1324, #0A0C1A);
            border-radius: 40px;
            padding: 15px;
            border: 2px solid rgba(255, 217, 102, 0.3);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 20px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            animation: slideUp 0.5s ease 0.1s both;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            aspect-ratio: 1;
        }

        .board-cell {
            background: rgba(30, 35, 59, 0.6);
            border-radius: 10px;
            aspect-ratio: 1;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 217, 102, 0.2);
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.3);
        }

        .board-cell.filled {
            background: linear-gradient(145deg, #FFD966, #FF9347);
            border: 2px solid #FFF;
            box-shadow: 0 0 20px rgba(255,215,0,0.5), inset 0 -3px 0 rgba(0,0,0,0.2);
            animation: placePop 0.3s ease;
        }

        @keyframes placePop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .board-cell.placed {
            animation: placePop 0.3s ease;
        }

        /* BLOK PANELİ - PREMIUM */
        .blocks-panel {
            background: linear-gradient(145deg, rgba(30, 35, 59, 0.95), rgba(19, 23, 43, 0.95));
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 25px 20px;
            border: 1px solid rgba(255, 217, 102, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            animation: slideUp 0.5s ease 0.2s both;
        }

        .blocks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #FFF;
            font-weight: 700;
            font-size: 18px;
        }

        .refresh-btn {
            background: linear-gradient(145deg, #2D3450, #1E233B);
            padding: 12px 25px;
            border-radius: 40px;
            color: #FFD966;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 217, 102, 0.3);
            transition: all 0.2s ease;
        }

        .refresh-btn:active {
            transform: rotate(180deg);
            background: #FFD966;
            color: #0C0F1A;
        }

        .blocks-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 140px;
        }

        .block-item {
            background: linear-gradient(145deg, #2D3450, #1E233B);
            border-radius: 25px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .block-item.selected {
            border-color: #FFD966;
            transform: scale(1.1) translateY(-5px);
            background: linear-gradient(145deg, #3A4260, #2D3450);
            box-shadow: 0 20px 30px rgba(255,215,0,0.3);
        }

        .block-item:active {
            transform: scale(0.95);
        }

        .block-preview {
            display: grid;
            gap: 4px;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 15px;
        }

        .block-preview-cell {
            width: 28px;
            height: 28px;
            background: rgba(45, 52, 80, 0.8);
            border-radius: 6px;
            border: 1px solid rgba(255, 217, 102, 0.2);
        }

        .block-preview-cell.filled {
            background: linear-gradient(145deg, #FFD966, #FF9347);
            border: 1px solid #FFF;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        .block-label {
            text-align: center;
            color: #FFF;
            font-size: 13px;
            margin-top: 8px;
            font-weight: 600;
        }

        /* MODAL - PREMIUM */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: linear-gradient(145deg, #1E233B, #13172B);
            border-radius: 50px;
            padding: 35px 30px;
            width: 90%;
            max-width: 360px;
            border: 1px solid rgba(255, 217, 102, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: slideUp 0.4s ease;
        }

        .modal-title {
            color: #FFF;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #FFD966, #FF9347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255, 217, 102, 0.2);
            color: #FFF;
            font-weight: 600;
            font-size: 18px;
        }

        .modal-toggle {
            width: 60px;
            height: 32px;
            background: rgba(45, 52, 80, 0.8);
            border-radius: 40px;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(255, 217, 102, 0.3);
            transition: all 0.2s ease;
        }

        .modal-toggle.active {
            background: linear-gradient(145deg, #FFD966, #FF9347);
        }

        .modal-toggle::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            background: #FFF;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .modal-toggle.active::after {
            left: 30px;
        }

        .modal-close {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, #FFD966, #FF9347);
            border: none;
            border-radius: 35px;
            color: #0C0F1A;
            font-weight: 800;
            font-size: 18px;
            margin-top: 30px;
            cursor: pointer;
            border: 2px solid #FFF;
            box-shadow: 0 10px 20px rgba(255,215,0,0.3);
            transition: all 0.2s ease;
        }

        .modal-close:active {
            transform: scale(0.95);
        }

        /* VICTORY ANIMATION */
        .victory-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #FFD966, #FF9347);
            padding: 30px 50px;
            border-radius: 60px;
            color: #0C0F1A;
            font-weight: 900;
            font-size: 32px;
            border: 4px solid #FFF;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            z-index: 1000;
            animation: victoryPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
        }

        @keyframes victoryPop {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- STATUS BAR -->
        <div class="status-bar">
            <div class="level-info" id="status-level">⚡ LEVEL 1</div>
            <div class="stats">
                <div class="stat-item">⭐ <span id="status-stars">0</span></div>
                <div class="stat-item">🎯 <span id="status-score">0</span></div>
            </div>
        </div>

        <!-- LOBBY EKRANI -->
        <div id="lobby-screen" class="lobby-screen">
            <div class="lobby-header">
                <div class="game-title">BLAST ULTRA</div>
                <div class="title-badge">⚡ PREMIUM BLOCK PUZZLE</div>
            </div>

            <div class="player-card">
                <div class="player-avatar">👑</div>
                <div class="player-info">
                    <div class="player-name">EMRE</div>
                    <div class="player-stats">
                        <span class="player-stat">🏆 12.450</span>
                        <span class="player-stat">⭐ 234</span>
                    </div>
                </div>
            </div>

            <div class="section-title">🎮 LEVEL SEÇ</div>
            <div class="level-grid" id="level-grid">
                <!-- Level kartları JS ile doldurulacak -->
            </div>

            <div class="lobby-footer">
                <div class="lobby-btn" id="settings-btn">
                    ⚙️ AYARLAR
                </div>
                <div class="lobby-btn" id="leaderboard-btn">
                    🏆 SIRALAMA
                </div>
            </div>
        </div>

        <!-- OYUN EKRANI -->
        <div id="game-screen" class="game-screen">
            <div class="game-header">
                <div class="back-btn" id="back-btn">←</div>
                <div class="level-badge" id="current-level">LVL 1</div>
                <div style="width:55px;"></div>
            </div>

            <div class="goal-card">
                <span class="goal-text">LEVEL HEDEFİ</span>
                <span class="goal-value" id="level-goal">500</span>
            </div>

            <!-- OYUN TAHTASI -->
            <div class="board-container">
                <div class="board-grid" id="board-grid">
                    <!-- 8x8 grid JS ile doldurulacak -->
                </div>
            </div>

            <!-- BLOK PANELİ -->
            <div class="blocks-panel">
                <div class="blocks-header">
                    <span>🔷 MEVCUT BLOKLAR</span>
                    <span class="refresh-btn" id="refresh-blocks">⟳ YENİLE</span>
                </div>
                <div class="blocks-container" id="blocks-container">
                    <!-- Bloklar JS ile doldurulacak -->
                </div>
            </div>
        </div>
    </div>

    <!-- VICTORY POPUP -->
    <div id="victory-popup" class="victory-popup">
        🎉 LEVEL TAMAMLANDI!
    </div>

    <!-- AYARLAR MODAL -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title">⚙️ AYARLAR</div>
            <div class="modal-item">
                <span>🔊 SES</span>
                <div class="modal-toggle active" id="sound-toggle"></div>
            </div>
            <div class="modal-item">
                <span>🎵 MÜZİK</span>
                <div class="modal-toggle active" id="music-toggle"></div>
            </div>
            <div class="modal-item">
                <span>📳 TİTREŞİM</span>
                <div class="modal-toggle" id="vibration-toggle"></div>
            </div>
            <button class="modal-close" id="close-settings">KAYDET</button>
        </div>
    </div>

    <!-- LEADERBOARD MODAL -->
    <div id="leaderboard-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title">🏆 SIRALAMA</div>
            <div style="color: #FFF; margin: 20px 0;" id="leaderboard-list">
                <div style="display: flex; justify-content: space-between; padding: 15px; background: rgba(45,52,80,0.5); border-radius: 20px; margin-bottom: 10px;">
                    <span style="color: #FFD966;">🥇 1.</span> <span>EMRE</span> <span>12.450</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 15px; background: rgba(45,52,80,0.5); border-radius: 20px; margin-bottom: 10px;">
                    <span style="color: #FFD966;">🥈 2.</span> <span>AYŞE</span> <span>11.230</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 15px; background: rgba(45,52,80,0.5); border-radius: 20px;">
                    <span style="color: #FFD966;">🥉 3.</span> <span>MEHMET</span> <span>10.980</span>
                </div>
            </div>
            <button class="modal-close" id="close-leaderboard">KAPAT</button>
        </div>
    </div>

    <script>
        // OYUN DEĞİŞKENLERİ
        let currentLevel = 1;
        let totalStars = 234;
        let currentScore = 0;
        let board = Array(8).fill().map(() => Array(8).fill(0));
        let availableBlocks = [];
        let selectedBlock = null;
        let blocksRefreshed = false;

        // LEVEL TANIMLARI (20+ LEVEL)
        const levels = [
            { id: 1, name: "BAŞLANGIÇ", goal: 500, stars: 3, unlocked: true },
            { id: 2, name: "ÇAYLAK", goal: 800, stars: 3, unlocked: true },
            { id: 3, name: "ACE Mİ", goal: 1200, stars: 3, unlocked: true },
            { id: 4, name: "UZMAN", goal: 1800, stars: 3, unlocked: true },
            { id: 5, name: "PROFESYONEL", goal: 2500, stars: 3, unlocked: true },
            { id: 6, name: "EFSANE", goal: 3500, stars: 3, unlocked: false },
            { id: 7, name: "MİTOLOJİK", goal: 5000, stars: 3, unlocked: false },
            { id: 8, name: "İLAHİ", goal: 7500, stars: 3, unlocked: false },
            { id: 9, name: "ÖLÜMSÜZ", goal: 10000, stars: 3, unlocked: false },
            { id: 10, name: "TANRISAL", goal: 15000, stars: 3, unlocked: false },
            { id: 11, name: "KAOSTAN", goal: 20000, stars: 3, unlocked: false },
            { id: 12, name: "SONSUZ", goal: 30000, stars: 3, unlocked: false }
        ];

        // BLOK ŞEKİLLERİ (20+ ÇEŞİT)
        const blockShapes = [
            { shape: [[1]], size: 1, name: "TEK" },
            { shape: [[1,1]], size: 2, name: "İKİLİ" },
            { shape: [[1],[1]], size: 2, name: "DİKEY" },
            { shape: [[1,1,1]], size: 3, name: "ÜÇLÜ" },
            { shape: [[1],[1],[1]], size: 3, name: "DİKEY 3" },
            { shape: [[1,1],[1,1]], size: 4, name: "KARE" },
            { shape: [[1,1,1,1]], size: 4, name: "DÖRTLÜ" },
            { shape: [[1],[1],[1],[1]], size: 4, name: "DİKEY 4" },
            { shape: [[1,1,0],[0,1,1]], size: 4, name: "Z" },
            { shape: [[0,1,1],[1,1,0]], size: 4, name: "Z TERS" },
            { shape: [[1,0,0],[1,1,1]], size: 4, name: "L" },
            { shape: [[0,0,1],[1,1,1]], size: 4, name: "L TERS" },
            { shape: [[1,1],[1,0]], size: 3, name: "KÖŞE" },
            { shape: [[1,1],[0,1]], size: 3, name: "KÖŞE 2" },
            { shape: [[1,0,1],[1,1,1]], size: 5, name: "U" },
            { shape: [[1,1,1],[1,0,1]], size: 5, name: "KARE DELİK" },
            { shape: [[1,1,1,1,1]], size: 5, name: "BEŞLİ" },
            { shape: [[1],[1],[1],[1],[1]], size: 5, name: "DİKEY 5" }
        ];

        // LOBİYİ RENDER ET
        function renderLobby() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';

            levels.forEach((level, index) => {
                const card = document.createElement('div');
                card.className = `level-card ${level.unlocked ? 'unlocked' : 'locked'}`;
                if (level.unlocked) {
                    card.onclick = () => startLevel(level.id);
                }
                
                card.innerHTML = `
                    <div class="level-number">${level.id}</div>
                    <div class="level-name">${level.name}</div>
                    <div class="level-goal">🎯 ${level.goal}</div>
                `;
                
                grid.appendChild(card);
            });
        }

        // OYUN TAHTASINI RENDER ET
        function renderBoard() {
            const boardGrid = document.getElementById('board-grid');
            boardGrid.innerHTML = '';
            
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const cell = document.createElement('div');
                    cell.className = `board-cell ${board[i][j] === 1 ? 'filled' : ''}`;
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    boardGrid.appendChild(cell);
                }
            }
        }

        // RASTGELE BLOK ÜRET
        function generateRandomBlocks(count = 4) {
            const blocks = [];
            for (let i = 0; i < count; i++) {
                const randomIndex = Math.floor(Math.random() * blockShapes.length);
                blocks.push({ ...blockShapes[randomIndex], id: i });
            }
            return blocks;
        }

        // BLOKLARI GÖSTER
        function renderBlocks() {
            const container = document.getElementById('blocks-container');
            container.innerHTML = '';

            availableBlocks.forEach((block, index) => {
                const blockEl = document.createElement('div');
                blockEl.className = `block-item ${selectedBlock === index ? 'selected' : ''}`;
                
                // Blok önizlemesi
                const preview = document.createElement('div');
                preview.className = 'block-preview';
                preview.style.gridTemplateColumns = `repeat(${block.shape[0].length}, 1fr)`;
                
                for (let i = 0; i < block.shape.length; i++) {
                    for (let j = 0; j < block.shape[i].length; j++) {
                        const cell = document.createElement('div');
                        cell.className = `block-preview-cell ${block.shape[i][j] === 1 ? 'filled' : ''}`;
                        preview.appendChild(cell);
                    }
                }
                
                blockEl.appendChild(preview);
                blockEl.innerHTML += `<div class="block-label">${block.name}</div>`;
                
                blockEl.onclick = () => selectBlock(index);
                container.appendChild(blockEl);
            });
        }

        // BLOK SEÇ
        function selectBlock(index) {
            selectedBlock = selectedBlock === index ? null : index;
            renderBlocks();
        }

        // BLOK YERLEŞTİR (ANİMASYONLU)
        function tryPlaceBlock(block, startRow, startCol) {
            // Kontrol
            for (let i = 0; i < block.shape.length; i++) {
                for (let j = 0; j < block.shape[i].length; j++) {
                    if (block.shape[i][j] === 1) {
                        const newRow = startRow + i;
                        const newCol = startCol + j;
                        
                        if (newRow >= 8 || newCol >= 8) return false;
                        if (board[newRow][newCol] === 1) return false;
                    }
                }
            }
            
            // Yerleştir
            for (let i = 0; i < block.shape.length; i++) {
                for (let j = 0; j < block.shape[i].length; j++) {
                    if (block.shape[i][j] === 1) {
                        const newRow = startRow + i;
                        const newCol = startCol + j;
                        board[newRow][newCol] = 1;
                        
                        // Animasyon
                        const cellIndex = newRow * 8 + newCol;
                        const cell = document.querySelectorAll('.board-cell')[cellIndex];
                        cell.classList.add('placed');
                        setTimeout(() => cell.classList.remove('placed'), 300);
                    }
                }
            }
            
            // Puan ekle
            currentScore += block.size * 15;
            document.getElementById('status-score').textContent = currentScore;
            
            // Blok kaldır
            availableBlocks.splice(selectedBlock, 1);
            selectedBlock = null;
            
            // Tam satır kontrolü
            checkCompleteLines();
            
            renderBoard();
            renderBlocks();
            
            // Level kontrolü
            const currentLevelData = levels[currentLevel - 1];
            if (currentScore >= currentLevelData.goal) {
                showVictory();
            }
            
            return true;
        }

        // TAM SATIR KONTROLÜ
        function checkCompleteLines() {
            let linesCleared = 0;
            
            // Satır kontrolü
            for (let i = 0; i < 8; i++) {
                let fullRow = true;
                for (let j = 0; j < 8; j++) {
                    if (board[i][j] === 0) {
                        fullRow = false;
                        break;
                    }
                }
                if (fullRow) {
                    for (let j = 0; j < 8; j++) {
                        board[i][j] = 0;
                        // Animasyon
                        const cellIndex = i * 8 + j;
                        const cell = document.querySelectorAll('.board-cell')[cellIndex];
                        cell.style.animation = 'placePop 0.3s ease reverse';
                    }
                    linesCleared++;
                }
            }
            
            // Sütun kontrolü
            for (let j = 0; j < 8; j++) {
                let fullCol = true;
                for (let i = 0; i < 8; i++) {
                    if (board[i][j] === 0) {
                        fullCol = false;
                        break;
                    }
                }
                if (fullCol) {
                    for (let i = 0; i < 8; i++) {
                        board[i][j] = 0;
                        // Animasyon
                        const cellIndex = i * 8 + j;
                        const cell = document.querySelectorAll('.board-cell')[cellIndex];
                        cell.style.animation = 'placePop 0.3s ease reverse';
                    }
                    linesCleared++;
                }
            }
            
            if (linesCleared > 0) {
                currentScore += linesCleared * 100;
                document.getElementById('status-score').textContent = currentScore;
                totalStars += linesCleared;
                document.getElementById('status-stars').textContent = totalStars;
            }
        }

        // VICTORY GÖSTER
        function showVictory() {
            const popup = document.getElementById('victory-popup');
            popup.style.display = 'flex';
            
            // Titreşim efekti
            if (document.getElementById('vibration-toggle').classList.contains('active')) {
                if (navigator.vibrate) navigator.vibrate(200);
            }
            
            setTimeout(() => {
                popup.style.display = 'none';
                if (currentLevel < levels.length) {
                    levels[currentLevel].unlocked = true;
                    currentLevel++;
                    startLevel(currentLevel);
                }
            }, 1500);
        }

        // BLOKLARI YENİLE
        function refreshBlocks() {
            if (!blocksRefreshed) {
                availableBlocks = generateRandomBlocks(4);
                selectedBlock = null;
                renderBlocks();
                blocksRefreshed = true;
                setTimeout(() => blocksRefreshed = false, 1000);
            }
        }

        // LEVEL BAŞLAT
        function startLevel(levelId) {
            currentLevel = levelId;
            currentScore = 0;
            board = Array(8).fill().map(() => Array(8).fill(0));
            availableBlocks = generateRandomBlocks(4);
            selectedBlock = null;
            
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('current-level').textContent = `LVL ${levelId}`;
            document.getElementById('level-goal').textContent = levels[levelId - 1].goal;
            document.getElementById('status-level').textContent = `⚡ LEVEL ${levelId}`;
            document.getElementById('status-score').textContent = '0';
            document.getElementById('status-stars').textContent = totalStars;
            
            renderBoard();
            renderBlocks();
            
            // Scroll to top
            document.getElementById('game-container').scrollTop = 0;
        }

        // LOBIYE DÖN
        function backToLobby() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'flex';
            renderLobby();
            document.getElementById('game-container').scrollTop = 0;
        }

        // EVENT LISTENERS
        document.getElementById('back-btn').addEventListener('click', backToLobby);
        document.getElementById('refresh-blocks').addEventListener('click', refreshBlocks);

        // BOARD TIKLAMA
        document.getElementById('board-grid').addEventListener('click', (e) => {
            if (!e.target.classList.contains('board-cell')) return;
            if (selectedBlock === null) {
                // Titreşim uyarı
                if (document.getElementById('vibration-toggle').classList.contains('active')) {
                    if (navigator.vibrate) navigator.vibrate(50);
                }
                return;
            }
            
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            const block = availableBlocks[selectedBlock];
            
            // Titreşim
            if (document.getElementById('vibration-toggle').classList.contains('active')) {
                if (navigator.vibrate) navigator.vibrate(20);
            }
            
            tryPlaceBlock(block, row, col);
        });

        // AYARLAR
        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('settings-modal').style.display = 'flex';
        });

        document.getElementById('close-settings').addEventListener('click', () => {
            document.getElementById('settings-modal').style.display = 'none';
        });

        // TOGGLE BUTONLARI
        document.querySelectorAll('.modal-toggle').forEach(toggle => {
            toggle.addEventListener('click', function() {
                this.classList.toggle('active');
            });
        });

        // LEADERBOARD
        document.getElementById('leaderboard-btn').addEventListener('click', () => {
            document.getElementById('leaderboard-modal').style.display = 'flex';
        });

        document.getElementById('close-leaderboard').addEventListener('click', () => {
            document.getElementById('leaderboard-modal').style.display = 'none';
        });

        // MODAL DIŞINA TIKLAMA
        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        });

        // İLK YÜKLEME
        renderLobby();
    </script>
</body>
</html>
