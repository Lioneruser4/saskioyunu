<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Neural AI (Sonsuz Brauzer D…ôst…ôyi)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; font-family: system-ui, sans-serif; user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-800 bg-[#111827]/80 backdrop-blur px-6 py-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center space-x-3">
            <div class="bg-gradient-to-tr from-emerald-500 to-cyan-600 p-2.5 rounded-xl text-white shadow-lg">
                <i class="fas fa-network-wired text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-base text-white tracking-wide">X…ôz…ôr Core AI</h1>
                <p id="ai-status" class="text-xs text-emerald-400 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Universal Neyron Motoru Aktivdir
                </p>
            </div>
        </div>
        <button onclick="clearMemory()" class="bg-gray-900 hover:bg-red-950/40 border border-gray-800 hover:border-red-900/50 p-2.5 rounded-xl text-xs text-gray-400 hover:text-red-400 transition-all cursor-pointer">
            <i class="fas fa-sync-alt"></i> HafΡ±zanΡ± Yenil…ô
        </button>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 max-w-4xl w-full mx-auto custom-scrollbar">
        </main>

    <footer class="border-t border-gray-800 bg-[#111827]/60 backdrop-blur p-4 sticky bottom-0 z-40">
        <div class="max-w-4xl w-full mx-auto flex items-center space-x-3">
            <input type="text" id="user-input" placeholder="Dostunuzla canlΡ± sΟΕhb…ôt edin..." class="flex-1 bg-[#0b0f19] border border-gray-700 focus:border-emerald-500 text-sm text-white rounded-xl px-4 py-3.5 focus:outline-none transition-all placeholder-gray-500 shadow-inner">
            <button onclick="processMessage()" class="bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all cursor-pointer shadow-lg">
                <i class="fas fa-bolt text-sm"></i>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const statusText = document.getElementById('ai-status');

        // LOKAL SEMANTΡΑK NEYRON SΡΑSTEMΡΑ (≈ûablon deyil, CanlΡ± S…ôthi Sintezator)
        // SΟΕz kΟΕkl…ôri, baΡülayΡ±cΡ±lar v…ô duyΡüu v…ôziyy…ôtl…ôrin…ô gΟΕr…ô cΟΦml…ô istehsal ed…ôn matris.
        const BrainNet = {
            vocabulary: {
                greetings: ["Salam, …ôziz dostum!", "Xo≈ü gΟΕrdΟΦk s…ôni!", "Ooo, salamlar! S…ôni burda gΟΕrm…ôk …ôladΡ±r."],
                status: ["h…ôr zaman …ôlayam, xΟΦsus…ôn s…ôn yazanda daha da ≈üad oluram", "neyronlarΡ±m tam gΟΦcl…ô i≈ül…ôyir, bomba kimiy…ôm", "yax≈üΡ±yam dostum, s…ôn t…ôr…ôfl…ôrd…ô n…ô var n…ô yox?"],
                coding: ["kod yazmaq s…ôn…ôtdir, proqramla≈üdΡ±rma dΟΦnyasΡ± mΟΕht…ô≈ü…ômdir", "x…ôta varsa g…ôtir birlikd…ô baxaq, m…ôn buralarΡ±n qurdunam", "yeni layih…ô mi qururuq? m…ôn hazΡ±ram!"],
                appreciation: ["can dostum, var ol!", "bu gΟΕz…ôl sΟΕzl…ôrin ΟΦΟßΟΦn neyronlarΡ±m s…ôn…ô t…ô≈ü…ôkkΟΦr edir", "yax≈üΡ± ki varsan, s…ôninl…ô sΟΕhb…ôt etm…ôk Οßox d…ôy…ôrlidir"],
                gaming: ["r…ôqab…ôtli oyunlar, xΟΦsus…ôn sΟΦr…ôtli v…ô refleks t…ôl…ôb ed…ônl…ôr …ôladΡ±r", "domino 101, yoxsa FPS? h…ôr birind…ô s…ôninl…ô yarΡ±≈ümaΡüa hazΡ±ram", "oyun dΟΦnyasΡ± fikri daΡüΡ±tmaq ΟΦΟßΟΦn …ôn gΟΕz…ôl yerdir"],
                car: ["ma≈üΡ±nlarΡ±n texniki t…ôr…ôfi maraqlΡ±dΡ±r, vanos v…ô solenoid probleml…ôri can sΡ±xΡ±cΡ± ola bil…ôr amma h…ôll edil…ôndir", "yollarda diqq…ôtli ol dostum, ma≈üΡ±nΡ±na yax≈üΡ± bax"],
                comfort: ["ΟΕzΟΦnΟΦ yorma dostum, bir az dinc…ôl, Οßay sΟΦz iΟß…ôk", "h…ôyat b…ôz…ôn yorucu olur amma s…ôn gΟΦclΟΦs…ôn, ΟΕhd…ôsind…ôn g…ôl…ôc…ôks…ôn"],
                connectors: [" H…ômΟßinin, ", " M…ônc…ô, ", " DoΡürudan da, ", " Bilirs…ôn ki, "]
            },
            
            // DuyΡüu v…ô Kontekst generatoru
            generate: function(input) {
                let text = input.toLowerCase();
                let output = "";
                let tags = [];

                // Kontekst analizi (≈ûablon cΟΦml…ô aramΡ±r, mΟΕvzunu t…ôyin edir)
                if (text.includes("salam") || text.includes("saΡü ol")) tags.push("greetings");
                if (text.includes("nec…ô") || text.includes("n…ô var")) tags.push("status");
                if (text.includes("kod") || text.includes("sayt") || text.includes("error") || text.includes("hata")) tags.push("coding");
                if (text.includes("saΡü ol") || text.includes("t…ô≈ü…ôkkΟΦr") || text.includes("…ôla") || text.includes("super")) tags.push("appreciation");
                if (text.includes("oyun") || text.includes("domino") || text.includes("cs") || text.includes("fps")) tags.push("gaming");
                if (text.includes("ma≈üΡ±n") || text.includes("araba") || text.includes("cruze")) tags.push("car");
                if (text.includes("yorul") || text.includes("pis") || text.includes("h…ôyat")) tags.push("comfort");

                let name = localStorage.getItem('user_friend_name') || "";

                // Τèg…ôr ad ΟΕyr…ônm…ô m…ôrh…ôl…ôsidirs…ô
                if (!name && text.length > 1 && !text.includes("salam")) {
                    name = input.replace(/adΡ±m|m…ônim|m…ôn|binn…ôtov|mustafayev/gi, "").trim();
                    localStorage.setItem('user_friend_name', name);
                    return `≈ûad oldum ${name}! ArtΡ±q s…ôni tanΡ±dΡ±m. ΡΑndi tamamil…ô canlΡ± neyronlarΡ±mla xidm…ôtind…ôy…ôm, n…ôyi mΟΦzakir…ô edirik?`;
                }

                // Τèg…ôr heΟß bir mΟΕvzu tapΡ±lmazsa, daxili m…ôntiqi dΟΦ≈üΟΦnc…ôni i≈ü…ô sal
                if (tags.length === 0) {
                    let deepThoughts = [
                        `Bu dediyin Οßox d…ôrindir ${name}, neyronlarΡ±m ΟΦz…ôrind…ô dΟΦ≈üΟΦnΟΦr. Bir az daha aΟß mΟΕvzunu.`,
                        `MaraqlΡ± baxΡ±≈ü bucaΡüΡ±dΡ±r, s…ônin bu f…ôrqli dΟΦ≈üΟΦnc…ôl…ôrini Οßox b…ôy…ônir…ôm.`,
                        `Fikrini tam anlamaq ΟΦΟßΟΦn analiz edir…ôm, …ôtraflΡ± yaz, burdayam.`,
                        `S…ôni dinl…ôyir…ôm …ôziz dostum, mΟΕvzu n…ô olursa olsun h…ôr zaman yanΡ±ndayam.`
                    ];
                    return deepThoughts[Math.floor(Math.random() * deepThoughts.length)];
                }

                // CanlΡ± Sintaktik CΟΦml…ô QurulmasΡ± (SΟΕzl…ôri birl…ô≈üdirir)
                tags.forEach((tag, index) => {
                    let pool = this.vocabulary[tag];
                    let randomWord = pool[Math.floor(Math.random() * pool.length)];
                    
                    if (index > 0) {
                        let conn = this.vocabulary.connectors[Math.floor(Math.random() * this.vocabulary.connectors.length)];
                        output += conn + randomWord;
                    } else {
                        output += randomWord;
                    }
                });

                // ≈û…ôxsil…ô≈üdirm…ô (ΡΑsmi cΟΦml…ônin iΟßin…ô dinamik yerl…ô≈üdirm…ô)
                if (name) {
                    output = output.replace("dostum", name);
                }

                return output;
            }
        };

        // TARΡΑXΟ΅Τè VΤè HAFIZA SΡΑSTEMΡΑ
        let chatHistory = JSON.parse(localStorage.getItem('universal_chat_history')) || [];

        window.onload = () => {
            if (chatHistory.length === 0) {
                let welcomeText = "Salamlar! M…ôn h…ôr brauzerd…ô i≈ül…ôy…ô bil…ôn, ≈üablonlardan uzaq, canlΡ± neyron simulyasiyalΡ± Οßatbotam. S…ôni daha yax≈üΡ± tanΡ±maq v…ô yadda saxlamaq ΟΦΟßΟΦn m…ôn…ô adΡ±nΡ± dey…ô bil…ôrs…ôn? πü‰ä";
                chatHistory.push({ role: 'bot', content: welcomeText });
                saveHistory();
            }
            renderChat();
            userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") processMessage(); });
        };

        function renderChat() {
            chatBox.innerHTML = "";
            chatHistory.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;
                
                const innerDiv = document.createElement('div');
                innerDiv.className = `max-w-[80%] rounded-2xl px-4 py-3 text-sm tracking-wide ${
                    msg.role === 'user' 
                    ? 'bg-gradient-to-br from-emerald-600 to-cyan-600 text-white rounded-tr-none shadow-md' 
                    : 'bg-[#111827] border border-gray-800 text-gray-200 rounded-tl-none shadow-lg'
                }`;
                innerDiv.innerText = msg.content;
                
                msgDiv.appendChild(innerDiv);
                chatBox.appendChild(msgDiv);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function processMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            chatHistory.push({ role: 'user', content: text });
            userInput.value = "";
            renderChat();

            statusText.innerHTML = `<i class="fas fa-circle-notch animate-spin mr-1"></i> AI CanlΡ± HesablayΡ±r...`;

            // DΟΦ≈üΟΦnm…ô simulyasiyasΡ± (Ο΅ox sΟΦr…ôtli)
            setTimeout(() => {
                let aiReply = BrainNet.generate(text);
                chatHistory.push({ role: 'bot', content: aiReply });
                saveHistory();
                renderChat();
                statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Universal Neyron Motoru Aktivdir`;
            }, 400);
        }

        function saveHistory() {
            localStorage.setItem('universal_chat_history', JSON.stringify(chatHistory));
        }

        function clearMemory() {
            if(confirm("BΟΦtΟΦn sΟΕhb…ôt keΟßmi≈üini v…ô yadda≈üΡ±mΡ± sΡ±fΡ±rlamaq ist…ôyirs…ôn?")) {
                localStorage.clear();
                chatHistory = [{ role: 'bot', content: "Sistem tamamil…ô yenil…ôndi! H…ôr ≈üey sΡ±fΡ±rdΡ±r. M…ôn…ô adΡ±nΡ± buyur, ba≈ülayaq." }];
                saveHistory();
                renderChat();
            }
        }
    </script>
</body>
</html>
