<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Ülke Topları Yarışıyor! · Düşen Engeller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #0b1a2e 0%, #1b3b4f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }
        .game-wrapper {
            background: #102b3f;
            border-radius: 48px 48px 28px 28px;
            box-shadow: 0 30px 35px -10px rgba(0,0,0,0.7), inset 0 -2px 5px #3d6c8c;
            padding: 22px 22px 30px 22px;
            border: 2px solid #64b5f6;
        }
        .arena-container {
            position: relative;
            width: min(900px, 95vw);
            background: #1f4a64;
            border-radius: 36px 36px 24px 24px;
            padding: 16px 16px 20px 16px;
            box-shadow: inset 0 0 0 3px #9ad4ff, inset 0 0 15px #a1d9ff;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: radial-gradient(circle at 20% 30%, #56b4e9, #0f3b4f);
            border-radius: 28px 28px 20px 20px;
            box-shadow: 0 12px 25px black;
            border: 3px solid #ffe484;
            cursor: grab;
            touch-action: none; /* mobilde kaydırmayı engelle */
        }
        canvas:active {
            cursor: grabbing;
        }
        .top-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin: 15px 10px 5px 10px;
            color: #f5f9ff;
            text-shadow: 3px 3px 0 #0a3142;
        }
        .emoji-selector {
            background: #0a1e2b;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #ffb74d;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 15px;
            align-items: center;
            box-shadow: inset 0 2px 5px #2f647a;
        }
        .emoji-label {
            font-weight: bold;
            letter-spacing: 1px;
            background: #f7d794;
            padding: 5px 14px;
            border-radius: 40px;
            color: #1d3b4b;
            text-shadow: none;
            box-shadow: 0 3px 0 #926d39;
        }
        .emoji-option {
            font-size: 2.2rem;
            background: #305f77;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #123845, 0 8px 12px black;
            transition: 0.1s ease;
            line-height: 1;
            padding: 0;
        }
        .emoji-option.selected {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #123845, 0 5px 12px black;
            background: #ffb74d;
            border: 2px solid #fff3b0;
        }
        .emoji-option:hover {
            background: #4797b5;
        }
        .button-group {
            display: flex;
            gap: 12px;
        }
        .action-btn {
            background: #ffcf8a;
            border: none;
            border-radius: 40px;
            padding: 12px 25px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #102027;
            box-shadow: 0 6px 0 #b2691a, 0 8px 15px black;
            cursor: pointer;
            transition: 0.1s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #ffe8c0;
        }
        .action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b2691a, 0 8px 15px black;
        }
        .status-bar {
            background: #0c2b39e0;
            backdrop-filter: blur(3px);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid #ffd966;
            box-shadow: inset 0 -2px 5px #5699b9;
            color: #ffecb3;
        }
        footer {
            text-align: center;
            margin-top: 16px;
            color: #b5d7ed;
            font-weight: 500;
        }
        footer a {
            color: #ffdead;
            text-decoration: none;
            border-bottom: 2px dotted;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="arena-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
    </div>

    <div class="top-panel">
        <div class="emoji-selector">
            <span class="emoji-label">🇹🇷 topun 👇</span>
            <button class="emoji-option selected" data-emoji="🇹🇷">🇹🇷</button>
            <button class="emoji-option" data-emoji="🇯🇵">🇯🇵</button>
            <button class="emoji-option" data-emoji="🇩🇪">🇩🇪</button>
            <button class="emoji-option" data-emoji="🇧🇷">🇧🇷</button>
            <button class="emoji-option" data-emoji="🇺🇸">🇺🇸</button>
            <button class="emoji-option" data-emoji="⚽">⚽</button>
        </div>
        <div class="button-group">
            <button class="action-btn" id="addBallBtn">➕ top ekle</button>
            <button class="action-btn" id="resetBtn">⟲ sıfırla</button>
        </div>
    </div>

    <div class="status-bar" id="statusMessage">
        🏁 Kazanan yok — tıklayarak top ekle!
    </div>
    <footer>
        ⚡ dönen & dar engeller • toplar sekerek yarışsın • <a href="#" target="_blank">github.io</a> hazır
    </footer>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Boyutlar sabit (canvas 1000x600)
        const CW = 1000;
        const CH = 600;
        canvas.width = CW;
        canvas.height = CH;

        // --- Oyun değişkenleri ---
        let balls = [];                // { emoji, x, y, vx, vy, radius }
        let winnerIndex = -1;           // kim birinci oldu? (-1=yok)
        const baseRadius = 22;           // topların yarıçapı

        // Sabit yerçekimi ve sürtünme (ağır olmasın ama sekmeli)
        const GRAVITY = 0.12;
        const FRICTION_AIR = 0.992;       // hafif yavaşlama
        const FLOOR_FRICTION = 0.98;       // yerde ekstra tutunma

        // Yer seviyesi (topların düştüğü en alt nokta, canvasın hemen altına yakın)
        const GROUND_Y = CH - 38;            // biraz yüksekte dursunlar sekme için

        // --- Engeller (dinamik) ---
        let obstacles = [];

        // Engel yapılandırması (dönen çubuklar, dar dikdörtgenler)
        function buildObstacles() {
            obstacles = [
                // 1) Dönen uzun çubuk (merkez etrafında dönecek) - biraz eğik başlangıç
                { type: 'spinner', x: 300, y: 280, w: 130, h: 14, angle: 0.3, spinSpeed: 0.012 },
                // 2) Dar sabit çubuk (yatay)
                { type: 'fixed', x: 600, y: 400, w: 110, h: 12, angle: 0.0 },
                // 3) Dikey dar engel (dönen değil ama dar)
                { type: 'fixed', x: 780, y: 180, w: 14, h: 120, angle: 0.0 },
                // 4) İkinci bir dönen kısa çubuk (farklı hız)
                { type: 'spinner', x: 450, y: 120, w: 100, h: 10, angle: 1.8, spinSpeed: -0.018 },
                // 5) Çapraz yerleşik dar engel (sabit)
                { type: 'fixed', x: 180, y: 450, w: 90, h: 10, angle: 0.7 },
                // 6) Ek dönen engel (merkez)
                { type: 'spinner', x: 700, y: 280, w: 120, h: 12, angle: 0.0, spinSpeed: 0.02 }
            ];
        }
        buildObstacles(); // ilk kurulum

        // Seçili emoji
        let selectedEmoji = '🇹🇷'; // varsayılan

        // Emoji seçim butonları
        document.querySelectorAll('.emoji-option').forEach(btn => {
            btn.addEventListener('click', e => {
                document.querySelectorAll('.emoji-option').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedEmoji = btn.getAttribute('data-emoji');
            });
        });

        // Mesaj kutusunu güncelle
        const statusDiv = document.getElementById('statusMessage');

        // --- top ekle (tıklama ile imleç pozisyonuna) ---
        function addBallAtMouse(clientX, clientY) {
            if (winnerIndex !== -1) return; // yarış bittiyse ekleme

            const rect = canvas.getBoundingClientRect();
            const scaleX = CW / rect.width;    // canvas fiziksel boyut / css genişlik
            const scaleY = CH / rect.height;

            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;

            // sınırları zorlama (top alandan dışarı taşmasın ama tam kenarda başlamasın)
            canvasX = Math.min(Math.max(canvasX, baseRadius + 5), CW - baseRadius - 5);
            canvasY = Math.min(Math.max(canvasY, baseRadius + 5), GROUND_Y - 5); // yerin altına geçmesin

            // rastgele hafif yatay hız + yukarı doğru hafif zıplama
            const vx = (Math.random() - 0.5) * 1.6;
            const vy = -1.2 - Math.random() * 1.5; // biraz yukarı

            balls.push({
                emoji: selectedEmoji,
                x: canvasX,
                y: canvasY,
                vx: vx,
                vy: vy,
                radius: baseRadius
            });

            // kazanan varsa iptal et (ama zaten winnerIndex -1 kontrolü var)
        }

        // Canvas tıklama / dokunma
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            addBallAtMouse(e.clientX, e.clientY);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                addBallAtMouse(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        // buton ile rastgele konuma top ekle (tıklama butonu)
        document.getElementById('addBallBtn').addEventListener('click', () => {
            if (winnerIndex !== -1) return;
            // rastgele üst bölge
            const randX = 150 + Math.random() * (CW - 300);
            const randY = 80 + Math.random() * 200; // üst kısım
            balls.push({
                emoji: selectedEmoji,
                x: randX,
                y: Math.min(randY, GROUND_Y - baseRadius - 5),
                vx: (Math.random() - 0.5) * 2,
                vy: -1.8 - Math.random() * 2,
                radius: baseRadius
            });
        });

        // Sıfırla butonu
        document.getElementById('resetBtn').addEventListener('click', () => {
            balls = [];
            winnerIndex = -1;
            buildObstacles(); // engelleri ilk haline döndür (açılar sıfırlanır)
            statusDiv.innerText = '🏁 Kazanan yok — tıklayarak top ekle!';
        });

        // --- Çarpışma tespiti: Döndürülmüş dikdörtgen ile top (elips aslında daire) ---
        function rotatePoint(cx, cy, x, y, angle) {
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            const dx = x - cx;
            const dy = y - cy;
            return {
                x: cx + dx * cos - dy * sin,
                y: cy + dx * sin + dy * cos
            };
        }

        function handleBallObstacleCollision(ball, ob) {
            // Dönen engel tipi için anlık merkez etrafında dönüş yapılmış.
            // Önce engelin köşelerini dünya koordinatında hesapla (veya topu engel lokal uzayına çevir)
            const cx = ob.x;
            const cy = ob.y;
            const w = ob.w;
            const h = ob.h;
            const angle = ob.angle || 0;

            // 1) topun merkezini engelin yerel koordinatına çevir (negatif açıyla döndür)
            const localBall = rotatePoint(cx, cy, ball.x, ball.y, -angle);
            const localX = localBall.x;
            const localY = localBall.y;

            // yerel dikdörtgen sınırları (merkez cx,cy etrafında)
            const left = cx - w/2;
            const right = cx + w/2;
            const top = cy - h/2;
            const bottom = cy + h/2;

            // en yakın nokta (clamp)
            const closestX = Math.max(left, Math.min(localX, right));
            const closestY = Math.max(top, Math.min(localY, bottom));

            // çarpışma vektörü (yerel)
            let dx = localX - closestX;
            let dy = localY - closestY;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < ball.radius && dist > 0.001) {
                // çakışma var: topu it
                const overlap = ball.radius - dist;
                const normX = dx / dist;
                const normY = dy / dist;

                // Topu yerelde geri it
                const newLocalX = localX + normX * overlap;
                const newLocalY = localY + normY * overlap;

                // Dünya koordinatına geri döndür ( + angle)
                const worldBall = rotatePoint(cx, cy, newLocalX, newLocalY, angle);
                ball.x = worldBall.x;
                ball.y = worldBall.y;

                // Hız yansıması (sürtünmeli)
                // Önce hız vektörünü yerel koordinata çevir
                let vLocal = rotatePoint(0, 0, ball.vx, ball.vy, -angle);
                // Normal doğrultusunda hızı ters çevir (sadece normal bileşeni)
                let vn = vLocal.x * normX + vLocal.y * normY;
                if (vn < 0) { // yaklaşıyorsa
                    vt_x = vLocal.x - vn * normX;
                    vt_y = vLocal.y - vn * normY;
                    // yeni normal bileşen (eski halinin -0.45 katı kadar sekme + sürtünme)
                    vn_new = -vn * 0.48;
                    vLocal.x = vt_x + vn_new * normX;
                    vLocal.y = vt_y + vn_new * normY;
                    // tekrar dünya döndür
                    let vWorld = rotatePoint(0, 0, vLocal.x, vLocal.y, angle);
                    ball.vx = vWorld.x * 0.98;
                    ball.vy = vWorld.y * 0.98;
                }
                return true;
            }
            return false;
        }

        // --- Fizik güncelleme ---
        function updatePhysics() {
            if (winnerIndex !== -1) return; // kazanan varsa don

            // yerçekimi ve hareket
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];

                // yerçekimi
                b.vy += GRAVITY;

                // hız uygula
                b.x += b.vx;
                b.y += b.vy;

                // hava sürtünmesi
                b.vx *= FRICTION_AIR;
                b.vy *= FRICTION_AIR;

                // --- Yer (zemin) çarpışması ---
                if (b.y + b.radius > GROUND_Y) {
                    b.y = GROUND_Y - b.radius;
                    if (b.vy > 0.2) {
                        b.vy = -b.vy * 0.5;  // sekme
                        b.vx *= FLOOR_FRICTION;
                    } else {
                        b.vy = 0;
                        b.vx *= 0.99; // yerde yavaşça dur
                    }
                }

                // sol/sağ duvar
                if (b.x - b.radius < 5) {
                    b.x = 5 + b.radius;
                    b.vx = -b.vx * 0.4;
                }
                if (b.x + b.radius > CW - 5) {
                    b.x = CW - 5 - b.radius;
                    b.vx = -b.vx * 0.4;
                }

                // tavan (çok yükseğe çıkmasın)
                if (b.y - b.radius < 5) {
                    b.y = 5 + b.radius;
                    b.vy = -b.vy * 0.3;
                }

                // küçük limit
                b.vx = Math.min(Math.max(b.vx, -7), 7);
                b.vy = Math.min(Math.max(b.vy, -7), 7);
            }

            // --- Engel çarpışmaları (çoklu geçiş) ---
            for (let iter = 0; iter < 3; iter++) { // hafif iterasyon
                for (let i = 0; i < balls.length; i++) {
                    for (let ob of obstacles) {
                        handleBallObstacleCollision(balls[i], ob);
                    }
                }
            }

            // Dönen engellerin açılarını güncelle (bağımsız)
            obstacles.forEach(ob => {
                if (ob.type === 'spinner') {
                    ob.angle += ob.spinSpeed;
                }
            });

            // --- Kazanan kontrolü (en düşük y = en yukarıda) toplar düşüyor mantığında en üstteki kazanır ---
            if (balls.length > 0) {
                let minY = Infinity;
                let candidate = -1;
                for (let i = 0; i < balls.length; i++) {
                    // y değeri ne kadar küçükse o kadar yukarıda
                    if (balls[i].y < minY) {
                        minY = balls[i].y;
                        candidate = i;
                    }
                }
                // kazanan için eşik (yeterince yukarıdaysa)
                if (candidate !== -1 && balls[candidate].y < 90) { // neredeyse tavan sınırı
                    if (winnerIndex === -1) {
                        winnerIndex = candidate;
                        statusDiv.innerText = `🏆 Kazanan: ${balls[candidate].emoji}  en yukarıda! 🏆`;
                    }
                } else {
                    // henüz kazanan yoksa statü güncellemesi (isteğe bağlı)
                    if (winnerIndex === -1) {
                        statusDiv.innerText = `⚡ ${balls.length} top yarışıyor... en üstteki kazanır`;
                    }
                }
            } else {
                statusDiv.innerText = `🏁 Top eklemek için tıkla!`;
            }
        }

        // --- Çizimler ---
        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // zemin çizgisi
            ctx.beginPath();
            ctx.strokeStyle = '#ffecbb';
            ctx.lineWidth = 4;
            ctx.setLineDash([12, 16]);
            ctx.beginPath();
            ctx.moveTo(10, GROUND_Y);
            ctx.lineTo(CW-10, GROUND_Y);
            ctx.stroke();
            ctx.setLineDash([]);

            // Engelleri çiz
            obstacles.forEach(ob => {
                ctx.save();
                ctx.translate(ob.x, ob.y);
                ctx.rotate(ob.angle || 0);
                ctx.fillStyle = ob.type === 'spinner' ? '#f57c00' : '#ab47bc';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 14;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
                ctx.fillRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                ctx.restore();

                // ekstra parlak kenar
                ctx.save();
                ctx.translate(ob.x, ob.y);
                ctx.rotate(ob.angle || 0);
                ctx.strokeStyle = '#ffd966';
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#fff5b0';
                ctx.strokeRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                ctx.restore();
            });

            // Toplar
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                // gölge
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 14;
                ctx.shadowOffsetY = 4;

                // top arkaplan (beyaz halka)
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius+2, 0, 2*Math.PI);
                ctx.fillStyle = '#ffffff30';
                ctx.fill();

                ctx.shadowBlur = 20;
                ctx.font = `${b.radius+12}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Twemoji Mozilla", "Android Emoji", Emoji, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = i === winnerIndex ? '#fff99b' : 'white';
                ctx.shadowColor = i === winnerIndex ? 'gold' : '#001122';
                ctx.fillText(b.emoji, b.x, b.y-2);

                // kazanan ışıltısı
                if (i === winnerIndex) {
                    ctx.shadowBlur = 40;
                    ctx.font = '40px sans-serif';
                    ctx.fillStyle = 'gold';
                    ctx.fillText('👑', b.x-18, b.y-55);
                }
            }
            ctx.shadowBlur = 0;

            requestAnimationFrame(draw);
        }

        // Animasyon döngüsü (fizik 60fps)
        function gameLoop() {
            updatePhysics();
            requestAnimationFrame(gameLoop);
        }

        // başlat
        gameLoop();
        draw(); // ilk draw da başlasın

        // canvas yeniden boyutlanınca ölçek sabit (css ile oynama yok)
    })();
</script>
</body>
</html>
