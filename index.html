<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KILIÇ ARENASI · 3 Can · Hızlanan Toplar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a2a35;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 10px;
        }
        .game-box {
            background: #2c404f;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 25px 35px -10px black;
            border: 4px solid #6a9ec7;
        }
        .canvas-container {
            width: min(760px, 90vw);
            aspect-ratio: 4 / 3;
            background: #1b4f64;
            border-radius: 30px;
            padding: 8px;
            box-shadow: inset 0 0 0 4px #9ad0ff, inset 0 0 30px #26688a;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #347a9e, #144b66);
            border-radius: 24px;
            border: 4px solid #ffcf7a;
            cursor: crosshair;
        }
        .control-panel {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }
        .btn {
            background: #ffdead;
            border: none;
            border-radius: 40px;
            padding: 12px 30px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #02212b;
            box-shadow: 0 6px 0 #8b5d28, 0 8px 15px black;
            cursor: pointer;
            transition: 0.05s;
            border: 2px solid #ffd58c;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #8b5d28, 0 8px 15px black;
        }
        .stats {
            background: #1f475a;
            padding: 10px 25px;
            border-radius: 50px;
            border: 3px solid #ffb13b;
            color: #fff3cf;
            font-weight: bold;
            font-size: 1.4rem;
            text-shadow: 2px 2px 0 #09303f;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sword-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 8px gold);
        }
        .footer {
            text-align: center;
            margin-top: 15px;
            color: #b5daf0;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="game-box">
    <div class="canvas-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <div class="control-panel">
        <button class="btn" id="addBallBtn">➕ TOP EKLE</button>
        <button class="btn" id="resetBtn">⟲ YENİ OYUN</button>
        <div class="stats">
            <div class="stat-item">⚔️ <span id="swordTimer">0.0s</span></div>
            <div class="stat-item">🎯 <span id="ballCount">0</span></div>
        </div>
    </div>
    <div class="footer">
        ⚔️ KILIÇ her 5 saniyede bir yer değiştirir · Kılıcı alan saldırır · Çarpışınca hız patlaması
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 800, CH = 600;
        canvas.width = CW; canvas.height = CH;

        // --- Oyun değişkenleri ---
        let balls = [];
        let gameActive = true;
        let lastTime = performance.now();
        
        // Kılıç değişkenleri
        let sword = {
            x: CW/2,
            y: CH/2,
            vx: 0,
            vy: 0,
            radius: 25,
            lastMoveTime: 0,
            moveInterval: 5000, // 5 saniye
            active: true
        };

        // Rastgele kılıç hareketi
        function moveSwordRandomly() {
            if (!gameActive) return;
            const margin = 50;
            sword.x = margin + Math.random() * (CW - 2 * margin);
            sword.y = margin + Math.random() * (CH - 2 * margin);
            sword.lastMoveTime = performance.now();
        }

        // İlk kılıç hareketi
        moveSwordRandomly();

        // --- Top sınıfı ---
        class Ball {
            constructor(x, y, emoji = '⚪') {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.radius = 16;
                this.emoji = emoji;
                this.hasSword = false;
                this.health = 3;
                this.speedMultiplier = 1.0;
                this.speedBoostTime = 0;
                this.color = '#fff5e0';
            }

            update(deltaTime) {
                // Hız çarpanı zamanla azalsın
                if (this.speedBoostTime > 0) {
                    this.speedBoostTime -= deltaTime;
                    if (this.speedBoostTime <= 0) {
                        this.speedBoostTime = 0;
                        this.speedMultiplier = 1.0;
                    }
                }

                const currentSpeed = this.speedMultiplier;
                this.x += this.vx * currentSpeed;
                this.y += this.vy * currentSpeed;

                // Duvarlara çarp (seksin)
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = -this.vx * 0.95;
                    this.speedMultiplier = Math.min(2.0, this.speedMultiplier * 1.1);
                }
                if (this.x + this.radius > CW) {
                    this.x = CW - this.radius;
                    this.vx = -this.vx * 0.95;
                    this.speedMultiplier = Math.min(2.0, this.speedMultiplier * 1.1);
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy = -this.vy * 0.95;
                    this.speedMultiplier = Math.min(2.0, this.speedMultiplier * 1.1);
                }
                if (this.y + this.radius > CH) {
                    this.y = CH - this.radius;
                    this.vy = -this.vy * 0.95;
                    this.speedMultiplier = Math.min(2.0, this.speedMultiplier * 1.1);
                }

                // Hız sınırı
                const maxSpeed = 8;
                this.vx = Math.min(maxSpeed, Math.max(-maxSpeed, this.vx));
                this.vy = Math.min(maxSpeed, Math.max(-maxSpeed, this.vy));
            }
        }

        // --- Top ekleme ---
        function addBall() {
            const emojis = ['⚪', '🔴', '🔵', '🟡', '🟢', '🟣', '🟠', '⚫', '⚪', '🔘'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            const x = 50 + Math.random() * (CW - 100);
            const y = 50 + Math.random() * (CH - 100);
            balls.push(new Ball(x, y, randomEmoji));
            updateBallCount();
        }

        // --- Top-top çarpışması (hız patlamalı) ---
        function handleBallCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    
                    const dx = b2.x - b1.x;
                    const dy = b2.y - b1.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const minDist = b1.radius + b2.radius;
                    
                    if (dist < minDist) {
                        // Çarpışma anı - hız patlaması
                        const boostAmount = 1.4;
                        b1.speedMultiplier = Math.min(2.5, b1.speedMultiplier * boostAmount);
                        b2.speedMultiplier = Math.min(2.5, b2.speedMultiplier * boostAmount);
                        b1.speedBoostTime = 2000; // 2 saniye
                        b2.speedBoostTime = 2000;
                        
                        // Kılıç kontrolü
                        if (b1.hasSword && !b2.hasSword) {
                            b2.health--;
                            if (b2.health > 0) {
                                b2.speedMultiplier = Math.min(2.5, b2.speedMultiplier * 1.8);
                                b2.speedBoostTime = 1500;
                            }
                        } else if (b2.hasSword && !b1.hasSword) {
                            b1.health--;
                            if (b1.health > 0) {
                                b1.speedMultiplier = Math.min(2.5, b1.speedMultiplier * 1.8);
                                b1.speedBoostTime = 1500;
                            }
                        }
                        
                        // Fizik tepkisi
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle);
                        const cos = Math.cos(angle);
                        
                        const v1 = {
                            x: b1.vx * cos + b1.vy * sin,
                            y: b1.vy * cos - b1.vx * sin
                        };
                        const v2 = {
                            x: b2.vx * cos + b2.vy * sin,
                            y: b2.vy * cos - b2.vx * sin
                        };
                        
                        const v1f = v2.x;
                        const v2f = v1.x;
                        
                        b1.vx = v1f * cos - v1.y * sin;
                        b1.vy = v1f * sin + v1.y * cos;
                        b2.vx = v2f * cos - v2.y * sin;
                        b2.vy = v2f * sin + v2.y * cos;
                        
                        // Ayır
                        const overlap = (minDist - dist) / 2;
                        const moveX = (dx / dist) * overlap;
                        const moveY = (dy / dist) * overlap;
                        b1.x -= moveX;
                        b1.y -= moveY;
                        b2.x += moveX;
                        b2.y += moveY;
                    }
                }
            }
        }

        // --- Kılıç etkileşimi ---
        function handleSwordPickup() {
            for (let ball of balls) {
                const dx = ball.x - sword.x;
                const dy = ball.y - sword.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < ball.radius + sword.radius) {
                    if (!ball.hasSword) {
                        // Kılıcı al
                        ball.hasSword = true;
                        ball.speedMultiplier = Math.min(2.5, ball.speedMultiplier * 1.5);
                        ball.speedBoostTime = 2000;
                        
                        // Diğerlerinden kılıcı al
                        balls.forEach(b => {
                            if (b !== ball) b.hasSword = false;
                        });
                        
                        // Kılıç hemen yeni konuma ışınlanmasın, 5 saniye bekle
                        setTimeout(() => {
                            if (gameActive) {
                                moveSwordRandomly();
                                // Kılıç hareket edince eskisi ölür
                                balls.forEach(b => b.hasSword = false);
                            }
                        }, 100);
                    }
                }
            }
        }

        // --- Ölü topları temizle ---
        function removeDeadBalls() {
            balls = balls.filter(ball => ball.health > 0);
            updateBallCount();
        }

        // --- UI güncelleme ---
        function updateBallCount() {
            document.getElementById('ballCount').textContent = balls.length;
        }

        // --- Animasyon döngüsü ---
        let lastUpdate = performance.now();
        
        function animate() {
            const now = performance.now();
            const deltaTime = now - lastUpdate;
            lastUpdate = now;

            if (gameActive) {
                // Kılıç zamanlayıcı
                if (now - sword.lastMoveTime > sword.moveInterval) {
                    moveSwordRandomly();
                    // Kılıç hareket edince tüm kılıçlar kaybolur
                    balls.forEach(b => b.hasSword = false);
                }

                // Topları güncelle
                balls.forEach(ball => ball.update(deltaTime));
                
                // Çarpışmalar
                handleBallCollisions();
                handleSwordPickup();
                removeDeadBalls();

                // Kılıç zamanlayıcı UI
                const timeToMove = Math.max(0, (sword.moveInterval - (now - sword.lastMoveTime)) / 1000);
                document.getElementById('swordTimer').textContent = timeToMove.toFixed(1) + 's';
            }

            draw();
            requestAnimationFrame(animate);
        }

        // --- Çizim ---
        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // Izgara deseni
            ctx.strokeStyle = '#6ba5c030';
            ctx.lineWidth = 1;
            for (let i = 0; i < CW; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, CH);
                ctx.strokeStyle = '#ffffff20';
                ctx.stroke();
            }
            for (let i = 0; i < CH; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(CW, i);
                ctx.stroke();
            }

            // Kılıç
            ctx.save();
            ctx.shadowColor = '#ffaa33';
            ctx.shadowBlur = 30;
            ctx.font = '50px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Twemoji Mozilla", "Android Emoji", Emoji, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffe45c';
            ctx.fillText('⚔️', sword.x, sword.y);
            
            // Kılıç çevresinde parıltı
            ctx.shadowBlur = 50;
            ctx.globalAlpha = 0.5;
            ctx.fillText('⚔️', sword.x, sword.y);
            ctx.restore();

            // Toplar
            for (let ball of balls) {
                ctx.save();
                
                // Gölge
                ctx.shadowColor = '#00000080';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetY = 3;
                
                // Top gövdesi
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius + 2, 0, 2 * Math.PI);
                ctx.fillStyle = ball.hasSword ? '#ffe68f' : '#ffffff';
                ctx.fill();
                
                // Sağlık çemberleri
                for (let i = 0; i < ball.health; i++) {
                    ctx.beginPath();
                    ctx.arc(ball.x - 12 + i * 12, ball.y - 22, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ff4d4d';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                }
                
                // Top emojisi
                ctx.font = `${ball.radius + 8}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Twemoji Mozilla", "Android Emoji", Emoji, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 20;
                ctx.fillStyle = ball.hasSword ? '#ffd966' : 'white';
                ctx.fillText(ball.emoji, ball.x, ball.y - 2);
                
                // Hız göstergesi (çizgi)
                if (ball.speedMultiplier > 1.1) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 15;
                    ctx.arc(ball.x, ball.y, ball.radius + 8, 0, 2 * Math.PI);
                    ctx.stroke();
                }
                
                ctx.restore();
            }

            // Merkez işareti
            ctx.fillStyle = '#ffffff40';
            ctx.font = '20px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('⚔️ ARENA ⚔️', CW/2, 30);
        }

        // --- Event listeners ---
        document.getElementById('addBallBtn').addEventListener('click', () => {
            addBall();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            balls = [];
            gameActive = true;
            moveSwordRandomly();
            updateBallCount();
            document.getElementById('swordTimer').textContent = '5.0s';
        });

        // Başlangıç topları
        for (let i = 0; i < 3; i++) {
            addBall();
        }

        // Animasyonu başlat
        lastUpdate = performance.now();
        animate();
    })();
</script>
</body>
</html>
