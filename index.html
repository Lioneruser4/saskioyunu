<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Backrooms Expedition - Telegram WebView</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: #ffc933; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #joystick-container { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; background: rgba(0,0,0,0.5); border-radius: 50%; pointer-events: auto; }
        #joystick-knob { position: absolute; top: 50px; left: 50px; width: 50px; height: 50px; background: #ffc933; border-radius: 50%; }
        #jump-btn { position: absolute; bottom: 20px; right: 20px; width: 80px; height: 80px; background: rgba(255, 201, 51, 0.3); border: 2px solid #ffc933; border-radius: 50%; pointer-events: auto; color: #ffc933; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        #status-bar { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; pointer-events: none; border-left: 3px solid #ffc933; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1c1b1b; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .flicker { animation: flicker 0.2s infinite; }
        @keyframes flicker { 0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.9; } }
    </style>
</head>
<body>
    <div id="loading-screen">
        <h1 class="flicker">INITIALIZING EXPEDITION...</h1>
        <p id="loading-status">Connecting to Telegram...</p>
    </div>

    <div id="ui-layer">
        <div id="status-bar">
            AGENT: <span id="user-name">IDENTIFYING...</span><br>
            SECTOR: LOBBY_01<br>
            LATENCY: <span id="ping">0ms</span>
        </div>
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script src="game.js"></script>
    <script>
        // Telegram Integration
        const tele = window.Telegram.WebApp;
        tele.expand();
        const userData = {
            id: tele.initDataUnsafe?.user?.id || "GUEST_" + Math.floor(Math.random()*1000),
            name: tele.initDataUnsafe?.user?.first_name || "Unknown_Subject"
        };
        document.getElementById('user-name').innerText = userData.name.toUpperCase();

        // Socket.io Connection
        const socket = io('https://saskioyunu-1-2d6i.onrender.com', {
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000
        });

        socket.on('connect', () => {
            document.getElementById('loading-status').innerText = "Entering the Backrooms...";
            socket.emit('find_game', userData);
        });

        socket.on('room_joined', (data) => {
            document.getElementById('loading-screen').style.display = 'none';
            initGame(socket, data.yourId);
        });

        // Ping logic
        setInterval(() => {
            const start = Date.now();
            socket.emit('ping', () => {
                const duration = Date.now() - start;
                document.getElementById('ping').innerText = duration + 'ms';
            });
        }, 2000);
    </script>
</body>
</html>
