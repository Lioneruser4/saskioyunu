<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SkyRadar Pro | 3D Küresel Uçak Takip Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', monospace;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0f2a 0%, #03050b 100%);
            color: #fff;
        }

        /* 3D Canvas */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Ana Kontrol Paneli - Cam Stili */
        .glass-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 20, 40, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 18px 24px;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 255, 255, 0.1);
            animation: slideInLeft 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            min-width: 280px;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .glass-panel h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #fff, #4affff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radar-icon {
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 2px cyan; }
            50% { opacity: 0.7; text-shadow: 0 0 8px cyan; }
        }

        .status-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            border-left: 3px solid #0ff;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            font-size: 0.9rem;
        }

        .status-label {
            font-weight: 600;
            color: #8aaaff;
            min-width: 100px;
        }

        .status-value {
            font-weight: 500;
            font-family: monospace;
            font-size: 1rem;
        }

        .nearest-highlight {
            background: rgba(255, 100, 50, 0.3);
            border-radius: 12px;
            padding: 8px;
            animation: glowOrange 1.5s infinite;
        }

        @keyframes glowOrange {
            0%, 100% { box-shadow: 0 0 2px rgba(255, 100, 50, 0.5); }
            50% { box-shadow: 0 0 12px rgba(255, 100, 50, 0.8); }
        }

        button {
            background: linear-gradient(135deg, #0a2f5a, #041c33);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-family: inherit;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        button:hover {
            background: linear-gradient(135deg, #0f4b7a, #062a44);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
            transform: scale(1.02);
            color: white;
        }

        /* Bildirim Toasti */
        .toast-notify {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: linear-gradient(135deg, #ff3366, #ff884d);
            color: white;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 200;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255, 50, 50, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.3, 0.55, 1);
            pointer-events: none;
            white-space: nowrap;
        }

        .toast-notify.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-48%) rotate(1deg); }
            75% { transform: translateX(-52%) rotate(-1deg); }
        }

        /* Sağ Alt Bilgi */
        .info-footer {
            position: absolute;
            bottom: 16px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #88aaff;
            z-index: 100;
            font-family: monospace;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .glass-panel { padding: 12px 18px; min-width: 220px; top: 12px; left: 12px; }
            .glass-panel h1 { font-size: 1.2rem; }
            .status-item { font-size: 0.75rem; }
            .toast-notify { font-size: 0.9rem; padding: 12px 24px; white-space: nowrap; }
        }

        /* loading efekti */
        .loading-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #0ff;
            margin-left: 8px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Ana Panel -->
    <div class="glass-panel">
        <h1>
            <span class="radar-icon">🛸</span> SKYRADAR PRO
            <span style="font-size: 0.8rem;">3D</span>
        </h1>
        <div class="status-card">
            <div class="status-item">
                <span class="status-label">📍 KONUM:</span>
                <span class="status-value" id="userLocationText">Alınıyor...</span>
            </div>
            <div class="status-item">
                <span class="status-label">🛩️ ANLIK UÇAK:</span>
                <span class="status-value" id="planeCount">0</span>
            </div>
            <div class="status-item" id="nearestDiv">
                <span class="status-label">⚠️ EN YAKIN:</span>
                <span class="status-value" id="nearestInfo">Yok</span>
            </div>
        </div>
        <button id="enableNotificationsBtn">🔔 BİLDİRİMLERİ AÇ</button>
        <div style="font-size: 11px; margin-top: 12px; text-align: center; opacity: 0.6;">✦ Üzerinden uçak geçtiğinde alarm ✦</div>
    </div>

    <!-- Bildirim Toasti -->
    <div id="airAlertToast" class="toast-notify">
        ✈️🔥 ÜZERİNİZDEN UÇAK GEÇİYOR! 🔥✈️
    </div>

    <div class="info-footer">
        📡 Gerçek zamanlı ADS-B | OpenSky Network
    </div>

    <!-- Three.js ve Kod -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- BAŞLANGIÇ AYARLARI ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);
        scene.fog = new THREE.FogExp2(0x03050b, 0.0003);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2D Renderer (etiketler için)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Kontroller
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // --- DÜNYA (Şık Gezegen) ---
        const earthGeometry = new THREE.SphereGeometry(3.2, 128, 128);
        const textureLoader = new THREE.TextureLoader();
        // Yüksek çözünürlüklü dünya dokusu (Three.js örneklerinden)
        const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
        
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthMap,
            specularMap: earthSpecularMap,
            specular: new THREE.Color('grey'),
            shininess: 5,
            normalMap: earthNormalMap,
            normalScale: new THREE.Vector2(0.8, 0.8)
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        
        // Bulut katmanı
        const cloudGeometry = new THREE.SphereGeometry(3.23, 128, 128);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: cloudMap,
            transparent: true,
            opacity: 0.12,
            blending: THREE.AdditiveBlending
        });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(clouds);
        
        // Yıldız alanı (partikül)
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 800;
            starPositions[i*3+1] = (Math.random() - 0.5) * 800;
            starPositions[i*3+2] = (Math.random() - 0.5) * 200 - 80;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // Işıklandırma
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466cc, 0.4);
        backLight.position.set(-3, 1, -5);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.3);
        fillLight.position.set(2, 3, 4);
        scene.add(fillLight);
        
        // Atmosfer halkası (glow efekti)
        const atmosGeometry = new THREE.SphereGeometry(3.28, 64, 64);
        const atmosMaterial = new THREE.MeshPhongMaterial({
            color: 0x3388ff,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const atmosphere = new THREE.Mesh(atmosGeometry, atmosMaterial);
        scene.add(atmosphere);
        
        // --- UÇAK VERİLERİ VE GLOBAL DEĞİŞKENLER ---
        let planes = []; // { mesh, label, icao, lat, lon, alt, heading }
        let userLocation = { lat: 41.0082, lon: 28.9784 }; // Varsayılan İstanbul, sonra gps ile güncellenecek
        let notificationsEnabled = false;
        let lastNotifiedPlanes = new Set(); // bildirim gönderilen uçaklar (tekrar etmemesi için)
        let lastNearestDistance = Infinity;
        
        // Kullanıcı konumunu al (GPS)
        function getUserLocation() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation.lat = position.coords.latitude;
                        userLocation.lon = position.coords.longitude;
                        document.getElementById('userLocationText').innerHTML = `${userLocation.lat.toFixed(2)}°, ${userLocation.lon.toFixed(2)}° <span class="loading-dot"></span>`;
                        document.getElementById('userLocationText').style.color = "#aaffdd";
                        console.log("Konum alındı:", userLocation);
                        checkOverflight(); // ilk kontrol
                    },
                    (error) => {
                        console.warn("Konum alınamadı, varsayılan kullanılıyor", error);
                        document.getElementById('userLocationText').innerHTML = "Varsayılan (İstanbul)";
                    }
                );
            } else {
                document.getElementById('userLocationText').innerHTML = "GPS desteklenmiyor";
            }
        }
        
        // İki nokta arası mesafe (km) (haversine)
        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        // Üzerinden geçiş kontrolü (yatay mesafe < 5km ve rakım farkı < 2000m ise bildirim)
        function checkOverflight() {
            if (!planes.length) return;
            let nearest = null;
            let minDist = Infinity;
            
            for (let plane of planes) {
                const dist = haversineDistance(userLocation.lat, userLocation.lon, plane.lat, plane.lon);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = plane;
                }
            }
            
            // UI güncelleme
            const nearestSpan = document.getElementById('nearestInfo');
            if (nearest && minDist < 50) {
                nearestSpan.innerHTML = `${nearest.icao || 'Uçak'} | ${minDist.toFixed(1)} km`;
                nearestSpan.parentElement.parentElement.classList.add('nearest-highlight');
                if (minDist < 5) {
                    nearestSpan.style.color = "#ff8866";
                    nearestSpan.style.fontWeight = "bold";
                } else {
                    nearestSpan.style.color = "#aaffdd";
                }
            } else {
                nearestSpan.innerHTML = "Yakın yok";
                nearestSpan.parentElement.parentElement.classList.remove('nearest-highlight');
            }
            
            // BİLDİRİM: mesafe 5 kilometreden azsa ve daha önce bildirilmemişse
            if (notificationsEnabled && nearest && minDist < 5.0) {
                const planeKey = nearest.icao + "_" + Math.floor(Date.now() / 60000); // dakika bazlı tekrar engeli
                if (!lastNotifiedPlanes.has(planeKey) && minDist < 5.0) {
                    lastNotifiedPlanes.add(planeKey);
                    showToastNotification();
                    // Tarayıcı bildirimi (opsiyonel)
                    if (Notification.permission === "granted") {
                        new Notification("🚨 UÇAK GEÇİYOR!", {
                            body: `${nearest.icao || 'Uçak'} tam üzerinizde! (${minDist.toFixed(1)} km)`,
                            icon: "https://cdn-icons-png.flaticon.com/512/3095/3095110.png"
                        });
                    }
                    // 3 dakika sonra bu uçağın aynı anahtarı temizlenebilir ama set yönetimi için basit timeout
                    setTimeout(() => {
                        lastNotifiedPlanes.delete(planeKey);
                    }, 120000);
                }
            } else if (nearest && minDist > 10) {
                // mesafe açıldığında highlight kaldır
            }
            lastNearestDistance = minDist;
        }
        
        // Bildirim toast göster
        let toastTimeout = null;
        function showToastNotification() {
            const toast = document.getElementById('airAlertToast');
            toast.classList.remove('show');
            void toast.offsetWidth; // reflow
            toast.classList.add('show');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }
        
        // Bildirim butonu
        document.getElementById('enableNotificationsBtn').addEventListener('click', () => {
            if (Notification.permission === "default") {
                Notification.requestPermission().then(perm => {
                    if (perm === "granted") notificationsEnabled = true;
                    else alert("Bildirimler engellendi, lütfen tarayıcı ayarlarından açın.");
                });
            } else if (Notification.permission === "granted") {
                notificationsEnabled = true;
                showToastNotification(); // test
                setTimeout(() => {
                    const toast = document.getElementById('airAlertToast');
                    toast.classList.remove('show');
                }, 2000);
            } else {
                alert("Bildirimler engellenmiş. Lütfen site ayarlarından izin verin.");
            }
        });
        
        // Uçakları 3D'ye yerleştirme (enlem/boylam -> vektör)
        function latLonToVector3(lat, lon, radius = 3.25) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = lon * Math.PI / 180;
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            return new THREE.Vector3(x, y, z);
        }
        
        // Uçak modeli (basit ama şık cone + kanat)
        function createAirplaneModel(color = "#ffaa44") {
            const group = new THREE.Group();
            // gövde
            const bodyGeo = new THREE.CylinderGeometry(0.08, 0.12, 0.45, 8);
            const material = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3, emissive: 0x221100 });
            const body = new THREE.Mesh(bodyGeo, material);
            body.rotation.x = Math.PI / 2;
            body.position.z = 0;
            group.add(body);
            // kanatlar
            const wingGeo = new THREE.BoxGeometry(0.32, 0.03, 0.12);
            const wings = new THREE.Mesh(wingGeo, material);
            wings.position.set(0, 0.02, 0);
            group.add(wings);
            // kuyruk
            const tailGeo = new THREE.ConeGeometry(0.09, 0.16, 4);
            const tail = new THREE.Mesh(tailGeo, material);
            tail.position.set(0, 0.1, -0.18);
            group.add(tail);
            // uç ışığı
            const lightMat = new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0xff2200 });
            const tip = new THREE.SphereGeometry(0.05, 6, 6);
            const lightTip = new THREE.Mesh(tip, lightMat);
            lightTip.position.set(0, 0, 0.23);
            group.add(lightTip);
            return group;
        }
        
        // CSS2D Etiketi
        function makeLabel(text, color = "#ccddff") {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.backgroundColor = "rgba(0,0,0,0.65)";
            div.style.color = color;
            div.style.fontSize = "12px";
            div.style.fontWeight = "bold";
            div.style.padding = "2px 8px";
            div.style.borderRadius = "20px";
            div.style.border = `1px solid ${color}`;
            div.style.backdropFilter = "blur(4px)";
            div.style.fontFamily = "monospace";
            div.style.whiteSpace = "nowrap";
            return new CSS2DObject(div);
        }
        
        // Uçakları güncelleme / API'den çekme
        async function fetchPlanesData() {
            try {
                // OpenSky API - tüm devletlerin uçakları (sınırlı, yaklaşık 200-300 uçak)
                const response = await fetch('https://opensky-network.org/api/states/all');
                const data = await response.json();
                if (!data.states) return;
                
                const newPlanes = [];
                const existingMap = new Map();
                planes.forEach(p => existingMap.set(p.icao, p));
                
                for (let state of data.states) {
                    const icao = state[0];
                    const lat = state[6];
                    const lon = state[5];
                    const alt = state[7];
                    const heading = state[10];
                    if (!lat || !lon) continue;
                    // sadece aktif ve anlamlı uçaklar
                    if (Math.abs(lat) > 90 || Math.abs(lon) > 180) continue;
                    
                    let planeObj = existingMap.get(icao);
                    if (planeObj) {
                        // güncelle pozisyon
                        planeObj.lat = lat;
                        planeObj.lon = lon;
                        planeObj.alt = alt;
                        const newPos = latLonToVector3(lat, lon, 3.28);
                        planeObj.mesh.position.lerp(newPos, 0.3);
                        // yönelim (heading)
                        if (heading) {
                            const angleRad = heading * Math.PI / 180;
                            planeObj.mesh.rotation.y = angleRad;
                        }
                        // etiket güncelleme
                        if (planeObj.label) {
                            planeObj.label.position.copy(planeObj.mesh.position);
                            const distToUser = haversineDistance(userLocation.lat, userLocation.lon, lat, lon);
                            let labelColor = distToUser < 8 ? "#ffaa77" : "#88ccff";
                            planeObj.label.element.style.borderColor = labelColor;
                            planeObj.label.element.style.color = labelColor;
                            planeObj.label.element.textContent = `${icao.slice(-4)} | ${Math.floor(alt || 0)}m`;
                        }
                    } else {
                        // yeni uçak ekle
                        const model = createAirplaneModel("#ffaa66");
                        const pos = latLonToVector3(lat, lon, 3.28);
                        model.position.copy(pos);
                        scene.add(model);
                        const labelDiv = makeLabel(`${icao.slice(-4)} | ${Math.floor(alt || 0)}m`, "#88ccff");
                        labelDiv.position.copy(pos);
                        scene.add(labelDiv);
                        
                        planeObj = {
                            mesh: model,
                            label: labelDiv,
                            icao: icao,
                            lat: lat,
                            lon: lon,
                            alt: alt,
                            heading: heading || 0
                        };
                        newPlanes.push(planeObj);
                    }
                    if (!existingMap.has(icao)) newPlanes.push(planeObj);
                }
                // eski uçakları temizle (artık güncel olmayan)
                for (let p of planes) {
                    if (!newPlanes.find(np => np.icao === p.icao)) {
                        scene.remove(p.mesh);
                        scene.remove(p.label);
                    }
                }
                planes = newPlanes.filter(p => p !== undefined);
                document.getElementById('planeCount').innerHTML = planes.length;
                checkOverflight();
            } catch (err) {
                console.warn("API hatası:", err);
                document.getElementById('planeCount').innerHTML = "Bağlantı hatası";
            }
        }
        
        // Animasyon döngüsü
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.002;
            // Bulutları yavaşça döndür
            clouds.rotation.y += 0.0008;
            stars.rotation.y += 0.0002;
            // uçakların etiketlerini takip et
            planes.forEach(plane => {
                if (plane.label) {
                    plane.label.position.copy(plane.mesh.position);
                }
                // küçük ışık efekti
                if (plane.mesh.children.length > 0) {
                    const lightPart = plane.mesh.children.find(c => c.material && c.material.emissive);
                    if (lightPart) lightPart.material.emissiveIntensity = 0.5 + Math.sin(time * 15) * 0.3;
                }
            });
            controls.update(); // kamera
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // periyodik veri çekme (her 6 saniye)
        function startRadar() {
            getUserLocation();
            fetchPlanesData();
            setInterval(fetchPlanesData, 6500);
            setInterval(() => {
                if (planes.length) checkOverflight();
            }, 3000);
        }
        
        startRadar();
        animate();
        
        // pencere yeniden boyutlandırma
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // kısa bilgi konsola
        console.log("🚀 SkyRadar Pro Aktif | 3D Küresel Uçak Takip");
        
        // bildirim kontrolü
        if (Notification.permission === "granted") notificationsEnabled = true;
    </script>
</body>
</html>
