<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Düşüş Vadisi · Çoklu Engel · Çarpışan Toplar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0c2532;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 5px;
            touch-action: pan-y;
        }
        .phone-frame {
            width: min(400px, 96vw);
            background: #0f3f57;
            border-radius: 60px 60px 36px 36px;
            padding: 20px 10px 20px 10px;
            box-shadow: 0 30px 40px -10px black, inset 0 -4px 12px #6ec3ff;
            border: 3px solid #7ec8ff;
        }
        .canvas-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 360 / 720;
            background: #145d80;
            border-radius: 48px;
            padding: 8px;
            box-shadow: inset 0 0 0 4px #b9e4ff, inset 0 0 30px #207199;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #348cbd 0%, #155578 100%);
            border-radius: 40px;
            border: 3px solid #ffde9e;
            touch-action: none;
            cursor: pointer;
        }
        .control-panel {
            margin: 18px 6px 8px 6px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .emoji-bar {
            background: #0c3f56;
            border-radius: 60px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #fcb042;
            box-shadow: inset 0 3px 10px #3590b5;
        }
        .emoji-bar span {
            color: white;
            font-weight: 800;
            background: #1f6d8f;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            text-shadow: 2px 2px 0 #073d54;
        }
        .emoji-grid {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .emoji-opt {
            font-size: 2.1rem;
            background: #1f6f94;
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            box-shadow: 0 5px 0 #0b3443, 0 7px 12px black;
            transition: 0.07s;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .emoji-opt.selected {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0b3443, 0 7px 12px black;
            background: #ffae3c;
            border: 3px solid #fff1c1;
        }
        .action-row {
            display: flex;
            gap: 12px;
        }
        .btn {
            background: #ffeec2;
            border: none;
            border-radius: 60px;
            padding: 16px 0;
            font-weight: 800;
            font-size: 1.3rem;
            color: #022835;
            box-shadow: 0 8px 0 #9c601d, 0 8px 22px black;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 2px solid #ffd894;
            cursor: pointer;
        }
        .btn:active {
            transform: translateY(7px);
            box-shadow: 0 2px 0 #9c601d, 0 8px 22px black;
        }
        .timer-section {
            background: #052d3b;
            padding: 14px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #fac354;
            color: #fcf3cf;
            font-weight: bold;
            font-size: 1.3rem;
            text-shadow: 2px 2px 0 #103f52;
            margin-top: 5px;
        }
        .progress {
            height: 14px;
            background: #fedb9f;
            border-radius: 20px;
            width: 100%;
            box-shadow: inset 0 2px 6px #3f321b;
            transition: width 0.1s;
        }
        .footer-note {
            text-align: center;
            color: #b0e0ff;
            margin-top: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="phone-frame">
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="360" height="720"></canvas>
    </div>

    <div class="control-panel">
        <div class="emoji-bar">
            <span>TOPUN</span>
            <div class="emoji-grid">
                <button class="emoji-opt selected" data-emoji="🇹🇷">🇹🇷</button>
                <button class="emoji-opt" data-emoji="🇯🇵">🇯🇵</button>
                <button class="emoji-opt" data-emoji="🇩🇪">🇩🇪</button>
                <button class="emoji-opt" data-emoji="🇧🇷">🇧🇷</button>
                <button class="emoji-opt" data-emoji="🇺🇸">🇺🇸</button>
                <button class="emoji-opt" data-emoji="⚽">⚽</button>
                <button class="emoji-opt" data-emoji="🐧">🐧</button>
                <button class="emoji-opt" data-emoji="👾">👾</button>
            </div>
        </div>

        <div class="action-row">
            <button class="btn" id="startBtn">▶ BAŞLAT</button>
            <button class="btn" id="addBallBtn">➕ TOP EKLE</button>
            <button class="btn" id="resetBtn">⟲ SIFIRLA</button>
        </div>

        <div class="timer-section" id="statusMsg">
            <span>⏳ 25s</span>
            <span>🏁 DAR DELİK</span>
        </div>
        <div class="progress" id="timerFill" style="width:100%"></div>
    </div>
    <div class="footer-note">
        ⬇️ 45+ engel • toplar itişir • durmaz • son deliğe ilk ulaşan kazanır
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 360, CH = 720;
        canvas.width = CW; canvas.height = CH;

        // --- Oyun durumu ---
        let balls = [];
        let winnerIndex = -1;
        let gameActive = false;          // BAŞLAT butonu ile true olur
        let startTime = null;
        let elapsedSeconds = 0;
        const RACE_DURATION = 25;         // 25 saniye
        const BASE_RADIUS = 13;           

        const GRAVITY = 0.22;
        const GROUND_Y = CH - 30;

        let cameraY = 0;
        const CAM_SMOOTH = 0.06;

        let selectedEmoji = '🇹🇷';

        // --- HEDEF (dar delik) ---
        const TARGET_SLOT = {
            x: CW/2 - 22,
            y: 9800,            // ÇOK DERİN (daha fazla engel için)
            w: 44,
            h: 18,
        };

        // --- 45+ ENGEL (çeşit çeşit) ---
        let obstacles = [];

        function buildObstacles() {
            obstacles = [];
            // 1. Dönen çubuklar (spinner) - 8 adet
            for (let i = 0; i < 8; i++) {
                obstacles.push({
                    type: 'spinner',
                    x: 80 + (i * 30) % 250,
                    y: 600 + i * 320,
                    w: 90 + (i%3)*20,
                    h: 10 + (i%2)*4,
                    angle: i * 0.5,
                    spinSpeed: 0.02 * (i%2 === 0 ? 1 : -1)
                });
            }
            // 2. Sabit dar engeller (fixed) - 12 adet (yatay, dikey, çapraz)
            for (let i = 0; i < 12; i++) {
                let angle = (i % 3) * 0.8;
                let w = (i % 2 === 0) ? 100 : 14;
                let h = (i % 2 === 0) ? 10 : 90;
                obstacles.push({
                    type: 'fixed',
                    x: 60 + (i * 25) % 280,
                    y: 1200 + i * 280,
                    w: w, h: h,
                    angle: angle
                });
            }
            // 3. İten/çarpan "yaylı" engeller (spinner ama daha hızlı) - 6 adet
            for (let i = 0; i < 6; i++) {
                obstacles.push({
                    type: 'spinner',
                    x: 180 + i * 40,
                    y: 2800 + i * 300,
                    w: 110, h: 12,
                    angle: i,
                    spinSpeed: 0.035 * (i%2===0?1:-1)
                });
            }
            // 4. Dar dikey koridorlar (fixed) - 8 adet
            for (let i = 0; i < 8; i++) {
                obstacles.push({
                    type: 'fixed',
                    x: 40 + i * 40,
                    y: 4200 + i * 220,
                    w: 10, h: 130,
                    angle: 0.1
                });
            }
            // 5. Çapraz dönen bıçaklar - 6 adet
            for (let i = 0; i < 6; i++) {
                obstacles.push({
                    type: 'spinner',
                    x: 280 - i * 20,
                    y: 5500 + i * 320,
                    w: 130, h: 8,
                    angle: i * 1.2,
                    spinSpeed: 0.025
                });
            }
            // 6. Karmaşık engel grupları (dönen + sabit) ekstra
            obstacles.push({ type: 'fixed', x: 150, y: 7000, w: 40, h: 10, angle: 0.8 });
            obstacles.push({ type: 'fixed', x: 220, y: 7100, w: 10, h: 110, angle: 0.0 });
            obstacles.push({ type: 'spinner', x: 90, y: 7300, w: 150, h: 12, angle: 0.2, spinSpeed: 0.04 });
            obstacles.push({ type: 'spinner', x: 270, y: 7600, w: 100, h: 10, angle: 1.0, spinSpeed: -0.03 });
            obstacles.push({ type: 'fixed', x: 180, y: 8000, w: 120, h: 8, angle: 0.4 });
            obstacles.push({ type: 'fixed', x: 70, y: 8300, w: 8, h: 140, angle: 0.2 });
            obstacles.push({ type: 'spinner', x: 290, y: 8600, w: 110, h: 14, angle: 0.8, spinSpeed: 0.02 });
            obstacles.push({ type: 'fixed', x: 130, y: 9000, w: 100, h: 10, angle: -0.3 });
            obstacles.push({ type: 'fixed', x: 220, y: 9300, w: 14, h: 100, angle: 0.5 });
            // Toplam sayı: 8+12+6+8+6+9 = 49 engel
        }
        buildObstacles();

        // --- Emoji seçim ---
        document.querySelectorAll('.emoji-opt').forEach(btn => {
            btn.addEventListener('click', e => {
                document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedEmoji = btn.getAttribute('data-emoji');
            });
        });

        const statusDiv = document.getElementById('statusMsg');
        const timerFill = document.getElementById('timerFill');

        // --- Top ekleme fonksiyonu (her zaman eklenebilir ama aktif değilse hareket etmez) ---
        function addBallAtTap(clientX, clientY) {
            if (winnerIndex !== -1) return; // kazanan varsa ekleme

            const rect = canvas.getBoundingClientRect();
            const scaleX = CW / rect.width;
            const scaleY = CH / rect.height;

            let screenX = (clientX - rect.left) * scaleX;
            let screenY = (clientY - rect.top) * scaleY;

            let worldX = Math.min(Math.max(screenX, BASE_RADIUS + 5), CW - BASE_RADIUS - 5);
            let worldY = screenY + cameraY;

            // biraz üstten başlasın
            worldY = Math.max(50 + cameraY, worldY - 30);

            // her topun hareketli olması için rastgele hız
            const vx = (Math.random() - 0.5) * 2.2;
            const vy = 0.5 + Math.random() * 2.0;

            balls.push({
                emoji: selectedEmoji,
                x: worldX,
                y: worldY,
                vx: vx,
                vy: vy,
                radius: BASE_RADIUS
            });

            // Eğer oyun aktif değilse ve top eklenirse zaman başlamaz (start bekler)
        }

        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            addBallAtTap(e.clientX, e.clientY);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) addBallAtTap(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        // BAŞLAT butonu
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!gameActive && winnerIndex === -1) {
                gameActive = true;
                if (balls.length > 0 && startTime === null) {
                    startTime = performance.now();
                } else if (balls.length === 0) {
                    // top yoksa uyarı
                    statusDiv.innerHTML = `<span>⚠️ Önce top ekle</span><span></span>`;
                    gameActive = false;
                }
            }
        });

        // Top ekle butonu (rastgele konum)
        document.getElementById('addBallBtn').addEventListener('click', () => {
            if (winnerIndex !== -1) return;
            const wx = 50 + Math.random() * (CW - 100);
            const wy = cameraY + 100 + Math.random() * 200;
            balls.push({
                emoji: selectedEmoji,
                x: wx,
                y: wy,
                vx: (Math.random() - 0.5) * 2.5,
                vy: 1.0 + Math.random() * 2.5,
                radius: BASE_RADIUS
            });
        });

        // Sıfırla
        document.getElementById('resetBtn').addEventListener('click', () => {
            balls = [];
            winnerIndex = -1;
            gameActive = false;
            startTime = null;
            elapsedSeconds = 0;
            cameraY = 0;
            buildObstacles();
            statusDiv.innerHTML = `<span>⏳ 25s</span><span>🏁 DAR DELİK</span>`;
            timerFill.style.width = '100%';
        });

        // --- Çarpışma: top-top (yumuşak itiş) ---
        function handleBallCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i], b2 = balls[j];
                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let minDist = b1.radius + b2.radius;
                    if (dist < minDist && dist > 0.001) {
                        let overlap = (minDist - dist) / 2;
                        let nx = dx / dist;
                        let ny = dy / dist;
                        
                        // konum düzeltme
                        b1.x -= nx * overlap;
                        b1.y -= ny * overlap;
                        b2.x += nx * overlap;
                        b2.y += ny * overlap;

                        // hız transferi (esnek çarpışma)
                        let v1n = b1.vx * nx + b1.vy * ny;
                        let v2n = b2.vx * nx + b2.vy * ny;
                        let v1t_x = b1.vx - v1n * nx;
                        let v1t_y = b1.vy - v1n * ny;
                        let v2t_x = b2.vx - v2n * nx;
                        let v2t_y = b2.vy - v2n * ny;

                        let v1n_after = (v1n * (1) + v2n * (1)) / 2; // kütle eşit
                        let v2n_after = v1n_after;

                        b1.vx = v1t_x + v1n_after * nx;
                        b1.vy = v1t_y + v1n_after * ny;
                        b2.vx = v2t_x + v2n_after * nx;
                        b2.vy = v2t_y + v2n_after * ny;
                    }
                }
            }
        }

        // --- Döndürülmüş dikdörtgen çarpışması (gelişmiş) ---
        function rotatePoint(cx, cy, x, y, angle) {
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            const dx = x - cx;
            const dy = y - cy;
            return { x: cx + dx * cos - dy * sin, y: cy + dx * sin + dy * cos };
        }

        function handleBallObstacle(ball, ob) {
            const cx = ob.x, cy = ob.y, w = ob.w, h = ob.h, angle = ob.angle || 0;
            const localBall = rotatePoint(cx, cy, ball.x, ball.y, -angle);
            const left = cx - w/2, right = cx + w/2, top = cy - h/2, bottom = cy + h/2;
            const closestX = Math.max(left, Math.min(localBall.x, right));
            const closestY = Math.max(top, Math.min(localBall.y, bottom));
            let dx = localBall.x - closestX, dy = localBall.y - closestY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < ball.radius && dist > 0.001) {
                const overlap = ball.radius - dist;
                const normX = dx / dist, normY = dy / dist;
                const newLocalX = localBall.x + normX * overlap;
                const newLocalY = localBall.y + normY * overlap;
                const worldBall = rotatePoint(cx, cy, newLocalX, newLocalY, angle);
                ball.x = worldBall.x;
                ball.y = worldBall.y;

                // hız yansıması
                let vLocal = rotatePoint(0, 0, ball.vx, ball.vy, -angle);
                let vn = vLocal.x * normX + vLocal.y * normY;
                if (vn < 0) {
                    let vt_x = vLocal.x - vn * normX;
                    let vt_y = vLocal.y - vn * normY;
                    let vn_new = -vn * 0.5; // biraz canlı sektirme
                    vLocal.x = vt_x + vn_new * normX;
                    vLocal.y = vt_y + vn_new * normY;
                    let vWorld = rotatePoint(0, 0, vLocal.x, vLocal.y, angle);
                    ball.vx = vWorld.x * 0.98;
                    ball.vy = vWorld.y * 0.98;
                }
                return true;
            }
            return false;
        }

        // --- Fizik güncelleme (aktifse) ---
        function update() {
            if (!gameActive || winnerIndex !== -1) return;

            // Zaman
            if (startTime !== null) {
                const now = performance.now();
                elapsedSeconds = (now - startTime) / 1000;
                if (elapsedSeconds >= RACE_DURATION) {
                    gameActive = false;
                    statusDiv.innerHTML = `<span>⏱️ SÜRE DOLDU</span><span></span>`;
                    timerFill.style.width = '0%';
                    return;
                } else {
                    const percent = ((RACE_DURATION - elapsedSeconds) / RACE_DURATION) * 100;
                    timerFill.style.width = percent + '%';
                    statusDiv.innerHTML = `<span>⏳ ${(RACE_DURATION - elapsedSeconds).toFixed(1)}s</span><span>🏁 ${balls.length} top</span>`;
                }
            }

            // Yerçekimi ve hareket (toplar ASLA durmasın diye sürtünme düşük)
            for (let b of balls) {
                b.vy += GRAVITY;
                b.x += b.vx;
                b.y += b.vy;

                // çok az sürtünme (hareketlilik kalsın)
                b.vx *= 0.997;
                b.vy *= 0.997;

                // Kenar duvarlar
                if (b.x - b.radius < 5) { b.x = 5 + b.radius; b.vx *= -0.4; }
                if (b.x + b.radius > CW - 5) { b.x = CW - 5 - b.radius; b.vx *= -0.4; }
                // Alt sınır çok aşağıda
                if (b.y + b.radius > GROUND_Y + 9000) { b.y = GROUND_Y + 9000 - b.radius; b.vy *= -0.3; }
            }

            // Top-top çarpışması (itsinler)
            handleBallCollisions();

            // Engel çarpışmaları (3 iterasyon)
            for (let iter = 0; iter < 3; iter++) {
                for (let b of balls) {
                    for (let ob of obstacles) {
                        handleBallObstacle(b, ob);
                    }
                }
            }

            // Dönen engeller
            obstacles.forEach(ob => { if (ob.type === 'spinner') ob.angle += ob.spinSpeed; });

            // Hedef delik kontrolü
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                if (b.x > TARGET_SLOT.x && b.x < TARGET_SLOT.x + TARGET_SLOT.w &&
                    b.y > TARGET_SLOT.y && b.y < TARGET_SLOT.y + TARGET_SLOT.h) {
                    if (winnerIndex === -1 && gameActive) {
                        winnerIndex = i;
                        gameActive = false;
                        statusDiv.innerHTML = `<span>🏆 KAZANAN</span><span>${b.emoji}</span>`;
                        timerFill.style.width = '0%';
                        break;
                    }
                }
            }

            // Kamera: en dipteki topa göre
            if (balls.length > 0) {
                let lowestY = Math.max(...balls.map(b => b.y));
                let targetCamera = Math.max(0, lowestY - CH * 0.5);
                cameraY += (targetCamera - cameraY) * CAM_SMOOTH;
            }
        }

        // --- Çizim (ekran koordinatları) ---
        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // Arkaplan
            ctx.fillStyle = '#1d6e97';
            ctx.fillRect(0, 0, CW, CH);
            for (let i = 0; i < 20; i++) {
                ctx.fillStyle = '#97d0f030';
                ctx.fillRect(0, i*60 - cameraY*0.4, CW, 15);
            }

            // Hedef delik
            ctx.save();
            const slotY = TARGET_SLOT.y - cameraY;
            if (slotY + TARGET_SLOT.h > 0 && slotY < CH) {
                ctx.fillStyle = '#e04e2a';
                ctx.shadowColor = '#ffb86b';
                ctx.shadowBlur = 30;
                ctx.fillRect(TARGET_SLOT.x, slotY, TARGET_SLOT.w, TARGET_SLOT.h);
                ctx.font = 'bold 24px sans-serif';
                ctx.fillStyle = '#fffbc2';
                ctx.fillText('🏁', TARGET_SLOT.x+8, slotY-12);
            }
            ctx.restore();

            // Engeller
            obstacles.forEach(ob => {
                const scY = ob.y - cameraY;
                if (scY + ob.h/2 < 0 || scY - ob.h/2 > CH) return;
                ctx.save();
                ctx.translate(ob.x, scY);
                ctx.rotate(ob.angle || 0);
                ctx.fillStyle = ob.type === 'spinner' ? '#f39c12' : '#b83ddb';
                ctx.shadowColor = '#1a1a2e';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetY = 4;
                ctx.fillRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                ctx.restore();
                ctx.save();
                ctx.translate(ob.x, scY);
                ctx.rotate(ob.angle || 0);
                ctx.strokeStyle = '#ffe69b';
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ffedb0';
                ctx.strokeRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                ctx.restore();
            });

            // Toplar
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                const scrX = b.x;
                const scrY = b.y - cameraY;
                if (scrY + b.radius < 0 || scrY - b.radius > CH) continue;

                ctx.shadowColor = '#001b29';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetY = 5;
                ctx.beginPath();
                ctx.arc(scrX, scrY, b.radius+2, 0, 2*Math.PI);
                ctx.fillStyle = '#ffffe0';
                ctx.fill();

                ctx.font = `${b.radius+11}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Twemoji Mozilla", "Android Emoji", Emoji, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = i === winnerIndex ? 'gold' : '#002c40';
                ctx.fillStyle = i === winnerIndex ? '#fffeb0' : 'white';
                ctx.fillText(b.emoji, scrX, scrY-2);

                if (i === winnerIndex) {
                    ctx.font = '28px sans-serif';
                    ctx.fillStyle = '#ffdb7c';
                    ctx.fillText('👑', scrX-16, scrY-50);
                }
            }

            // Gradient üst
            const grad = ctx.createLinearGradient(0, 0, 0, 60);
            grad.addColorStop(0, '#05252f');
            grad.addColorStop(1, '#05252f00');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CW, 60);

            requestAnimationFrame(draw);
        }

        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
        draw();
    })();
</script>
</body>
</html>
