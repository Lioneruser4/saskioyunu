<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENGEL DENİZİ · Hiç boşluk yok · 40 saniye</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0a1f2b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 4px;
            touch-action: pan-y;
        }
        .elite-frame {
            width: min(330px, 94vw);
            background: #0e3345;
            border-radius: 64px 64px 38px 38px;
            padding: 18px 8px 22px 8px;
            box-shadow: 0 35px 45px -15px black, inset 0 -6px 18px #5ab8ff;
            border: 3px solid #62b0ff;
        }
        .canvas-case {
            position: relative;
            width: 100%;
            aspect-ratio: 310 / 800;
            background: #104e6b;
            border-radius: 50px;
            padding: 7px;
            box-shadow: inset 0 0 0 5px #c0e6ff, inset 0 0 40px #1d7097;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1f5f83 0%, #0a3a51 100%);
            border-radius: 42px;
            border: 4px solid #ffd685;
            touch-action: none;
            cursor: pointer;
        }
        .control-strip {
            margin: 18px 3px 8px 3px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .emoji-dock {
            background: #083446;
            border-radius: 80px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #ffb444;
            box-shadow: inset 0 3px 15px #2683aa;
        }
        .emoji-dock label {
            color: white;
            font-weight: 800;
            background: #1e6f96;
            padding: 7px 18px;
            border-radius: 40px;
            font-size: 0.95rem;
            text-shadow: 2px 2px 0 #093f58;
        }
        .emoji-pack {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .emoji-tile {
            font-size: 1.9rem;
            background: #1e7196;
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            box-shadow: 0 5px 0 #082f40, 0 5px 8px black;
            transition: 0.07s;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .emoji-tile.selected {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #082f40, 0 5px 8px black;
            background: #ffaa2b;
            border: 3px solid #fff7d4;
        }
        .cmd-group {
            display: flex;
            gap: 6px;
        }
        .cmd-btn {
            background: #fff4d5;
            border: none;
            border-radius: 70px;
            padding: 13px 0;
            font-weight: 800;
            font-size: 1.15rem;
            color: #012a38;
            box-shadow: 0 7px 0 #87531b, 0 8px 20px black;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            border: 2px solid #ffd682;
            cursor: pointer;
        }
        .cmd-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #87531b, 0 8px 20px black;
        }
        .time-panel {
            background: #032c3c;
            padding: 14px 14px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #fabe4e;
            color: #fcf3cf;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 2px 2px 0 #1f4457;
            margin-top: 6px;
        }
        .time-bar {
            height: 14px;
            background: #fee2a3;
            border-radius: 20px;
            width: 100%;
            box-shadow: inset 0 2px 6px #3b2e13;
            transition: width 0.1s;
        }
        .footer-note {
            text-align: center;
            color: #c2e2ff;
            margin-top: 12px;
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="elite-frame">
    <div class="canvas-case">
        <canvas id="gameCanvas" width="310" height="800"></canvas>
    </div>

    <div class="control-strip">
        <div class="emoji-dock">
            <label>TOPUN</label>
            <div class="emoji-pack">
                <button class="emoji-tile selected" data-emoji="🇹🇷">🇹🇷</button>
                <button class="emoji-tile" data-emoji="🇯🇵">🇯🇵</button>
                <button class="emoji-tile" data-emoji="🇩🇪">🇩🇪</button>
                <button class="emoji-tile" data-emoji="🇧🇷">🇧🇷</button>
                <button class="emoji-tile" data-emoji="🇺🇸">🇺🇸</button>
                <button class="emoji-tile" data-emoji="⚽">⚽</button>
                <button class="emoji-tile" data-emoji="🐲">🐲</button>
                <button class="emoji-tile" data-emoji="🦁">🦁</button>
                <button class="emoji-tile" data-emoji="👽">👽</button>
                <button class="emoji-tile" data-emoji="💀">💀</button>
                <button class="emoji-tile" data-emoji="🐢">🐢</button>
                <button class="emoji-tile" data-emoji="🚀">🚀</button>
            </div>
        </div>

        <div class="cmd-group">
            <button class="cmd-btn" id="startBtn">▶ BAŞLAT 40sn</button>
            <button class="cmd-btn" id="addBallBtn">➕ TOP</button>
            <button class="cmd-btn" id="resetBtn">⟲ YENİ</button>
        </div>

        <div class="time-panel" id="statusMsg">
            <span>⏳ 40s</span>
            <span>💀 SON ÇUKUR</span>
        </div>
        <div class="time-bar" id="timerFill" style="width:100%"></div>
    </div>
    <div class="footer-note">
        ⬇️ 150+ ENGEL · HİÇ BOŞLUK YOK · TOPLAR İÇİNDEN GEÇEMEZ · SON DELİĞE İLK DÜŞEN KAZANIR
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 310, CH = 800;      // ÇOK DAR ve ÇOK UZUN
        canvas.width = CW; canvas.height = CH;

        // --- Oyun parametreleri ---
        let balls = [];
        let winnerIndex = -1;
        let gameActive = false;
        let startTime = null;
        let elapsedSeconds = 0;
        const RACE_DURATION = 40;         // 40 saniye
        const BASE_RADIUS = 11;            // küçük toplar

        const GRAVITY = 0.2;
        const GROUND_Y = CH - 25;

        let cameraY = 0;
        const CAM_SMOOTH = 0.045;

        let selectedEmoji = '🇹🇷';

        // --- HEDEF (dar çukur) - ÇOK DERİN ---
        const TARGET_PIT = {
            x: CW/2 - 18,
            y: 22000,            // İNANILMAZ DERİN (bol engelli)
            w: 36,
            h: 16,
        };

        // ========== 150+ ENGEL - HİÇ BOŞLUK YOK ==========
        let obstacles = [];

        function buildObstacles() {
            obstacles = [];

            // ENGEL FABRİKASI: her 20-30 pikselde bir engel
            for (let y = 400; y < 22000; y += 45) {  // sık aralıklar
                // her katta 2-5 engel
                const count = 3 + Math.floor(Math.random() * 4); // 3-6 arası
                for (let i = 0; i < count; i++) {
                    const type = Math.random() > 0.4 ? 'spinner' : 'fixed';
                    const x = 30 + (i * 45) % 240;  // dağılım
                    const w = type === 'spinner' ? 40 + Math.random() * 40 : 8 + Math.random() * 30;
                    const h = type === 'spinner' ? 6 + Math.random() * 6 : 30 + Math.random() * 60;
                    const angle = Math.random() * Math.PI;
                    const spinSpeed = type === 'spinner' ? (Math.random() - 0.5) * 0.04 : 0;
                    
                    obstacles.push({
                        type: type,
                        x: x,
                        y: y + (i * 15),
                        w: w,
                        h: h,
                        angle: angle,
                        spinSpeed: spinSpeed
                    });
                }

                // ekstra dikey engeller (boşluk kalmasın)
                if (y % 90 < 30) {
                    obstacles.push({
                        type: 'fixed',
                        x: 50 + Math.random() * 200,
                        y: y + 20,
                        w: 6,
                        h: 70,
                        angle: 0.1,
                        spinSpeed: 0
                    });
                }
            }

            // hedef bölgesi yakınında ekstra sık engel
            for (let y = 21500; y < 22000; y += 25) {
                for (let i = 0; i < 8; i++) {
                    obstacles.push({
                        type: 'spinner',
                        x: 30 + i * 35,
                        y: y + i * 10,
                        w: 35,
                        h: 6,
                        angle: i,
                        spinSpeed: 0.03 * (i%2===0?1:-1)
                    });
                }
            }

            // Toplam engel sayısı: yaklaşık 180-200 arası
        }
        buildObstacles();

        // --- Emoji seçim ---
        document.querySelectorAll('.emoji-tile').forEach(btn => {
            btn.addEventListener('click', e => {
                document.querySelectorAll('.emoji-tile').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedEmoji = btn.getAttribute('data-emoji');
            });
        });

        const statusDiv = document.getElementById('statusMsg');
        const timerFill = document.getElementById('timerFill');

        // --- Top ekleme (dokunma ile) - tam koridor ortası ---
        function addBallAtTap(clientX, clientY) {
            if (winnerIndex !== -1) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = CW / rect.width;
            const scaleY = CH / rect.height;

            let screenX = (clientX - rect.left) * scaleX;
            let screenY = (clientY - rect.top) * scaleY;

            // SADECE ORTA KORİDOR - kaçış yok
            let worldX = CW/2 + (Math.random() - 0.5) * 25;  // çok dar koridor
            worldX = Math.min(Math.max(worldX, BASE_RADIUS + 12), CW - BASE_RADIUS - 12);
            
            let worldY = screenY + cameraY;
            worldY = Math.max(60 + cameraY, worldY - 15);

            const vx = (Math.random() - 0.5) * 1.0;   // minimum yatay
            const vy = 0.9 + Math.random() * 1.8;

            balls.push({
                emoji: selectedEmoji,
                x: worldX,
                y: worldY,
                vx: vx,
                vy: vy,
                radius: BASE_RADIUS
            });
        }

        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            addBallAtTap(e.clientX, e.clientY);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) addBallAtTap(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        // BAŞLAT butonu
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!gameActive && winnerIndex === -1) {
                if (balls.length === 0) {
                    statusDiv.innerHTML = `<span>⚠️ TOP EKLE</span><span></span>`;
                    return;
                }
                gameActive = true;
                if (startTime === null) startTime = performance.now();
            }
        });

        // Top ekle butonu
        document.getElementById('addBallBtn').addEventListener('click', () => {
            if (winnerIndex !== -1) return;
            let worldX = CW/2 + (Math.random() - 0.5) * 30;
            worldX = Math.min(Math.max(worldX, BASE_RADIUS + 12), CW - BASE_RADIUS - 12);
            const worldY = cameraY + 180 + Math.random() * 250;
            balls.push({
                emoji: selectedEmoji,
                x: worldX,
                y: worldY,
                vx: (Math.random() - 0.5) * 1.2,
                vy: 1.2 + Math.random() * 2.2,
                radius: BASE_RADIUS
            });
        });

        // Sıfırla
        document.getElementById('resetBtn').addEventListener('click', () => {
            balls = [];
            winnerIndex = -1;
            gameActive = false;
            startTime = null;
            elapsedSeconds = 0;
            cameraY = 0;
            buildObstacles();
            statusDiv.innerHTML = `<span>⏳ 40s</span><span>💀 SON ÇUKUR</span>`;
            timerFill.style.width = '100%';
        });

        // --- Çarpışma fonksiyonları (GÜÇLENDİRİLMİŞ) ---
        function rotatePoint(cx, cy, x, y, angle) {
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            const dx = x - cx;
            const dy = y - cy;
            return { x: cx + dx * cos - dy * sin, y: cy + dx * sin + dy * cos };
        }

        function handleBallObstacle(ball, ob) {
            const cx = ob.x, cy = ob.y, w = ob.w, h = ob.h, angle = ob.angle || 0;
            
            // topu engelin lokal koordinatına çevir
            const localBall = rotatePoint(cx, cy, ball.x, ball.y, -angle);
            
            // engelin sınırları (lokal)
            const left = cx - w/2;
            const right = cx + w/2;
            const top = cy - h/2;
            const bottom = cy + h/2;
            
            // en yakın noktayı bul
            const closestX = Math.max(left, Math.min(localBall.x, right));
            const closestY = Math.max(top, Math.min(localBall.y, bottom));
            
            let dx = localBall.x - closestX;
            let dy = localBall.y - closestY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < ball.radius && dist > 0.001) {
                // çarpışma var - itekle
                const overlap = ball.radius - dist;
                const normX = dx / dist;
                const normY = dy / dist;
                
                // konumu düzelt (lokal)
                const newLocalX = localBall.x + normX * overlap;
                const newLocalY = localBall.y + normY * overlap;
                
                // dünyaya geri çevir
                const worldBall = rotatePoint(cx, cy, newLocalX, newLocalY, angle);
                ball.x = worldBall.x;
                ball.y = worldBall.y;

                // hız tepkisi (enerji korunumlu)
                let vLocal = rotatePoint(0, 0, ball.vx, ball.vy, -angle);
                let vn = vLocal.x * normX + vLocal.y * normY;
                
                if (vn < 0) {  // yaklaşıyorsa
                    let vt_x = vLocal.x - vn * normX;
                    let vt_y = vLocal.y - vn * normY;
                    let vn_new = -vn * 0.55;  // biraz enerji kaybı
                    
                    vLocal.x = vt_x + vn_new * normX;
                    vLocal.y = vt_y + vn_new * normY;
                    
                    let vWorld = rotatePoint(0, 0, vLocal.x, vLocal.y, angle);
                    ball.vx = vWorld.x * 0.98;
                    ball.vy = vWorld.y * 0.98;
                }
                return true;
            }
            return false;
        }

        function handleBallCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i], b2 = balls[j];
                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let minDist = b1.radius + b2.radius;
                    
                    if (dist < minDist && dist > 0.001) {
                        let overlap = (minDist - dist) / 2;
                        let nx = dx / dist;
                        let ny = dy / dist;
                        
                        // konum düzeltme
                        b1.x -= nx * overlap;
                        b1.y -= ny * overlap;
                        b2.x += nx * overlap;
                        b2.y += ny * overlap;

                        // hız değişimi (tam esnek)
                        let v1n = b1.vx * nx + b1.vy * ny;
                        let v2n = b2.vx * nx + b2.vy * ny;
                        let v1t_x = b1.vx - v1n * nx;
                        let v1t_y = b1.vy - v1n * ny;
                        let v2t_x = b2.vx - v2n * nx;
                        let v2t_y = b2.vy - v2n * ny;

                        let v1n_after = (v1n + v2n) / 2;
                        let v2n_after = v1n_after;

                        b1.vx = v1t_x + v1n_after * nx;
                        b1.vy = v1t_y + v1n_after * ny;
                        b2.vx = v2t_x + v2n_after * nx;
                        b2.vy = v2t_y + v2n_after * ny;
                    }
                }
            }
        }

        // --- Fizik güncelleme (GÜÇLENDİRİLMİŞ) ---
        function update() {
            if (!gameActive || winnerIndex !== -1) return;

            if (startTime !== null) {
                const now = performance.now();
                elapsedSeconds = (now - startTime) / 1000;
                if (elapsedSeconds >= RACE_DURATION) {
                    gameActive = false;
                    statusDiv.innerHTML = `<span>⏱️ SÜRE DOLDU</span><span></span>`;
                    timerFill.style.width = '0%';
                    return;
                } else {
                    const percent = ((RACE_DURATION - elapsedSeconds) / RACE_DURATION) * 100;
                    timerFill.style.width = percent + '%';
                    statusDiv.innerHTML = `<span>⏳ ${(RACE_DURATION - elapsedSeconds).toFixed(1)}s</span><span>💀 ${balls.length} top</span>`;
                }
            }

            // Yerçekimi ve hareket
            for (let b of balls) {
                b.vy += GRAVITY;
                b.x += b.vx;
                b.y += b.vy;

                // minimal sürtünme (toplar dursun istemiyoruz ama çok hızlı da olmasın)
                b.vx *= 0.998;
                b.vy *= 0.998;

                // DAR KORİDOR - duvarlar çok yakın
                if (b.x - b.radius < 12) { 
                    b.x = 12 + b.radius; 
                    b.vx *= -0.35; 
                }
                if (b.x + b.radius > CW - 12) { 
                    b.x = CW - 12 - b.radius; 
                    b.vx *= -0.35; 
                }

                // alt sınır (çok aşağı düşmesin)
                if (b.y + b.radius > GROUND_Y + 21500) { 
                    b.y = GROUND_Y + 21500 - b.radius; 
                    b.vy *= -0.3;
                }
            }

            // top-top çarpışması
            handleBallCollisions();

            // engel çarpışmaları (5 iterasyon - sızdırmazlık için)
            for (let iter = 0; iter < 5; iter++) {
                for (let b of balls) {
                    for (let ob of obstacles) {
                        handleBallObstacle(b, ob);
                    }
                }
            }

            // dönen engellerin açılarını güncelle
            obstacles.forEach(ob => { 
                if (ob.type === 'spinner') ob.angle += ob.spinSpeed; 
            });

            // hedef çukur kontrolü
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                if (b.x > TARGET_PIT.x && b.x < TARGET_PIT.x + TARGET_PIT.w &&
                    b.y > TARGET_PIT.y && b.y < TARGET_PIT.y + TARGET_PIT.h) {
                    if (winnerIndex === -1 && gameActive) {
                        winnerIndex = i;
                        gameActive = false;
                        statusDiv.innerHTML = `<span>🏆 KAZANAN</span><span>${b.emoji}</span>`;
                        timerFill.style.width = '0%';
                        break;
                    }
                }
            }

            // kamera - en dipteki topa göre
            if (balls.length > 0) {
                let lowestY = Math.max(...balls.map(b => b.y));
                let targetCamera = Math.max(0, lowestY - CH * 0.4);
                cameraY += (targetCamera - cameraY) * CAM_SMOOTH;
            }
        }

        // --- Çizim (optimize) ---
        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // arkaplan - yoğun engel hissi
            ctx.fillStyle = '#1a5f86';
            ctx.fillRect(0, 0, CW, CH);
            
            // hareket eden gölgeler
            for (let i = 0; i < 30; i++) {
                ctx.fillStyle = '#b2e2ff15';
                ctx.fillRect(0, i*60 - cameraY*0.3, CW, 20);
            }

            // hedef çukur
            ctx.save();
            const pitY = TARGET_PIT.y - cameraY;
            if (pitY + TARGET_PIT.h > 0 && pitY < CH) {
                ctx.fillStyle = '#d63e1a';
                ctx.shadowColor = '#ffaa4e';
                ctx.shadowBlur = 45;
                ctx.fillRect(TARGET_PIT.x, pitY, TARGET_PIT.w, TARGET_PIT.h);
                ctx.font = 'bold 26px sans-serif';
                ctx.fillStyle = '#ffffcf';
                ctx.fillText('🕳️', TARGET_PIT.x+4, pitY-18);
            }
            ctx.restore();

            // TÜM ENGLER (150+)
            obstacles.forEach(ob => {
                const scY = ob.y - cameraY;
                if (scY + ob.h/2 < 0 || scY - ob.h/2 > CH) return;
                
                ctx.save();
                ctx.translate(ob.x, scY);
                ctx.rotate(ob.angle || 0);
                
                // gövde
                ctx.fillStyle = ob.type === 'spinner' ? '#e0691a' : '#b84cd8';
                ctx.shadowColor = '#101010';
                ctx.shadowBlur = 25;
                ctx.shadowOffsetY = 5;
                ctx.fillRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                
                // parlak kenar
                ctx.strokeStyle = '#feda7a';
                ctx.lineWidth = 2.8;
                ctx.shadowBlur = 18;
                ctx.shadowColor = '#ffeca0';
                ctx.strokeRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                
                ctx.restore();
            });

            // TOPLAR
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                const scrX = b.x;
                const scrY = b.y - cameraY;
                
                if (scrY + b.radius < 0 || scrY - b.radius > CH) continue;

                // gölge
                ctx.shadowColor = '#00111e';
                ctx.shadowBlur = 24;
                ctx.shadowOffsetY = 6;
                
                // arka parlaklık
                ctx.beginPath();
                ctx.arc(scrX, scrY, b.radius+2, 0, 2*Math.PI);
                ctx.fillStyle = '#ffffec';
                ctx.fill();

                // emoji
                ctx.font = `${b.radius+9}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Twemoji Mozilla", "Android Emoji", Emoji, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = i === winnerIndex ? 'gold' : '#002f40';
                ctx.fillStyle = i === winnerIndex ? '#ffffc2' : 'white';
                ctx.fillText(b.emoji, scrX, scrY-2);

                // kazanan tacı
                if (i === winnerIndex) {
                    ctx.font = '28px sans-serif';
                    ctx.fillStyle = '#ffdb70';
                    ctx.fillText('👑', scrX-14, scrY-52);
                }
            }

            // üst fade
            const grad = ctx.createLinearGradient(0, 0, 0, 80);
            grad.addColorStop(0, '#02212b');
            grad.addColorStop(1, '#02212b00');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CW, 80);

            requestAnimationFrame(draw);
        }

        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
        draw();
    })();
</script>
</body>
</html>
