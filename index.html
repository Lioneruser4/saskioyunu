<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAR KANYON · 35 saniye · Profesyonel Engel Labirenti</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0c1c28;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 4px;
            touch-action: pan-y;
        }
        .premium-frame {
            width: min(340px, 94vw);     /* daha ensiz telefon hissi */
            background: #0d3445;
            border-radius: 60px 60px 36px 36px;
            padding: 18px 8px 22px 8px;
            box-shadow: 0 35px 40px -12px black, inset 0 -5px 15px #64c0ff;
            border: 3px solid #6eb0ff;
        }
        .canvas-holder {
            position: relative;
            width: 100%;
            aspect-ratio: 320 / 780;    /* daha uzun ve dar alan */
            background: #0f4765;
            border-radius: 48px;
            padding: 8px;
            box-shadow: inset 0 0 0 4px #bbe6ff, inset 0 0 35px #1a6f96;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #266d94 0%, #0e4560 100%);
            border-radius: 40px;
            border: 3px solid #ffd58c;
            touch-action: none;
            cursor: pointer;
        }
        .ui-bar {
            margin: 18px 4px 8px 4px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .emoji-selector {
            background: #0b364b;
            border-radius: 70px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #ffb445;
            box-shadow: inset 0 3px 12px #2e90b5;
        }
        .emoji-selector span {
            color: white;
            font-weight: 800;
            background: #1e6d91;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.95rem;
            text-shadow: 2px 2px 0 #094154;
        }
        .emoji-palette {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .emoji-item {
            font-size: 2rem;
            background: #1f7093;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            box-shadow: 0 5px 0 #0a3443, 0 6px 10px black;
            transition: 0.07s;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .emoji-item.selected {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0a3443, 0 6px 10px black;
            background: #ffaa33;
            border: 3px solid #fff3cf;
        }
        .action-group {
            display: flex;
            gap: 8px;
        }
        .premium-btn {
            background: #fff2cf;
            border: none;
            border-radius: 60px;
            padding: 14px 0;
            font-weight: 800;
            font-size: 1.2rem;
            color: #022c3a;
            box-shadow: 0 7px 0 #8f551b, 0 8px 20px black;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 2px solid #ffda8b;
            cursor: pointer;
        }
        .premium-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #8f551b, 0 8px 20px black;
        }
        .timer-panel {
            background: #042c3b;
            padding: 14px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #fabe5a;
            color: #fcf3cf;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 2px 2px 0 #1f4457;
            margin-top: 6px;
        }
        .progress-bar {
            height: 14px;
            background: #fee2a3;
            border-radius: 20px;
            width: 100%;
            box-shadow: inset 0 2px 6px #3b2e13;
            transition: width 0.1s;
        }
        .footer-note {
            text-align: center;
            color: #c2e2ff;
            margin-top: 12px;
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="premium-frame">
    <div class="canvas-holder">
        <canvas id="gameCanvas" width="320" height="780"></canvas>
    </div>

    <div class="ui-bar">
        <div class="emoji-selector">
            <span>TOPUN</span>
            <div class="emoji-palette">
                <button class="emoji-item selected" data-emoji="🇹🇷">🇹🇷</button>
                <button class="emoji-item" data-emoji="🇯🇵">🇯🇵</button>
                <button class="emoji-item" data-emoji="🇩🇪">🇩🇪</button>
                <button class="emoji-item" data-emoji="🇧🇷">🇧🇷</button>
                <button class="emoji-item" data-emoji="🇺🇸">🇺🇸</button>
                <button class="emoji-item" data-emoji="⚽">⚽</button>
                <button class="emoji-item" data-emoji="🐉">🐉</button>
                <button class="emoji-item" data-emoji="🦊">🦊</button>
                <button class="emoji-item" data-emoji="👾">👾</button>
                <button class="emoji-item" data-emoji="⭐">⭐</button>
            </div>
        </div>

        <div class="action-group">
            <button class="premium-btn" id="startBtn">▶ BAŞLAT (35sn)</button>
            <button class="premium-btn" id="addBallBtn">➕ TOP</button>
            <button class="premium-btn" id="resetBtn">⟲ YENİ</button>
        </div>

        <div class="timer-panel" id="statusMsg">
            <span>⏳ 35s</span>
            <span>🎯 HEDEF ÇUKUR</span>
        </div>
        <div class="progress-bar" id="timerFill" style="width:100%"></div>
    </div>
    <div class="footer-note">
        ⬇️ DAR KANYON (320px) · 65+ PROFESYONEL ENGEL · TOPLAR İTİŞİR · SON ÇUKURA İLK DÜŞEN KAZANIR
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 320, CH = 780;      // DAR ve UZUN alan
        canvas.width = CW; canvas.height = CH;

        // --- Oyun parametreleri ---
        let balls = [];
        let winnerIndex = -1;
        let gameActive = false;
        let startTime = null;
        let elapsedSeconds = 0;
        const RACE_DURATION = 35;         // 35 saniye
        const BASE_RADIUS = 12;            // daha küçük toplar dar alana uygun

        const GRAVITY = 0.18;
        const GROUND_Y = CH - 25;

        let cameraY = 0;
        const CAM_SMOOTH = 0.05;

        let selectedEmoji = '🇹🇷';

        // --- HEDEF (dar çukur) - çok derinde ---
        const TARGET_PIT = {
            x: CW/2 - 20,
            y: 14800,            // ÇOK DERİN (engellerle dolu uzun bir yol)
            w: 40,
            h: 18,
        };

        // ========== 65+ PROFESYONEL ENGEL ==========
        let obstacles = [];

        function buildObstacles() {
            obstacles = [];

            // 1. KATEGORİ: Dönen bıçaklar (spinner) - 12 adet, dar alana uygun boyutlar
            for (let i = 0; i < 12; i++) {
                obstacles.push({
                    type: 'spinner',
                    x: 70 + (i * 15) % 180,    // dar alanda merkeze yakın
                    y: 600 + i * 280,
                    w: 70 + (i%3)*15,
                    h: 8 + (i%3)*2,
                    angle: i * 0.7,
                    spinSpeed: 0.018 * (i%2===0 ? 1 : -1)
                });
            }

            // 2. KATEGORİ: Sabit dar duvarlar (fixed) - 18 adet (yatay, dikey, çapraz)
            for (let i = 0; i < 18; i++) {
                let angle = (i % 4) * 0.6;
                let w = (i % 3 === 0) ? 70 : 10;     // bazıları yatay uzun, bazıları dikey
                let h = (i % 3 === 0) ? 8 : 60;
                obstacles.push({
                    type: 'fixed',
                    x: 50 + (i * 18) % 220,
                    y: 1300 + i * 250,
                    w: w, h: h,
                    angle: angle
                });
            }

            // 3. KATEGORİ: Hızlı çarpan dönerler - 10 adet
            for (let i = 0; i < 10; i++) {
                obstacles.push({
                    type: 'spinner',
                    x: 160 + (i * 12) % 140,
                    y: 3400 + i * 280,
                    w: 85, h: 9,
                    angle: i,
                    spinSpeed: 0.028 * (i%2===0?1:-1)
                });
            }

            // 4. KATEGORİ: Dikey koridor engelleri - 10 adet
            for (let i = 0; i < 10; i++) {
                obstacles.push({
                    type: 'fixed',
                    x: 40 + i * 25,
                    y: 5200 + i * 240,
                    w: 8, h: 90,
                    angle: 0.05
                });
            }

            // 5. KATEGORİ: Çapraz dönen bıçaklar - 8 adet
            for (let i = 0; i < 8; i++) {
                obstacles.push({
                    type: 'spinner',
                    x: 200 - i * 15,
                    y: 6900 + i * 320,
                    w: 100, h: 7,
                    angle: i * 1.4,
                    spinSpeed: 0.022
                });
            }

            // 6. KATEGORİ: Labirent tipi sabit engeller - 12 adet
            for (let i = 0; i < 12; i++) {
                obstacles.push({
                    type: 'fixed',
                    x: 80 + (i * 20) % 160,
                    y: 8600 + i * 230,
                    w: 50 + (i%2)*20,
                    h: 8,
                    angle: 0.3 * (i%3)
                });
            }

            // 7. KATEGORİ: Ekstra dönen kısa çubuklar (son bölge)
            for (let i = 0; i < 8; i++) {
                obstacles.push({
                    type: 'spinner',
                    x: 110 + i * 30,
                    y: 10800 + i * 250,
                    w: 60, h: 8,
                    angle: i,
                    spinSpeed: 0.025 * (i%2===0?1:-1)
                });
            }

            // 8. KATEGORİ: Hedefe yakın dar koridor (sabit) - 4 özel engel
            obstacles.push({ type: 'fixed', x: 130, y: 13000, w: 8, h: 120, angle: 0.0 });
            obstacles.push({ type: 'fixed', x: 190, y: 13200, w: 8, h: 100, angle: 0.0 });
            obstacles.push({ type: 'spinner', x: 80, y: 13500, w: 90, h: 8, angle: 0.5, spinSpeed: 0.03 });
            obstacles.push({ type: 'spinner', x: 240, y: 13800, w: 90, h: 8, angle: 1.2, spinSpeed: -0.03 });
            obstacles.push({ type: 'fixed', x: 160, y: 14200, w: 70, h: 8, angle: 0.2 });
            obstacles.push({ type: 'fixed', x: 100, y: 14500, w: 8, h: 100, angle: 0.4 });
            
            // Toplam engel: 12+18+10+10+8+12+8+6 = 84 engel !
        }
        buildObstacles();

        // --- Emoji seçim ---
        document.querySelectorAll('.emoji-item').forEach(btn => {
            btn.addEventListener('click', e => {
                document.querySelectorAll('.emoji-item').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedEmoji = btn.getAttribute('data-emoji');
            });
        });

        const statusDiv = document.getElementById('statusMsg');
        const timerFill = document.getElementById('timerFill');

        // --- Top ekleme (dokunma ile) ---
        function addBallAtTap(clientX, clientY) {
            if (winnerIndex !== -1) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = CW / rect.width;
            const scaleY = CH / rect.height;

            let screenX = (clientX - rect.left) * scaleX;
            let screenY = (clientY - rect.top) * scaleY;

            // DAR ALAN: toplar sağa sola kaçamasın diye X'i ortala
            let worldX = CW/2 + (Math.random() - 0.5) * 40;  // dar koridor ortası
            worldX = Math.min(Math.max(worldX, BASE_RADIUS + 8), CW - BASE_RADIUS - 8);
            
            let worldY = screenY + cameraY;
            worldY = Math.max(50 + cameraY, worldY - 20);

            const vx = (Math.random() - 0.5) * 1.2;   // yatay hız düşük (dar alan)
            const vy = 0.8 + Math.random() * 1.8;

            balls.push({
                emoji: selectedEmoji,
                x: worldX,
                y: worldY,
                vx: vx,
                vy: vy,
                radius: BASE_RADIUS
            });
        }

        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            addBallAtTap(e.clientX, e.clientY);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) addBallAtTap(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        // BAŞLAT butonu
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!gameActive && winnerIndex === -1) {
                if (balls.length === 0) {
                    statusDiv.innerHTML = `<span>⚠️ Önce top ekle</span><span></span>`;
                    return;
                }
                gameActive = true;
                if (startTime === null) startTime = performance.now();
            }
        });

        // Top ekle butonu (kontrollü)
        document.getElementById('addBallBtn').addEventListener('click', () => {
            if (winnerIndex !== -1) return;
            let worldX = CW/2 + (Math.random() - 0.5) * 45;
            worldX = Math.min(Math.max(worldX, BASE_RADIUS + 8), CW - BASE_RADIUS - 8);
            const worldY = cameraY + 150 + Math.random() * 200;
            balls.push({
                emoji: selectedEmoji,
                x: worldX,
                y: worldY,
                vx: (Math.random() - 0.5) * 1.5,
                vy: 1.0 + Math.random() * 2.0,
                radius: BASE_RADIUS
            });
        });

        // Sıfırla
        document.getElementById('resetBtn').addEventListener('click', () => {
            balls = [];
            winnerIndex = -1;
            gameActive = false;
            startTime = null;
            elapsedSeconds = 0;
            cameraY = 0;
            buildObstacles();
            statusDiv.innerHTML = `<span>⏳ 35s</span><span>🎯 HEDEF ÇUKUR</span>`;
            timerFill.style.width = '100%';
        });

        // --- GELİŞMİŞ ÇARPışMA (top-top ve top-engel) ---
        function rotatePoint(cx, cy, x, y, angle) {
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            const dx = x - cx;
            const dy = y - cy;
            return { x: cx + dx * cos - dy * sin, y: cy + dx * sin + dy * cos };
        }

        function handleBallObstacle(ball, ob) {
            const cx = ob.x, cy = ob.y, w = ob.w, h = ob.h, angle = ob.angle || 0;
            const localBall = rotatePoint(cx, cy, ball.x, ball.y, -angle);
            const left = cx - w/2, right = cx + w/2, top = cy - h/2, bottom = cy + h/2;
            const closestX = Math.max(left, Math.min(localBall.x, right));
            const closestY = Math.max(top, Math.min(localBall.y, bottom));
            let dx = localBall.x - closestX, dy = localBall.y - closestY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < ball.radius && dist > 0.001) {
                const overlap = ball.radius - dist;
                const normX = dx / dist, normY = dy / dist;
                const newLocalX = localBall.x + normX * overlap;
                const newLocalY = localBall.y + normY * overlap;
                const worldBall = rotatePoint(cx, cy, newLocalX, newLocalY, angle);
                ball.x = worldBall.x;
                ball.y = worldBall.y;

                let vLocal = rotatePoint(0, 0, ball.vx, ball.vy, -angle);
                let vn = vLocal.x * normX + vLocal.y * normY;
                if (vn < 0) {
                    let vt_x = vLocal.x - vn * normX;
                    let vt_y = vLocal.y - vn * normY;
                    let vn_new = -vn * 0.52;
                    vLocal.x = vt_x + vn_new * normX;
                    vLocal.y = vt_y + vn_new * normY;
                    let vWorld = rotatePoint(0, 0, vLocal.x, vLocal.y, angle);
                    ball.vx = vWorld.x * 0.98;
                    ball.vy = vWorld.y * 0.98;
                }
                return true;
            }
            return false;
        }

        function handleBallCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i], b2 = balls[j];
                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let minDist = b1.radius + b2.radius;
                    if (dist < minDist && dist > 0.001) {
                        let overlap = (minDist - dist) / 2;
                        let nx = dx / dist;
                        let ny = dy / dist;
                        
                        b1.x -= nx * overlap;
                        b1.y -= ny * overlap;
                        b2.x += nx * overlap;
                        b2.y += ny * overlap;

                        let v1n = b1.vx * nx + b1.vy * ny;
                        let v2n = b2.vx * nx + b2.vy * ny;
                        let v1t_x = b1.vx - v1n * nx;
                        let v1t_y = b1.vy - v1n * ny;
                        let v2t_x = b2.vx - v2n * nx;
                        let v2t_y = b2.vy - v2n * ny;

                        let v1n_after = (v1n + v2n) / 2;
                        let v2n_after = v1n_after;

                        b1.vx = v1t_x + v1n_after * nx;
                        b1.vy = v1t_y + v1n_after * ny;
                        b2.vx = v2t_x + v2n_after * nx;
                        b2.vy = v2t_y + v2n_after * ny;
                    }
                }
            }
        }

        // --- Fizik güncelleme ---
        function update() {
            if (!gameActive || winnerIndex !== -1) return;

            if (startTime !== null) {
                const now = performance.now();
                elapsedSeconds = (now - startTime) / 1000;
                if (elapsedSeconds >= RACE_DURATION) {
                    gameActive = false;
                    statusDiv.innerHTML = `<span>⏱️ SÜRE DOLDU</span><span></span>`;
                    timerFill.style.width = '0%';
                    return;
                } else {
                    const percent = ((RACE_DURATION - elapsedSeconds) / RACE_DURATION) * 100;
                    timerFill.style.width = percent + '%';
                    statusDiv.innerHTML = `<span>⏳ ${(RACE_DURATION - elapsedSeconds).toFixed(1)}s</span><span>🎯 ${balls.length} top</span>`;
                }
            }

            // Yerçekimi ve hareket
            for (let b of balls) {
                b.vy += GRAVITY;
                b.x += b.vx;
                b.y += b.vy;

                b.vx *= 0.998;
                b.vy *= 0.998;

                // DAR ALAN: duvarlar çok yakın (sol/sağ)
                if (b.x - b.radius < 10) { b.x = 10 + b.radius; b.vx *= -0.35; }
                if (b.x + b.radius > CW - 10) { b.x = CW - 10 - b.radius; b.vx *= -0.35; }

                if (b.y + b.radius > GROUND_Y + 14000) { 
                    b.y = GROUND_Y + 14000 - b.radius; 
                    b.vy *= -0.25;
                }
            }

            handleBallCollisions();

            for (let iter = 0; iter < 3; iter++) {
                for (let b of balls) {
                    for (let ob of obstacles) {
                        handleBallObstacle(b, ob);
                    }
                }
            }

            obstacles.forEach(ob => { if (ob.type === 'spinner') ob.angle += ob.spinSpeed; });

            // Hedef çukur kontrolü
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                if (b.x > TARGET_PIT.x && b.x < TARGET_PIT.x + TARGET_PIT.w &&
                    b.y > TARGET_PIT.y && b.y < TARGET_PIT.y + TARGET_PIT.h) {
                    if (winnerIndex === -1 && gameActive) {
                        winnerIndex = i;
                        gameActive = false;
                        statusDiv.innerHTML = `<span>🏆 KAZANAN</span><span>${b.emoji}</span>`;
                        timerFill.style.width = '0%';
                        break;
                    }
                }
            }

            // Kamera: en dipteki topa göre (ama çok yumuşak)
            if (balls.length > 0) {
                let lowestY = Math.max(...balls.map(b => b.y));
                let targetCamera = Math.max(0, lowestY - CH * 0.45);
                cameraY += (targetCamera - cameraY) * CAM_SMOOTH;
            }
        }

        // --- Çizim ---
        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // Derinlik efekti
            ctx.fillStyle = '#1f6991';
            ctx.fillRect(0, 0, CW, CH);
            for (let i = 0; i < 25; i++) {
                ctx.fillStyle = '#aad6ff20';
                ctx.fillRect(0, i*50 - cameraY*0.3, CW, 12);
            }

            // Hedef çukur
            ctx.save();
            const pitY = TARGET_PIT.y - cameraY;
            if (pitY + TARGET_PIT.h > 0 && pitY < CH) {
                ctx.fillStyle = '#d64f2c';
                ctx.shadowColor = '#ffb45b';
                ctx.shadowBlur = 40;
                ctx.fillRect(TARGET_PIT.x, pitY, TARGET_PIT.w, TARGET_PIT.h);
                ctx.font = 'bold 24px sans-serif';
                ctx.fillStyle = '#fffed0';
                ctx.fillText('🕳️', TARGET_PIT.x+6, pitY-15);
            }
            ctx.restore();

            // Engeller (84 adet)
            obstacles.forEach(ob => {
                const scY = ob.y - cameraY;
                if (scY + ob.h/2 < 0 || scY - ob.h/2 > CH) return;
                ctx.save();
                ctx.translate(ob.x, scY);
                ctx.rotate(ob.angle || 0);
                ctx.fillStyle = ob.type === 'spinner' ? '#e67e22' : '#aa4cd9';
                ctx.shadowColor = '#10121e';
                ctx.shadowBlur = 22;
                ctx.shadowOffsetY = 4;
                ctx.fillRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                ctx.restore();
                ctx.save();
                ctx.translate(ob.x, scY);
                ctx.rotate(ob.angle || 0);
                ctx.strokeStyle = '#ffeaa5';
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fff3b8';
                ctx.strokeRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                ctx.restore();
            });

            // Toplar
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                const scrX = b.x;
                const scrY = b.y - cameraY;
                if (scrY + b.radius < 0 || scrY - b.radius > CH) continue;

                ctx.shadowColor = '#001d2b';
                ctx.shadowBlur = 22;
                ctx.shadowOffsetY = 6;
                ctx.beginPath();
                ctx.arc(scrX, scrY, b.radius+2, 0, 2*Math.PI);
                ctx.fillStyle = '#ffffe8';
                ctx.fill();

                ctx.font = `${b.radius+10}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Twemoji Mozilla", "Android Emoji", Emoji, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = i === winnerIndex ? 'gold' : '#003349';
                ctx.fillStyle = i === winnerIndex ? '#ffffb5' : 'white';
                ctx.fillText(b.emoji, scrX, scrY-2);

                if (i === winnerIndex) {
                    ctx.font = '26px sans-serif';
                    ctx.fillStyle = '#ffe066';
                    ctx.fillText('👑', scrX-14, scrY-50);
                }
            }

            // Üst karartma
            const grad = ctx.createLinearGradient(0, 0, 0, 70);
            grad.addColorStop(0, '#03242e');
            grad.addColorStop(1, '#03242e00');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CW, 70);

            requestAnimationFrame(draw);
        }

        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
        draw();
    })();
</script>
</body>
</html>
