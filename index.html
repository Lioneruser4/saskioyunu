<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔴 CANLI MÜHARİBƏ İZLƏMƏ - REAL OSINT</title>
    
    <!-- Leaflet Xəritə -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            position: fixed;
        }

        #map {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* TV STİLİ XƏBƏR LENTİ */
        #news-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #cc0000;
            color: white;
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 -5px 20px rgba(255,0,0,0.5);
            border-top: 2px solid #ff6666;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        #ticker-content {
            display: inline-block;
            animation: ticker 30s linear infinite;
            font-size: 22px;
            font-weight: bold;
            padding-left: 100%;
        }

        .ticker-item {
            display: inline-block;
            padding-right: 60px;
            color: white;
        }

        .ticker-item::before {
            content: "🚨";
            margin-right: 10px;
            font-size: 24px;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* ANLIQ XƏBƏR PANELİ */
        #breaking-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.95);
            border-left: 8px solid #ff0000;
            border-radius: 15px;
            padding: 20px;
            color: white;
            max-width: 400px;
            width: calc(100% - 40px);
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid #ff4444;
        }

        .breaking-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .red-dot {
            width: 16px;
            height: 16px;
            background: #ff0000;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .breaking-title {
            font-size: 24px;
            font-weight: bold;
            color: #ff0000;
            margin: 10px 0;
        }

        .breaking-location {
            font-size: 18px;
            margin: 5px 0;
            color: #ffaa00;
        }

        .breaking-time {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }

        /* STATİSTİKA */
        #stats-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #ff4444;
            border-radius: 15px;
            padding: 15px;
            color: white;
            min-width: 200px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }

        .stat-value {
            color: #ff4444;
            font-weight: bold;
        }

        #country-stats {
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .country-stat {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            font-size: 14px;
            border-bottom: 1px solid #333;
        }

        /* MENU DÜYMƏSİ */
        #menu-btn {
            position: absolute;
            bottom: 70px;
            right: 20px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            background: #ff4444;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 0 30px #ff4444;
            border: 2px solid white;
        }

        /* MOBİL ÜÇÜN */
        @media (max-width: 768px) {
            #breaking-panel {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
            
            #stats-panel {
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
            }
            
            #news-ticker {
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- XƏBƏR LENTİ -->
    <div id="news-ticker">
        <div id="ticker-content"></div>
    </div>

    <!-- ANLIQ XƏBƏR PANELİ -->
    <div id="breaking-panel">
        <div class="breaking-header">
            <span class="red-dot"></span>
            <span>🔴 SON DƏQİQƏ</span>
        </div>
        <div class="breaking-title" id="breaking-title">Məlumat yüklənir...</div>
        <div class="breaking-location" id="breaking-location"></div>
        <div class="breaking-time" id="breaking-time"></div>
    </div>

    <!-- STATİSTİKA -->
    <div id="stats-panel">
        <div style="font-size: 18px; margin-bottom: 10px; color: #ff4444;">📊 CANLI MƏLUMAT</div>
        <div class="stat-row">
            <span>Ümumi hadisələr:</span>
            <span class="stat-value" id="total-events">0</span>
        </div>
        <div class="stat-row">
            <span>Aktiv münaqişələr:</span>
            <span class="stat-value" id="active-conflicts">0</span>
        </div>
        <div class="stat-row">
            <span>Son yenilənmə:</span>
            <span class="stat-value" id="last-update">-</span>
        </div>
        
        <div id="country-stats"></div>
    </div>

    <!-- MENU -->
    <div id="menu-btn" onclick="refreshData()">🔄</div>

    <script>
        let map;
        let markers = [];
        let currentNews = [];
        
        // Telegram tam ekran
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.expand();
        }

        // Xəritəni başlat
        function initMap() {
            map = L.map('map', {
                center: [30, 30],
                zoom: 2.5,
                zoomControl: false,
                attributionControl: false
            });

            // Qaranlıq xəritə
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
        }

        // Məlumatları yenilə
        async function refreshData() {
            try {
                // RENDER API-nin ÜNVANI - BURANI DƏYİŞDİRİN!
                const API_URL = 'https://sizin-api.onrender.com/api/live-war-data';
                
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Xəritəni təmizlə
                markers.forEach(m => map.removeLayer(m));
                markers = [];
                
                // Münaqişələri xəritəyə əlavə et
                data.conflicts?.forEach(event => {
                    if (event.lat && event.lng) {
                        const color = event.fatalities > 10 ? '#ff0000' : 
                                     event.fatalities > 5 ? '#ff6600' : '#ffaa00';
                        
                        const marker = L.circleMarker([event.lat, event.lng], {
                            radius: Math.min(event.fatalities ? event.fatalities * 2 : 8, 20),
                            color: color,
                            fillColor: color,
                            fillOpacity: 0.8,
                            weight: 2
                        }).addTo(map);
                        
                        marker.bindPopup(`
                            <b>${event.country}</b><br>
                            ${event.location || event.region}<br>
                            Tip: ${event.type}<br>
                            Ölən: ${event.fatalities || 0}<br>
                            Mənbə: ${event.source}
                        `);
                        
                        markers.push(marker);
                    }
                });
                
                // XƏBƏR LENTİNİ YENİLƏ
                if (data.news && data.news.length > 0) {
                    const tickerContent = data.news.map(n => 
                        `<span class="ticker-item">🚨 ${n.title}</span>`
                    ).join('');
                    
                    document.getElementById('ticker-content').innerHTML = tickerContent;
                    
                    // Son xəbəri panelə qoy
                    const latest = data.news[0];
                    document.getElementById('breaking-title').textContent = latest.title;
                    document.getElementById('breaking-location').innerHTML = `📍 ${latest.country || 'Bilinmir'}`;
                    document.getElementById('breaking-time').textContent = 
                        new Date(latest.date).toLocaleTimeString('az-AZ');
                }
                
                // STATİSTİKANİ YENİLƏ
                document.getElementById('total-events').textContent = data.conflicts?.length || 0;
                document.getElementById('last-update').textContent = 
                    new Date().toLocaleTimeString('az-AZ');
                
                // Ölkə statistikası
                const countries = {};
                data.conflicts?.forEach(e => {
                    if (e.country) {
                        countries[e.country] = (countries[e.country] || 0) + 1;
                    }
                });
                
                const countryHtml = Object.entries(countries)
                    .sort((a,b) => b[1] - a[1])
                    .map(([country, count]) => `
                        <div class="country-stat">
                            <span>${country}</span>
                            <span style="color:#ff4444;">${count}</span>
                        </div>
                    `).join('');
                
                document.getElementById('country-stats').innerHTML = countryHtml;
                
            } catch (error) {
                console.error('Xəta:', error);
                document.getElementById('breaking-title').textContent = 
                    'Məlumat çəkilə bilmədi';
            }
        }

        // Səhifə yüklənəndə
        window.onload = () => {
            initMap();
            refreshData();
            
            // Hər 30 saniyədə yenilə
            setInterval(refreshData, 30000);
            
            // Ekran dəyişəndə
            window.addEventListener('resize', () => {
                if (map) map.invalidateSize();
            });
        };
    </script>
</body>
</html>
