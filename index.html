<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meyve Şatosu · Profesyonel Eşleştirme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #3b5e3b, #1d4a1d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            touch-action: pan-y pinch-zoom;
        }

        /* ANA KAPSAM — PROFESYONEL TASARIM */
        .game-suite {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(165deg, #ffdbb5 0%, #f7c98a 100%);
            border-radius: 56px 56px 48px 48px;
            box-shadow: 0 30px 35px -10px rgba(0,0,0,0.6), inset 0 -4px 8px rgba(255,215,140,0.8), inset 0 4px 6px #fff3cf;
            border: 5px solid #e3a56d;
            overflow: hidden;
            padding: 20px 16px 25px;
            transition: all 0.2s;
        }

        /* STATUS BAR (PROFESYONEL) */
        .status-bar {
            background: #604020;
            border-radius: 100px;
            padding: 8px 16px 8px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 3px solid #eec18e;
            box-shadow: inset 0 3px 6px #302010, 0 8px 0 #3f2c14;
        }

        .score-glass {
            background: #ffefc0;
            border-radius: 40px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.9rem;
            color: #412f1b;
            text-shadow: 2px 2px 0 #dba959;
            border: 2px solid #f5b468;
            box-shadow: inset 0 -5px 0 #bb9246;
            letter-spacing: 1px;
        }
        .score-glass span {
            font-size: 1.2rem;
            background: #b37b42;
            color: #ffe39a;
            padding: 6px 16px;
            border-radius: 40px;
            box-shadow: inset 0 -3px 0 #7a5629;
        }

        .level-badge {
            background: #b37b42;
            border-radius: 50px;
            padding: 8px 22px;
            font-weight: bold;
            font-size: 1.5rem;
            color: #fff3c9;
            border: 3px solid #ffe8b0;
            box-shadow: inset 0 -4px 0 #6b4f2b, 0 5px 0 #4d3a1f;
        }

        /* OYUN TAHTASI - PREMIUM */
        .board-container {
            background: #b0763a;
            padding: 16px 12px;
            border-radius: 64px 64px 48px 48px;
            border: 5px solid #f5cd94;
            box-shadow: inset 0 0 0 5px #faeac6, 0 15px 0 #694e2c;
            margin-bottom: 25px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            aspect-ratio: 1/1;
            background: #e2b681;
            padding: 8px;
            border-radius: 40px;
            border: 3px solid #ffdcaa;
        }

        .cell {
            background: #fffcf0;
            border-radius: 20px;
            box-shadow: 0 0 0 2px #b4823b, inset 0 -6px 0 rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.08s, box-shadow 0.08s;
            aspect-ratio: 1/1;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .cell:active {
            transform: scale(0.94);
            box-shadow: 0 0 0 2px #b4823b, inset 0 -2px 0 rgba(0,0,0,0.15);
        }

        /* MEYVE STİLLERİ — GERÇEKÇİ, EMOJİ YOK */
        .fruit {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2), 0 3px 8px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }

        /* ELMA */
        .fruit-0 {
            background: radial-gradient(circle at 35% 35%, #ff4f4f, #b32e2e);
        }
        .fruit-0::after {
            content: "";
            position: absolute;
            width: 14%;
            height: 14%;
            background: #5a3e1f;
            border-radius: 40% 40% 0 0;
            top: -10%;
            left: 43%;
            transform: rotate(-8deg);
        }
        .fruit-0::before {
            content: "";
            position: absolute;
            width: 25%;
            height: 12%;
            background: #3a7734;
            border-radius: 50%;
            top: -15%;
            left: 37%;
            transform: rotate(-12deg);
        }

        /* MUZ */
        .fruit-1 {
            background: linear-gradient(145deg, #fde551, #e4b004);
            border-radius: 50% 50% 40% 40%;
            transform: rotate(12deg);
        }
        .fruit-1::after {
            content: "";
            position: absolute;
            width: 30%;
            height: 20%;
            background: #7c491b;
            border-radius: 50%;
            top: 15%;
            right: 5%;
        }

        /* PORTAKAL */
        .fruit-2 {
            background: radial-gradient(circle at 40% 40%, #ffae42, #d46400);
        }
        .fruit-2::after {
            content: "";
            position: absolute;
            width: 20%;
            height: 18%;
            background: #308530;
            border-radius: 60% 60% 0 0;
            top: -6%;
            left: 40%;
        }

        /* ÇİLEK */
        .fruit-3 {
            background: #e84342;
            border-radius: 45% 45% 50% 50%;
        }
        .fruit-3::after {
            content: "⚫";
            position: absolute;
            font-size: 12px;
            color: #222;
            top: 25%;
            left: 20%;
            transform: scale(1.3);
            text-shadow: 1px 1px 0 #553322;
        }
        .fruit-3::before {
            content: "";
            position: absolute;
            width: 30%;
            height: 16%;
            background: #3daa3d;
            border-radius: 50%;
            top: -12%;
            left: 35%;
        }

        /* ÜZÜM */
        .fruit-4 {
            background: #884eaf;
        }
        .fruit-4::after, .fruit-4::before {
            content: "";
            position: absolute;
            width: 35%;
            height: 35%;
            background: #a868d1;
            border-radius: 50%;
            top: -10%;
            right: -5%;
            opacity: 0.9;
        }
        .fruit-4::before {
            top: auto;
            bottom: -10%;
            left: -5%;
            background: #6d3894;
        }

        /* KARPUZ */
        .fruit-5 {
            background: #27ae60;
            overflow: hidden;
        }
        .fruit-5::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 48%;
            background: #d17237;
            bottom: 0;
            left: 0;
            border-radius: 0 0 50% 50%;
        }
        .fruit-5::before {
            content: "⚫⚫";
            position: absolute;
            font-size: 10px;
            color: #2d2d2d;
            top: 38%;
            left: 20%;
            letter-spacing: 4px;
        }

        /* ARMUT */
        .fruit-6 {
            background: linear-gradient(145deg, #f0d830, #dbb010);
            border-radius: 55% 55% 45% 45%;
            transform: rotate(-5deg);
        }

        /* ŞEFTALİ */
        .fruit-7 {
            background: radial-gradient(circle at 35% 35%, #ffb6b6, #f66b8d);
            border-radius: 55% 45% 50% 50%;
        }
        .fruit-7::after {
            content: "";
            position: absolute;
            width: 24%;
            height: 18%;
            background: #9c6b42;
            border-radius: 40%;
            top: 2%;
            left: 38%;
        }

        /* KONTROLLER */
        .action-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .action-btn {
            flex: 1;
            background: #febf5e;
            border: none;
            font-weight: 800;
            font-size: 1.3rem;
            padding: 16px 8px;
            border-radius: 50px;
            color: #35220b;
            border-bottom: 6px solid #b1702a;
            box-shadow: 0 8px 0 #744d22;
            transition: all 0.04s linear;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 1px;
        }
        .action-btn:active {
            transform: translateY(8px);
            border-bottom-width: 2px;
            box-shadow: 0 2px 0 #744d22;
        }

        /* LOBI — SONSUZ LEVEL */
        .lobby-panel {
            background: #dba15d;
            border-radius: 60px 60px 40px 40px;
            padding: 16px 12px;
            border: 5px solid #fdd49c;
            box-shadow: inset 0 -4px 8px #a56f38, 0 10px 0 #7a502b;
        }

        .lobby-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px 8px;
        }
        .lobby-header h3 {
            font-size: 1.8rem;
            color: #2f1f0e;
            text-shadow: 2px 2px 0 #ecc184;
        }
        .lobby-header span {
            background: #5a3a1a;
            color: #fdebbc;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .level-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-height: 135px;
            overflow-y: auto;
            padding: 8px 5px;
            scrollbar-width: thin;
            scrollbar-color: #ab6d30 #fad69c;
        }
        .level-grid::-webkit-scrollbar {
            width: 6px;
        }
        .level-grid::-webkit-scrollbar-thumb {
            background: #ab6d30;
            border-radius: 10px;
        }

        .level-chip {
            background: #fef3db;
            border: 3px solid #c18b4a;
            border-radius: 50px;
            padding: 12px 18px;
            font-weight: 800;
            font-size: 1.4rem;
            color: #55380e;
            box-shadow: 0 6px 0 #8b5f2e, 0 8px 8px rgba(0,0,0,0.3);
            transition: 0.04s;
            cursor: pointer;
            flex: 0 0 auto;
        }
        .level-chip:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #8b5f2e, 0 8px 8px rgba(0,0,0,0.2);
        }
        .level-chip.active-level {
            background: #feca57;
            border-color: #f39c12;
            transform: scale(1.07);
            box-shadow: 0 0 0 3px #fff1b5, 0 6px 0 #b46f20;
        }

        .watermark {
            text-align: center;
            margin-top: 20px;
            color: #fcf0c0;
            text-shadow: 2px 2px 0 #7b5c36;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<div class="game-suite" id="gameSuite">
    <div class="status-bar">
        <div class="score-glass" id="scoreDisplay">0 <span>puan</span></div>
        <div class="level-badge" id="levelDisplay">LVL 1</div>
    </div>

    <div class="board-container">
        <div class="board" id="boardEl"></div>
    </div>

    <div class="action-bar">
        <button class="action-btn" id="newGameBtn">🔄 YENİ OYUN</button>
        <button class="action-btn" id="nextLevelBtn">🌟 SONRAKİ</button>
    </div>

    <div class="lobby-panel">
        <div class="lobby-header">
            <h3>🍒 MEYVE LOBİSİ 🍊</h3>
            <span id="lobbyLevelCounter">∞</span>
        </div>
        <div class="level-grid" id="levelLobby"></div>
    </div>
    <div class="watermark">👇 DOKUN & KAYDIR — PROFESYONEL MEYVE PATLATMA 👇</div>
</div>

<script>
(function() {
    // -------------------- PROFESYONEL OYUN MOTORU --------------------
    const ROWS = 8, COLS = 8;
    const FRUIT_COUNT = 8;  // 8 farklı meyve (0-7)

    let board = [];
    let currentLevel = 1;
    let score = 0;
    let selectedRow = -1, selectedCol = -1;
    let isDragging = false;
    let touchMoved = false;

    // DOM elemanları
    const boardEl = document.getElementById('boardEl');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const levelLobby = document.getElementById('levelLobby');
    const newGameBtn = document.getElementById('newGameBtn');
    const nextLevelBtn = document.getElementById('nextLevelBtn');

    // -------------------- TAHTA İŞLEMLERİ (KUSURSUZ) --------------------
    function createEmptyBoard() {
        return Array(ROWS).fill().map(() => Array(COLS).fill(0));
    }

    // Seviyeye göre rastgele tahta (daha yüksek seviye = daha fazla çeşitlilik)
    function generateBoardForLevel(level) {
        const variety = Math.min(FRUIT_COUNT, 4 + Math.floor(level / 1.5));
        const newBoard = [];
        for (let r = 0; r < ROWS; r++) {
            const row = [];
            for (let c = 0; c < COLS; c++) {
                row.push(Math.floor(Math.random() * variety) % FRUIT_COUNT);
            }
            newBoard.push(row);
        }
        return newBoard;
    }

    // Başlangıçta patlamasız bir tahta oluştur (patlamaları temizle)
    function initBoard(level) {
        let attempts = 0;
        let newBoard;
        do {
            newBoard = generateBoardForLevel(level);
            board = newBoard;
            // Tahtada patlama var mı kontrol et (sadece kontrol)
        } while (hasAnyMatch(board) && attempts++ < 30); // max 30 deneme

        // Yine de patlama varsa son çare manuel düzelt
        while (hasAnyMatch(board)) {
            board = breakMatches(board);
        }

        // Puan sıfırlanmasın, sadece yeni level başlangıcında istenen olur
        renderBoard();
    }

    // Herhangi bir eşleşme var mı?
    function hasAnyMatch(board) {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c] === -1) continue;
                if (checkMatchAt(board, r, c)) return true;
            }
        }
        return false;
    }

    function checkMatchAt(board, r, c) {
        const val = board[r][c];
        if (val === -1) return false;
        // yatay 3+
        if (c + 2 < COLS && board[r][c+1] === val && board[r][c+2] === val) return true;
        // dikey 3+
        if (r + 2 < ROWS && board[r+1][c] === val && board[r+2][c] === val) return true;
        return false;
    }

    // Basit kırma: eşleşenleri -1 yap, tahtayı döndür (başlangıç için)
    function breakMatches(board) {
        const newBoard = board.map(row => [...row]);
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (newBoard[r][c] === -1) continue;
                if (c + 2 < COLS && newBoard[r][c] === newBoard[r][c+1] && newBoard[r][c] === newBoard[r][c+2]) {
                    newBoard[r][c] = -1;
                    newBoard[r][c+1] = -1;
                    newBoard[r][c+2] = -1;
                }
                if (r + 2 < ROWS && newBoard[r][c] === newBoard[r+1][c] && newBoard[r][c] === newBoard[r+2][c]) {
                    newBoard[r][c] = -1;
                    newBoard[r+1][c] = -1;
                    newBoard[r+2][c] = -1;
                }
            }
        }
        // boşları rastgele doldur
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (newBoard[r][c] === -1) {
                    newBoard[r][c] = Math.floor(Math.random() * FRUIT_COUNT);
                }
            }
        }
        return newBoard;
    }

    // ------------------ PATLATMA MOTORU (ÇEKİRDEK) ------------------
    function scanMatchesAndCrush(addScore = true) {
        let crushed = false;
        const crushMap = Array(ROWS).fill().map(() => Array(COLS).fill(false));

        // Yatay tarama
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS - 2; c++) {
                const val = board[r][c];
                if (val === -1) continue;
                if (board[r][c+1] === val && board[r][c+2] === val) {
                    let end = c+2;
                    while (end+1 < COLS && board[r][end+1] === val) end++;
                    for (let k = c; k <= end; k++) crushMap[r][k] = true;
                }
            }
        }
        // Dikey tarama
        for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS - 2; r++) {
                const val = board[r][c];
                if (val === -1) continue;
                if (board[r+1][c] === val && board[r+2][c] === val) {
                    let end = r+2;
                    while (end+1 < ROWS && board[end+1][c] === val) end++;
                    for (let k = r; k <= end; k++) crushMap[k][c] = true;
                }
            }
        }

        // Patlat ve puan ekle
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (crushMap[r][c] && board[r][c] !== -1) {
                    if (addScore) {
                        score += 15 + currentLevel * 3;
                    }
                    board[r][c] = -1;
                    crushed = true;
                }
            }
        }

        if (addScore) updateScore();
        return crushed;
    }

    // Boşlukları doldur (yukarıdan yeni meyve)
    function fillGaps() {
        for (let c = 0; c < COLS; c++) {
            for (let r = ROWS-1; r >= 0; r--) {
                if (board[r][c] === -1) {
                    // üstte dolu ara
                    for (let k = r-1; k >= 0; k--) {
                        if (board[k][c] !== -1) {
                            board[r][c] = board[k][c];
                            board[k][c] = -1;
                            break;
                        }
                    }
                    // hala -1 ise yeni meyve oluş
                    if (board[r][c] === -1) {
                        board[r][c] = Math.floor(Math.random() * FRUIT_COUNT);
                    }
                }
            }
        }
    }

    // Patlama ve doldurma döngüsü (kademeli)
    function settleBoard() {
        let any;
        do {
            any = scanMatchesAndCrush(true);
            if (any) fillGaps();
        } while (any);
        renderBoard();
    }

    // İki hücreyi değiştir ve patlama kontrolü
    function trySwap(r1, c1, r2, c2) {
        if (r1 < 0 || r1 >= ROWS || c1 < 0 || c1 >= COLS || r2 < 0 || r2 >= ROWS || c2 < 0 || c2 >= COLS) return false;
        if (Math.abs(r1 - r2) + Math.abs(c1 - c2) !== 1) return false;
        if (board[r1][c1] === -1 || board[r2][c2] === -1) return false;

        // swap
        [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];

        const match1 = checkMatchAt(board, r1, c1);
        const match2 = checkMatchAt(board, r2, c2);

        if (match1 || match2) {
            settleBoard();  // tüm patlamaları tetikle
            return true;
        } else {
            // geri al
            [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
            return false;
        }
    }

    // ------------------ RENDER ------------------
    function renderBoard() {
        boardEl.innerHTML = '';
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = r;
                cell.dataset.col = c;

                const fruitType = board[r][c];
                if (fruitType !== -1) {
                    const fruitDiv = document.createElement('div');
                    fruitDiv.className = `fruit fruit-${fruitType % FRUIT_COUNT}`;
                    cell.appendChild(fruitDiv);
                }

                // Touch Events (Mobil)
                cell.addEventListener('touchstart', handleTouchStart, { passive: false });
                cell.addEventListener('touchmove', handleTouchMove, { passive: false });
                cell.addEventListener('touchend', handleTouchEnd);
                cell.addEventListener('touchcancel', handleTouchEnd);

                // Mouse Events (Geliştirme için)
                cell.addEventListener('mousedown', handleMouseDown);
                cell.addEventListener('mousemove', handleMouseMove);
                cell.addEventListener('mouseup', handleMouseUp);
                cell.addEventListener('mouseleave', handleMouseLeave);

                boardEl.appendChild(cell);
            }
        }
    }

    // ------------------ OLAY YÖNETİCİLERİ (PROFESYONEL) ------------------
    function handleTouchStart(e) {
        e.preventDefault();
        const cell = e.target.closest('.cell');
        if (!cell) return;
        const r = parseInt(cell.dataset.row);
        const c = parseInt(cell.dataset.col);
        selectedRow = r; selectedCol = c;
        isDragging = true;
        touchMoved = false;
    }

    function handleTouchMove(e) {
        e.preventDefault();
        if (!isDragging || selectedRow === -1 || selectedCol === -1) return;
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const cell = el?.closest('.cell');
        if (!cell) return;

        const r = parseInt(cell.dataset.row);
        const c = parseInt(cell.dataset.col);
        if (r === selectedRow && c === selectedCol) return;

        if (Math.abs(r - selectedRow) + Math.abs(c - selectedCol) === 1) {
            e.preventDefault();
            touchMoved = true;
            trySwap(selectedRow, selectedCol, r, c);
            selectedRow = -1; selectedCol = -1;
            isDragging = false;
        }
    }

    function handleTouchEnd(e) {
        e.preventDefault();
        selectedRow = -1; selectedCol = -1;
        isDragging = false;
    }

    // Mouse sürükleme
    function handleMouseDown(e) {
        e.preventDefault();
        const cell = e.target.closest('.cell');
        if (!cell) return;
        selectedRow = parseInt(cell.dataset.row);
        selectedCol = parseInt(cell.dataset.col);
        isDragging = true;
        touchMoved = false;
    }

    function handleMouseMove(e) {
        if (!isDragging || selectedRow === -1) return;
        e.preventDefault();
        const cell = e.target.closest('.cell');
        if (!cell) return;
        const r = parseInt(cell.dataset.row);
        const c = parseInt(cell.dataset.col);
        if (Math.abs(r - selectedRow) + Math.abs(c - selectedCol) === 1) {
            trySwap(selectedRow, selectedCol, r, c);
            selectedRow = -1; selectedCol = -1;
            isDragging = false;
        }
    }

    function handleMouseUp(e) { selectedRow = -1; selectedCol = -1; isDragging = false; }
    function handleMouseLeave(e) { selectedRow = -1; selectedCol = -1; isDragging = false; }

    // ------------------ PUAN & SEVİYE ------------------
    function updateScore() {
        scoreDisplay.innerHTML = `${score} <span>puan</span>`;
    }

    function loadLevel(level) {
        currentLevel = Math.max(1, level);
        initBoard(currentLevel);
        levelDisplay.innerText = `LVL ${currentLevel}`;
        document.querySelectorAll('.level-chip').forEach(chip => {
            chip.classList.remove('active-level');
            if (parseInt(chip.innerText) === currentLevel) chip.classList.add('active-level');
        });
    }

    function resetGame() {
        score = 0;
        updateScore();
        loadLevel(1);
    }

    function nextLevel() {
        loadLevel(currentLevel + 1);
    }

    // ------------------ LOBİ OLUŞTUR (SONSUZ) ------------------
    function buildLobby() {
        levelLobby.innerHTML = '';
        // 30 seviye göster (sonsuz hissi)
        for (let i = 1; i <= 30; i++) {
            const chip = document.createElement('div');
            chip.className = 'level-chip';
            chip.innerText = i;
            chip.addEventListener('click', (e) => {
                e.preventDefault();
                loadLevel(i);
            });
            levelLobby.appendChild(chip);
        }
    }

    // ------------------ BAŞLANGIÇ ------------------
    window.addEventListener('load', () => {
        buildLobby();
        resetGame();

        newGameBtn.addEventListener('click', (e) => {
            e.preventDefault();
            resetGame();
        });

        nextLevelBtn.addEventListener('click', (e) => {
            e.preventDefault();
            nextLevel();
        });

        // Sayfa dışı touchmove engelle
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('.board')) e.preventDefault();
        }, { passive: false });
    });

})();
</script>
</body>
</html>
