<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniVapp - Universitet Platforması</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            color: #0a1a2f;
        }

        .app {
            max-width: 1500px;
            margin: 0 auto;
            padding: 16px 24px;
        }

        /* Navbar */
        .navbar {
            background: white;
            padding: 18px 28px;
            border-radius: 30px;
            box-shadow: 0 8px 25px rgba(0,20,40,0.05);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #0a2647, #1e4f8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #0a2647, #1e4f8a);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(10,38,71,0.2);
        }

        /* Tabs */
        .tabs-container {
            background: white;
            border-radius: 30px;
            padding: 12px 20px 0 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 12px;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 14px 28px;
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #3f536e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab.active {
            background: #0a2647;
            color: white;
            box-shadow: 0 8px 18px rgba(10,38,71,0.2);
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 350px;
            gap: 24px;
        }

        /* Folders Panel */
        .folders-panel {
            background: white;
            border-radius: 28px;
            padding: 22px 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            height: fit-content;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .panel-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a2f4f;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-folder-btn {
            width: 40px;
            height: 40px;
            background: #eef4ff;
            border: none;
            border-radius: 16px;
            color: #0a2647;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .folder-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .folder-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            color: #2d405c;
        }

        .folder-item:hover {
            background: #f5f9ff;
        }

        .folder-item.active {
            background: #e8f0fe;
            color: #0a2647;
            font-weight: 600;
        }

        .folder-count {
            margin-left: auto;
            background: #edf3fa;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        /* Content Panel */
        .content-panel {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .content-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0a1a2f;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-primary {
            background: #0a2647;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-secondary {
            background: #f0f6ff;
            color: #0a2647;
            border: none;
            padding: 12px 22px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Items Grid - Mətnin ilk 30 simvolu görünür */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .item-card {
            background: #fafcff;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #eef2f8;
            transition: 0.2s;
            cursor: pointer;
        }

        .item-card:hover {
            transform: translateY(-3px);
            border-color: #0a2647;
            box-shadow: 0 15px 25px rgba(10,38,71,0.08);
        }

        .item-icon {
            width: 48px;
            height: 48px;
            background: #e3ecfa;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a2647;
            font-size: 1.4rem;
            margin-bottom: 15px;
        }

        .item-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #0a1a2f;
        }

        .item-preview {
            font-size: 0.9rem;
            color: #5f7a9a;
            margin-bottom: 12px;
            line-height: 1.5;
            height: 65px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            background: #f1f7ff;
            padding: 10px;
            border-radius: 14px;
            border-left: 3px solid #0a2647;
            word-break: break-word;
        }

        .item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #6f8aac;
        }

        .item-badge {
            background: #dde7f5;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            color: #0a2647;
        }

        /* Kitab Görünüşü */
        .book-view {
            max-width: 800px;
            margin: 0 auto;
            font-family: 'Georgia', serif;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .book-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 25px;
            border-bottom: 2px solid #e2e8f0;
        }

        .book-title {
            font-size: 2.4rem;
            font-weight: 700;
            color: #0a2647;
            margin-bottom: 12px;
        }

        .book-meta {
            color: #64748b;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .book-content {
            font-size: 1.2rem;
            line-height: 1.9;
            color: #1e293b;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .book-content p {
            margin-bottom: 25px;
        }

        /* Exit button */
        .exit-book-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0a2647;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 60px;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(10,38,71,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* OCR Panel */
        .ocr-panel {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            height: fit-content;
        }

        .camera-btn, .gallery-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .camera-btn {
            background: linear-gradient(145deg, #0a2647, #1e4f8a);
            color: white;
        }

        .gallery-btn {
            background: #e8f0fe;
            color: #0a2647;
            border: 1px solid #cddff5;
        }

        #camera-container {
            display: none;
            margin: 20px 0;
        }

        #camera-stream {
            width: 100%;
            border-radius: 20px;
        }

        .camera-controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .capture-btn, .close-camera {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
        }

        .capture-btn {
            background: #0a2647;
            color: white;
        }

        .ocr-result {
            background: #f8fbfe;
            border-radius: 22px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .ocr-text {
            background: white;
            border-radius: 18px;
            padding: 18px;
            min-height: 130px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #e2eaf2;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 15px 0;
            outline: none;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .folder-select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2eaf2;
            border-radius: 18px;
            margin-bottom: 12px;
        }

        .ocr-actions {
            display: flex;
            gap: 10px;
        }

        .ocr-action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 18px;
            font-weight: 600;
            cursor: pointer;
            background: white;
            border: 1px solid #dde5ef;
        }

        .save-btn {
            background: #0a2647;
            color: white;
            border: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f4fa;
            border-top: 4px solid #0a2647;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1100px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Navbar -->
        <div class="navbar">
            <div class="logo">
                <h1>UniVapp</h1>
            </div>
            <div class="avatar" onclick="showStats()">U</div>
        </div>

        <!-- Tabs -->
        <div class="tabs-container">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('ana', this)"><i class="fas fa-home"></i>Ana səhifə</button>
                <button class="tab" onclick="switchTab('dersler', this)"><i class="fas fa-book-open"></i>Dərslər</button>
                <button class="tab" onclick="switchTab('pdfs', this)"><i class="fas fa-file-pdf"></i>PDF-lər</button>
                <button class="tab" onclick="switchTab('qeydler', this)"><i class="fas fa-sticky-note"></i>Qeydlər</button>
                <button class="tab" onclick="switchTab('kamera', this)"><i class="fas fa-camera"></i>Kamera</button>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid" id="mainGrid">
            <!-- Sol Panel - Qovluqlar -->
            <div class="folders-panel">
                <div class="panel-header">
                    <h3><i class="fas fa-folder-tree"></i> Qovluqlar</h3>
                    <button class="new-folder-btn" onclick="createFolder()"><i class="fas fa-plus"></i></button>
                </div>
                <div class="folder-list" id="folderList"></div>
            </div>

            <!-- Orta Panel - Məzmun -->
            <div class="content-panel" id="contentPanel">
                <!-- Normal görünüş -->
                <div id="normalView">
                    <div class="content-header">
                        <h2 id="currentFolderTitle">Bütün dərslər</h2>
                        <div class="action-buttons">
                            <button class="btn-secondary" id="actionBtn" onclick="handleAction()"><i class="fas fa-plus"></i> <span id="actionText">Yeni</span></button>
                            <button class="btn-primary" onclick="uploadPDF()"><i class="fas fa-upload"></i>PDF</button>
                        </div>
                    </div>
                    
                    <div class="items-grid" id="itemsGrid"></div>
                </div>

                <!-- Kitab görünüşü -->
                <div id="bookView" class="book-view hidden">
                    <div class="book-header">
                        <h1 class="book-title" id="bookTitle"></h1>
                        <div class="book-meta">
                            <span><i class="far fa-calendar"></i> <span id="bookDate"></span></span>
                            <span><i class="far fa-folder"></i> <span id="bookFolder"></span></span>
                            <span><i class="far fa-tag"></i> <span id="bookType"></span></span>
                        </div>
                    </div>
                    <div class="book-content" id="bookContent"></div>
                </div>
            </div>

            <!-- Sağ Panel - Kamera OCR -->
            <div class="ocr-panel">
                <h3 style="margin-bottom: 20px;"><i class="fas fa-camera-retro"></i> Dərs materialı</h3>
                
                <button class="camera-btn" onclick="openCamera()">
                    <i class="fas fa-camera"></i> Kamera ilə çək
                </button>
                
                <button class="gallery-btn" onclick="openGallery()">
                    <i class="fas fa-images"></i> Qalereyadan seç
                </button>
                
                <div id="camera-container">
                    <video id="camera-stream" autoplay playsinline></video>
                    <div class="camera-controls">
                        <button class="capture-btn" onclick="captureImage()">Çək</button>
                        <button class="close-camera" onclick="closeCamera()">Bağla</button>
                    </div>
                </div>

                <input type="file" id="galleryInput" accept="image/*" style="display: none;">
                <div id="ocr-loading" class="spinner"></div>

                <div id="ocr-result" class="ocr-result">
                    <div style="display: flex; justify-content: space-between;">
                        <span style="font-weight: 700;">Mətn:</span>
                        <button onclick="clearOCR()" style="background:none; border:none;">✕</button>
                    </div>
                    
                    <select id="folderSelect" class="folder-select"></select>
                    <div id="ocr-text" class="ocr-text" contenteditable="true"></div>
                    
                    <div class="ocr-actions">
                        <button class="ocr-action-btn save-btn" onclick="saveOCR()"><i class="fas fa-save"></i> Yadda saxla</button>
                        <button class="ocr-action-btn" onclick="copyOCR()"><i class="fas fa-copy"></i> Köçür</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Kitabdan çıxış düyməsi -->
        <button id="exitBookBtn" class="exit-book-btn hidden" onclick="exitBookMode()">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <script>
        // ========== GÜCLƏNDİRİLMİŞ DATA SAXLANIŞI ==========
        // Məlumatlar heç vaxt silinmir - 3 qat backup
        
        // Data strukturu
        let folders = [];
        let items = [];
        let selectedFolder = 'Bütün dərslər';
        let currentTab = 'ana';
        let cameraStream = null;
        let isBookMode = false;

        // Yedek sistemi - localStorage + backup
        function loadData() {
            try {
                // Əsas data
                const mainFolders = localStorage.getItem('univapp_folders_master');
                const mainItems = localStorage.getItem('univapp_items_master');
                
                // Backup data
                const backupFolders = localStorage.getItem('univapp_folders_backup');
                const backupItems = localStorage.getItem('univapp_items_backup');
                
                if (mainFolders) {
                    folders = JSON.parse(mainFolders);
                } else if (backupFolders) {
                    folders = JSON.parse(backupFolders);
                } else {
                    // Default folders
                    folders = [
                        { id: 1, name: 'Riyaziyyat', count: 0 },
                        { id: 2, name: 'Fizika', count: 0 },
                        { id: 3, name: 'Proqramlaşdırma', count: 0 },
                        { id: 4, name: 'Xətti cəbr', count: 0 },
                        { id: 5, name: 'Universitet', count: 0 }
                    ];
                }
                
                if (mainItems) {
                    items = JSON.parse(mainItems);
                } else if (backupItems) {
                    items = JSON.parse(backupItems);
                } else {
                    // Default items
                    items = [
                        { id: 1, title: 'Riyaziyyat mühazirə 1', type: 'ders', folder: 'Riyaziyyat', date: '2024-01-15', content: 'Bu gün limit və törəmə mövzusunu keçdik. Limit anlayışı riyazi analizin əsasını təşkil edir. Törəmə isə dəyişmə sürətini ifadə edir.' },
                        { id: 2, title: 'Fizika laboratoriya', type: 'qeyd', folder: 'Fizika', date: '2024-01-20', content: 'Təcrübə nəticələri: Sürət ölçüldü, cismin hərəkət tənliyi quruldu. Nyuton qanunları tətbiq edildi.' },
                        { id: 3, title: 'Kvant fizikası', type: 'ders', folder: 'Fizika', date: '2024-02-10', content: 'Kvant ədədləri və atom quruluşu. Plank sabiti, foton enerjisi, Heisenberg qeyri-müəyyənlik prinsipi.' }
                    ];
                }
                
                // Backup yarat
                createBackup();
                
            } catch (e) {
                console.error('Load error:', e);
                resetToDefault();
            }
            
            updateAll();
        }

        // Backup yarat
        function createBackup() {
            try {
                localStorage.setItem('univapp_folders_backup', JSON.stringify(folders));
                localStorage.setItem('univapp_items_backup', JSON.stringify(items));
            } catch (e) {}
        }

        // Məlumatı yadda saxla (hər dəyişiklikdə)
        function saveData() {
            try {
                // Master save
                localStorage.setItem('univapp_folders_master', JSON.stringify(folders));
                localStorage.setItem('univapp_items_master', JSON.stringify(items));
                
                // Backup save
                createBackup();
                
                // Əlavə olaraq timestamp
                localStorage.setItem('univapp_last_save', new Date().toISOString());
                
            } catch (e) {
                console.error('Save error:', e);
                alert('Xəbərdarlıq: Yaddaş dolub, köhnə məlumatlar silinə bilər');
            }
        }

        // Reset to default
        function resetToDefault() {
            folders = [
                { id: 1, name: 'Riyaziyyat', count: 0 },
                { id: 2, name: 'Fizika', count: 0 },
                { id: 3, name: 'Proqramlaşdırma', count: 0 },
                { id: 4, name: 'Xətti cəbr', count: 0 }
            ];
            items = [];
            saveData();
        }

        // Update all
        function updateAll() {
            updateFolderCounts();
            renderFolders();
            renderItems();
            updateFolderSelect();
        }

        // Folder count yenilə
        function updateFolderCounts() {
            folders.forEach(folder => {
                folder.count = items.filter(item => item.folder === folder.name).length;
            });
        }

        // Folder seçimini yenilə
        function updateFolderSelect() {
            const select = document.getElementById('folderSelect');
            select.innerHTML = '<option value="">Qovluq seçin</option>';
            folders.forEach(f => {
                select.innerHTML += `<option value="${f.name}">${f.name}</option>`;
            });
        }

        // Folderları render et
        function renderFolders() {
            const list = document.getElementById('folderList');
            list.innerHTML = `
                <div class="folder-item ${selectedFolder === 'Bütün dərslər' ? 'active' : ''}" 
                     onclick="selectFolder('Bütün dərslər')">
                    <i class="fas fa-globe"></i> Bütün dərslər
                    <span class="folder-count">${items.length}</span>
                </div>
            `;
            
            folders.forEach(f => {
                list.innerHTML += `
                    <div class="folder-item ${selectedFolder === f.name ? 'active' : ''}" 
                         onclick="selectFolder('${f.name.replace(/'/g, "\\'")}')">
                        <i class="fas fa-folder"></i> ${f.name}
                        <span class="folder-count">${f.count}</span>
                    </div>
                `;
            });
        }

        // Elementləri render et - İLK 30 SİMVOL GÖRÜNÜR
        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';
            
            let filteredItems = items;
            
            // Tab-a görə filtr
            if (currentTab === 'dersler') {
                filteredItems = filteredItems.filter(i => i.type === 'ders');
            } else if (currentTab === 'pdfs') {
                filteredItems = filteredItems.filter(i => i.type === 'pdf');
            } else if (currentTab === 'qeydler') {
                filteredItems = filteredItems.filter(i => i.type === 'qeyd');
            }
            
            // Qovluğa görə filtr
            if (selectedFolder !== 'Bütün dərslər') {
                filteredItems = filteredItems.filter(i => i.folder === selectedFolder);
            }
            
            if (filteredItems.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:#728aa8;">Heç bir məlumat yoxdur</div>';
                return;
            }
            
            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.onclick = () => openBookMode(item.id);
                
                let icon = 'fa-file';
                if (item.type === 'ders') icon = 'fa-book-open';
                else if (item.type === 'qeyd') icon = 'fa-sticky-note';
                else if (item.type === 'pdf') icon = 'fa-file-pdf';
                
                // Mətnin ilk 30 simvolu (preview)
                let preview = '';
                if (item.content) {
                    preview = item.content.substring(0, 30);
                    if (item.content.length > 30) preview += '...';
                } else if (item.type === 'pdf') {
                    preview = 'PDF faylı';
                } else {
                    preview = 'Məzmun yoxdur';
                }
                
                const date = new Date(item.date).toLocaleDateString('az');
                
                card.innerHTML = `
                    <div class="item-icon"><i class="fas ${icon}"></i></div>
                    <div class="item-title">${item.title}</div>
                    <div class="item-preview">${preview}</div>
                    <div class="item-meta">
                        <span class="item-badge">${item.type}</span>
                        <span>${date}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Kitab rejimi - tam ekran
        function openBookMode(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;
            
            document.getElementById('bookTitle').innerText = item.title;
            document.getElementById('bookDate').innerText = new Date(item.date).toLocaleDateString('az');
            document.getElementById('bookFolder').innerText = item.folder;
            document.getElementById('bookType').innerText = item.type;
            
            // Mətn formatı - düzgün alt-alta
            if (item.content) {
                const formattedContent = item.content.replace(/\n/g, '</p><p>');
                document.getElementById('bookContent').innerHTML = `<p>${formattedContent}</p>`;
            } else {
                document.getElementById('bookContent').innerHTML = '<p>Məzmun yoxdur</p>';
            }
            
            document.getElementById('normalView').classList.add('hidden');
            document.getElementById('bookView').classList.remove('hidden');
            document.getElementById('exitBookBtn').classList.remove('hidden');
            isBookMode = true;
        }

        // Kitabdan çıx
        function exitBookMode() {
            document.getElementById('normalView').classList.remove('hidden');
            document.getElementById('bookView').classList.add('hidden');
            document.getElementById('exitBookBtn').classList.add('hidden');
            isBookMode = false;
        }

        // Folder seç
        function selectFolder(folderName) {
            selectedFolder = folderName;
            document.getElementById('currentFolderTitle').innerText = folderName;
            renderFolders();
            renderItems();
        }

        // Yeni folder
        function createFolder() {
            const name = prompt('Qovluq adı:');
            if (name && name.trim()) {
                folders.push({
                    id: Date.now(),
                    name: name.trim(),
                    count: 0
                });
                saveData();
                updateAll();
            }
        }

        // Action düyməsi
        function handleAction() {
            if (currentTab === 'pdfs') {
                uploadPDF();
            } else if (currentTab === 'kamera') {
                openCamera();
            } else {
                createNote();
            }
        }

        // Yeni qeyd
        function createNote(type = 'qeyd') {
            const title = prompt('Başlıq:', `Qeyd ${new Date().toLocaleDateString('az')}`);
            if (!title) return;
            
            const content = prompt('Mətn:');
            if (!content) return;
            
            const folder = selectedFolder !== 'Bütün dərslər' ? selectedFolder : 'Ümumi';
            
            const newItem = {
                id: Date.now(),
                title: title,
                type: currentTab === 'dersler' ? 'ders' : 'qeyd',
                folder: folder,
                date: new Date().toISOString(),
                content: content
            };
            
            items.push(newItem);
            saveData();
            updateAll();
        }

        // PDF yüklə
        function uploadPDF() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.pdf';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (loadEvent) => {
                        const newItem = {
                            id: Date.now(),
                            title: file.name,
                            type: 'pdf',
                            folder: selectedFolder !== 'Bütün dərslər' ? selectedFolder : 'PDF-lər',
                            date: new Date().toISOString(),
                            data: loadEvent.target.result
                        };
                        items.push(newItem);
                        saveData();
                        updateAll();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        // Tab dəyiş
        function switchTab(tabName, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            
            currentTab = tabName;
            
            // Başlığı dəyiş
            const titles = {
                'ana': 'Ana səhifə',
                'dersler': 'Bütün dərslər',
                'pdfs': 'PDF Kitabxana',
                'qeydler': 'Qeydlərim',
                'kamera': 'Kamera OCR'
            };
            
            document.getElementById('currentFolderTitle').innerText = titles[tabName];
            
            // Action düyməsi mətnini dəyiş
            const actionBtn = document.getElementById('actionText');
            if (tabName === 'pdfs') actionBtn.innerText = 'Yeni PDF';
            else if (tabName === 'kamera') actionBtn.innerText = 'Kamera aç';
            else actionBtn.innerText = 'Yeni';
            
            renderItems();
            
            if (tabName === 'kamera') {
                document.querySelector('.ocr-panel').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // ========== KAMERA FUNKSİYALARI ==========
        async function openCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                const video = document.getElementById('camera-stream');
                video.srcObject = cameraStream;
                document.getElementById('camera-container').style.display = 'block';
                await video.play();
            } catch (err) {
                alert('Kamera xətası: ' + err.message);
            }
        }

        function closeCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
            }
            document.getElementById('camera-container').style.display = 'none';
        }

        function openGallery() {
            document.getElementById('galleryInput').click();
        }

        document.getElementById('galleryInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) processImage(file);
        };

        async function captureImage() {
            const video = document.getElementById('camera-stream');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            closeCamera();
            
            canvas.toBlob(blob => processImage(blob));
        }

        async function processImage(imageBlob) {
            document.getElementById('ocr-loading').style.display = 'block';
            
            try {
                const { data: { text } } = await Tesseract.recognize(imageBlob, 'aze+eng');
                // Mətn formatını qoru
                document.getElementById('ocr-text').innerText = text || 'Mətn tapılmadı';
                document.getElementById('ocr-result').style.display = 'block';
            } catch (err) {
                alert('OCR xətası');
            } finally {
                document.getElementById('ocr-loading').style.display = 'none';
            }
        }

        // OCR yadda saxla - mətn formatı qorunur
        function saveOCR() {
            const text = document.getElementById('ocr-text').innerText.trim();
            const folderName = document.getElementById('folderSelect').value;
            
            if (!text || !folderName) {
                alert('Mətn və qovluq seçin');
                return;
            }
            
            const newItem = {
                id: Date.now(),
                title: `OCR ${new Date().toLocaleDateString('az')}`,
                type: 'qeyd',
                folder: folderName,
                date: new Date().toISOString(),
                content: text  // Mətn olduğu kimi saxlanır
            };
            
            items.push(newItem);
            saveData();
            updateAll();
            
            alert('Əlavə edildi!');
            document.getElementById('ocr-result').style.display = 'none';
        }

        function copyOCR() {
            const text = document.getElementById('ocr-text').innerText;
            navigator.clipboard.writeText(text);
            alert('Köçürüldü');
        }

        function clearOCR() {
            document.getElementById('ocr-result').style.display = 'none';
        }

        function showStats() {
            alert(`UniVapp\nCəmi qeydlər: ${items.length}\nQovluqlar: ${folders.length}\nSon yedəkləmə: ${new Date().toLocaleTimeString('az')}`);
        }

        // Initial load
        loadData();

        // Hər 5 dəqiqədə backup
        setInterval(createBackup, 300000);

        // Səhifə bağlananda yadda saxla
        window.addEventListener('beforeunload', () => {
            saveData();
        });
    </script>
</body>
</html>
