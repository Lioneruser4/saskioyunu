<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 3D SAVAŞ İZLEME PANELİ</title>
    
    <!-- Three.js Kütüphaneleri -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #ff4444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
            max-width: 300px;
            border: 1px solid rgba(255,68,68,0.3);
        }
        
        #info-panel h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ff4444;
        }
        
        #info-panel h1::before {
            content: "⚡";
            font-size: 28px;
        }
        
        #stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 14px;
        }
        
        .stat-label {
            color: #aaa;
        }
        
        .stat-value {
            color: #ff4444;
            font-weight: bold;
            font-size: 18px;
        }
        
        #country-filter {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #ff4444;
            color: white;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        #country-filter option {
            background: #1a1a1a;
        }
        
        .conflict-item {
            padding: 8px;
            margin: 5px 0;
            background: rgba(255,68,68,0.1);
            border-radius: 5px;
            font-size: 12px;
            border-left: 2px solid #ff4444;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        #status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 12px;
            font-family: monospace;
            z-index: 1000;
            backdrop-filter: blur(5px);
            border: 1px solid #00ff00;
            display: flex;
            justify-content: space-between;
        }
        
        .live-badge {
            background: #ff4444;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        #legend {
            position: absolute;
            bottom: 100px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            border: 1px solid #ff4444;
            z-index: 1000;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
        }
        
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .critical { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .high { background: #ff6600; box-shadow: 0 0 10px #ff6600; }
        .medium { background: #ffff00; box-shadow: 0 0 10px #ffff00; }
    </style>
</head>
<body>
    <!-- Sol Panel -->
    <div id="info-panel">
        <h1>SAVAŞ İZLEME MERKEZİ</h1>
        
        <div id="stats">
            <div class="stat-item">
                <span class="stat-label">Aktif Çatışmalar:</span>
                <span class="stat-value" id="total-conflicts">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Son Güncelleme:</span>
                <span class="stat-value" id="last-update">-</span>
            </div>
        </div>
        
        <select id="country-filter">
            <option value="all">🌍 TÜM BÖLGELER</option>
            <option value="Ukraine">🇺🇦 Ukrayna</option>
            <option value="Gaza">🇵🇸 Gazze</option>
            <option value="Sudan">🇸🇩 Sudan</option>
            <option value="Myanmar">🇲🇲 Myanmar</option>
            <option value="Ethiopia">🇪🇹 Etiyopya</option>
            <option value="Somalia">🇸🇴 Somali</option>
            <option value="Lebanon">🇱🇧 Lübnan</option>
            <option value="Israel">🇮🇱 İsrail</option>
        </select>
        
        <div style="margin-top: 15px;">
            <h3 style="color: #ff4444; margin: 0 0 10px 0; font-size: 16px;">🔴 ANLIK ÇATIŞMALAR</h3>
            <div id="conflict-list"></div>
        </div>
    </div>
    
    <!-- Sağ Legend -->
    <div id="legend">
        <h4 style="margin: 0 0 10px 0; color: #ff4444;">ÇATIŞMA ŞİDDETİ</h4>
        <div class="legend-item">
            <div class="color-dot critical"></div>
            <span>Kritik (0.9+)</span>
        </div>
        <div class="legend-item">
            <div class="color-dot high"></div>
            <span>Yüksek (0.7-0.9)</span>
        </div>
        <div class="legend-item">
            <div class="color-dot medium"></div>
            <span>Orta (0.5-0.7)</span>
        </div>
    </div>
    
    <!-- Alt Status Bar -->
    <div id="status-bar">
        <span>⚡ SİSTEM: <span style="color: #0f0">AKTİF</span></span>
        <span class="live-badge">CANLI</span>
        <span>🔴 İZLENEN ÇATIŞMA: <span id="active-monitor">0</span></span>
    </div>
    
    <!-- Three.js Container -->
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 1. SAHNE KURULUMU ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        // Kamera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        
        // Renderer'lar
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.getElementById('canvas-container').appendChild(labelRenderer.domElement);
        
        // Kontroller
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2;
        
        // --- 2. IŞIKLAR ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);
        
        const pointLight1 = new THREE.PointLight(0xff4444, 1, 20);
        pointLight1.position.set(2, 3, 2);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0x4444ff, 1, 20);
        pointLight2.position.set(-2, 1, -2);
        scene.add(pointLight2);
        
        // --- 3. DÜNYA (GEZEGEN) ---
        const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
        
        // Dünya dokusu (yüksek çözünürlüklü)
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const cloudTexture = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
        
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthTexture,
            shininess: 5,
            emissive: new THREE.Color(0x112233)
        });
        
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        
        // Bulut katmanı
        const cloudGeometry = new THREE.SphereGeometry(5.02, 64, 64);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: cloudTexture,
            transparent: true,
            opacity: 0.3,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide
        });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(clouds);
        
        // Atmosfer glow
        const glowGeometry = new THREE.SphereGeometry(5.1, 64, 64);
        const glowMaterial = new THREE.MeshPhongMaterial({
            color: 0x3366ff,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide
        });
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        scene.add(glow);
        
        // Yıldızlar (arka plan)
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starsPositions = new Float32Array(starsCount * 3);
        
        for (let i = 0; i < starsCount * 3; i += 3) {
            const r = 50 + Math.random() * 50;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            starsPositions[i] = r * Math.sin(phi) * Math.cos(theta);
            starsPositions[i + 1] = r * Math.sin(phi) * Math.sin(theta);
            starsPositions[i + 2] = r * Math.cos(phi);
        }
        
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // --- 4. ÇATIŞMA BÖLGELERİ ---
        const conflicts = []; // Tüm çatışma objelerini sakla
        
        function latLngToPosition(lat, lng, radius = 5.1) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = lng * Math.PI / 180;
            
            return new THREE.Vector3(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }
        
        function createConflictMarker(lat, lng, intensity, name) {
            const pos = latLngToPosition(lat, lng);
            
            // Renk belirle
            let color;
            if (intensity > 0.85) color = 0xff0000;
            else if (intensity > 0.7) color = 0xff6600;
            else color = 0xffaa00;
            
            // Ana marker (küre)
            const size = 0.15 + (intensity * 0.2);
            const geometry = new THREE.SphereGeometry(size, 16, 16);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.8
            });
            
            const marker = new THREE.Mesh(geometry, material);
            marker.position.copy(pos);
            
            // Işık efekti
            const light = new THREE.PointLight(color, 1, 3);
            light.position.copy(pos);
            
            // Dış halka (pulsing)
            const ringGeometry = new THREE.TorusGeometry(size * 2, 0.02, 16, 32);
            const ringMaterial = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                transparent: true,
                opacity: 0.6
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.position.copy(pos);
            ring.rotation.x = Math.PI / 2;
            
            // Label
            const div = document.createElement('div');
            div.textContent = name;
            div.style.color = 'white';
            div.style.background = 'rgba(255,0,0,0.8)';
            div.style.padding = '4px 8px';
            div.style.borderRadius = '4px';
            div.style.fontSize = '12px';
            div.style.fontWeight = 'bold';
            div.style.border = '1px solid white';
            div.style.boxShadow = '0 0 10px red';
            div.style.whiteSpace = 'nowrap';
            
            const label = new CSS2DObject(div);
            label.position.copy(pos.clone().multiplyScalar(1.1));
            
            // Animasyon verilerini ekle
            marker.userData = { 
                baseScale: 1,
                pulseSpeed: 1 + Math.random(),
                intensity: intensity,
                ring: ring,
                light: light,
                label: label,
                lat, lng
            };
            
            scene.add(marker);
            scene.add(ring);
            scene.add(light);
            scene.add(label);
            
            conflicts.push(marker);
        }
        
        // --- 5. VERİ ÇEKME VE GÜNCELLEME ---
        async function fetchConflicts() {
            try {
                // Render API'niz hazır olana kadar mock veri kullan
                const mockData = [
                    { lat: 48.3794, lng: 31.1656, intensity: 0.95, name: 'Donbas' },
                    { lat: 46.4846, lng: 30.7326, intensity: 0.85, name: 'Odessa' },
                    { lat: 47.8388, lng: 35.1396, intensity: 0.90, name: 'Zaporizhzhia' },
                    { lat: 31.3547, lng: 34.3088, intensity: 0.98, name: 'Gaza' },
                    { lat: 31.5311, lng: 34.4668, intensity: 0.88, name: 'N. Gaza' },
                    { lat: 15.5007, lng: 32.5599, intensity: 0.89, name: 'Khartoum' },
                    { lat: 21.9162, lng: 95.9560, intensity: 0.85, name: 'Sagaing' },
                    { lat: 12.6045, lng: 37.4615, intensity: 0.87, name: 'Amhara' },
                    { lat: 2.0469, lng: 45.3182, intensity: 0.88, name: 'Mogadishu' },
                    { lat: 33.8869, lng: 35.5131, intensity: 0.93, name: 'Beirut' }
                ];
                
                // Eski markerları temizle
                conflicts.forEach(marker => {
                    scene.remove(marker);
                    scene.remove(marker.userData.ring);
                    scene.remove(marker.userData.light);
                    scene.remove(marker.userData.label);
                });
                conflicts.length = 0;
                
                // Yeni markerları ekle
                mockData.forEach(data => {
                    createConflictMarker(data.lat, data.lng, data.intensity, data.name);
                });
                
                // UI'ı güncelle
                document.getElementById('total-conflicts').textContent = mockData.length;
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
                document.getElementById('active-monitor').textContent = mockData.length;
                
                // Çatışma listesini güncelle
                const listEl = document.getElementById('conflict-list');
                listEl.innerHTML = mockData.map(c => 
                    `<div class="conflict-item">🔴 ${c.name} (${(c.intensity*100).toFixed(0)}%)</div>`
                ).join('');
                
            } catch (error) {
                console.error('Veri çekme hatası:', error);
            }
        }
        
        // İlk verileri çek ve her 30 saniyede bir güncelle
        fetchConflicts();
        setInterval(fetchConflicts, 30000);
        
        // --- 6. ANİMASYON DÖNGÜSÜ ---
        let clock = new THREE.Clock();
        
        function animate() {
            const delta = clock.getDelta();
            const time = Date.now() / 1000;
            
            // Dünya dönüşü
            earth.rotation.y += 0.0005;
            clouds.rotation.y += 0.0007;
            
            // Yıldızlar yavaşça dönsün
            stars.rotation.y += 0.0001;
            
            // Marker animasyonları
            conflicts.forEach(marker => {
                const data = marker.userData;
                
                // Pulsing efekti
                const scale = 1 + Math.sin(time * data.pulseSpeed * 3) * 0.2;
                marker.scale.set(scale, scale, scale);
                
                // Halka dönüşü ve ölçek
                if (data.ring) {
                    data.ring.rotation.z += 0.01;
                    data.ring.scale.set(scale * 1.2, scale * 1.2, scale * 1.2);
                }
                
                // Işık parlaklığı
                if (data.light) {
                    data.light.intensity = 0.8 + Math.sin(time * 5) * 0.3;
                }
            });
            
            controls.update();
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // --- 7. FİLTRELEME ---
        document.getElementById('country-filter').addEventListener('change', (e) => {
            const country = e.target.value;
            // Filtreleme mantığı eklenebilir
        });
        
        // --- 8. RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
