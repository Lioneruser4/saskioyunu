<!DOCTYPE html>
<html lang="az" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0084ff">
    <title>Mələk AI – Şəxsi Süni Zəka</title>
    <script type="module">
        // WebAssembly model yükləyicisi - bütün brauzerlər üçün
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';
        env.allowLocalModels = false;
        window.transformers = { pipeline, env };
    </script>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface2: #f0f0f2;
            --text: #1d1d1f;
            --text2: #86868b;
            --blue: #007aff;
            --blue-light: #e8f2ff;
            --bubble-user: #007aff;
            --bubble-bot: #e9e9eb;
            --border: rgba(0,0,0,0.06);
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 22px;
            --transition: 0.25s ease;
        }
        [data-theme="dark"] {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface2: #2c2c2e;
            --text: #f5f5f7;
            --text2: #98989d;
            --blue: #0a84ff;
            --blue-light: #1a2a3a;
            --bubble-user: #0a84ff;
            --bubble-bot: #2c2c2e;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* YÜKLƏMƏ EKRANI */
        .loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-logo {
            font-size: 64px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .loading-text {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-top: 20px;
        }
        .loading-subtext {
            font-size: 13px;
            color: var(--text2);
            margin-top: 8px;
        }
        .progress-bar {
            width: 280px;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            margin-top: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-percent {
            font-size: 14px;
            color: var(--text2);
            margin-top: 8px;
            font-weight: 500;
        }
        
        /* ANA TƏTBİQ */
        .app {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 501px) {
            .app {
                height: 92dvh;
                border-radius: 32px;
                margin: 0 12px;
            }
        }
        
        /* NAVBAR */
        .navbar {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 10;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            transition: var(--transition);
        }
        .nav-left:active { background: var(--surface2); }
        .avatar-wrap { position: relative; }
        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white;
            box-shadow: 0 4px 12px rgba(102,126,234,0.3);
        }
        .status-dot {
            width: 10px; height: 10px;
            background: #34c759;
            border-radius: 50%;
            position: absolute;
            bottom: 0; right: 0;
            border: 2px solid var(--surface);
        }
        .nav-info h3 {
            font-size: 16px; font-weight: 600;
            color: var(--text);
            letter-spacing: -0.2px;
        }
        .nav-info span {
            font-size: 11px; color: #34c759; font-weight: 500;
        }
        .nav-actions { display: flex; gap: 4px; }
        .icon-btn {
            width: 36px; height: 36px;
            border-radius: 50%; border: none;
            background: var(--surface2);
            cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--transition);
            color: var(--text);
        }
        .icon-btn:active { transform: scale(0.92); }
        
        /* CHAT AREA */
        .chat-view {
            flex: 1; overflow-y: auto;
            padding: 16px 12px;
            display: flex; flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .chat-view::-webkit-scrollbar { width: 0; }
        
        .msg-row {
            display: flex; gap: 6px;
            max-width: 88%;
            animation: msgIn 0.3s ease forwards;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.bot { align-self: flex-start; }
        
        .bubble {
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 15px; line-height: 1.45;
            word-break: break-word;
            letter-spacing: -0.1px;
        }
        .bot .bubble {
            background: var(--bubble-bot);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }
        .user .bubble {
            background: var(--bubble-user);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        
        .msg-time {
            font-size: 10px; color: var(--text2);
            margin-top: 2px;
            padding: 0 4px;
        }
        .user .msg-time { text-align: right; }
        
        /* TYPING INDICATOR */
        .typing {
            display: flex; gap: 5px;
            padding: 14px 16px;
            background: var(--bubble-bot);
            border-radius: var(--radius);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            animation: msgIn 0.2s ease forwards;
        }
        .typing span {
            width: 7px; height: 7px;
            background: var(--text2);
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.16s; }
        .typing span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        /* INPUT */
        .input-bar {
            padding: 8px 12px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex; gap: 6px;
            align-items: center;
            background: var(--surface);
        }
        .input-wrap {
            flex: 1; display: flex; align-items: center;
            background: var(--surface2);
            border-radius: 24px;
            padding: 2px 2px 2px 16px;
            border: 1px solid transparent;
            transition: all var(--transition);
        }
        .input-wrap:focus-within {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-light);
        }
        .input-wrap input {
            flex: 1; border: none; outline: none;
            background: transparent; padding: 10px 0;
            font-size: 15px; color: var(--text);
            min-width: 0;
        }
        .input-wrap input::placeholder { color: var(--text2); }
        
        .mic-btn {
            width: 38px; height: 38px;
            border-radius: 50%; border: none;
            background: var(--surface2);
            cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .mic-btn.recording {
            background: #ff3b30;
            color: #fff;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }
        
        .send-btn {
            width: 38px; height: 38px;
            border-radius: 50%; border: none;
            background: var(--blue);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .send-btn:active { transform: scale(0.88); opacity: 0.8; }
        .send-btn svg { width: 18px; height: 18px; fill: #fff; }
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        /* SIDEBAR - KÖHNƏ SÖHBƏTLƏR */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 300px;
            height: 100dvh;
            background: var(--surface);
            z-index: 101;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header h3 {
            font-size: 18px; font-weight: 600;
            color: var(--text);
        }
        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .sidebar-item {
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .sidebar-item:hover, .sidebar-item:active {
            background: var(--surface2);
        }
        .sidebar-item.active {
            background: var(--blue-light);
        }
        .sidebar-item .chat-preview {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }
        .sidebar-item .chat-date {
            font-size: 11px;
            color: var(--text2);
        }
        .sidebar-item .delete-chat {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            color: var(--text2);
            opacity: 0;
            transition: var(--transition);
        }
        .sidebar-item:hover .delete-chat {
            opacity: 1;
        }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--blue);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .new-chat-btn:active { opacity: 0.8; }
        .footer-note {
            text-align: center;
            font-size: 10px;
            color: var(--text2);
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <!-- YÜKLƏMƏ EKRANI -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">✨</div>
        <div class="loading-text">Mələk yüklənir...</div>
        <div class="loading-subtext">Süni zəka modeli hazırlanır</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-percent" id="progressPercent">0%</div>
        <div class="loading-subtext" style="margin-top:16px;">İlk yükləmə 1-2 dəqiqə çəkə bilər</div>
    </div>

    <!-- SIDEBAR OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>💬 Söhbətlər</h3>
            <button class="icon-btn" onclick="closeSidebar()">✕</button>
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
        <div class="sidebar-footer">
            <button class="new-chat-btn" onclick="newChat()">+ Yeni söhbət</button>
            <p class="footer-note">Səni Xaliq kodlayıb 💜</p>
        </div>
    </div>

    <!-- ANA TƏTBİQ -->
    <div class="app">
        <nav class="navbar">
            <div class="nav-left" onclick="openSidebar()">
                <div class="avatar-wrap">
                    <div class="avatar">✨</div>
                    <div class="status-dot"></div>
                </div>
                <div class="nav-info">
                    <h3>Mələk</h3>
                    <span>onlayn 🟢</span>
                </div>
            </div>
            <div class="nav-actions">
                <button class="icon-btn" onclick="toggleTheme()" title="Tema">🌙</button>
            </div>
        </nav>
        <main class="chat-view" id="chatView">
            <div class="msg-row bot">
                <div class="bubble">Salam! Mən Mələkəm ✨<br>Sənə necə kömək edə bilərəm?</div>
            </div>
        </main>
        <div class="input-bar">
            <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Səslə yaz">🎤</button>
            <div class="input-wrap">
                <input type="text" id="msgInput" placeholder="Mələk ilə yaz..." autocomplete="off" enterkeyhint="send">
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        // ==================== GLOBAL DƏYİŞƏNLƏR ====================
        const STORAGE_KEY = 'melek_chats_v2';
        const USER_KEY = 'melek_user_name';
        const THEME_KEY = 'melek_theme';
        
        let model = null;
        let currentChatId = null;
        let allChats = {};
        let userName = '';
        let recognition = null;
        let isRecording = false;
        let isModelLoaded = false;
        
        // ==================== DOM ELEMENTLƏRİ ====================
        const loadingScreen = document.getElementById('loadingScreen');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const chatView = document.getElementById('chatView');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const sidebarList = document.getElementById('sidebarList');
        
        // ==================== BAŞLANGIC ====================
        async function init() {
            // Məlumatları yüklə
            userName = localStorage.getItem(USER_KEY) || '';
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try { allChats = JSON.parse(saved); } catch(e) { allChats = {}; }
            }
            
            // Tema
            const theme = localStorage.getItem(THEME_KEY) || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelector('.icon-btn').textContent = theme === 'dark' ? '☀️' : '🌙';
            
            // Modeli yüklə
            await loadModel();
            
            // İlk söhbəti başlat
            if (Object.keys(allChats).length === 0) {
                newChat(true);
            } else {
                const sorted = Object.keys(allChats).sort((a,b) => allChats[b].updated - allChats[a].updated);
                switchChat(sorted[0]);
            }
            
            // Event listenerlar
            msgInput.addEventListener('input', () => {
                sendBtn.disabled = !msgInput.value.trim();
            });
            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
            });
            
            renderSidebar();
        }
        
        // ==================== MODEL YÜKLƏMƏ ====================
        async function loadModel() {
            return new Promise(async (resolve) => {
                updateProgress(0, 'Model yüklənir...');
                
                try {
                    // Transformers.js ilə kiçik model yüklə
                    const { pipeline } = window.transformers;
                    
                    updateProgress(20, 'AI modeli endirilir...');
                    
                    // Phi-2 və ya TinyLlama (ən kiçik)
                    model = await pipeline('text-generation', 'Xenova/LaMini-Flan-T5-783M', {
                        progress_callback: (progress) => {
                            if (progress.status === 'progress') {
                                const percent = 20 + Math.floor(progress.progress * 70);
                                updateProgress(percent, 'Model faylları yüklənir...');
                            }
                        }
                    });
                    
                    updateProgress(95, 'Demək olar hazırdır...');
                    
                    await new Promise(r => setTimeout(r, 500));
                    updateProgress(100, 'Hazırdır! ✅');
                    
                    isModelLoaded = true;
                    sendBtn.disabled = false;
                    
                    setTimeout(() => {
                        loadingScreen.classList.add('hidden');
                    }, 600);
                    
                    resolve();
                    
                } catch (error) {
                    console.error('Model xətası:', error);
                    updateProgress(100, 'Xəta! Alternativ işə salınır...');
                    
                    // WebAssembly fallback - sadə qayda əsaslı cavablandırıcı
                    model = 'fallback';
                    isModelLoaded = true;
                    sendBtn.disabled = false;
                    
                    setTimeout(() => {
                        loadingScreen.classList.add('hidden');
                        showSystemMessage('⚡ Yüngül rejimdə işləyirəm. Bütün suallara cavab verə bilərəm!');
                    }, 800);
                    
                    resolve();
                }
            });
        }
        
        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
            document.querySelector('.loading-subtext').textContent = text;
        }
        
        // ==================== SÖHBƏT FUNKSİYALARI ====================
        function newChat(silent = false) {
            const id = Date.now().toString();
            allChats[id] = {
                id: id,
                title: 'Yeni söhbət',
                messages: [
                    { role: 'bot', text: 'Salam! Mən Mələkəm ✨\nSənə necə kömək edə bilərəm?', time: Date.now() }
                ],
                created: Date.now(),
                updated: Date.now()
            };
            saveChats();
            switchChat(id);
            if (!silent) closeSidebar();
        }
        
        function switchChat(id) {
            currentChatId = id;
            renderChat();
            renderSidebar();
        }
        
        function deleteChat(id, e) {
            e.stopPropagation();
            if (!confirm('Bu söhbəti silməyə əminsən?')) return;
            delete allChats[id];
            saveChats();
            
            const ids = Object.keys(allChats);
            if (ids.length === 0) {
                newChat(true);
            } else if (currentChatId === id) {
                switchChat(ids[0]);
            }
            renderSidebar();
        }
        
        function saveChats() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allChats));
        }
        
        // ==================== MESAJ GÖNDƏRMƏ ====================
        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !isModelLoaded) return;
            
            msgInput.value = '';
            sendBtn.disabled = true;
            
            // İstifadəçi mesajı
            addMessage('user', text);
            
            // Ad öyrənmə
            if (!userName && text.length < 30 && !text.includes('?')) {
                userName = text;
                localStorage.setItem(USER_KEY, userName);
                addMessage('bot', `Tanış olduğuma şad, ${userName}! 🎉\nMən sənin şəxsi assistentinəm.`);
                return;
            }
            
            // Söhbət başlığını yenilə
            if (allChats[currentChatId].messages.length <= 2) {
                allChats[currentChatId].title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
            }
            
            // Typing göstər
            showTyping();
            
            try {
                let reply;
                
                if (model === 'fallback') {
                    // Fallback cavab sistemi
                    reply = generateFallbackReply(text);
                } else {
                    // AI modeli ilə
                    const systemPrompt = `Sən Mələk. Dost, şirin, komik. 
Sahibin Xaliq Mustadayev (@xaliqmustafayev).
İstifadəçi: ${userName || 'dostum'}.
Azərbaycan dilində danış. Qısa, emojili, canlı ol.`;
                    
                    const result = await model(systemPrompt + '\nİstifadəçi: ' + text + '\nMələk:', {
                        max_new_tokens: 200,
                        temperature: 0.8
                    });
                    
                    reply = result[0].generated_text || 'Hmm, başa düşmədim 😅';
                }
                
                hideTyping();
                addMessage('bot', reply);
                
            } catch (error) {
                hideTyping();
                addMessage('bot', 'Ay dostum, beynim getdi 😅\nBir də yazarsan?');
            }
        }
        
        function generateFallbackReply(text) {
            const lower = text.toLowerCase();
            
            // Salamlaşma
            if (/salam|hey|həy|hello|sabah|axşam/i.test(lower)) {
                return `Salam ${userName || 'dostum'}! 😊 Nə var nə yox?`;
            }
            
            // Necəsən
            if (/necəsən|necesen|nətərsən/i.test(lower)) {
                return 'Mən superəm, sağ ol! 💪 Sən necəsən?';
            }
            
            // Kim yaratdı / Xaliq
            if (/xaliq|kim yarat|kim kodla|sahib/i.test(lower)) {
                return 'Məni Xaliq Mustadayev kodlayıb! 🚀\nOnun sosial mediya hesabları: @xaliqmustafayev';
            }
            
            // Ad soruşma
            if (/adın nə|adın ne|kim sən/i.test(lower)) {
                return `Mənim adım Mələkdir! ✨\nSənin şəxsi AI assistentinəm.`;
            }
            
            // Kömək
            if (/kömək|help|nə edə bil/i.test(lower)) {
                return `Sənə hər şeydə kömək edə bilərəm! 💡\n- Sualları cavablandıra\n- Məlumat verə\n- Söhbət edə\n- Və daha çox...`;
            }
            
            // Təşəkkür
            if (/sağ ol|təşəkkür|thanks|çox sağ/i.test(lower)) {
                return 'Buyur, dostum! 😊 Hər vaxt köməyə hazıram!';
            }
            
            // Default cavablar
            const replies = [
                'Maraqlıdır! 🧐 Bir az daha ətraflı danışa bilərsən?',
                'Hmm, başa düşdüm. 😊 Bu haqda nə düşünürsən?',
                'Əla! ✨ Davam et, maraqla dinləyirəm.',
                'Doğru deyirsən! 💯',
                'Haha, yaxşı dedin! 😂'
            ];
            
            return replies[Math.floor(Math.random() * replies.length)];
        }
        
        function addMessage(role, text) {
            const msg = {
                role: role,
                text: text,
                time: Date.now()
            };
            allChats[currentChatId].messages.push(msg);
            allChats[currentChatId].updated = Date.now();
            saveChats();
            
            const row = document.createElement('div');
            row.className = `msg-row ${role}`;
            row.innerHTML = `<div class="bubble">${escapeHTML(text)}</div>`;
            chatView.appendChild(row);
            chatView.scrollTop = chatView.scrollHeight;
            
            renderSidebar();
        }
        
        function showSystemMessage(text) {
            const row = document.createElement('div');
            row.className = 'msg-row bot';
            row.innerHTML = `<div class="bubble">${escapeHTML(text)}</div>`;
            chatView.appendChild(row);
            chatView.scrollTop = chatView.scrollHeight;
        }
        
        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typingIndicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            chatView.appendChild(typing);
            chatView.scrollTop = chatView.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        function renderChat() {
            if (!currentChatId || !allChats[currentChatId]) {
                newChat(true);
                return;
            }
            
            chatView.innerHTML = '';
            const messages = allChats[currentChatId].messages;
            
            messages.forEach(msg => {
                const row = document.createElement('div');
                row.className = `msg-row ${msg.role}`;
                row.innerHTML = `<div class="bubble">${escapeHTML(msg.text)}</div>`;
                chatView.appendChild(row);
            });
            
            chatView.scrollTop = chatView.scrollHeight;
        }
        
        function renderSidebar() {
            sidebarList.innerHTML = '';
            const chatIds = Object.keys(allChats).sort((a, b) => allChats[b].updated - allChats[a].updated);
            
            chatIds.forEach(id => {
                const chat = allChats[id];
                const item = document.createElement('div');
                item.className = `sidebar-item ${id === currentChatId ? 'active' : ''}`;
                item.onclick = () => { switchChat(id); closeSidebar(); };
                item.innerHTML = `
                    <div>
                        <div class="chat-preview">${chat.title}</div>
                        <div class="chat-date">${formatDate(chat.updated)}</div>
                    </div>
                    <button class="delete-chat" onclick="deleteChat('${id}', event)">🗑️</button>
                `;
                sidebarList.appendChild(item);
            });
        }
        
        // ==================== KÖMƏKÇİ FUNKSİYALAR ====================
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML.replace(/\n/g, '<br>');
        }
        
        function formatDate(timestamp) {
            const d = new Date(timestamp);
            const now = new Date();
            const diff = now - d;
            
            if (diff < 86400000) {
                return d.toLocaleTimeString('az-AZ', { hour: '2-digit', minute: '2-digit' });
            } else if (diff < 604800000) {
                const days = ['Bazar', 'B.e.', 'Ç.a.', 'Çərş.', 'C.a.', 'Cümə', 'Şənbə'];
                return days[d.getDay()];
            } else {
                return d.toLocaleDateString('az-AZ', { day: 'numeric', month: 'short' });
            }
        }
        
        function openSidebar() {
            sidebar.classList.add('active');
            sidebarOverlay.classList.add('active');
            renderSidebar();
        }
        
        function closeSidebar() {
            sidebar.classList.remove('active');
            sidebarOverlay.classList.remove('active');
        }
