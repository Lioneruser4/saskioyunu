<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Düşüş ⬇️ Dar Delik · 20sn Yarışı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0f212f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 5px;
            touch-action: pan-y;
        }
        .phone-frame {
            width: min(400px, 96vw);
            background: #0d3b4f;
            border-radius: 56px 56px 32px 32px;
            padding: 18px 10px 22px 10px;
            box-shadow: 0 30px 35px -8px black, inset 0 -3px 10px #5bbdf0;
            border: 3px solid #72c3ff;
        }
        .viewport {
            position: relative;
            width: 100%;
            aspect-ratio: 360 / 720;
            background: #154f6e;
            border-radius: 44px;
            padding: 8px;
            box-shadow: inset 0 0 0 4px #b1e2ff, inset 0 0 30px #1c688b;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #4799c7 0%, #1d5875 100%);
            border-radius: 36px;
            border: 3px solid #ffe594;
            touch-action: none;
            cursor: pointer;
        }
        .dashboard {
            margin: 16px 6px 6px 6px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .emoji-panel {
            background: #0b3649;
            border-radius: 60px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #fbbd4a;
            box-shadow: inset 0 3px 8px #3283a5;
        }
        .emoji-panel label {
            color: white;
            font-weight: 800;
            background: #1e637e;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            letter-spacing: 0.5px;
            text-shadow: 2px 2px 0 #083746;
        }
        .emoji-set {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .emoji-btn {
            font-size: 2.2rem;
            background: #226480;
            border: none;
            border-radius: 50%;
            width: 54px;
            height: 54px;
            box-shadow: 0 5px 0 #07323f, 0 7px 12px black;
            transition: 0.07s;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .emoji-btn.selected {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #07323f, 0 7px 12px black;
            background: #fcb042;
            border: 3px solid #fff3d1;
        }
        .button-row {
            display: flex;
            gap: 12px;
        }
        .primary-btn {
            background: #ffe6b3;
            border: none;
            border-radius: 50px;
            padding: 14px 0;
            font-weight: 800;
            font-size: 1.3rem;
            color: #022b39;
            box-shadow: 0 7px 0 #9e601b, 0 8px 20px black;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 2px solid #ffcf7a;
            cursor: pointer;
        }
        .primary-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #9e601b, 0 8px 20px black;
        }
        .timer-status {
            background: #062733;
            padding: 14px 15px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #f3c26b;
            color: #fcf3cf;
            font-weight: bold;
            font-size: 1.3rem;
            text-shadow: 2px 2px 0 #1f3f4d;
            margin-top: 5px;
        }
        .timer-bar-fill {
            height: 14px;
            background: #fedb9f;
            border-radius: 20px;
            width: 100%;
            box-shadow: inset 0 2px 6px #463d1f;
        }
        .footer-note {
            text-align: center;
            color: #b0e0ff;
            margin-top: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="phone-frame">
    <div class="viewport">
        <canvas id="gameCanvas" width="360" height="720"></canvas>
    </div>

    <div class="dashboard">
        <div class="emoji-panel">
            <label>🇹🇷 TOP</label>
            <div class="emoji-set">
                <button class="emoji-btn selected" data-emoji="🇹🇷">🇹🇷</button>
                <button class="emoji-btn" data-emoji="🇯🇵">🇯🇵</button>
                <button class="emoji-btn" data-emoji="🇩🇪">🇩🇪</button>
                <button class="emoji-btn" data-emoji="🇧🇷">🇧🇷</button>
                <button class="emoji-btn" data-emoji="🇺🇸">🇺🇸</button>
                <button class="emoji-btn" data-emoji="⚽">⚽</button>
            </div>
        </div>

        <div class="button-row">
            <button class="primary-btn" id="addBallBtn">➕ EKLE</button>
            <button class="primary-btn" id="resetBtn">⟲ YENİ</button>
        </div>

        <div class="timer-status" id="statusMsg">
            <span>⏳ 20s</span>
            <span>🏁 dar delik</span>
        </div>
        <div class="timer-bar-fill" id="timerFill" style="width:100%"></div>
    </div>
    <div class="footer-note">
        ⬇️ toplar düştükçe alan iner · son dar deliğe ilk ulaşan kazanır
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 360, CH = 720;
        canvas.width = CW; canvas.height = CH;

        // --- Oyun değişkenleri ---
        let balls = [];
        let winnerIndex = -1;
        let gameActive = true;
        let startTime = null;          // performans başlangıcı
        let elapsedSeconds = 0;
        const RACE_DURATION = 20;       // 20 saniye yarış
        const BASE_RADIUS = 14;          // mobilde daha küçük top

        // Yer çekimi (aşağı doğru kuvvet)
        const GRAVITY = 0.2;
        const GROUND_Y = CH - 30;        // gerçek zemin (en alt)

        // *** KAMERA değişkeni: toplar düştükçe aşağı kayar ***
        let cameraY = 0;                 // kamera en üstte başlar (0 kayma)
        const CAM_SPEED = 1.6;            // kayma hızı (top hızına bağlı olarak)

        // seçili emoji
        let selectedEmoji = '🇹🇷';

        // --- Engeller (sabit dünyada) ---
        let obstacles = [];

        // Dar delik (hedef) en altta bir yarık
        const TARGET_SLOT = {
            x: CW/2 - 25,
            y: 5500,            // çok derinde (dünya koordinatı)
            w: 50,
            h: 20,
            color: '#f55c3b'
        };

        // Engelleri oluştur (dünya koordinatlarında, y değerleri büyük)
        function buildObstacles() {
            obstacles = [
                // Dönen çubuklar (spinner)
                { type: 'spinner', x: 120, y: 800, w: 100, h: 10, angle: 0.2, spinSpeed: 0.02 },
                { type: 'spinner', x: 260, y: 1350, w: 90, h: 10, angle: 1.0, spinSpeed: -0.025 },
                { type: 'spinner', x: 70, y: 2200, w: 130, h: 12, angle: 0.5, spinSpeed: 0.018 },
                // Sabit dar engeller (fixed)
                { type: 'fixed', x: 200, y: 1900, w: 100, h: 8, angle: 0.3 },
                { type: 'fixed', x: 300, y: 2800, w: 12, h: 130, angle: 0.0 },  // dikey dar
                { type: 'fixed', x: 50, y: 3300, w: 110, h: 10, angle: -0.4 },
                { type: 'fixed', x: 180, y: 4000, w: 80, h: 10, angle: 0.6 },
                { type: 'spinner', x: 280, y: 4700, w: 110, h: 12, angle: 1.8, spinSpeed: 0.015 },
                { type: 'fixed', x: 140, y: 5200, w: 60, h: 10, angle: 0.1 },  // deliğe yakın
            ];
        }
        buildObstacles();

        // --- Emoji seçim ---
        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedEmoji = btn.getAttribute('data-emoji');
            });
        });

        const statusDiv = document.getElementById('statusMsg');
        const timerFill = document.getElementById('timerFill');

        // --- Top ekleme fonksiyonu (dokunma ile) ---
        function addBallAtTap(clientX, clientY) {
            if (!gameActive || winnerIndex !== -1) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = CW / rect.width;
            const scaleY = CH / rect.height;

            // canvas üzerindeki pixel (ekran koordinatı)
            let screenX = (clientX - rect.left) * scaleX;
            let screenY = (clientY - rect.top) * scaleY;

            // Bu ekran konumunu dünya koordinatına çevir: dünyaY = screenY + cameraY
            let worldX = Math.min(Math.max(screenX, BASE_RADIUS + 5), CW - BASE_RADIUS - 5);
            let worldY = screenY + cameraY;

            // Başlangıçta biraz yukarıda olsun (kameranın biraz üstü)
            worldY = Math.max(50 + cameraY, worldY - 20); 

            // Hız (hafif aşağı eğilimli, ama yatay da olsun)
            const vx = (Math.random() - 0.5) * 1.8;
            const vy = 0.8 + Math.random() * 1.2; // aşağı yönlü

            balls.push({
                emoji: selectedEmoji,
                x: worldX,
                y: worldY,
                vx: vx,
                vy: vy,
                radius: BASE_RADIUS
            });

            // Yarış başlamamışsa zamanı başlat
            if (balls.length === 1 && startTime === null && gameActive) {
                startTime = performance.now();
            }
        }

        // Touch / mouse olayları
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            addBallAtTap(e.clientX, e.clientY);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                addBallAtTap(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        // buton ile rastgele üst bölgeye ekle
        document.getElementById('addBallBtn').addEventListener('click', () => {
            if (!gameActive || winnerIndex !== -1) return;
            const wx = 60 + Math.random() * (CW - 120);
            const wy = cameraY + 100 + Math.random() * 150; // ekranın üst kısmı
            balls.push({
                emoji: selectedEmoji,
                x: wx,
                y: wy,
                vx: (Math.random() - 0.5) * 1.5,
                vy: 1.0 + Math.random() * 2,
                radius: BASE_RADIUS
            });
            if (balls.length === 1 && startTime === null && gameActive) {
                startTime = performance.now();
            }
        });

        // Sıfırla
        document.getElementById('resetBtn').addEventListener('click', () => {
            balls = [];
            winnerIndex = -1;
            gameActive = true;
            startTime = null;
            elapsedSeconds = 0;
            cameraY = 0;
            buildObstacles();  // engeller ilk açılarına dönsün
            statusDiv.innerHTML = `<span>⏳ 20s</span><span>🏁 dar delik</span>`;
            timerFill.style.width = '100%';
        });

        // --- Çarpışma: döndürülmüş dikdörtgen ile top ---
        function rotatePoint(cx, cy, x, y, angle) {
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            const dx = x - cx;
            const dy = y - cy;
            return {
                x: cx + dx * cos - dy * sin,
                y: cy + dx * sin + dy * cos
            };
        }

        function handleBallObstacle(ball, ob) {
            const cx = ob.x;
            const cy = ob.y;
            const w = ob.w;
            const h = ob.h;
            const angle = ob.angle || 0;

            // topu yerel koordinata çevir
            const localBall = rotatePoint(cx, cy, ball.x, ball.y, -angle);
            const left = cx - w/2;
            const right = cx + w/2;
            const top = cy - h/2;
            const bottom = cy + h/2;

            const closestX = Math.max(left, Math.min(localBall.x, right));
            const closestY = Math.max(top, Math.min(localBall.y, bottom));

            let dx = localBall.x - closestX;
            let dy = localBall.y - closestY;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < ball.radius && dist > 0.001) {
                const overlap = ball.radius - dist;
                const normX = dx / dist;
                const normY = dy / dist;

                // konumu düzelt (yerelde)
                const newLocalX = localBall.x + normX * overlap;
                const newLocalY = localBall.y + normY * overlap;

                // dünyaya geri çevir
                const worldBall = rotatePoint(cx, cy, newLocalX, newLocalY, angle);
                ball.x = worldBall.x;
                ball.y = worldBall.y;

                // hız tepkisi
                let vLocal = rotatePoint(0, 0, ball.vx, ball.vy, -angle);
                let vn = vLocal.x * normX + vLocal.y * normY;
                if (vn < 0) {
                    let vt_x = vLocal.x - vn * normX;
                    let vt_y = vLocal.y - vn * normY;
                    let vn_new = -vn * 0.45;
                    vLocal.x = vt_x + vn_new * normX;
                    vLocal.y = vt_y + vn_new * normY;
                    let vWorld = rotatePoint(0, 0, vLocal.x, vLocal.y, angle);
                    ball.vx = vWorld.x * 0.97;
                    ball.vy = vWorld.y * 0.97;
                }
                return true;
            }
            return false;
        }

        // --- Fizik & kamera güncellemesi ---
        function update() {
            if (!gameActive || winnerIndex !== -1) {
                // kazanan varsa sadece kamera kayması durur.
                return;
            }

            // Zaman kontrolü
            if (startTime !== null) {
                const now = performance.now();
                elapsedSeconds = (now - startTime) / 1000;
                if (elapsedSeconds >= RACE_DURATION) {
                    gameActive = false;  // süre bitti, artık top eklenmez, ama kamera durur.
                    statusDiv.innerHTML = `<span>⏱️ süre doldu</span><span>⚰️</span>`;
                    timerFill.style.width = '0%';
                    return;
                } else {
                    const percent = ((RACE_DURATION - elapsedSeconds) / RACE_DURATION) * 100;
                    timerFill.style.width = percent + '%';
                    statusDiv.innerHTML = `<span>⏳ ${(RACE_DURATION - elapsedSeconds).toFixed(1)}s</span><span>🏁 dar delik</span>`;
                }
            }

            // 1. Toplara yerçekimi uygula (aşağı doğru)
            for (let b of balls) {
                b.vy += GRAVITY;
                b.x += b.vx;
                b.y += b.vy;

                // hafif sürtünme
                b.vx *= 0.995;
                b.vy *= 0.995;

                // Duvarlar (sol/sağ) dünya koordinatında
                if (b.x - b.radius < 10) { b.x = 10 + b.radius; b.vx *= -0.3; }
                if (b.x + b.radius > CW - 10) { b.x = CW - 10 - b.radius; b.vx *= -0.3; }

                // Alt zemin (çok aşağı düşmesin, ama yine de kayma olsun)
                if (b.y + b.radius > GROUND_Y + 2000) { // dünyada çok aşağı inmeyi sınırla (2000 piksel fazladan)
                    b.y = GROUND_Y + 2000 - b.radius;
                    b.vy *= -0.2;
                }
            }

            // 2. Engel çarpışmaları (çoklu iterasyon)
            for (let iter = 0; iter < 3; iter++) {
                for (let b of balls) {
                    for (let ob of obstacles) {
                        handleBallObstacle(b, ob);
                    }
                }
            }

            // 3. Dönen engellerin açılarını güncelle
            obstacles.forEach(ob => { if (ob.type === 'spinner') ob.angle += ob.spinSpeed; });

            // 4. Hedef dar delik kontrolü (sona ulaşma)
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                // deliğin içinde mi? (basit bir kutu kontrolü)
                if (b.x > TARGET_SLOT.x && b.x < TARGET_SLOT.x + TARGET_SLOT.w &&
                    b.y > TARGET_SLOT.y && b.y < TARGET_SLOT.y + TARGET_SLOT.h) {
                    if (winnerIndex === -1 && gameActive) {
                        winnerIndex = i;
                        gameActive = false; // yarış bitti
                        statusDiv.innerHTML = `<span>🏆 KAZANAN</span><span>${b.emoji}</span>`;
                        timerFill.style.width = '0%';
                        break;
                    }
                }
            }

            // 5. KAMERA: en düşük (en aşağıdaki) topa göre kay, ama yumuşak
            if (balls.length > 0 && gameActive) {
                let lowestY = Math.max(...balls.map(b => b.y)); // en aşağıdaki topun dünya y'si
                // hedef kamera: en alttaki top ekranın 2/3'ünde olacak şekilde
                let targetCamera = Math.max(0, lowestY - CH * 0.6);
                // yumuşak geçiş
                cameraY += (targetCamera - cameraY) * 0.05;
            } else {
                // hiç top yoksa kamera oynamasın
            }

            // Kamera sınırı (çok aşağı kaymasın, delik görünsün)
            cameraY = Math.min(cameraY, TARGET_SLOT.y + TARGET_SLOT.h - CH + 100);
        }

        // --- Çizim (ekran koordinatlarına dönüşüm) ---
        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // arkaplan desen (derinlik hissi)
            ctx.fillStyle = '#307a9e';
            ctx.fillRect(0, 0, CW, CH);
            for (let i = 0; i < 10; i++) {
                ctx.fillStyle = '#52a5cc30';
                ctx.fillRect(0, i*80 - cameraY*0.3, CW, 20);
            }

            // hedef delik (dünya koordinatı -> ekran)
            ctx.save();
            const slotScreenY = TARGET_SLOT.y - cameraY;
            if (slotScreenY + TARGET_SLOT.h > 0 && slotScreenY < CH) {
                ctx.fillStyle = '#e0452b';
                ctx.shadowColor = '#ffc107';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.rect(TARGET_SLOT.x, slotScreenY, TARGET_SLOT.w, TARGET_SLOT.h);
                ctx.fill();
                ctx.fillStyle = '#fcd4b5';
                ctx.font = 'bold 20px sans-serif';
                ctx.shadowBlur = 20;
                ctx.fillText('🏁', TARGET_SLOT.x+10, slotScreenY-8);
            }
            ctx.restore();

            // Engelleri çiz (dünya -> ekran dönüşümü)
            obstacles.forEach(ob => {
                const screenY = ob.y - cameraY;
                if (screenY + ob.h/2 < 0 || screenY - ob.h/2 > CH) return; // görünür değilse atla

                ctx.save();
                ctx.translate(ob.x, screenY);
                ctx.rotate(ob.angle || 0);
                ctx.fillStyle = ob.type === 'spinner' ? '#f08c2e' : '#b550c9';
                ctx.shadowColor = '#111';
                ctx.shadowBlur = 18;
                ctx.shadowOffsetY = 3;
                ctx.fillRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                ctx.restore();

                // parlak kenar
                ctx.save();
                ctx.translate(ob.x, screenY);
                ctx.rotate(ob.angle || 0);
                ctx.strokeStyle = '#fce38a';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffeeaa';
                ctx.strokeRect(-ob.w/2, -ob.h/2, ob.w, ob.h);
                ctx.restore();
            });

            // Topları çiz (ekran koordinatında)
            for (let i = 0; i < balls.length; i++) {
                const b = balls[i];
                const screenX = b.x;
                const screenY = b.y - cameraY;

                if (screenY + b.radius < 0 || screenY - b.radius > CH) continue; // görünmezse atla

                ctx.shadowColor = '#00111e';
                ctx.shadowBlur = 18;
                ctx.shadowOffsetY = 4;
                // arka halka
                ctx.beginPath();
                ctx.arc(screenX, screenY, b.radius+2, 0, 2*Math.PI);
                ctx.fillStyle = '#fff3c9';
                ctx.fill();

                ctx.font = `${b.radius+10}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Twemoji Mozilla", "Android Emoji", Emoji, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = i === winnerIndex ? 'gold' : '#002433';
                ctx.fillStyle = i === winnerIndex ? '#fffead' : 'white';
                ctx.fillText(b.emoji, screenX, screenY-2);

                if (i === winnerIndex) {
                    ctx.font = '28px sans-serif';
                    ctx.fillStyle = '#ffd966';
                    ctx.fillText('👑', screenX-16, screenY-48);
                }
            }

            // üst fade efekti
            const grad = ctx.createLinearGradient(0, 0, 0, 50);
            grad.addColorStop(0, '#05242f');
            grad.addColorStop(1, '#05242f00');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CW, 50);

            requestAnimationFrame(draw);
        }

        function gameLoop() {
            update();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
        draw();
    })();
</script>
</body>
</html>
