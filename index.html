<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANLI UYDU · Gerçek Görüntü</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0f1f;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0a1a2f, #0f2642);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #00d4ff;
            box-shadow: 0 4px 20px rgba(0,212,255,0.2);
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo h1 {
            font-size: 24px;
            background: linear-gradient(45deg, #fff, #88ddff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .live-badge {
            background: #ff3333;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; background: #ff3333; }
            50% { opacity: 0.7; background: #ff0000; }
            100% { opacity: 1; background: #ff3333; }
        }

        .search-container {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 500px;
            margin: 0 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #2a4a7a;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: #00a8ff;
            outline: none;
            background: rgba(255,255,255,0.15);
        }

        .search-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #00a8ff, #0066ff);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
            box-shadow: 0 0 15px rgba(0,168,255,0.5);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0,168,255,0.8);
        }

        .coordinates {
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            color: #aaddff;
            backdrop-filter: blur(5px);
            border: 1px solid #2a4a7a;
        }

        #map {
            flex: 1;
            width: 100%;
            background: #000;
            z-index: 1;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 12px;
            color: #aaccff;
            backdrop-filter: blur(5px);
            border: 1px solid #2a4a7a;
            z-index: 1000;
        }

        /* Leaflet özelleştirme */
        .leaflet-control-attribution {
            display: none;
        }
        
        .leaflet-control-zoom {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span class="live-badge">🔴 CANLI</span>
            <h1>🛰️ GERÇEK UYDU</h1>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="🌍 Yer ara (Bakü, İstanbul, Ankara, Moskova...)" value="Bakü, Azerbaycan">
            <button class="search-btn" onclick="searchLocation()">🔍 ARA</button>
        </div>
        
        <div class="coordinates" id="coordDisplay">40.4093° N, 49.8671° E</div>
    </div>
    
    <div id="map"></div>
    
    <div class="footer">
        🛰️ Maxar Technologies · Landsat · Copernicus · Günlük güncellenen uydu görüntüleri
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Haritayı oluştur
        const map = L.map('map', {
            center: [40.4093, 49.8671], // Bakü
            zoom: 18,
            zoomControl: false,
            attributionControl: false
        });

        // GERÇEK UYDU GÖRÜNTÜSÜ (En güncel, çizgisiz)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 22,
            attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community'
        }).addTo(map);

        // Ekstra detay için ikinci katman (yüksek çözünürlük)
        L.tileLayer('https://services.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 22
        }).addTo(map);

        // Koordinat gösterici
        map.on('moveend', function() {
            const center = map.getCenter();
            document.getElementById('coordDisplay').innerHTML = 
                center.lat.toFixed(4) + '° N, ' + center.lng.toFixed(4) + '° E';
        });

        // Marker (işaretçi) ekle
        let currentMarker = null;

        function addMarker(lat, lng, title) {
            if (currentMarker) {
                map.removeLayer(currentMarker);
            }
            
            // Özel işaretçi (kırmızı nokta)
            const customIcon = L.divIcon({
                html: '📍',
                className: 'custom-marker',
                iconSize: [30, 30]
            });
            
            currentMarker = L.marker([lat, lng], { 
                icon: customIcon,
                title: title 
            }).addTo(map);
            
            // Popup ekle
            currentMarker.bindPopup(`
                <div style="color:black; padding:5px;">
                    <b>📍 ${title}</b><br>
                    ${lat.toFixed(4)}, ${lng.toFixed(4)}
                </div>
            `).openPopup();
        }

        // Arama fonksiyonu (Nominatim - ücretsiz, API'siz)
        function searchLocation() {
            const query = document.getElementById('searchInput').value;
            
            if (!query) return;
            
            // Yükleniyor göster
            document.querySelector('.search-btn').textContent = '🔍...';
            
            // Nominatim OpenStreetMap arama (ücretsiz, API anahtarı gerekmez)
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`;
            
            fetch(url, {
                headers: {
                    'User-Agent': 'UyduHarita/1.0'
                }
            })
            .then(response => response.json())
            .then(data => {
                document.querySelector('.search-btn').textContent = '🔍 ARA';
                
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    const displayName = data[0].display_name.split(',')[0]; // Kısa isim
                    
                    // Haritayı git
                    map.setView([lat, lon], 19);
                    
                    // Marker ekle
                    addMarker(lat, lon, displayName);
                    
                    // Koordinatları güncelle
                    document.getElementById('coordDisplay').innerHTML = 
                        lat.toFixed(4) + '° N, ' + lon.toFixed(4) + '° E';
                } else {
                    alert('❌ Yer bulunamadı!');
                }
            })
            .catch(error => {
                document.querySelector('.search-btn').textContent = '🔍 ARA';
                alert('Arama hatası! Tekrar dene.');
                console.error(error);
            });
        }

        // Enter tuşu ile arama
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchLocation();
            }
        });

        // Sayfa yüklenince Bakü'ye marker ekle
        window.onload = function() {
            setTimeout(() => {
                addMarker(40.4093, 49.8671, 'Bakü');
            }, 500);
        };

        // Gece modu için hafif karartma
        map.on('load', function() {
            document.querySelector('.leaflet-tile-pane').style.filter = 'brightness(0.9) contrast(1.1)';
        });
    </script>
</body>
</html>
