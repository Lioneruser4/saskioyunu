<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SASKI FPS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:#0a0a0f;font-family:'Courier New',monospace;overflow:hidden;touch-action:none;}
canvas{display:block;position:fixed;top:0;left:0;}

/* ── SCREENS ── */
#screens{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse at 50% 0%,#1a2a1a 0%,#0a0a0f 70%);}
#screens.hidden{display:none;}

.screen{display:none;flex-direction:column;align-items:center;gap:16px;width:min(420px,94vw);}
.screen.active{display:flex;}

.logo{font-size:clamp(2rem,7vw,3.5rem);font-weight:900;letter-spacing:4px;
background:linear-gradient(135deg,#ff6600,#ffcc00,#ff3300);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
text-shadow:none;filter:drop-shadow(0 0 20px #ff6600aa);}
.logo-sub{font-size:.75rem;letter-spacing:6px;color:#ff660088;text-transform:uppercase;margin-top:-12px;}

.panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,102,0,.25);border-radius:12px;padding:20px;width:100%;}
.panel h3{color:#ff9900;font-size:.8rem;letter-spacing:3px;margin-bottom:12px;text-transform:uppercase;}

input[type=text]{width:100%;background:rgba(0,0,0,.4);border:1px solid #ff660044;border-radius:8px;
padding:12px 16px;color:#fff;font-size:1rem;font-family:inherit;outline:none;}
input[type=text]:focus{border-color:#ff6600;}

.btn{width:100%;padding:14px;border:none;border-radius:8px;font-family:inherit;font-size:1rem;
font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:.2s;}
.btn-primary{background:linear-gradient(135deg,#ff6600,#cc3300);color:#fff;}
.btn-primary:active{filter:brightness(.8);}
.btn-secondary{background:rgba(255,255,255,.08);color:#aaa;border:1px solid #333;}

.player-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;}
.player-item{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(0,0,0,.3);border-radius:6px;}
.player-dot{width:10px;height:10px;border-radius:50%;}
.player-dot.T{background:#ff4444;}
.player-dot.CT{background:#4488ff;}
.player-name{color:#ddd;font-size:.85rem;flex:1;}
.player-team{font-size:.7rem;color:#888;}

.countdown-big{font-size:clamp(4rem,15vw,8rem);font-weight:900;color:#ffcc00;
filter:drop-shadow(0 0 30px #ffcc00);text-align:center;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}}

.waiting-text{color:#888;font-size:.85rem;text-align:center;letter-spacing:2px;}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;}

#scores-bar{position:absolute;top:12px;left:50%;transform:translateX(-50%);
display:flex;align-items:center;gap:0;background:rgba(0,0,0,.7);
border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden;}
.score-side{padding:8px 22px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.score-side.T{background:rgba(255,50,50,.2);}
.score-side.CT{background:rgba(50,100,255,.2);}
.score-label{font-size:.6rem;letter-spacing:2px;color:#aaa;}
.score-num{font-size:1.5rem;font-weight:900;color:#fff;line-height:1;}
.score-div{width:2px;background:rgba(255,255,255,.15);align-self:stretch;}

#hp-bar-wrap{position:absolute;bottom:130px;left:16px;width:160px;}
#hp-bar-label{font-size:.6rem;letter-spacing:2px;color:#ff6600;margin-bottom:4px;}
#hp-bar-bg{background:rgba(255,255,255,.1);border-radius:4px;height:8px;overflow:hidden;}
#hp-bar{height:100%;border-radius:4px;transition:width .2s,background .2s;background:#44ff44;}
#hp-text{font-size:.75rem;color:#fff;margin-top:4px;}

#ammo-hud{position:absolute;bottom:130px;right:16px;text-align:right;}
#ammo-num{font-size:2.5rem;font-weight:900;color:#fff;line-height:1;}
#ammo-label{font-size:.55rem;letter-spacing:2px;color:#888;}

#kills-list{position:absolute;top:70px;right:12px;display:flex;flex-direction:column;gap:4px;width:200px;}
.kill-entry{background:rgba(0,0,0,.6);border-left:3px solid #ff6600;padding:4px 8px;
border-radius:0 4px 4px 0;font-size:.7rem;color:#ddd;animation:slideIn .3s ease,fadeOut 3s .1s forwards;}
@keyframes slideIn{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes fadeOut{0%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}

#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:20px;height:20px;pointer-events:none;}
#crosshair::before,#crosshair::after{content:’’;position:absolute;background:rgba(255,255,255,.9);}
#crosshair::before{top:50%;left:0;right:0;height:1.5px;transform:translateY(-50%);}
#crosshair::after{left:50%;top:0;bottom:0;width:1.5px;transform:translateX(-50%);}

#scoreboard-btn{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.5);border:1px solid #333;
border-radius:6px;color:#aaa;font-family:inherit;font-size:.65rem;padding:8px 12px;
pointer-events:all;cursor:pointer;letter-spacing:1px;}

#scoreboard{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
justify-content:center;background:rgba(0,0,0,.85);pointer-events:all;}
#scoreboard.show{display:flex;}
#scoreboard table{border-collapse:collapse;width:min(500px,90vw);}
#scoreboard th{padding:8px 12px;font-size:.65rem;letter-spacing:2px;color:#888;text-align:left;border-bottom:1px solid #333;}
#scoreboard td{padding:8px 12px;font-size:.8rem;color:#ddd;border-bottom:1px solid #1a1a1a;}
.sb-T{color:#ff5555;}
.sb-CT{color:#5588ff;}
.sb-me{color:#ffcc00;}

#msg-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
#msg-overlay.show{display:flex;}
.msg-big{font-size:clamp(1.5rem,6vw,3rem);font-weight:900;text-align:center;}
.msg-sub{font-size:.8rem;color:#888;letter-spacing:2px;}

#dead-overlay{position:absolute;inset:0;background:rgba(200,0,0,.15);pointer-events:none;opacity:0;transition:.3s;}
#dead-overlay.show{opacity:1;}
#dead-timer{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
text-align:center;color:#ff4444;display:none;}
#dead-timer.show{display:block;}
#dead-timer .dt-label{font-size:.65rem;letter-spacing:3px;color:#ff7777;}
#dead-timer .dt-num{font-size:3rem;font-weight:900;}

/* ── CONTROLS ── */
#controls{position:fixed;inset:0;pointer-events:none;z-index:20;}

#joystick-zone{position:absolute;bottom:0;left:0;width:50%;height:220px;pointer-events:all;}
#joystick-base{position:absolute;bottom:60px;left:60px;width:110px;height:110px;
border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.3);}
#joystick-knob{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.6);
box-shadow:0 0 14px rgba(255,255,255,.3);}

#aim-zone{position:absolute;bottom:0;right:0;width:50%;height:100%;pointer-events:all;}

#shoot-btn{position:absolute;bottom:70px;right:70px;width:72px;height:72px;border-radius:50%;
background:radial-gradient(circle,#ff4400,#aa1100);border:3px solid rgba(255,100,0,.5);
pointer-events:all;display:flex;align-items:center;justify-content:center;
font-size:1.1rem;color:#fff;box-shadow:0 0 20px #ff440055;}
#shoot-btn:active{filter:brightness(.7);}

#reload-btn{position:absolute;bottom:70px;right:160px;width:52px;height:52px;border-radius:50%;
background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);
pointer-events:all;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#aaa;}

#chat-input-wrap{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
width:60%;display:none;pointer-events:all;}
#chat-input-wrap.show{display:block;}
#chat-input{width:100%;background:rgba(0,0,0,.7);border:1px solid #444;border-radius:6px;
padding:8px 12px;color:#fff;font-family:inherit;font-size:.8rem;outline:none;}

#chat-toggle{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,.5);border:1px solid #333;border-radius:6px;
color:#888;font-family:inherit;font-size:.6rem;padding:6px 14px;pointer-events:all;cursor:pointer;}

#chat-log{position:absolute;bottom:140px;left:12px;width:200px;display:flex;flex-direction:column;gap:3px;pointer-events:none;}
.chat-msg{background:rgba(0,0,0,.6);border-radius:4px;padding:4px 8px;font-size:.7rem;
color:#ddd;animation:fadeOut 5s .5s forwards;}
.chat-msg .cn-T{color:#ff7777;}
.chat-msg .cn-CT{color:#7799ff;}

/* ── MINIMAP ── */
#minimap{position:absolute;top:70px;left:12px;border:1px solid rgba(255,255,255,.15);
border-radius:4px;overflow:hidden;}
</style>

</head>
<body>

<!-- ── SCREENS ── -->

<div id="screens">
  <!-- MAIN MENU -->
  <div class="screen active" id="screen-menu">
    <div class="logo">SASKI</div>
    <div class="logo-sub">Tactical FPS</div>
    <div class="panel">
      <h3>Kullanıcı Adı</h3>
      <input type="text" id="name-input" placeholder="İsminizi girin..." maxlength="16"/>
    </div>
    <button class="btn btn-primary" id="btn-join">OYUNA KATIL</button>
  </div>

  <!-- LOBBY -->

  <div class="screen" id="screen-lobby">
    <div class="logo" style="font-size:2rem">LOBİ</div>
    <div class="panel">
      <h3>Oyuncular</h3>
      <div class="player-list" id="lobby-players"></div>
    </div>
    <div class="waiting-text" id="lobby-status">Oyuncular bekleniyor...</div>
  </div>

  <!-- COUNTDOWN -->

  <div class="screen" id="screen-countdown">
    <div class="waiting-text">OYUN BAŞLIYOR</div>
    <div class="countdown-big" id="countdown-num">5</div>
  </div>

  <!-- GAME END -->

  <div class="screen" id="screen-end">
    <div class="msg-big" id="end-msg">KAZANDINIZ!</div>
    <div class="panel">
      <h3>Skor Tablosu</h3>
      <div id="end-scores"></div>
    </div>
    <div class="waiting-text">Lobi sıfırlanıyor...</div>
  </div>
</div>

<!-- ── GAME CANVAS ── -->

<canvas id="c"></canvas>

<!-- ── HUD ── -->

<div id="hud" class="hidden">
  <div id="scores-bar">
    <div class="score-side T"><div class="score-label">TERÖRİST</div><div class="score-num" id="score-T">0</div></div>
    <div class="score-div"></div>
    <div class="score-side CT"><div class="score-num" id="score-CT">0</div><div class="score-label">CT</div></div>
  </div>

  <div id="hp-bar-wrap">
    <div id="hp-bar-label">SAĞLIK</div>
    <div id="hp-bar-bg"><div id="hp-bar" style="width:100%"></div></div>
    <div id="hp-text">100</div>
  </div>

  <div id="ammo-hud">
    <div id="ammo-num">30</div>
    <div id="ammo-label">MERMİ</div>
  </div>

  <div id="kills-list"></div>
  <div id="crosshair"></div>

<canvas id="minimap" width="120" height="90"></canvas>

<button id="scoreboard-btn" onclick="toggleScoreboard()">TABLO</button>

  <div id="scoreboard">
    <table id="sb-table">
      <thead><tr><th>Oyuncu</th><th>Takım</th><th>Öldürme</th><th>Ölüm</th></tr></thead>
      <tbody id="sb-body"></tbody>
    </table>
  </div>

  <div id="msg-overlay">
    <div class="msg-big" id="msg-main"></div>
    <div class="msg-sub" id="msg-sub"></div>
  </div>

  <div id="dead-overlay"></div>
  <div id="dead-timer">
    <div class="dt-label">YENİDEN DOĞUYOR</div>
    <div class="dt-num" id="dt-num">4</div>
  </div>
</div>

<!-- ── CHAT LOG ── -->

<div id="chat-log"></div>

<!-- ── CONTROLS ── -->

<div id="controls" class="hidden">
  <div id="joystick-zone">
    <div id="joystick-base"><div id="joystick-knob"></div></div>
  </div>
  <div id="aim-zone"></div>
  <div id="shoot-btn">🔫</div>
  <div id="reload-btn">R</div>
  <button id="chat-toggle" onclick="toggleChat()">💬 CHAT</button>
  <div id="chat-input-wrap"><input type="text" id="chat-input" placeholder="Mesaj yaz... (Enter gönder)"/></div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
const SERVER_URL = 'https://saskioyunu-2rxd.onrender.com';
const MINIMAP_SCALE = 120 / 2400;

// ─── STATE ───────────────────────────────────────────────────
let socket = null;
let myId = null;
let myTeam = null;
let walls = [];
let MAP_W = 2400, MAP_H = 1800;
let gameState = 'menu'; // menu|lobby|countdown|playing|ended

let remotePlayers = {};   // id -> player data from server
let remoteBullets = [];
let particles = [];
let ammo = 30;
let maxAmmo = 30;
let reloading = false;
let reloadTimer = 0;
let camX = 0, camY = 0;
let deadRespawnAt = 0;
let isAlive = true;
let hitFlash = 0;
let sbVisible = false;
let lastTs = 0;

// Input
let moveX = 0, moveY = 0;
let aimAngle = 0;
let shooting = false;
let joystickActive = false;
let joyStartX = 0, joyStartY = 0;
let aimTouchId = null;
let aimPrevX = 0;

const input = { up: false, down: false, left: false, right: false, shoot: false, angle: 0 };

// ─── CANVAS ──────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap');
const mmCtx = mmCanvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── SCREENS ─────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const s = document.getElementById('screen-' + id);
  if (s) s.classList.add('active');
  document.getElementById('screens').classList.remove('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('controls').classList.add('hidden');
}
function hideScreens() {
  document.getElementById('screens').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('controls').classList.remove('hidden');
}

// ─── JOIN ─────────────────────────────────────────────────────
document.getElementById('btn-join').addEventListener('click', () => {
  const name = document.getElementById('name-input').value.trim() || 'Oyuncu';
  connectAndJoin(name);
});
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-join').click();
});

function connectAndJoin(name) {
  socket = io(SERVER_URL, { transports: ['websocket'] });

  socket.on('connect', () => {
    socket.emit('join', { name });
  });

  socket.on('joined', data => {
    myId = data.id;
    myTeam = data.team;
    walls = data.walls;
    MAP_W = data.mapW;
    MAP_H = data.mapH;
    applyRoomState(data.room);
    showScreen('lobby');
    gameState = 'lobby';
  });

  socket.on('playerJoined', p => {
    remotePlayers[p.id] = p;
    updateLobbyUI();
  });

  socket.on('playerLeft', id => {
    delete remotePlayers[id];
    updateLobbyUI();
  });

  socket.on('countdown', n => {
    gameState = 'countdown';
    document.getElementById('screens').classList.remove('hidden');
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-countdown').classList.add('active');
    document.getElementById('countdown-num').textContent = n;
  });

  socket.on('gameStart', data => {
    gameState = 'playing';
    applyRoomState(data);
    hideScreens();
    ammo = maxAmmo = 30;
    reloading = false;
    isAlive = true;
    document.getElementById('dead-overlay').classList.remove('show');
    document.getElementById('dead-timer').classList.remove('show');
  });

  socket.on('respawn', data => {
    if (data.id === myId) {
      isAlive = true;
      ammo = maxAmmo;
      reloading = false;
      document.getElementById('dead-overlay').classList.remove('show');
      document.getElementById('dead-timer').classList.remove('show');
    }
    if (remotePlayers[data.id]) {
      remotePlayers[data.id].x = data.x;
      remotePlayers[data.id].y = data.y;
      remotePlayers[data.id].alive = true;
      remotePlayers[data.id].hp = 100;
    }
  });

  socket.on('state', data => {
    const now = Date.now();
    const dt = lastTs ? (now - lastTs) / 1000 : 0.016;
    lastTs = now;

    for (const p of data.players) {
      if (!remotePlayers[p.id]) remotePlayers[p.id] = p;
      else {
        // smooth interpolation for others
        if (p.id !== myId) {
          remotePlayers[p.id].x += (p.x - remotePlayers[p.id].x) * 0.3;
          remotePlayers[p.id].y += (p.y - remotePlayers[p.id].y) * 0.3;
          remotePlayers[p.id].angle = p.angle;
        } else {
          remotePlayers[p.id].x = p.x;
          remotePlayers[p.id].y = p.y;
        }
        Object.assign(remotePlayers[p.id], { hp: p.hp, alive: p.alive, kills: p.kills, deaths: p.deaths, team: p.team, name: p.name });
      }
    }

    remoteBullets = data.bullets;

    // Update scores
    document.getElementById('score-T').textContent = data.scores.T;
    document.getElementById('score-CT').textContent = data.scores.CT;

    // Handle events
    for (const ev of data.events) {
      if (ev.type === 'hit') {
        spawnBloodParticles(ev.x, ev.y, 6);
        if (ev.targetId === myId) {
          hitFlash = 1;
          updateHP(remotePlayers[myId]?.hp || 0);
        }
      }
      if (ev.type === 'kill') {
        spawnExplosionParticles(
          remotePlayers[ev.victimId]?.x || 0,
          remotePlayers[ev.victimId]?.y || 0, 12
        );
        addKillEntry(ev.killerId, ev.victimId);
        if (ev.victimId === myId) {
          isAlive = false;
          deadRespawnAt = now + 4000;
          document.getElementById('dead-overlay').classList.add('show');
          document.getElementById('dead-timer').classList.add('show');
        }
      }
      if (ev.type === 'bulletHitWall') {
        spawnSparkParticles(ev.x, ev.y, 4);
      }
    }

    // Update scoreboard
    updateScoreboard();
    updateMinimapPlayers();
  });

  socket.on('gameEnd', data => {
    gameState = 'ended';
    showEndScreen(data);
  });

  socket.on('lobbyReset', data => {
    gameState = 'lobby';
    applyRoomState(data);
    showScreen('lobby');
  });

  socket.on('chat', data => addChatMsg(data));

  socket.on('disconnect', () => {
    gameState = 'menu';
    showScreen('menu');
    remotePlayers = {};
  });
}

function applyRoomState(room) {
  for (const p of room.players) remotePlayers[p.id] = p;
  document.getElementById('score-T').textContent = room.scores.T;
  document.getElementById('score-CT').textContent = room.scores.CT;
  updateLobbyUI();
}

// ─── LOBBY UI ─────────────────────────────────────────────────
function updateLobbyUI() {
  const list = document.getElementById('lobby-players');
  list.innerHTML = '';
  for (const p of Object.values(remotePlayers)) {
    const div = document.createElement('div');
    div.className = 'player-item';
    div.innerHTML = `<div class="player-dot ${p.team}"></div>
      <div class="player-name">${esc(p.name)}${p.id===myId?' (Sen)':''}</div>
      <div class="player-team">${p.team==='T'?'Terörist':'CT'}</div>`;
    list.appendChild(div);
  }
  const count = Object.keys(remotePlayers).length;
  document.getElementById('lobby-status').textContent =
    count < 2 ? 'En az 2 oyuncu bekleniyor...' : `${count} oyuncu hazır`;
}

// ─── END SCREEN ───────────────────────────────────────────────
function showEndScreen(data) {
  const me = remotePlayers[myId];
  const won = me && data.winTeam === me.team;
  const el = document.getElementById('end-msg');
  el.textContent = won ? '🏆 KAZANDINIZ!' : '💀 KAYBETTİNİZ';
  el.style.color = won ? '#ffcc00' : '#ff4444';
  const sc = document.getElementById('end-scores');
  sc.innerHTML = `<div style="display:flex;justify-content:space-between;padding:4px 0;color:#888;font-size:.7rem;">
    <span>T Takımı</span><span>${data.scores.T} — ${data.scores.CT}</span><span>CT Takımı</span></div>`;
  showScreen('end');
}

// ─── HP ───────────────────────────────────────────────────────
function updateHP(hp) {
  const pct = Math.max(0, hp) / 100;
  document.getElementById('hp-bar').style.width = (pct * 100) + '%';
  document.getElementById('hp-bar').style.background =
    hp > 60 ? '#44ff44' : hp > 30 ? '#ffcc00' : '#ff4444';
  document.getElementById('hp-text').textContent = Math.max(0, hp);
}

// ─── KILL FEED ────────────────────────────────────────────────
function addKillEntry(killerId, victimId) {
  const k = remotePlayers[killerId];
  const v = remotePlayers[victimId];
  if (!k || !v) return;
  const div = document.createElement('div');
  div.className = 'kill-entry';
  div.innerHTML = `<span style="color:${k.team==='T'?'#ff7777':'#7799ff'}">${esc(k.name)}</span> 🔫 <span style="color:${v.team==='T'?'#ff7777':'#7799ff'}">${esc(v.name)}</span>`;
  const list = document.getElementById('kills-list');
  list.prepend(div);
  setTimeout(() => div.remove(), 3300);
}

// ─── CHAT ─────────────────────────────────────────────────────
function toggleChat() {
  const wrap = document.getElementById('chat-input-wrap');
  wrap.classList.toggle('show');
  if (wrap.classList.contains('show')) document.getElementById('chat-input').focus();
}
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val && socket) socket.emit('chat', val);
    e.target.value = '';
    document.getElementById('chat-input-wrap').classList.remove('show');
  }
});
function addChatMsg(data) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<span class="cn-${data.team}">${esc(data.name)}</span>: ${esc(data.msg)}`;
  const log = document.getElementById('chat-log');
  log.appendChild(div);
  setTimeout(() => div.remove(), 5500);
}

// ─── SCOREBOARD ───────────────────────────────────────────────
function toggleScoreboard() {
  sbVisible = !sbVisible;
  document.getElementById('scoreboard').classList.toggle('show', sbVisible);
}
function updateScoreboard() {
  if (!sbVisible) return;
  const tbody = document.getElementById('sb-body');
  const players = Object.values(remotePlayers).sort((a, b) => b.kills - a.kills);
  tbody.innerHTML = players.map(p => `
    <tr>
      <td class="${p.id===myId?'sb-me':''}">${esc(p.name)}${p.id===myId?' ★':''}</td>
      <td class="sb-${p.team}">${p.team==='T'?'Terörist':'CT'}</td>
      <td>${p.kills}</td><td>${p.deaths}</td>
    </tr>`).join('');
}

// ─── MSG OVERLAY ─────────────────────────────────────────────
function showMsg(main, sub, ms = 2000) {
  document.getElementById('msg-main').textContent = main;
  document.getElementById('msg-sub').textContent = sub;
  document.getElementById('msg-overlay').classList.add('show');
  setTimeout(() => document.getElementById('msg-overlay').classList.remove('show'), ms);
}

// ─── PARTICLES ────────────────────────────────────────────────
function spawnBloodParticles(x, y, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 40 + Math.random() * 80;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, r: 3+Math.random()*4, life: 1, type: 'blood' });
  }
}
function spawnSparkParticles(x, y, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 60 + Math.random() * 120;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, r: 2+Math.random()*2, life: 1, type: 'spark' });
  }
}
function spawnExplosionParticles(x, y, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 80 + Math.random() * 160;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, r: 4+Math.random()*6, life: 1, type: 'explosion' });
  }
}

// ─── MINIMAP ──────────────────────────────────────────────────
function updateMinimapPlayers() {
  mmCtx.clearRect(0, 0, 120, 90);
  mmCtx.fillStyle = 'rgba(0,0,0,.7)';
  mmCtx.fillRect(0, 0, 120, 90);
  // walls
  mmCtx.fillStyle = '#333';
  for (const w of walls) {
    mmCtx.fillRect(w.x*MINIMAP_SCALE, w.y*MINIMAP_SCALE, w.w*MINIMAP_SCALE, w.h*MINIMAP_SCALE);
  }
  // players
  for (const p of Object.values(remotePlayers)) {
    if (!p.alive) continue;
    mmCtx.beginPath();
    mmCtx.arc(p.x*MINIMAP_SCALE, p.y*MINIMAP_SCALE, p.id===myId?3:2, 0, Math.PI*2);
    mmCtx.fillStyle = p.id===myId ? '#ffcc00' : p.team==='T' ? '#ff4444' : '#4488ff';
    mmCtx.fill();
  }
}

// ─── INPUT – JOYSTICK ─────────────────────────────────────────
const joyZone = document.getElementById('joystick-zone');
const joyBase = document.getElementById('joystick-base');
const joyKnob = document.getElementById('joystick-knob');
const joyBaseR = 55;
const MINIMAP_SCALE_CONST = 120 / 2400;

joyZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  joyStartX = t.clientX;
  joyStartY = t.clientY;
  joystickActive = true;
  joyBase.style.left = (t.clientX - 55) + 'px';
  joyBase.style.bottom = (window.innerHeight - t.clientY - 55) + 'px';
  joyBase.style.position = 'fixed';
  joyBase.style.top = 'unset';
}, { passive: false });

joyZone.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!joystickActive) return;
  const t = e.changedTouches[0];
  let dx = t.clientX - joyStartX;
  let dy = t.clientY - joyStartY;
  const d = Math.hypot(dx, dy);
  if (d > joyBaseR) { dx = dx / d * joyBaseR; dy = dy / d * joyBaseR; }
  joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  moveX = dx / joyBaseR;
  moveY = dy / joyBaseR;
  const dead = 0.15;
  input.up    = moveY < -dead;
  input.down  = moveY >  dead;
  input.left  = moveX < -dead;
  input.right = moveX >  dead;
}, { passive: false });

joyZone.addEventListener('touchend', e => {
  e.preventDefault();
  joystickActive = false;
  joyKnob.style.transform = 'translate(-50%,-50%)';
  moveX = moveY = 0;
  input.up = input.down = input.left = input.right = false;
}, { passive: false });

// ─── INPUT – AIM ZONE ─────────────────────────────────────────
const aimZone = document.getElementById('aim-zone');
aimZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  aimTouchId = t.identifier;
  aimPrevX = t.clientX;
}, { passive: false });

aimZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== aimTouchId) continue;
    const dx = t.clientX - aimPrevX;
    aimAngle += dx * 0.008;
    aimPrevX = t.clientX;
    input.angle = aimAngle;
  }
}, { passive: false });

aimZone.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) if (t.identifier === aimTouchId) aimTouchId = null;
}, { passive: false });

// ─── INPUT – SHOOT BTN ────────────────────────────────────────
const shootBtn = document.getElementById('shoot-btn');
shootBtn.addEventListener('touchstart', e => { e.preventDefault(); shooting = true; input.shoot = true; }, { passive: false });
shootBtn.addEventListener('touchend', e => { e.preventDefault(); shooting = false; input.shoot = false; }, { passive: false });

// ─── INPUT – RELOAD ───────────────────────────────────────────
document.getElementById('reload-btn').addEventListener('touchstart', e => {
  e.preventDefault();
  startReload();
}, { passive: false });

function startReload() {
  if (reloading || ammo === maxAmmo) return;
  reloading = true;
  reloadTimer = 2000;
  document.getElementById('ammo-num').textContent = '...';
}

// Desktop mouse/keyboard fallback
window.addEventListener('keydown', e => {
  if (e.key === 'w' || e.key === 'ArrowUp') input.up = true;
  if (e.key === 's' || e.key === 'ArrowDown') input.down = true;
  if (e.key === 'a' || e.key === 'ArrowLeft') input.left = true;
  if (e.key === 'd' || e.key === 'ArrowRight') input.right = true;
  if (e.key === 'r') startReload();
  if (e.key === 'Tab') { e.preventDefault(); toggleScoreboard(); }
});
window.addEventListener('keyup', e => {
  if (e.key === 'w' || e.key === 'ArrowUp') input.up = false;
  if (e.key === 's' || e.key === 'ArrowDown') input.down = false;
  if (e.key === 'a' || e.key === 'ArrowLeft') input.left = false;
  if (e.key === 'd' || e.key === 'ArrowRight') input.right = false;
});
canvas.addEventListener('mousemove', e => {
  if (gameState !== 'playing') return;
  const me = remotePlayers[myId];
  if (!me) return;
  const sx = me.x - camX, sy = me.y - camY;
  aimAngle = Math.atan2(e.clientY - sy, e.clientX - sx);
  input.angle = aimAngle;
});
canvas.addEventListener('mousedown', e => {
  if (e.button === 0) { input.shoot = true; shooting = true; }
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 0) { input.shoot = false; shooting = false; }
});

// ─── SEND INPUT LOOP ─────────────────────────────────────────
setInterval(() => {
  if (socket && gameState === 'playing') socket.emit('input', { ...input });
}, 1000 / 30);

// ─── DEAD TIMER ───────────────────────────────────────────────
setInterval(() => {
  if (!isAlive && deadRespawnAt > 0) {
    const left = Math.ceil((deadRespawnAt - Date.now()) / 1000);
    document.getElementById('dt-num').textContent = Math.max(0, left);
    if (Date.now() >= deadRespawnAt) deadRespawnAt = 0;
  }
}, 200);

// ─── DRAW ─────────────────────────────────────────────────────
let lastRender = 0;

function drawBody(p, localX, localY, isMe) {
  const alive = p.alive;
  const a = p.angle;
  const r = 18;
  const team = p.team;
  const tColor = team === 'T' ? '#cc3300' : '#2255cc';
  const tLight = team === 'T' ? '#ff6644' : '#5599ff';

  if (!alive) {
    // corpse
    ctx.save();
    ctx.translate(localX, localY);
    ctx.rotate(a + Math.PI / 2);
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = tColor;
    ctx.beginPath();
    ctx.ellipse(0, 0, r, r * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
    return;
  }

  ctx.save();
  ctx.translate(localX, localY);
  ctx.rotate(a);

  // Shadow
  ctx.beginPath();
  ctx.ellipse(2, 4, r - 2, r * .6, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  ctx.fill();

  // Body
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = tColor;
  ctx.fill();

  // Vest detail
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.68, 0, Math.PI * 2);
  ctx.fillStyle = team === 'T' ? '#882200' : '#113388';
  ctx.fill();

  // Head direction dot
  ctx.beginPath();
  ctx.arc(r * 0.55, 0, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#ffddcc';
  ctx.fill();

  // Gun barrel
  ctx.fillStyle = '#555';
  ctx.fillRect(r * 0.2, -3, r * 1.0, 6);
  ctx.fillStyle = '#888';
  ctx.fillRect(r * 0.5, -2, r * 0.7, 4);

  // Outline / selected
  if (isMe) {
    ctx.beginPath();
    ctx.arc(0, 0, r + 3, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.restore();

  // Name tag
  if (!isMe) {
    ctx.font = 'bold 10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillStyle = tLight;
    ctx.fillText(p.name, localX, localY - r - 8);
  }

  // HP bar above
  const hpW = 32;
  const hpPct = (p.hp || 0) / 100;
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.fillRect(localX - hpW / 2, localY - r - 6, hpW, 4);
  ctx.fillStyle = hpPct > 0.6 ? '#44ff44' : hpPct > 0.3 ? '#ffcc00' : '#ff4444';
  ctx.fillRect(localX - hpW / 2, localY - r - 6, hpW * hpPct, 4);
}

function render(ts) {
  requestAnimationFrame(render);
  if (gameState !== 'playing') return;

  const dt = Math.min((ts - lastRender) / 1000, 0.05);
  lastRender = ts;

  const me = remotePlayers[myId];
  if (me) {
    // Camera follows me smoothly
    const tx = me.x - canvas.width / 2;
    const ty = me.y - canvas.height / 2;
    camX += (tx - camX) * 0.12;
    camY += (ty - camY) * 0.12;
    camX = Math.max(0, Math.min(MAP_W - canvas.width, camX));
    camY = Math.max(0, Math.min(MAP_H - canvas.height, camY));

    // Local ammo display update
    if (!reloading) {
      document.getElementById('ammo-num').textContent = ammo;
    } else {
      reloadTimer -= dt * 1000;
      if (reloadTimer <= 0) {
        reloading = false;
        ammo = maxAmmo;
        document.getElementById('ammo-num').textContent = ammo;
      }
    }

    // HP
    updateHP(me.hp || 0);
    if (!me.alive && isAlive) { isAlive = false; }
  }

  // ── BACKGROUND ──
  ctx.fillStyle = '#1a1f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Floor tiles
  const tileSize = 60;
  const offX = (-camX) % tileSize;
  const offY = (-camY) % tileSize;
  ctx.fillStyle = '#1e251e';
  for (let x = offX; x < canvas.width; x += tileSize) {
    for (let y = offY; y < canvas.height; y += tileSize) {
      if (((Math.floor((x - offX) / tileSize) + Math.floor((y - offY) / tileSize)) % 2) === 0) {
        ctx.fillRect(x, y, tileSize, tileSize);
      }
    }
  }

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,.03)';
  ctx.lineWidth = 1;
  for (let x = offX; x < canvas.width; x += tileSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
  for (let y = offY; y < canvas.height; y += tileSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

  // ── WALLS ──
  for (const w of walls) {
    const lx = w.x - camX, ly = w.y - camY;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    ctx.fillRect(lx + 4, ly + 4, w.w, w.h);
    // wall body
    const grad = ctx.createLinearGradient(lx, ly, lx + w.w, ly + w.h);
    grad.addColorStop(0, '#3a4a3a');
    grad.addColorStop(1, '#2a352a');
    ctx.fillStyle = grad;
    ctx.fillRect(lx, ly, w.w, w.h);
    // wall edge highlight
    ctx.strokeStyle = 'rgba(255,255,255,.12)';
    ctx.lineWidth = 1;
    ctx.strokeRect(lx, ly, w.w, w.h);
    // concrete texture lines
    if (w.w > 40 || w.h > 40) {
      ctx.strokeStyle = 'rgba(0,0,0,.2)';
      if (w.w > w.h) {
        for (let i = 1; i < 3; i++) {
          const lxl = lx + (w.w / 3) * i;
          ctx.beginPath(); ctx.moveTo(lxl, ly); ctx.lineTo(lxl, ly + w.h); ctx.stroke();
        }
      } else {
        for (let i = 1; i < 3; i++) {
          const lyl = ly + (w.h / 3) * i;
          ctx.beginPath(); ctx.moveTo(lx, lyl); ctx.lineTo(lx + w.w, lyl); ctx.stroke();
        }
      }
    }
  }

  // ── PLAYERS ──
  const ps = Object.values(remotePlayers);
  // Draw teammates first, then enemies, then me on top
  const order = [...ps.filter(p => p.id !== myId && p.team === myTeam),
                  ...ps.filter(p => p.id !== myId && p.team !== myTeam),
                  ...ps.filter(p => p.id === myId)];

  for (const p of order) {
    const lx = p.x - camX;
    const ly = p.y - camY;
    drawBody(p, lx, ly, p.id === myId);
  }

  // ── BULLETS ──
  for (const b of remoteBullets) {
    const lx = b.x - camX, ly = b.y - camY;
    ctx.save();
    ctx.beginPath();
    ctx.arc(lx, ly, 4, 0, Math.PI * 2);
    ctx.fillStyle = b.team === 'T' ? '#ff8844' : '#88aaff';
    ctx.fill();
    ctx.shadowColor = b.team === 'T' ? '#ff4400' : '#4488ff';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();
  }

  // ── PARTICLES ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.88;
    p.vy *= 0.88;
    p.life -= dt * 1.5;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    const lx = p.x - camX, ly = p.y - camY;
    ctx.globalAlpha = p.life;
    if (p.type === 'blood') ctx.fillStyle = '#cc2200';
    else if (p.type === 'spark') ctx.fillStyle = '#ffcc44';
    else ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(lx, ly, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ── HIT FLASH ──
  if (hitFlash > 0) {
    hitFlash -= dt * 3;
    ctx.fillStyle = `rgba(255,0,0,${hitFlash * 0.25})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ── DEAD OVERLAY UPDATE ──
  if (!isAlive) {
    ctx.fillStyle = 'rgba(120,0,0,.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}
requestAnimationFrame(render);

// ─── UTIL ────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Start on menu
showScreen('menu');
</script>
