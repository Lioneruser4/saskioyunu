    :root {
        --discord-purple: #5865F2;
        --discord-dark: #36393F;
        --discord-darker: #2C2F33;
        --discord-text: #FFFFFF;
        --discord-muted: #72767D;
        --discord-border: #202225;
        --success: #43B581;
        --warning: #FAA61A;
        --danger: #F04747;
    }

    html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--discord-darker);
        color: var(--discord-text);
        overflow: hidden;
    }

    /* LOADING SCREEN */
    .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #2C2F33 0%, #36393F 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    }

    .loading-screen.hidden {
        display: none;
    }

    .loading-container {
        text-align: center;
        animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .loading-logo {
        width: 80px;
        height: 80px;
        background: var(--discord-purple);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin-bottom: 30px;
        animation: pulse 2s ease-in-out infinite;
        box-shadow: 0 0 30px rgba(88, 101, 242, 0.3);
    }

    @keyframes pulse {
        0%, 100% { box-shadow: 0 0 30px rgba(88, 101, 242, 0.3); transform: scale(1); }
        50% { box-shadow: 0 0 50px rgba(88, 101, 242, 0.6); transform: scale(1.05); }
    }

    .loading-title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 10px;
    }

    .loading-status {
        font-size: 14px;
        color: var(--discord-muted);
        margin-bottom: 30px;
        min-height: 20px;
    }

    .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(88, 101, 242, 0.2);
        border-top-color: var(--discord-purple);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* MAIN LAYOUT */
    .app {
        display: flex;
        height: 100vh;
    }

    .sidebar-servers {
        width: 72px;
        background: var(--discord-dark);
        border-right: 1px solid var(--discord-border);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 8px 0;
        overflow-y: auto;
    }

    .server-icon {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--discord-purple);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        cursor: pointer;
        margin: 8px 0;
        transition: all 0.2s;
        font-size: 20px;
    }

    .server-icon:hover {
        border-radius: 30%;
        transform: scale(1.1);
    }

    .sidebar-channels {
        width: 240px;
        background: var(--discord-dark);
        border-right: 1px solid var(--discord-border);
        display: flex;
        flex-direction: column;
    }

    .channel-header {
        padding: 16px;
        border-bottom: 1px solid var(--discord-border);
        font-weight: 600;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
    }

    .channels-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
    }

    .channel-item {
        padding: 8px 16px;
        margin: 0 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 15px;
        color: var(--discord-muted);
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .channel-item:hover {
        background: rgba(88, 101, 242, 0.1);
        color: var(--discord-text);
    }

    .channel-item.active {
        background: var(--discord-purple);
        color: white;
    }

    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .channel-header-bar {
        padding: 16px 24px;
        background: var(--discord-dark);
        border-bottom: 1px solid var(--discord-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 60px;
    }

    .channel-info h2 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 4px;
    }

    .channel-info p {
        font-size: 12px;
        color: var(--discord-muted);
    }

    .header-controls {
        display: flex;
        gap: 16px;
        align-items: center;
    }

    .status-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: rgba(88, 101, 242, 0.1);
        border-radius: 20px;
        font-size: 12px;
    }

    .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
    }

    .messages-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .messages-list {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .message-group {
        display: flex;
        gap: 12px;
        animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        flex-shrink: 0;
        font-size: 14px;
    }

    .message-content {
        flex: 1;
    }

    .message-header {
        display: flex;
        gap: 8px;
        margin-bottom: 4px;
    }

    .username {
        font-weight: 600;
        font-size: 14px;
    }

    .timestamp {
        font-size: 12px;
        color: var(--discord-muted);
    }

    .message-text {
        font-size: 15px;
        line-height: 1.4;
        word-break: break-word;
    }

    .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--discord-muted);
        text-align: center;
    }

    .empty-icon {
        font-size: 60px;
        margin-bottom: 16px;
        opacity: 0.3;
    }

    .message-input-area {
        padding: 20px 24px;
        border-top: 1px solid var(--discord-border);
    }

    .input-wrapper {
        display: flex;
        gap: 12px;
    }

    .input-field {
        flex: 1;
        padding: 12px 16px;
        background: var(--discord-dark);
        border: 1px solid var(--discord-border);
        border-radius: 8px;
        color: var(--discord-text);
        font-size: 15px;
        font-family: inherit;
        resize: none;
        max-height: 120px;
    }

    .input-field:focus {
        outline: none;
        border-color: var(--discord-purple);
        background: var(--discord-darker);
    }

    .send-button {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--discord-purple);
        border: none;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-size: 18px;
    }

    .send-button:hover:not(:disabled) {
        background: #4752C4;
        transform: scale(1.1);
    }

    .send-button:disabled {
        opacity: 0.5;
    }

    .voice-panel {
        padding: 16px 24px;
        background: var(--discord-dark);
        border-top: 1px solid var(--discord-border);
        display: flex;
        align-items: center;
        gap: 16px;
        height: 60px;
    }

    .voice-controls {
        display: flex;
        gap: 8px;
    }

    .voice-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: var(--discord-dark);
        color: var(--discord-text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s;
    }

    .voice-btn:hover {
        background: rgba(88, 101, 242, 0.1);
    }

    .voice-btn.active {
        background: var(--success);
    }

    .voice-btn.muted {
        background: var(--danger);
    }

    .users-online {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--discord-muted);
        margin-left: auto;
    }

    .user-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
    }

    .user-profile {
        padding: 12px;
        background: var(--discord-dark);
        border: 1px solid var(--discord-border);
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .profile-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 12px;
    }

    .profile-info {
        flex: 1;
    }

    .profile-name {
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .profile-status {
        font-size: 11px;
        color: var(--discord-muted);
    }

    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-thumb {
        background: rgba(88, 101, 242, 0.3);
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: rgba(88, 101, 242, 0.5);
    }

    .modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .modal.show {
        display: flex;
        animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .modal-content {
        background: var(--discord-dark);
        border-radius: 12px;
        padding: 24px;
        width: 90%;
        max-width: 400px;
        animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .modal-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 16px;
    }

    .modal-input {
        width: 100%;
        padding: 12px;
        background: var(--discord-darker);
        border: 1px solid var(--discord-border);
        border-radius: 4px;
        color: var(--discord-text);
        font-size: 14px;
        margin-bottom: 16px;
        font-family: inherit;
    }

    .modal-input:focus {
        outline: none;
        border-color: var(--discord-purple);
    }

    .modal-buttons {
        display: flex;
        gap: 12px;
    }

    .modal-btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 4px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .modal-btn.primary {
        background: var(--discord-purple);
        color: white;
    }

    .modal-btn.primary:hover {
        background: #4752C4;
    }

    .modal-btn.secondary {
        background: var(--discord-darker);
        color: var(--discord-text);
        border: 1px solid var(--discord-border);
    }

    .modal-btn.secondary:hover {
        background: rgba(88, 101, 242, 0.1);
    }

    /* Performance */
    .message-group {
        will-change: opacity, transform;
    }

    @media (prefers-reduced-motion: reduce) {
        * {
            animation-duration: 0.01ms !important;
            transition-duration: 0.01ms !important;
        }
    }
</style>
