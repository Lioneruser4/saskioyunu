<!DOCTYPE html>
<html>
<head>
<meta charset="windows-1254">
<title>Musteri Takip Sistemi</title>
<hta:application id="MusteriTakip" applicationname="MusteriTakip" border="thin" caption="yes" maximizebutton="yes" minimizebutton="yes" sysmenu="yes" navigable="no" showintaskbar="yes" singleinstance="yes" windowstate="maximized">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#eef2f7;padding:20px}
.container{max-width:1400px;margin:0 auto}
.header{background:white;border-radius:14px;padding:15px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;border-left:5px solid #2c7da0}
h1{font-size:22px;color:#2c7da0}
.btn{padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.btn-mavi{background:#2c7da0;color:white}
.btn-boz{background:#e9ecef;color:#2c7da0;border:1px solid #dee2e6}
.btn-yesil{background:#28a745;color:white;width:42px;height:38px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;border:none;cursor:pointer;font-size:16px}
.btn-yesil:hover{background:#218838}
.panel{background:white;border-radius:14px;padding:18px;margin-bottom:20px}
.input-grup{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:15px}
input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:13px;outline:none}
input:focus{border-color:#2c7da0}
.qovluqlar{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.qovluq-item{background:#f8f9fa;border:1px solid #e9ecef;padding:6px 16px;border-radius:25px;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:8px}
.qovluq-item.active{background:#2c7da0;color:white}
.sil-qovluq{cursor:pointer;font-size:14px;opacity:0.6}
.table-wrapper{background:white;border-radius:14px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:14px 12px;background:#f8f9fa;border-bottom:2px solid #e9ecef}
td{padding:12px;border-bottom:1px solid #f0f0f0}
.musteri-ad{background:none;border:none;color:#2c7da0;font-weight:600;cursor:pointer;font-size:14px}
.kucuk-btn{padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-size:11px;margin:2px}
.btn-gelis{background:#e7f3f8;color:#2c7da0}
.btn-bilgi{background:#e9ecef;color:#2c7da0}
.btn-sil{background:#ffe0e0;color:#dc3545}
.badge{background:#f8f9fa;padding:3px 8px;border-radius:12px;font-size:11px;display:inline-block;margin-top:4px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-ic{background:white;border-radius:18px;width:90%;max-width:550px;max-height:80vh;overflow-y:auto;padding:22px}
.modal-baslik{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;border-bottom:2px solid #2c7da0;padding-bottom:10px}
.kapat{font-size:26px;cursor:pointer;color:#888}
.log-list{background:#f8f9fa;border-radius:12px;padding:10px;max-height:200px;overflow-y:auto;margin-bottom:15px}
.log-item{padding:6px 0;border-bottom:1px solid #e9ecef;font-size:12px}
.toplam-kutu{background:#e7f3f8;padding:12px;border-radius:12px;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>MUSTERI TAKIP SISTEMI</h1>
<div><button class="btn btn-boz" id="statBtn">STATISTIKA</button>
<button class="btn btn-mavi" id="yedekBtn">YEDEK AL</button>
<button class="btn btn-boz" id="yukleBtn">YEDEK YUKLE</button></div></div>
<div class="panel"><div class="input-grup"><input type="text" id="yeniQovluq" placeholder="Yeni qovluq adi"><button class="btn btn-mavi" id="qovluqElave">QOVLUQ YARAT</button></div><div class="qovluqlar" id="qovluqListesi"></div></div>
<div class="panel"><div class="input-grup"><input type="text" id="musteriAd" placeholder="Musteri adi"><input type="text" id="musteriTel" placeholder="Telefon"><button class="btn btn-mavi" id="musteriElave">MUSTERI ELAVE ET</button></div></div>
<div class="table-wrapper">\n<table>\n<thead>\n<tr><th>MUSTERI</th><th>TELEFON</th><th>GELIS</th><th>PUL</th><th>STATISTIKA</th><th>EMELIYYAT</th></tr>\n</thead>\n<tbody id="cedvelGovde"></tbody>\n</table>\n</div></div>
<script>
var musteriler=[];
var qovluqlar=[];
var seciliQovluq="all";

function tarixSaat(){
    var n=new Date();
    var g=n.getDate().toString().padStart(2,'0');
    var a=(n.getMonth()+1).toString().padStart(2,'0');
    var sa=n.getHours().toString().padStart(2,'0');
    var d=n.getMinutes().toString().padStart(2,'0');
    return g+'/'+a+' '+sa+':'+d;
}

function bugunTarix(){
    var n=new Date();
    return n.getDate().toString().padStart(2,'0')+'/'+(n.getMonth()+1).toString().padStart(2,'0');
}

function umumiPul(payments){
    var t=0;
    for(var i=0;i<payments.length;i++){
        var m=payments[i].match(/(\d+)/);
        if(m) t+=parseInt(m[1]);
    }
    return t;
}

function bugunGelis(visits){
    var b=bugunTarix();
    var s=0;
    for(var i=0;i<visits.length;i++){
        if(visits[i].substring(0,5)===b) s++;
    }
    return s;
}

function filtreliMusteriler(){
    if(seciliQovluq==="all") return musteriler;
    var r=[];
    for(var i=0;i<musteriler.length;i++){
        if(musteriler[i].qovluqId===seciliQovluq) r.push(musteriler[i]);
    }
    return r;
}

function kaydet(){
    try{
        var data={musteriler:musteriler,qovluqlar:qovluqlar,seciliQovluq:seciliQovluq};
        localStorage.setItem('MusteriTakip',JSON.stringify(data));
        var msg=document.createElement('div');
        msg.style.cssText='position:fixed;bottom:20px;right:20px;background:#28a745;color:white;padding:8px 16px;border-radius:20px;font-size:12px;z-index:9999;';
        msg.innerHTML='Kaydedildi';
        document.body.appendChild(msg);
        setTimeout(function(){msg.remove();},1500);
    }catch(e){alert('Kayit hatasi: '+e.message);}
}

function yukle(){
    try{
        var k=localStorage.getItem('MusteriTakip');
        if(k){
            var d=JSON.parse(k);
            musteriler=d.musteriler||[];
            qovluqlar=d.qovluqlar||[];
            seciliQovluq=d.seciliQovluq||"all";
        }
        if(qovluqlar.length===0){
            qovluqlar=[{id:"q1",name:"Umumi"}];
            seciliQovluq="q1";
        }
    }catch(e){alert('Yukleme hatasi');}
}

function cedvelGoster(){
    var tbody=document.getElementById('cedvelGovde');
    var filtered=filtreliMusteriler();
    if(filtered.length===0){
        tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;">Musteri yoxdur</td></tr>';
        return;
    }
    var html='';
    for(var i=0;i<filtered.length;i++){
        var m=filtered[i];
        var bugunG=bugunGelis(m.visits);
        var toplamG=m.visits.length;
        var toplamPul=umumiPul(m.payments);
        var pulSay=m.payments.length;
        html+='<tr>';
        html+='<td><button class="musteri-ad" onclick="detayGoster(\''+m.id+'\')">'+m.name+'</button></td>';
        html+='<td>'+(m.phone||'-')+'</td>';
        html+='<td><button class="kucuk-btn btn-gelis" onclick="gelisElave(\''+m.id+'\')">GELIS +1</button><div class="badge">Bugun: '+bugunG+' | Umumi: '+toplamG+'</div></td>';
        html+='<td><button class="btn-yesil" onclick="pulElave(\''+m.id+'\',20)"></button><div class="badge">'+pulSay+' defe</div></td>';
        html+='<td><div class="badge">📊 '+toplamG+' gelis</div></td>';
        html+='<td><button class="kucuk-btn btn-bilgi" onclick="detayGoster(\''+m.id+'\')">BILGI</button><button class="kucuk-btn btn-sil" onclick="musteriSil(\''+m.id+'\')">SIL</button></td>';
        html+='</tr>';
    }
    tbody.innerHTML=html;
}

function qovluqGoster(){
    var container=document.getElementById('qovluqListesi');
    container.innerHTML='';
    var allBtn=document.createElement('div');
    allBtn.className='qovluq-item'+(seciliQovluq==='all'?' active':'');
    allBtn.innerHTML='BUTUN MUSTERILER';
    allBtn.onclick=function(){seciliQovluq='all';kaydet();qovluqGoster();cedvelGoster();};
    container.appendChild(allBtn);
    for(var i=0;i<qovluqlar.length;i++){
        var q=qovluqlar[i];
        var div=document.createElement('div');
        div.className='qovluq-item'+(seciliQovluq===q.id?' active':'');
        div.innerHTML=q.name+'<span class="sil-qovluq" data-id="'+q.id+'">✖</span>';
        div.onclick=(function(qid){return function(e){if(e.target.classList.contains('sil-qovluq'))return;seciliQovluq=qid;kaydet();qovluqGoster();cedvelGoster();};})(q.id);
        var silSpan=div.querySelector('.sil-qovluq');
        silSpan.onclick=(function(qid){return function(e){e.stopPropagation();if(qovluqlar.length===1){alert('En azi bir qovluq qalmalidir!');return;}var ilk=null;for(var j=0;j<qovluqlar.length;j++){if(qovluqlar[j].id!==qid){ilk=qovluqlar[j];break;}}for(var k=0;k<musteriler.length;k++){if(musteriler[k].qovluqId===qid)musteriler[k].qovluqId=ilk.id;}var yeni=[];for(var j=0;j<qovluqlar.length;j++){if(qovluqlar[j].id!==qid)yeni.push(qovluqlar[j]);}qovluqlar=yeni;if(seciliQovluq===qid)seciliQovluq=ilk.id;kaydet();qovluqGoster();cedvelGoster();};})(q.id);
        container.appendChild(div);
    }
}

window.gelisElave=function(id){
    for(var i=0;i<musteriler.length;i++){
        if(musteriler[i].id===id){
            musteriler[i].visits.push(tarixSaat());
            kaydet();
            cedvelGoster();
            break;
        }
    }
};

window.pulElave=function(id,miktar){
    for(var i=0;i<musteriler.length;i++){
        if(musteriler[i].id===id){
            musteriler[i].payments.push(tarixSaat()+' - '+miktar+' AZN');
            kaydet();
            cedvelGoster();
            break;
        }
    }
};

window.musteriSil=function(id){
    if(confirm('Bu musterini silmek isteyirsiniz?')){
        var yeni=[];
        for(var i=0;i<musteriler.length;i++){
            if(musteriler[i].id!==id) yeni.push(musteriler[i]);
        }
        musteriler=yeni;
        kaydet();
        cedvelGoster();
        qovluqGoster();
    }
};

window.detayGoster=function(id){
    var m=null;
    for(var i=0;i<musteriler.length;i++){
        if(musteriler[i].id===id){m=musteriler[i];break;}
    }
    if(!m) return;
    var toplamPul=umumiPul(m.payments);
    var gelisHtml='',pulHtml='';
    for(var i=0;i<m.visits.length;i++) gelisHtml+='<div class="log-item">🕒 '+m.visits[i]+'</div>';
    if(m.visits.length===0) gelisHtml='<div class="log-item">Gelis yoxdur</div>';
    for(var i=0;i<m.payments.length;i++) pulHtml+='<div class="log-item">💰 '+m.payments[i]+'</div>';
    if(m.payments.length===0) pulHtml='<div class="log-item">Pul yoxdur</div>';
    var qovluqAdi='Umumi';
    for(var i=0;i<qovluqlar.length;i++){if(qovluqlar[i].id===m.qovluqId){qovluqAdi=qovluqlar[i].name;break;}}
    var md=document.createElement('div');
    md.className='modal';
    md.innerHTML='<div class="modal-ic"><div class="modal-baslik"><h3>👤 '+m.name+'</h3><span class="kapat" onclick="this.parentElement.parentElement.parentElement.remove()">&times;</span></div><p><strong>Telefon:</strong> '+(m.phone||'Yoxdur')+'</p><p><strong>Qovluq:</strong> '+qovluqAdi+'</p><h4>GELISLER ('+m.visits.length+')</h4><div class="log-list">'+gelisHtml+'</div><h4>PULLAR ('+m.payments.length+')</h4><div class="log-list">'+pulHtml+'</div><div class="toplam-kutu"><strong>UMUMI</strong><br>Gelis sayi: '+m.visits.length+'<br>Umumi pul: <span style="font-size:20px;">'+toplamPul+' AZN</span></div><button class="btn btn-mavi" style="margin-top:15px;width:100%;" onclick="this.parentElement.parentElement.remove()">BAGLA</button></div>';
    document.body.appendChild(md);
};

window.statistikaGoster=function(){
    var totalMusteri=musteriler.length;
    var totalGelis=0,totalPul=0,bugunGelisSay=0;
    var bugun=bugunTarix();
    for(var i=0;i<musteriler.length;i++){
        var m=musteriler[i];
        totalGelis+=m.visits.length;
        totalPul+=umumiPul(m.payments);
        for(var j=0;j<m.visits.length;j++){
            if(m.visits[j].substring(0,5)===bugun) bugunGelisSay++;
        }
    }
    var qovluqStat='';
    for(var i=0;i<qovluqlar.length;i++){
        var q=qovluqlar[i];
        var qMusteriler=[];
        for(var j=0;j<musteriler.length;j++){
            if(musteriler[j].qovluqId===q.id) qMusteriler.push(musteriler[j]);
        }
        var qGelis=0,qPul=0;
        for(var j=0;j<qMusteriler.length;j++){
            qGelis+=qMusteriler[j].visits.length;
            qPul+=umumiPul(qMusteriler[j].payments);
        }
        qovluqStat+='<div class="log-item"><strong>📁 '+q.name+'</strong>: '+qMusteriler.length+' musteri, '+qGelis+' gelis, '+qPul+' AZN</div>';
    }
    var md=document.createElement('div');
    md.className='modal';
    md.innerHTML='<div class="modal-ic"><div class="modal-baslik"><h3>UMUMI STATISTIKA</h3><span class="kapat" onclick="this.parentElement.parentElement.parentElement.remove()">&times;</span></div><div class="toplam-kutu" style="background:#2c7da0;color:white;"><strong>SISTEM UMUMI</strong><br>Musteri sayi: '+totalMusteri+'<br>Umumi gelis: '+totalGelis+'<br>Umumi pul: '+totalPul+' AZN<br>Bugunku gelis: '+bugunGelisSay+'</div><h4>QOVLUQLAR UZRE</h4><div class="log-list">'+qovluqStat+'</div><button class="btn btn-mavi" style="margin-top:15px;width:100%;" onclick="this.parentElement.parentElement.remove()">BAGLA</button></div>';
    document.body.appendChild(md);
};

function qovluqYarat(){
    var ad=document.getElementById('yeniQovluq').value.trim();
    if(!ad){alert('Qovluq adi daxil edin!');return;}
    qovluqlar.push({id:'q'+Date.now(),name:ad});
    seciliQovluq=qovluqlar[qovluqlar.length-1].id;
    document.getElementById('yeniQovluq').value='';
    kaydet();
    qovluqGoster();
    cedvelGoster();
}

function musteriYarat(){
    var ad=document.getElementById('musteriAd').value.trim();
    var tel=document.getElementById('musteriTel').value.trim();
    if(!ad){alert('Musteri adi daxil edin!');return;}
    var hedef=seciliQovluq;
    if(hedef==='all'){
        if(qovluqlar.length>0) hedef=qovluqlar[0].id;
        else{alert('Once qovluq yaradin!');return;}
    }
    musteriler.push({
        id:'m'+Date.now()+Math.random(),
        name:ad,
        phone:tel,
        qovluqId:hedef,
        visits:[],
        payments:[]
    });
    document.getElementById('musteriAd').value='';
    document.getElementById('musteriTel').value='';
    kaydet();
    cedvelGoster();
    qovluqGoster();
}

function yedekAl(){
    var data={musteriler:musteriler,qovluqlar:qovluqlar,seciliQovluq:seciliQovluq};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='musteriler_yedek_'+new Date().toISOString().slice(0,19)+'.json';
    a.click();
    URL.revokeObjectURL(a.href);
    alert('Yedek fayli endirildi!');
}

function yedekYukle(){
    var inp=document.createElement('input');
    inp.type='file';
    inp.accept='application/json';
    inp.onchange=function(e){
        var f=e.target.files[0];
        var r=new FileReader();
        r.onload=function(ev){
            try{
                var d=JSON.parse(ev.target.result);
                musteriler=d.musteriler||[];
                qovluqlar=d.qovluqlar||[];
                seciliQovluq=d.seciliQovluq||(qovluqlar[0]?qovluqlar[0].id:'all');
                if(qovluqlar.length===0) qovluqlar=[{id:'q1',name:'Umumi'}];
                kaydet();
                qovluqGoster();
                cedvelGoster();
                alert('Yedek yuklendi!');
            }catch(err){alert('Xeta!');}
        };
        r.readAsText(f);
    };
    inp.click();
}

window.onload=function(){
    yukle();
    qovluqGoster();
    cedvelGoster();
    document.getElementById('qovluqElave').onclick=qovluqYarat;
    document.getElementById('musteriElave').onclick=musteriYarat;
    document.getElementById('statBtn').onclick=function(){statistikaGoster();};
    document.getElementById('yedekBtn').onclick=yedekAl;
    document.getElementById('yukleBtn').onclick=yedekYukle;
    document.getElementById('yeniQovluq').onkeypress=function(e){if(e.key==='Enter')qovluqYarat();};
    document.getElementById('musteriAd').onkeypress=function(e){if(e.key==='Enter')musteriYarat();};
};
</script>
</body>
</html>
