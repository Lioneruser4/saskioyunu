<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hastane Müştəri Takip Sistemi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-left: 5px solid #2c7da0;
        }
        h1 { font-size: 22px; color: #2c7da0; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }
        .btn-primary { background: #2c7da0; color: white; }
        .btn-outline { background: white; border: 1px solid #2c7da0; color: #2c7da0; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; color: #333; }
        .folders-panel, .add-customer, .table-wrapper {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .folders-header, .add-customer { display: flex; gap: 12px; flex-wrap: wrap; }
        input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .folders-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .folder-item {
            background: #f8f9fa;
            padding: 6px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            border: 1px solid #dee2e6;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .folder-item.active { background: #2c7da0; color: white; }
        .delete-folder { cursor: pointer; opacity: 0.6; }
        .table-wrapper { overflow-x: auto; padding: 0; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 15px 12px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .customer-name {
            background: none;
            border: none;
            color: #2c7da0;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .small-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            margin: 2px;
        }
        .btn-visit { background: #e7f3f8; color: #2c7da0; }
        .btn-money { background: #e9ecef; color: #2c7da0; }
        .btn-money-custom { background: #f8f9fa; border: 1px solid #dee2e6; }
        .btn-info { background: #e7f3f8; color: #2c7da0; }
        .btn-delete { background: #ffe0e0; color: #dc3545; }
        .stat-badge {
            background: #f8f9fa;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            display: inline-block;
            margin-top: 4px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #2c7da0;
            padding-bottom: 10px;
        }
        .close-modal { font-size: 24px; cursor: pointer; color: #999; }
        .log-list { background: #f8f9fa; border-radius: 10px; padding: 10px; max-height: 200px; overflow-y: auto; }
        .log-item { padding: 6px 0; border-bottom: 1px solid #e9ecef; font-size: 12px; }
        .total-box { background: #e7f3f8; padding: 12px; border-radius: 10px; text-align: center; margin-top: 15px; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            th, td { padding: 8px 6px; font-size: 11px; }
            .small-btn { padding: 3px 6px; font-size: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏥 HASTANE MÜŞTƏRİ TAKİP SİSTEMİ</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-outline" id="statsBtn">📊 ÜMUMİ STATİSTİKA</button>
            <button class="btn btn-primary" id="exportBtn">💾 YEDƏK AL</button>
            <button class="btn btn-warning" id="importBtn">📂 YEDƏK YÜKLƏ</button>
        </div>
    </div>

    <div class="folders-panel">
        <div class="folders-header">
            <input type="text" id="folderName" placeholder="Yeni qovluq adı...">
            <button class="btn btn-primary" id="addFolderBtn">➕ QOVLUQ YARAT</button>
        </div>
        <div class="folders-list" id="foldersList"></div>
    </div>

    <div class="add-customer">
        <input type="text" id="custName" placeholder="Müştəri adı">
        <input type="text" id="custPhone" placeholder="Telefon nömrəsi">
        <button class="btn btn-success" id="addCustBtn">➕ MÜŞTƏRİ ƏLAVƏ ET</button>
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead>
                <tr><th>MÜŞTƏRİ</th><th>TELEFON</th><th>GƏLİŞ</th><th>PUL</th><th>STATİSTİKA</th><th>ƏMƏLİYYAT</th></tr>
            </thead>
            <tbody id="tableBody"><tr><td colspan="6" style="text-align:center; padding:40px;">Yüklənir...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    let musteriler = [];
    let qovluqlar = [];
    let seciliQovluq = "all";

    function kaydet() {
        localStorage.setItem('HastaneTakip', JSON.stringify({ musteriler, qovluqlar, seciliQovluq }));
    }

    function yukle() {
        const kayitli = localStorage.getItem('HastaneTakip');
        if(kayitli) {
            const data = JSON.parse(kayitli);
            musteriler = data.musteriler || [];
            qovluqlar = data.qovluqlar || [];
            seciliQovluq = data.seciliQovluq || "all";
        }
        if(qovluqlar.length === 0) {
            qovluqlar = [{ id: "q1", name: "Ümumi" }];
            seciliQovluq = "q1";
        }
    }

    function getDateTime() {
        const now = new Date();
        const gun = now.getDate().toString().padStart(2,'0');
        const ay = (now.getMonth()+1).toString().padStart(2,'0');
        const saat = now.getHours().toString().padStart(2,'0');
        const deq = now.getMinutes().toString().padStart(2,'0');
        return `${gun}/${ay} ${saat}:${deq}`;
    }

    function getToday() {
        const now = new Date();
        return now.getDate().toString().padStart(2,'0') + '/' + (now.getMonth()+1).toString().padStart(2,'0');
    }

    function getTotalMoney(payments) {
        let total = 0;
        for(let i = 0; i < payments.length; i++) {
            const match = payments[i].match(/(\d+)\s*AZN/);
            if(match) total += parseInt(match[1]);
        }
        return total;
    }

    function getTodayVisits(visits) {
        const today = getToday();
        let count = 0;
        for(let i = 0; i < visits.length; i++) {
            if(visits[i].substring(0,5) === today) count++;
        }
        return count;
    }

    function getFiltered() {
        if(seciliQovluq === "all") return musteriler;
        return musteriler.filter(m => m.qovluqId === seciliQovluq);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const filtered = getFiltered();
        if(filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">📭 Müştəri yoxdur</td></tr>';
            return;
        }
        let html = '';
        for(let m of filtered) {
            const bugunGelis = getTodayVisits(m.visits);
            const toplamGelis = m.visits.length;
            const toplamPul = getTotalMoney(m.payments);
            const toplamPulSay = m.payments.length;
            html += `<tr>
                <td><button class="customer-name" onclick="showDetails('${m.id}')">${m.name}</button></td>
                <td>${m.phone || '-'}</td>
                <td><button class="small-btn btn-visit" onclick="addVisit('${m.id}')">✅ GƏLİŞ +1</button><div class="stat-badge">Bugün: ${bugunGelis} | Ümumi: ${toplamGelis}</div></td>
                <td><button class="small-btn btn-money" onclick="addPayment('${m.id}', 20)">💰 +20 AZN</button><button class="small-btn btn-money-custom" onclick="addPaymentCustom('${m.id}')">✏️ Əl ilə</button><div class="stat-badge">${toplamPulSay} dəfə | ${toplamPul} AZN</div></td>
                <td><div class="stat-badge">📊 ${toplamGelis} gəliş</div><div class="stat-badge">💰 ${toplamPul} AZN</div></td>
                <td><button class="small-btn btn-info" onclick="showDetails('${m.id}')">ℹ️ BİLGİ</button><button class="small-btn btn-delete" onclick="deleteMusteri('${m.id}')">🗑️ SIL</button></td>
            </tr>`;
        }
        tbody.innerHTML = html;
    }

    function renderFolders() {
        const container = document.getElementById('foldersList');
        container.innerHTML = '';
        const allBtn = document.createElement('div');
        allBtn.className = `folder-item ${seciliQovluq === 'all' ? 'active' : ''}`;
        allBtn.innerHTML = '📁 BÜTÜN MÜŞTƏRİLƏR';
        allBtn.onclick = () => { seciliQovluq = 'all'; kaydet(); renderFolders(); renderTable(); };
        container.appendChild(allBtn);
        for(let f of qovluqlar) {
            const div = document.createElement('div');
            div.className = `folder-item ${seciliQovluq === f.id ? 'active' : ''}`;
            div.innerHTML = `${f.name} <span class="delete-folder" data-id="${f.id}">✖</span>`;
            div.onclick = (e) => { if(e.target.classList.contains('delete-folder')) return; seciliQovluq = f.id; kaydet(); renderFolders(); renderTable(); };
            const delSpan = div.querySelector('.delete-folder');
            delSpan.onclick = (e) => {
                e.stopPropagation();
                if(qovluqlar.length === 1) { alert("Ən azı bir qovluq qalmalıdır!"); return; }
                const ilk = qovluqlar.find(q => q.id !== f.id);
                for(let m of musteriler) if(m.qovluqId === f.id) m.qovluqId = ilk.id;
                qovluqlar = qovluqlar.filter(q => q.id !== f.id);
                if(seciliQovluq === f.id) seciliQovluq = ilk.id;
                kaydet(); renderFolders(); renderTable();
            };
            container.appendChild(div);
        }
    }

    window.addVisit = (id) => {
        const m = musteriler.find(m => m.id === id);
        if(m) { m.visits.push(getDateTime()); kaydet(); renderTable(); }
    };

    window.addPayment = (id, amount) => {
        const m = musteriler.find(m => m.id === id);
        if(m) { m.payments.push(`${getDateTime()} - ${amount} AZN`); kaydet(); renderTable(); }
    };

    window.addPaymentCustom = (id) => {
        const amount = prompt("Pul məbləğini daxil edin (AZN):", "20");
        if(amount && !isNaN(parseInt(amount)) && parseInt(amount) > 0) {
            addPayment(id, parseInt(amount));
        }
    };

    window.deleteMusteri = (id) => {
        if(confirm("Bu müştərini silmək istəyirsiniz?")) {
            musteriler = musteriler.filter(m => m.id !== id);
            kaydet(); renderTable();
        }
    };

    window.showDetails = (id) => {
        const m = musteriler.find(m => m.id === id);
        if(!m) return;
        const totalMoney = getTotalMoney(m.payments);
        let visitsHtml = '', paymentsHtml = '';
        for(let v of m.visits) visitsHtml += `<div class="log-item">🕒 ${v}</div>`;
        if(m.visits.length === 0) visitsHtml = '<div class="log-item">Gəliş yoxdur</div>';
        for(let p of m.payments) paymentsHtml += `<div class="log-item">💰 ${p}</div>`;
        if(m.payments.length === 0) paymentsHtml = '<div class="log-item">Pul yoxdur</div>';
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><div class="modal-header"><h3>👤 ${m.name}</h3><span class="close-modal" onclick="this.parentElement.parentElement.parentElement.remove()">&times;</span></div>
            <p><strong>📞 Telefon:</strong> ${m.phone || 'Yoxdur'}</p>
            <h4>📅 GƏLİŞLƏR (${m.visits.length})</h4><div class="log-list">${visitsHtml}</div>
            <h4>💰 PULLAR (${m.payments.length})</h4><div class="log-list">${paymentsHtml}</div>
            <div class="total-box"><strong>ÜMUMİ</strong><br>Gəliş: ${m.visits.length}<br>Pul: <span style="font-size:20px;">${totalMoney} AZN</span></div>
            <button class="btn btn-primary" style="margin-top:15px; width:100%;" onclick="this.parentElement.parentElement.remove()">BAĞLA</button></div>`;
        document.body.appendChild(modal);
    };

    window.showStats = () => {
        let totalMusteri = musteriler.length;
        let totalGelis = 0, totalPul = 0, bugunGelis = 0;
        const today = getToday();
        for(let m of musteriler) {
            totalGelis += m.visits.length;
            totalPul += getTotalMoney(m.payments);
            for(let v of m.visits) if(v.substring(0,5) === today) bugunGelis++;
        }
        let qovluqHtml = '';
        for(let q of qovluqlar) {
            const qM = musteriler.filter(m => m.qovluqId === q.id);
            let qG = 0, qP = 0;
            for(let m of qM) { qG += m.visits.length; qP += getTotalMoney(m.payments); }
            qovluqHtml += `<div class="log-item"><strong>📁 ${q.name}</strong>: ${qM.length} müştəri, ${qG} gəliş, ${qP} AZN</div>`;
        }
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><div class="modal-header"><h3>📊 ÜMUMİ STATİSTİKA</h3><span class="close-modal" onclick="this.parentElement.parentElement.parentElement.remove()">&times;</span></div>
            <div class="total-box" style="background:#2c7da0; color:white;"><strong>SİSTEM ÜMUMİ</strong><br>Müştəri: ${totalMusteri}<br>Gəliş: ${totalGelis}<br>Pul: ${totalPul} AZN<br>Bugün: ${bugunGelis}</div>
            <h4>📁 QOVLUQLAR</h4><div class="log-list">${qovluqHtml}</div>
            <button class="btn btn-primary" style="margin-top:15px; width:100%;" onclick="this.parentElement.parentElement.remove()">BAĞLA</button></div>`;
        document.body.appendChild(modal);
    };

    function addFolder() {
        const name = document.getElementById('folderName').value.trim();
        if(!name) { alert("Qovluq adı daxil edin!"); return; }
        qovluqlar.push({ id: "q" + Date.now(), name: name });
        seciliQovluq = qovluqlar[qovluqlar.length-1].id;
        document.getElementById('folderName').value = '';
        kaydet(); renderFolders(); renderTable();
    }

    function addCustomer() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        if(!name) { alert("Müştəri adı daxil edin!"); return; }
        let hedef = seciliQovluq;
        if(hedef === "all") { if(qovluqlar.length) hedef = qovluqlar[0].id; else { alert("Qovluq yaradın!"); return; } }
        musteriler.push({ id: "m" + Date.now() + Math.random(), name: name, phone: phone, qovluqId: hedef, visits: [], payments: [] });
        document.getElementById('custName').value = '';
        document.getElementById('custPhone').value = '';
        kaydet(); renderTable();
    }

    function yedekAl() {
        const data = { musteriler, qovluqlar, seciliQovluq };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `hastane_yedek_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert("Yedək faylı endirildi!");
    }

    function yedekYukle() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const data = JSON.parse(evt.target.result);
                    musteriler = data.musteriler || [];
                    qovluqlar = data.qovluqlar || [];
                    seciliQovluq = data.seciliQovluq || (qovluqlar[0]?.id || "all");
                    kaydet(); renderFolders(); renderTable();
                    alert("Yedək yükləndi!");
                } catch(err) { alert("Xəta!"); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    window.onload = () => {
        yukle();
        renderFolders();
        renderTable();
        document.getElementById('addFolderBtn').onclick = addFolder;
        document.getElementById('addCustBtn').onclick = addCustomer;
        document.getElementById('exportBtn').onclick = yedekAl;
        document.getElementById('importBtn').onclick = yedekYukle;
        document.getElementById('statsBtn').onclick = () => showStats();
        document.getElementById('folderName').onkeypress = (e) => { if(e.key === 'Enter') addFolder(); };
        document.getElementById('custName').onkeypress = (e) => { if(e.key === 'Enter') addCustomer(); };
    };
</script>
</body>
</html>
