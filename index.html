<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Durak Online ♠️</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(165deg, #0a4d2a 0%, #1a5a3a 30%, #0f3a22 100%);
            color: white;
            position: fixed;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            height: 65px;
            z-index: 100;
        }

        .lang-selector {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 40px;
        }

        .lang-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.2s ease;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            filter: grayscale(0.5);
        }

        .lang-btn.active {
            opacity: 1;
            transform: scale(1.2);
            filter: grayscale(0);
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 15px gold;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 18px 6px 10px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.3);
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid gold;
            object-fit: cover;
            background: #2a5a3a;
        }

        .player-name {
            font-weight: 600;
            font-size: 16px;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Ekranlar */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 20px;
            gap: 16px;
            width: 100%;
            height: calc(100% - 65px);
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        /* Menu Butonları */
        .menu-btn {
            width: 300px;
            max-width: 90%;
            padding: 20px 30px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #ffd700, #ffb347);
            color: #1a3a1a;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 1.5px;
            box-shadow: 0 12px 0 #b8860b, 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 8px 0;
            cursor: pointer;
            touch-action: manipulation;
            border: 2px solid rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        .menu-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #b8860b, 0 10px 20px rgba(0,0,0,0.5);
        }

        .menu-btn.secondary {
            background: linear-gradient(145deg, #4a90e2, #2c3e50);
            box-shadow: 0 12px 0 #1a2634;
            color: white;
        }

        .menu-btn.bot {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            box-shadow: 0 12px 0 #6c3483;
        }

        /* Lobi Listesi */
        .lobby-container {
            width: 100%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid gold;
        }

        .lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
            color: gold;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 50%;
            background: rgba(255,215,0,0.2);
        }

        .lobby-list {
            max-height: 350px;
            overflow-y: auto;
            border-radius: 20px;
        }

        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .room-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .room-name {
            font-weight: bold;
            font-size: 18px;
        }

        .room-creator {
            font-size: 14px;
            opacity: 0.8;
        }

        .join-btn {
            background: gold;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-weight: bold;
            font-size: 16px;
            color: #1a3a1a;
            cursor: pointer;
            box-shadow: 0 4px 0 #b8860b;
            transition: all 0.1s;
        }

        .join-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Oyun Tahtası */
        #game-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            width: 100%;
            height: 100%;
        }

        .opponent-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 20px;
        }

        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
        }

        .opponent-info, .player-info-game {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }

        .cards-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 10px;
            min-height: 120px;
        }

        .card {
            width: 65px;
            height: 95px;
            background: white;
            border-radius: 12px;
            border: 2px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 24px;
            color: #1a1a1a;
            box-shadow: 0 8px 0 #666, 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s ease;
            position: relative;
            touch-action: pan-y;
            cursor: pointer;
        }

        .card.red {
            color: #e74c3c;
        }

        .card.face-down {
            background: repeating-linear-gradient(45deg, #2c3e50, #2c3e50 10px, #34495e 10px, #34495e 20px);
            color: transparent;
            border-color: #7f8c8d;
            box-shadow: 0 8px 0 #2c3e50;
        }

        .card:active {
            transform: translateY(-10px) scale(1.05);
        }

        .card.small {
            width: 45px;
            height: 70px;
            font-size: 18px;
        }

        .center-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
            margin: 10px 0;
        }

        .pile {
            width: 70px;
            height: 100px;
            border: 3px dashed gold;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
            font-size: 24px;
            color: gold;
        }

        .trump-card {
            width: 70px;
            height: 100px;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            border: 3px solid gold;
        }

        /* Toast Mesajları */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid gold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,215,0,0.3);
            border-radius: 50%;
            border-top-color: gold;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: linear-gradient(145deg, #1a5a3a, #0f3a22);
            padding: 30px;
            border-radius: 40px;
            border: 2px solid gold;
            max-width: 300px;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-btn.yes {
            background: gold;
            color: #1a3a1a;
        }

        .modal-btn.no {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Header -->
        <div class="header">
            <div class="lang-selector">
                <button class="lang-btn" data-lang="az" onclick="setLanguage('az')">🇦🇿</button>
                <button class="lang-btn" data-lang="ru" onclick="setLanguage('ru')">🇷🇺</button>
                <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">🇬🇧</button>
                <button class="lang-btn" data-lang="tr" onclick="setLanguage('tr')">🇹🇷</button>
            </div>
            <div class="player-info" id="playerInfo">
                <img class="player-avatar" id="playerAvatar" src="" alt="avatar">
                <span class="player-name" id="playerName">Yükleniyor...</span>
            </div>
        </div>

        <!-- Ana Menü -->
        <div id="mainMenu" class="screen active">
            <button class="menu-btn" data-i18n="menu.find" onclick="findMatch()">Eşleşme bul</button>
            <button class="menu-btn secondary" data-i18n="menu.create" onclick="showCreateRoom()">Oda kur</button>
            <button class="menu-btn secondary" data-i18n="menu.join" onclick="showLobby()">Odaya bağlan</button>
            <button class="menu-btn bot" data-i18n="menu.bot" onclick="playWithBot()">Bot ile alıştırma</button>
        </div>

        <!-- Lobi Ekranı -->
        <div id="lobbyScreen" class="screen">
            <div class="lobby-container">
                <div class="lobby-header">
                    <span data-i18n="menu.join">Odalar</span>
                    <button class="refresh-btn" onclick="listRooms()">🔄</button>
                </div>
                <div id="roomsList" class="lobby-list">
                    <div style="text-align: center; padding: 20px;">Yükleniyor...</div>
                </div>
                <button class="menu-btn secondary" style="margin-top: 20px;" onclick="showMainMenu()" data-i18n="menu.back">Geri</button>
            </div>
        </div>

        <!-- Oda Kurma Ekranı -->
        <div id="createRoomScreen" class="screen">
            <div class="lobby-container">
                <h2 style="color: gold; margin-bottom: 20px;" data-i18n="menu.create">Oda Kur</h2>
                <input type="text" id="roomNameInput" placeholder="Oda adı..." style="width: 100%; padding: 15px; border-radius: 30px; border: none; margin-bottom: 20px; font-size: 16px;">
                <button class="menu-btn" onclick="createRoom()" data-i18n="menu.create">Oda Kur</button>
                <button class="menu-btn secondary" style="margin-top: 10px;" onclick="showMainMenu()" data-i18n="menu.back">Geri</button>
            </div>
        </div>

        <!-- Oyun Ekranı -->
        <div id="gameScreen" class="screen">
            <div id="game-board">
                <!-- Rakip Alanı -->
                <div class="opponent-area">
                    <div class="opponent-info">
                        <img class="player-avatar" id="opponentAvatar" src="" alt="">
                        <span class="player-name" id="opponentName">Rakip bekleniyor...</span>
                    </div>
                    <div class="cards-row" id="opponentCards"></div>
                </div>

                <!-- Orta Alan -->
                <div class="center-area">
                    <div class="pile" id="deckPile">🎴</div>
                    <div class="pile" id="tablePile"></div>
                    <div class="trump-card" id="trumpCard"></div>
                </div>

                <!-- Oyuncu Alanı -->
                <div class="player-area">
                    <div class="player-info-game">
                        <img class="player-avatar" id="myAvatar" src="" alt="">
                        <span class="player-name" id="myName"></span>
                    </div>
                    <div class="cards-row" id="myCards"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast mesajları için -->
    <div id="toast" class="toast" style="display: none;"></div>

    <script src="lang.js"></script>
    <script src="game.js"></script>
</body>
</html>
