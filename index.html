<script>
    const CONFIG = {
        SERVER: 'wss://saskioyunu-1-2d6i.onrender.com',
        CANVAS_WIDTH: window.innerWidth,
        CANVAS_HEIGHT: window.innerHeight
    };

    let gameState = {
        playerId: null,
        username: 'Player',
        roomId: null,
        connected: false,
        gameRunning: false,
        gameManager: null,
        keys: {}
    };

    let ws = null;

    // ============ LOAD & INIT ============
    window.addEventListener('load', () => {
        initTelegram();
        connectServer();
        setupEvents();
        loadingStatus('Initializing...');
    });

    function initTelegram() {
        if (window.Telegram?.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            if (tg.initDataUnsafe?.user?.first_name) {
                const name = tg.initDataUnsafe.user.first_name;
                document.getElementById('player-name').value = name;
                gameState.username = name;
            }
        }
    }

    function connectServer() {
        ws = new WebSocket(CONFIG.SERVER);

        ws.onopen = () => {
            gameState.connected = true;
            gameState.playerId = 'p_' + Date.now();
            loadingStatus('Connected to server');
            setTimeout(() => {
                ws.send(JSON.stringify({
                    type: 'INIT',
                    id: gameState.playerId,
                    username: gameState.username
                }));
            }, 500);
        };

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            handleMessage(msg);
        };

        ws.onerror = () => {
            loadingStatus('Connection error! Retrying...');
        };

        ws.onclose = () => {
            gameState.connected = false;
            setTimeout(connectServer, 3000);
        };

        window.ws = ws;
    }

    function handleMessage(msg) {
        if (msg.type === 'INIT_SUCCESS') {
            setTimeout(() => {
                hideLoading();
            }, 800);
        } else if (msg.type === 'ROOMS_LIST') {
            displayRooms(msg.rooms);
        } else if (msg.type === 'ROOM_CREATED') {
            startGame(msg.roomId, msg.layout, msg.room.monsterType === 'Bot', true);
        } else if (msg.type === 'ROOM_JOINED') {
            startGame(msg.roomId, msg.layout, true, false);
        } else if (msg.type === 'PLAYER_JOINED') {
            if (gameState.gameManager) {
                gameState.gameManager.addPlayer(msg.player);
            }
        } else if (msg.type === 'PLAYER_MOVE') {
            if (gameState.gameManager) {
                gameState.gameManager.updatePlayer(msg.playerId, msg);
            }
        } else if (msg.type === 'MONSTER_MOVE') {
            if (gameState.gameManager) {
                gameState.gameManager.updateMonster(msg.x, msg.y, msg.anim);
            }
        } else if (msg.type === 'GAME_START') {
            if (gameState.gameManager) {
                gameState.gameManager.startGame(msg.monsterId, msg.isAI);
            }
        } else if (msg.type === 'PLAYER_CAUGHT') {
            if (gameState.gameManager) {
                gameState.gameManager.playerCaught(msg.playerId);
            }
        } else if (msg.type === 'KEY_COLLECTED') {
            if (gameState.gameManager) {
                gameState.gameManager.keyCollected(msg.playerId);
            }
        } else if (msg.type === 'PLAYER_ESCAPED') {
            if (gameState.gameManager) {
                gameState.gameManager.playerEscaped(msg.playerId, msg.username);
            }
        }
    }

    function loadingStatus(text) {
        document.getElementById('loading-status').textContent = text;
    }

    function hideLoading() {
        document.getElementById('loading').classList.add('hidden');
    }

    // ============ MENU ============
    function setupEvents() {
        document.getElementById('btn-play').addEventListener('click', () => {
            gameState.username = document.getElementById('player-name').value || 'Player';
            showRooms();
        });

        document.getElementById('btn-create').addEventListener('click', () => {
            gameState.username = document.getElementById('player-name').value || 'Player';
            createRoom();
        });

        document.getElementById('btn-settings').addEventListener('click', () => {
            alert('Settings coming soon!');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && gameState.gameRunning) {
                showEscapeMenu();
            }
            gameState.keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            gameState.keys[e.key.toLowerCase()] = false;
        });

        setupMobileControls();
    }

    function showRooms() {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('rooms').classList.remove('hidden');
        ws.send(JSON.stringify({ type: 'GET_ROOMS' }));
    }

    function backToMenu() {
        document.getElementById('rooms').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
    }

    function displayRooms(rooms) {
        const list = document.getElementById('rooms-list');
        if (rooms.length === 0) {
            list.innerHTML = '<div style="text-align: center; grid-column: 1/-1; color: #888; padding: 40px;">No rooms available. Create one!</div>';
            return;
        }

        list.innerHTML = rooms.map(r => `
            <div class="room-card">
                <h3>Room #${r.id}</h3>
                <div class="room-info">Creator: <span>${r.creatorName}</span></div>
                <div class="room-info">Players: <span>${r.playerCount}/${r.maxPlayers}</span></div>
                <div class="room-info">Status: <span>${r.gameStarted ? 'IN PROGRESS' : 'WAITING'}</span></div>
                <div class="room-info">Monster: <span>${r.monsterType}</span></div>
                <button class="room-join-btn" onclick="joinRoom(${r.id})" ${r.isFull ? 'disabled' : ''}>
                    ${r.isFull ? 'ROOM FULL' : 'JOIN'}
                </button>
            </div>
        `).join('');
    }

    function createRoom() {
        document.getElementById('menu').classList.add('hidden');
        ws.send(JSON.stringify({
            type: 'CREATE_ROOM',
            username: gameState.username
        }));
    }

    function joinRoom(roomId) {
        document.getElementById('rooms').classList.add('hidden');
        ws.send(JSON.stringify({
            type: 'JOIN_ROOM',
            roomId: roomId,
            username: gameState.username
        }));
    }

    // ============ GAME ============
    function startGame(roomId, layout, isAI, isCreator) {
        gameState.roomId = roomId;
        gameState.gameRunning = true;
        document.getElementById('game').classList.remove('hidden');

        const canvas = document.getElementById('gameCanvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        gameState.gameManager = new GameEngine(canvas, gameState.playerId, layout);
        gameState.gameManager.start();

        // Update HUD
        document.getElementById('hud-name').textContent = gameState.username;

        if (isCreator) {
            const monsterType = confirm('AI Monster?\n\nOK = AI (Bot)\nCancel = Random Player') ? 'ai' : 'player';
            setTimeout(() => {
                ws.send(JSON.stringify({
                    type: 'START_GAME',
                    roomId: roomId,
                    monsterType: monsterType
                }));
            }, 500);
        }
    }

    function showEscapeMenu() {
        document.getElementById('escape-menu').classList.add('show');
        gameState.gameRunning = false;
    }

    function resumeGame() {
        document.getElementById('escape-menu').classList.remove('show');
        gameState.gameRunning = true;
    }

    function leaveGame() {
        ws.send(JSON.stringify({
            type: 'LEAVE_ROOM'
        }));
        document.getElementById('game').classList.add('hidden');
        document.getElementById('escape-menu').classList.remove('show');
        document.getElementById('menu').classList.remove('hidden');
        gameState.gameRunning = false;
        if (gameState.gameManager) {
            gameState.gameManager.destroy();
        }
    }

    // ============ MOBILE CONTROLS ============
    function setupMobileControls() {
        const joystick = document.getElementById('joystick');
        const stick = joystick.querySelector('.joystick-stick');
        let isDragging = false;

        joystick.addEventListener('touchstart', () => { isDragging = true; });
        joystick.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            const rect = joystick.getBoundingClientRect();
            const x = touch.clientX - (rect.left + rect.width / 2);
            const y = touch.clientY - (rect.top + rect.height / 2);
            const dist = Math.hypot(x, y);
            const maxDist = 50;
            const dx = dist > maxDist ? (x / dist) * maxDist : x;
            const dy = dist > maxDist ? (y / dist) * maxDist : y;
            stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            gameState.keys['joystick_x'] = dx / maxDist;
            gameState.keys['joystick_y'] = dy / maxDist;
        });
        joystick.addEventListener('touchend', () => {
            isDragging = false;
            stick.style.transform = 'translate(-50%, -50%)';
            gameState.keys['joystick_x'] = 0;
            gameState.keys['joystick_y'] = 0;
        });

        document.getElementById('btn-jump').addEventListener('touchstart', () => { gameState.keys[' '] = true; });
        document.getElementById('btn-jump').addEventListener('touchend', () => { gameState.keys[' '] = false; });
        document.getElementById('btn-sprint').addEventListener('touchstart', () => { gameState.keys['shift'] = true; });
        document.getElementById('btn-sprint').addEventListener('touchend', () => { gameState.keys['shift'] = false; });
    }

    window.addEventListener('resize', () => {
        CONFIG.CANVAS_WIDTH = window.innerWidth;
        CONFIG.CANVAS_HEIGHT = window.innerHeight;
        const canvas = document.getElementById('gameCanvas');
        if (canvas && !canvas.classList.contains('hidden')) {
            canvas.width = CONFIG.CANVAS_WIDTH;
            canvas.height = CONFIG.CANVAS_HEIGHT;
        }
    });
</script>
