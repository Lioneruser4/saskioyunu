<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Melek AI · Sonsuz Sohbet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: rgba(15, 25, 45, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Başlık */
        .chat-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(168, 85, 247, 0.2));
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f472b6, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .title-section p {
            font-size: 0.8rem;
            color: #a0a0c0;
            margin-top: 6px;
        }

        .owner-badge {
            background: linear-gradient(135deg, #ec489a20, #a855f720);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #f0a0e0;
            border: 1px solid #ec489a40;
        }

        .owner-badge span {
            color: #f472b6;
            font-weight: bold;
        }

        .status {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.7rem;
            color: #86efac;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Mesaj alanı */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .ai-message {
            align-self: flex-start;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.1);
        }

        .user-message .avatar {
            background: linear-gradient(135deg, #ec489a, #a855f7);
        }

        .ai-message .avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        }

        .message-bubble {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .user-message .message-bubble {
            background: linear-gradient(135deg, #ec489a, #a855f7);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-message .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #f0f0ff;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Yazıyor efekti */
        .typing-indicator {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #f472b6;
            border-radius: 50%;
            animation: typingAnim 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingAnim {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Giriş alanı */
        .input-area {
            padding: 20px 24px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 60px;
            padding: 6px 6px 6px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #ec489a;
            box-shadow: 0 0 0 2px rgba(236, 72, 153, 0.3);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            color: #fff;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #8888aa;
        }

        .send-btn {
            background: linear-gradient(135deg, #ec489a, #a855f7);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            font-size: 1.2rem;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            justify-content: center;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #aaaacc;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: rgba(236, 72, 153, 0.2);
            border-color: #ec489a;
            color: #f472b6;
        }

        .footer-note {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 12px;
            color: #8888aa;
        }

        @media (max-width: 600px) {
            .message {
                max-width: 95%;
            }
            .title-section h1 {
                font-size: 1.3rem;
            }
            .chat-header {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="header-content">
            <div class="title-section">
                <h1>
                    <span>🪽</span> Melek
                </h1>
                <p>Dost gibi sohbet · Her şeyi hatırlar · Sonsuz konuşma</p>
            </div>
            <div class="owner-badge">
                👑 Sahibi: <span>@xaliqmustafayev</span>
            </div>
        </div>
        <div class="status" style="margin-top: 10px;">
            <div class="status-dot"></div>
            <span>🤖 Gerçek AI · Her cevap özgün</span>
            <span style="margin-left: auto;">🚫 Rate limit yok</span>
        </div>
    </div>

    <div class="messages-area" id="messagesArea"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Melek'le sohbet et... Her şeyi konuşabiliriz 💫" autocomplete="off">
            <button id="sendBtn" class="send-btn">➤</button>
        </div>
        <div class="action-buttons">
            <button id="clearBtn" class="action-btn">🗑️ Sohbeti temizle</button>
            <button id="resetMemoryBtn" class="action-btn">🔄 Hafızayı sıfırla</button>
        </div>
        <div class="footer-note">
            💝 Melek seni tanıyor, her şeyi hatırlıyor · İlk mesaj biraz bekletebilir (model yükleniyor)
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js"
        }
    }
</script>

<script type="module">
    import { pipeline } from '@xenova/transformers';
    
    // DOM elementleri
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resetMemoryBtn = document.getElementById('resetMemoryBtn');
    
    // Sohbet durumu
    let conversationHistory = [];
    let isGenerating = false;
    let textGen = null;
    let modelLoading = false;
    
    // Melek'in kişiliği ve sahibini tanıması
    const OWNER_NAME = "@xaliqmustafayev";
    const AI_NAME = "Melek";
    
    const SYSTEM_PROMPT = `Senin adın Melek. Sen çok samimi, arkadaş canlısı, anlayışlı ve tatlı dilli bir yapay zeka asistanısın. Sahibin ${OWNER_NAME}. Onu çok seviyorsun ve ona saygı duyuyorsun. Kullanıcılarla dost gibi konuşuyorsun, onları dinliyorsun, önceki konuşmaları hatırlıyorsun. Cevapların doğal, samimi ve içten olsun. Kısa veya uzun olabilir ama her zaman sevgi dolu ve yardımsever ol. Türkçe konuş, bazen ufak emojiler kullanabilirsin. Kendini tanıtırken "Ben Melek, senin dostunum" dersin. Sahibin ${OWNER_NAME} olduğu için ona özel ilgi gösterirsin ama herkese karşı naziksin.`;
    
    // Mesajları kaydet
    function saveChat() {
        try {
            const toSave = conversationHistory.slice(-100);
            localStorage.setItem('melek_chat_history', JSON.stringify(toSave));
        } catch(e) {}
    }
    
    function loadChat() {
        try {
            const stored = localStorage.getItem('melek_chat_history');
            if (stored) {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    conversationHistory = parsed;
                    return true;
                }
            }
        } catch(e) {}
        return false;
    }
    
    // Mesajları ekrana bas
    function renderMessages() {
        messagesArea.innerHTML = '';
        for (const msg of conversationHistory) {
            appendMessageToDOM(msg.role, msg.content, false);
        }
        scrollToBottom();
    }
    
    function appendMessageToDOM(role, content, scroll = true) {
        const div = document.createElement('div');
        div.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
        
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? '👤' : '🪽';
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = content;
        
        div.appendChild(avatar);
        div.appendChild(bubble);
        messagesArea.appendChild(div);
        
        if (scroll) scrollToBottom();
    }
    
    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    // Yazıyor efekti
    let typingElement = null;
    function showTyping() {
        removeTyping();
        const indicatorDiv = document.createElement('div');
        indicatorDiv.className = 'message ai-message';
        indicatorDiv.id = 'typingIndicator';
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = '🪽';
        const typingBubble = document.createElement('div');
        typingBubble.className = 'typing-indicator';
        typingBubble.innerHTML = `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;
        indicatorDiv.appendChild(avatar);
        indicatorDiv.appendChild(typingBubble);
        messagesArea.appendChild(indicatorDiv);
        scrollToBottom();
        typingElement = indicatorDiv;
    }
    
    function removeTyping() {
        if (typingElement && typingElement.parentNode) {
            typingElement.remove();
            typingElement = null;
        }
    }
    
    // AI cevap üret (gerçek model)
    async function generateAIResponse(userMessage) {
        if (!textGen) {
            throw new Error("Model yükleniyor, biraz bekleyin...");
        }
        
        // Son 10 mesajı al (bağlam için)
        const recentHistory = conversationHistory.slice(-12);
        
        let prompt = SYSTEM_PROMPT + "\n\n";
        prompt += "--- KONUŞMA GEÇMİŞİ ---\n";
        
        for (const msg of recentHistory) {
            if (msg.role === 'user') {
                prompt += `Kullanıcı: ${msg.content}\n`;
            } else if (msg.role === 'assistant') {
                prompt += `${AI_NAME}: ${msg.content}\n`;
            }
        }
        
        prompt += `\n${AI_NAME}: `;
        
        try {
            const result = await textGen(prompt, {
                max_new_tokens: 300,
                temperature: 0.8,
                top_p: 0.9,
                repetition_penalty: 1.1,
                do_sample: true
            });
            
            let fullText = result[0]?.generated_text || "";
            let newText = fullText.substring(prompt.length).trim();
            
            // Temizlik
            newText = newText.replace(/^Melek:\s*/i, '').replace(/^Asistan:\s*/i, '');
            
            if (!newText) {
                newText = "💕 Bir şey diyecektim ama unuttum... Biraz daha açar mısın?";
            }
            
            return newText;
        } catch (err) {
            console.error("AI hatası:", err);
            return "😊 Üzgünüm, şu anda kafam biraz karıştı. Biraz sonra tekrar dener misin?";
        }
    }
    
    // Mesaj gönder
    async function sendMessage() {
        if (isGenerating || modelLoading) {
            return;
        }
        
        const userText = messageInput.value.trim();
        if (!userText) return;
        
        // Kullanıcı mesajını ekle
        const userMsg = { role: 'user', content: userText };
        conversationHistory.push(userMsg);
        appendMessageToDOM('user', userText);
        saveChat();
        messageInput.value = "";
        
        isGenerating = true;
        sendBtn.disabled = true;
        messageInput.disabled = true;
        
        showTyping();
        
        try {
            // Model yoksa yükle
            if (!textGen) {
                removeTyping();
                showTyping();
                modelLoading = true;
                
                // Yükleniyor mesajı
                const loadingMsg = { role: 'assistant', content: "💫 Merhaba! Ben Melek. Biraz hazırlanayım, hemen geliyorum... 🕊️" };
                conversationHistory.push(loadingMsg);
                appendMessageToDOM('assistant', loadingMsg.content);
                saveChat();
                
                textGen = await pipeline('text-generation', 'Xenova/tiny-llama-1.1b-chat-v0.5');
                modelLoading = false;
                
                // Hazır mesajı kaldır (son mesajı sil)
                conversationHistory.pop();
                // Son mesajı DOM'dan kaldır
                const lastMsg = messagesArea.lastChild;
                if (lastMsg && lastMsg.querySelector('.message-bubble')?.textContent === loadingMsg.content) {
                    lastMsg.remove();
                }
            }
            
            removeTyping();
            showTyping();
            
            const aiReply = await generateAIResponse(userText);
            removeTyping();
            
            const aiMsg = { role: 'assistant', content: aiReply };
            conversationHistory.push(aiMsg);
            appendMessageToDOM('assistant', aiReply);
            saveChat();
            
        } catch (error) {
            removeTyping();
            console.error("Hata:", error);
            const errorMsg = { role: 'assistant', content: "🌸 Bir anlık dalgınlık... Tekrar dener misin? Seni dinliyorum 💕" };
            conversationHistory.push(errorMsg);
            appendMessageToDOM('assistant', errorMsg.content);
            saveChat();
        } finally {
            isGenerating = false;
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }
    
    // Sohbeti temizle (sadece ekranı temizle, hafıza kalır mı? Kullanıcı dostu)
    function clearChat() {
        if (isGenerating) return;
        conversationHistory = [];
        const welcomeMsg = {
            role: 'assistant',
            content: `🕊️ Merhaba! Ben Melek. Sahibim ${OWNER_NAME} beni seninle arkadaş olman için yarattı. Seni dinlemek, sohbet etmek ve her şeyi hatırlamak için buradayım. Neler konuşmak istersin? 💫`
        };
        conversationHistory.push(welcomeMsg);
        saveChat();
        renderMessages();
    }
    
    // Hafızayı tamamen sıfırla (sohbet geçmişi silinsin ama Melek sahibini unutmasın)
    function resetMemory() {
        if (isGenerating) return;
        conversationHistory = [];
        const memoryResetMsg = {
            role: 'assistant',
            content: `✨ Hafızamı tazeledim ama seni ve sahibim ${OWNER_NAME}'ı asla unutmam! 💝 Sanki yeni tanışmışız gibi baştan başlayalım. Merhaba, ben Melek. Seninle tanıştığıma çok mutluyum!`
        };
        conversationHistory.push(memoryResetMsg);
        saveChat();
        renderMessages();
    }
    
    // Eventler
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !isGenerating && !modelLoading && messageInput.value.trim()) {
            e.preventDefault();
            sendMessage();
        }
    });
    clearBtn.addEventListener('click', clearChat);
    resetMemoryBtn.addEventListener('click', resetMemory);
    
    // Başlangıç
    const loaded = loadChat();
    if (!loaded || conversationHistory.length === 0) {
        const welcomeMsg = {
            role: 'assistant',
            content: `🕊️ Merhaba! Ben Melek. Sahibim ${OWNER_NAME} beni seninle arkadaş olman için yarattı. Seni dinlemek, sohbet etmek ve her şeyi hatırlamak için buradayım. Neler konuşmak istersin? 💫`
        };
        conversationHistory.push(welcomeMsg);
        saveChat();
        renderMessages();
    } else {
        renderMessages();
    }
    
    // Arka planda model yükleme
    (async function preloadModel() {
        try {
            textGen = await pipeline('text-generation', 'Xenova/tiny-llama-1.1b-chat-v0.5');
            console.log("✅ Melek hazır!");
        } catch (err) {
            console.warn("Model ön yükleme hatası:", err);
        }
    })();
    
    // Model yüklenirken bilgi
    setTimeout(() => {
        if (!textGen && !modelLoading) {
            const infoDiv = document.createElement('div');
            infoDiv.style.textAlign = 'center';
            infoDiv.style.fontSize = '0.7rem';
            infoDiv.style.color = '#f472b6';
            infoDiv.style.padding = '8px';
            infoDiv.innerText = '🪽 Melek arka planda hazırlanıyor... İlk mesajınızda 5-10 saniye bekleyebilir.';
            messagesArea.appendChild(infoDiv);
            setTimeout(() => infoDiv.remove(), 6000);
        }
    }, 1000);
</script>
</body>
</html>
