<!DOCTYPE html>
<html lang="az" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mələk ✨ - Süni Zəka</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --chat-bg: #ffffff;
            --text: #1a1a1a;
            --subtext: #65676b;
            --bubble-user: #0084ff;
            --bubble-user-text: #ffffff;
            --bubble-bot: #e4e6eb;
            --bubble-bot-text: #1a1a1a;
            --input-bg: #ffffff;
            --border: #dbdbdb;
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
            --heart: #ff4757;
            --header-bg: #ffffff;
        }
        
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --chat-bg: #1a1a2e;
            --text: #e8e8e8;
            --subtext: #a0a0b0;
            --bubble-user: #0066cc;
            --bubble-user-text: #ffffff;
            --bubble-bot: #252540;
            --bubble-bot-text: #e0e0e0;
            --input-bg: #252540;
            --border: #333350;
            --shadow: 0 2px 16px rgba(0,0,0,0.4);
            --header-bg: #1a1a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
            user-select: none;
        }

        .phone-frame {
            width: 100%;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            position: relative;
        }

        /* Header */
        .header {
            background: var(--header-bg);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            position: relative;
        }

        .avatar::after {
            content: '';
            width: 10px;
            height: 10px;
            background: #2ed573;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid var(--header-bg);
        }

        .header-info h3 {
            font-size: 16px;
            color: var(--text);
            font-weight: 600;
        }

        .header-info p {
            font-size: 11px;
            color: #2ed573;
            font-weight: 500;
        }

        .theme-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--input-bg);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border: 1px solid var(--border);
        }

        .theme-btn:active {
            transform: scale(0.9);
        }

        /* Chat Area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease;
            max-width: 85%;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bot-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }

        .bot-message .msg-bubble {
            background: var(--bubble-bot);
            color: var(--bubble-bot-text);
            border-bottom-left-radius: 4px;
        }

        .user-message .msg-bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: var(--bubble-bot);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            animation: slideIn 0.3s ease;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--subtext);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--chat-bg);
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border-radius: 24px;
            padding: 4px 16px;
            border: 1px solid var(--border);
            gap: 8px;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: 10px 0;
            font-size: 15px;
            color: var(--text);
        }

        .input-wrapper input::placeholder {
            color: var(--subtext);
        }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: #0084ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:active {
            transform: scale(0.9);
            background: #0066cc;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .clear-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 8px;
            color: var(--subtext);
            transition: all 0.2s;
        }

        .clear-btn:active {
            transform: scale(0.9);
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="avatar">✨</div>
                <div class="header-info">
                    <h3>Mələk</h3>
                    <p>🟢 Onlayn</p>
                </div>
            </div>
            <button class="theme-btn" onclick="toggleTheme()" title="Gece/Gündüz">🌙</button>
        </div>
        
        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="msg-bubble">
                    Salam! Mən Mələkəm ✨ Sənə necə kömək edə bilərəm, dostum? 😊
                </div>
            </div>
        </div>
        
        <!-- Input Area -->
        <div class="input-area">
            <button class="clear-btn" onclick="clearChat()" title="Söhbəti sil">🗑️</button>
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Mələk ilə söhbət et..."
                    autocomplete="off"
                >
            </div>
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // ==================== KONFİQURASİYA ====================
        const API_URL = 'https://saskioyunu-2rxd.onrender.com/chat'; // SƏNİN RENDER LİNKİN
        
        // ==================== MESAJLAR ====================
        let messages = JSON.parse(localStorage.getItem('melek_messages') || '[]');
        if (messages.length === 0) {
            messages.push({
                role: 'bot',
                text: 'Salam! Mən Mələkəm ✨ Sənə necə kömək edə bilərəm, dostum? 😊',
                time: new Date().toISOString()
            });
            localStorage.setItem('melek_messages', JSON.stringify(messages));
        }
        
        let userLang = localStorage.getItem('melek_user_lang') || 'az';
        
        // ==================== DOM ====================
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        
        // ==================== BAŞLANGIC ====================
        function init() {
            renderMessages();
            loadTheme();
            messageInput.focus();
            
            // Enter ilə göndər
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }
        
        // ==================== MESAJLARI GÖSTƏR ====================
        function renderMessages() {
            chatMessages.innerHTML = '';
            messages.forEach(msg => {
                addMessageToDOM(msg.role, msg.text, false);
            });
            scrollToBottom();
        }
        
        function addMessageToDOM(role, text, animate = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
            msgDiv.innerHTML = `<div class="msg-bubble">${escapeHTML(text)}</div>`;
            if (!animate) msgDiv.style.animation = 'none';
            chatMessages.appendChild(msgDiv);
        }
        
        // ==================== MESAJ GÖNDƏR ====================
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            
            // İstifadəçi mesajını əlavə et
            addMessage('user', text);
            messageInput.value = '';
            
            // Dil təyin et
            userLang = detectLanguage(text);
            localStorage.setItem('melek_user_lang', userLang);
            
            // Typing indikatoru göstər
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            typingDiv.id = 'typing';
            chatMessages.appendChild(typingDiv);
            scrollToBottom();
            
            try {
                // API-ə sorğu
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        lang: userLang,
                        history: getHistoryForAPI()
                    })
                });
                
                const data = await response.json();
                const botReply = data.reply || 'Hmm, bir anlıq düşündüm... 😅';
                
                // Typing sil
                document.getElementById('typing')?.remove();
                
                // Bot cavabını əlavə et
                addMessage('bot', botReply);
                
            } catch (error) {
                document.getElementById('typing')?.remove();
                addMessage('bot', 'Ay dostum, internet kəsildi sanki 😅 Bir də yazarsan?');
            }
        }
        
        function addMessage(role, text) {
            messages.push({
                role: role,
                text: text,
                time: new Date().toISOString()
            });
            localStorage.setItem('melek_messages', JSON.stringify(messages));
            addMessageToDOM(role, text);
            scrollToBottom();
        }
        
        // ==================== KÖMƏKÇİ ====================
        function getHistoryForAPI() {
            const lastMessages = messages.slice(-10);
            let history = [];
            let userMsg = null;
            
            lastMessages.forEach(msg => {
                if (msg.role === 'user') {
                    userMsg = msg.text;
                } else if (msg.role === 'bot' && userMsg) {
                    history.push({ user: userMsg, bot: msg.text });
                    userMsg = null;
                }
            });
            
            return history;
        }
        
        function detectLanguage(text) {
            const azChars = /[əğıöşüçƏĞIÖŞÜÇ]/;
            const ruChars = /[ыёэъЫЁЭЪ]/;
            const trChars = /[ğşçİĞŞÇ]/;
            
            if (azChars.test(text)) return 'az';
            if (ruChars.test(text)) return 'ru';
            if (trChars.test(text)) return 'tr';
            return 'en';
        }
        
        function clearChat() {
            if (confirm('Söhbəti silməyə əminsən?')) {
                messages = [{
                    role: 'bot',
                    text: 'Salam! Mən Mələkəm ✨ Sənə necə kömək edə bilərəm, dostum? 😊',
                    time: new Date().toISOString()
                }];
                localStorage.setItem('melek_messages', JSON.stringify(messages));
                renderMessages();
            }
        }
        
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('melek_theme', newTheme);
            
            const btn = document.querySelector('.theme-btn');
            btn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }
        
        function loadTheme() {
            const saved = localStorage.getItem('melek_theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            document.querySelector('.theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
        }
        
        function scrollToBottom() {
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 100);
        }
        
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // ==================== BAŞLAT ====================
        init();
    </script>
</body>
</html>
