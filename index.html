<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milyonçu AZ - Kim Milyonçu Olmaq İstər?</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- MongoDB Realm SDK (Serverless) -->
    <script src="https://unpkg.com/realm-web@2.0.0/dist/bundle.iife.js" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a1a2f, #0d2b4b);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* Telegram Tam Ekran */
        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Header - Telegram user info */
        .tg-header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tg-avatar {
            width: 48px;
            height: 48px;
            border-radius: 48px;
            background: linear-gradient(145deg, #ffd966, #ffb347);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.4rem;
            color: #0a1a2f;
            box-shadow: 0 8px 18px rgba(255,200,0,0.3);
        }

        .tg-info {
            flex: 1;
        }

        .tg-name {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .tg-balance {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 6px 14px;
            border-radius: 40px;
            width: fit-content;
            font-weight: 600;
            color: #ffd966;
        }

        /* Lobby Buttons */
        .lobby-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .lobby-btn {
            flex: 1;
            background: linear-gradient(145deg, #2a3f5e, #1a2f4f);
            border: none;
            border-radius: 30px;
            padding: 18px 0;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .lobby-btn i {
            font-size: 1.4rem;
            color: #ffd966;
        }

        .lobby-btn.active {
            background: linear-gradient(145deg, #ffd966, #ffb347);
            color: #0a1a2f;
        }

        .lobby-btn.active i {
            color: #0a1a2f;
        }

        /* Main Game Area */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Question Card */
        .question-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px 20px;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .difficulty-badge {
            display: inline-block;
            background: rgba(255,215,0,0.15);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffd966;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 20px;
            min-height: 100px;
        }

        .prize-info {
            background: linear-gradient(145deg, #1e3a5f, #0f2b50);
            border-radius: 30px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            border: 1px solid #ffd96650;
        }

        .current-prize {
            font-size: 2rem;
            color: #ffd966;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .question-counter {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 1rem;
        }

        /* Options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,215,0,0.2);
            border-radius: 30px;
            padding: 20px 12px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .option-prefix {
            width: 40px;
            height: 40px;
            background: rgba(255,215,0,0.15);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.3rem;
            color: #ffd966;
        }

        .option-btn:hover {
            background: rgba(255,215,0,0.1);
            border-color: #ffd966;
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background: linear-gradient(145deg, #28a745, #218838);
            border-color: #fff;
            animation: pulse 0.5s;
        }

        .option-btn.wrong {
            background: linear-gradient(145deg, #dc3545, #c82333);
            border-color: #fff;
            animation: shake 0.5s;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Leaderboard */
        .leaderboard-section {
            background: rgba(255,255,255,0.03);
            border-radius: 40px;
            padding: 20px;
            margin-top: 20px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffd966;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .leaderboard-item {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.1);
        }

        .rank {
            width: 35px;
            height: 35px;
            background: #ffd96620;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #ffd966;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: linear-gradient(145deg, #ffd966, #ffb347);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0a1a2f;
        }

        .user-info-small {
            flex: 1;
            font-weight: 600;
        }

        .user-score-small {
            font-weight: 800;
            color: #ffd966;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .current-user-rank {
            background: rgba(255,215,0,0.2);
            border-radius: 30px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            border: 2px solid #ffd966;
        }

        .rank-position {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffd966;
        }

        /* Loading */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,215,0,0.1);
            border-top: 4px solid #ffd966;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* Game Over */
        .game-over {
            text-align: center;
            padding: 40px 20px;
        }

        .game-over h2 {
            font-size: 2.5rem;
            color: #ffd966;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .play-again-btn {
            background: linear-gradient(145deg, #ffd966, #ffb347);
            border: none;
            border-radius: 50px;
            padding: 20px 40px;
            font-size: 1.3rem;
            font-weight: 800;
            color: #0a1a2f;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .question-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Telegram Header -->
        <div class="tg-header" id="tgHeader">
            <div class="tg-avatar" id="tgAvatar">U</div>
            <div class="tg-info">
                <div class="tg-name" id="tgName">Yüklənir...</div>
                <div class="tg-balance">
                    <i class="fas fa-coins"></i>
                    <span id="userBalance">0</span> AZN
                </div>
            </div>
        </div>

        <!-- Lobby Buttons -->
        <div class="lobby-buttons">
            <button class="lobby-btn active" id="gameBtn" onclick="showGame()">
                <i class="fas fa-gamepad"></i> Oyun
            </button>
            <button class="lobby-btn" id="leaderboardBtn" onclick="showLeaderboard()">
                <i class="fas fa-trophy"></i> Sıralama
            </button>
        </div>

        <!-- Main Game Area -->
        <div class="game-area" id="gameArea">
            <!-- Loading -->
            <div id="loading" class="loading-spinner">
                <div class="spinner"></div>
            </div>

            <!-- Game Content (hidden initially) -->
            <div id="gameContent" class="hidden">
                <div class="question-card">
                    <span class="difficulty-badge" id="difficultyBadge">Sadə</span>
                    <div class="question-text" id="questionText">Sual yüklənir...</div>
                    <div class="prize-info">
                        <div class="current-prize">
                            <i class="fas fa-coins"></i>
                            <span id="currentPrize">100</span> AZN
                        </div>
                        <div class="question-counter">
                            <span id="currentQuestionNum">1</span>/<span id="totalQuestions">∞</span>
                        </div>
                    </div>
                </div>

                <div class="options-grid" id="optionsContainer">
                    <!-- Options will be injected here -->
                </div>
            </div>

            <!-- Game Over Screen (hidden initially) -->
            <div id="gameOverScreen" class="game-over hidden">
                <h2>Oyun Bitdi!</h2>
                <div class="final-score">
                    <i class="fas fa-coins"></i>
                    <span id="finalPrize">0</span> AZN
                </div>
                <button class="play-again-btn" onclick="restartGame()">
                    <i class="fas fa-redo-alt"></i> Yenidən Başla
                </button>
            </div>
        </div>

        <!-- Leaderboard Section (hidden initially) -->
        <div id="leaderboardSection" class="leaderboard-section hidden">
            <div class="section-title">
                <i class="fas fa-trophy" style="color: #ffd966;"></i> TOP 10
            </div>
            <div class="leaderboard-list" id="leaderboardList">
                <!-- Leaderboard items will be injected here -->
            </div>
            <div class="current-user-rank" id="userRankSection">
                <span>Sizin yeriniz:</span>
                <span class="rank-position" id="userRank">-</span>
            </div>
        </div>
    </div>

    <script>
        // ========== TELEGRAM WEBAPP ==========
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Tam ekran
        
        // Telegram istifadəçi məlumatları
        const user = tg.initDataUnsafe?.user || {
            id: Math.floor(Math.random() * 1000000),
            first_name: 'İstifadəçi',
            last_name: '',
            username: 'user' + Math.floor(Math.random() * 1000)
        };
        
        // ========== MONGODB BAĞLANTI ==========
        const APP_ID = 'application-0-zlqyy'; // Realm App ID (MongoDB Atlas)
        const MONGO_URI = 'mongodb+srv://xaliqmustafayev7313_db_user:R4Cno5z1Enhtr09u@sayt.1oqunne.mongodb.net/domino_game?retryWrites=true&w=majority';
        
        let realmApp;
        let mongoClient;
        
        async function connectMongoDB() {
            try {
                // MongoDB Realm vasitəsilə bağlantı
                realmApp = new Realm.App({ id: APP_ID });
                
                // Anonim login
                const credentials = Realm.Credentials.anonymous();
                const user = await realmApp.logIn(credentials);
                
                // MongoDB service
                mongoClient = user.mongoClient('mongodb-atlas');
                
                console.log('MongoDB bağlantısı uğurlu');
                return true;
            } catch (error) {
                console.error('MongoDB xətası:', error);
                
                // Offline mode - localStorage istifadə et
                return false;
            }
        }

        // ========== SORU ÇƏKMƏ API ==========
        // Open Trivia Database (çoxdilli dəstək)
        async function fetchQuestion(difficulty = 'easy') {
            try {
                // difficulty: easy, medium, hard
                const response = await fetch(`https://opentdb.com/api.php?amount=1&category=9&difficulty=${difficulty}&type=multiple`);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    const q = data.results[0];
                    
                    // Cavabları qarışdır
                    const answers = [...q.incorrect_answers, q.correct_answer];
                    shuffleArray(answers);
                    
                    return {
                        id: Date.now() + Math.random(),
                        question: decodeHTML(q.question),
                        correct_answer: decodeHTML(q.correct_answer),
                        options: answers.map(a => decodeHTML(a)),
                        difficulty: q.difficulty,
                        category: q.category
                    };
                }
                return null;
            } catch (error) {
                console.error('Sual xətası:', error);
                return getFallbackQuestion();
            }
        }

        // Fallback suallar (API işləməsə)
        function getFallbackQuestion() {
            const fallbacks = [
                {
                    question: "Azərbaycanın paytaxtı hansı şəhərdir?",
                    correct_answer: "Bakı",
                    options: ["Bakı", "Gəncə", "Sumqayıt", "Naxçıvan"],
                    difficulty: "easy"
                },
                {
                    question: "2 + 2 * 2 = ?",
                    correct_answer: "6",
                    options: ["4", "6", "8", "2"],
                    difficulty: "medium"
                },
                {
                    question: "Dünyanın ən böyük okeanı hansıdır?",
                    correct_answer: "Sakit okean",
                    options: ["Atlantik", "Hind", "Şimal Buzlu", "Sakit okean"],
                    difficulty: "hard"
                }
            ];
            return fallbacks[Math.floor(Math.random() * fallbacks.length)];
        }

        // HTML decode
        function decodeHTML(html) {
            const txt = document.createElement('textarea');
            txt.innerHTML = html;
            return txt.value;
        }

        // Array qarışdır
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // ========== OYUN STATE ==========
        let gameState = {
            userId: user.id,
            userName: user.first_name + ' ' + (user.last_name || ''),
            balance: 0,
            currentQuestion: null,
            questionHistory: [], // Görülmüş suallar (təkrarlanmamaq üçün)
            difficulty: 'easy',
            questionCount: 0,
            gameActive: false
        };

        // LocalStorage-dan yüklə (offline üçün)
        function loadGameState() {
            try {
                const saved = localStorage.getItem(`game_${user.id}`);
                if (saved) {
                    const data = JSON.parse(saved);
                    gameState.balance = data.balance || 0;
                    gameState.questionHistory = data.questionHistory || [];
                    gameState.difficulty = data.difficulty || 'easy';
                    gameState.questionCount = data.questionCount || 0;
                }
            } catch (e) {}
            
            updateBalanceUI();
        }

        // Yadda saxla
        function saveGameState() {
            try {
                localStorage.setItem(`game_${user.id}`, JSON.stringify({
                    balance: gameState.balance,
                    questionHistory: gameState.questionHistory,
                    difficulty: gameState.difficulty,
                    questionCount: gameState.questionCount
                }));
            } catch (e) {}
            
            // MongoDB-yə də yaz (online olsa)
            saveToMongoDB();
        }

        // MongoDB-yə yaz
        async function saveToMongoDB() {
            // TODO: MongoDB Realm ilə sinxronizasiya
            console.log('MongoDB save:', gameState);
        }

        // ========== OYUN FUNKSİYALARI ==========
        async function startGame() {
            showLoading();
            gameState.gameActive = true;
            gameState.questionCount = 0;
            gameState.difficulty = 'easy';
            
            await loadNextQuestion();
        }

        async function loadNextQuestion() {
            if (!gameState.gameActive) return;
            
            showLoading();
            
            // Zorluq səviyyəsini təyin et (hər 5 sualdan bir artır)
            if (gameState.questionCount >= 5) gameState.difficulty = 'medium';
            if (gameState.questionCount >= 10) gameState.difficulty = 'hard';
            
            let question = null;
            let attempts = 0;
            
            // Təkrarlanmamış sual tap
            while (attempts < 10) {
                question = await fetchQuestion(gameState.difficulty);
                if (question && !gameState.questionHistory.includes(question.id)) {
                    break;
                }
                attempts++;
            }
            
            if (!question) {
                question = getFallbackQuestion();
            }
            
            gameState.currentQuestion = question;
            gameState.questionHistory.push(question.id);
            
            // UI yenilə
            document.getElementById('difficultyBadge').innerText = 
                gameState.difficulty === 'easy' ? 'Sadə' : 
                gameState.difficulty === 'medium' ? 'Orta' : 'Çətin';
            
            document.getElementById('questionText').innerText = question.question;
            document.getElementById('currentPrize').innerText = gameState.balance;
            document.getElementById('currentQuestionNum').innerText = gameState.questionCount + 1;
            
            // Optionları yarat
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D'];
            question.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.onclick = () => checkAnswer(option, question.correct_answer, btn);
                btn.innerHTML = `
                    <span class="option-prefix">${letters[index]}</span>
                    <span>${option}</span>
                `;
                optionsContainer.appendChild(btn);
            });
            
            hideLoading();
        }

        async function checkAnswer(selected, correct, btnElement) {
            if (!gameState.gameActive) return;
            
            const isCorrect = selected === correct;
            
            if (isCorrect) {
                // Düzgün cavab
                gameState.balance += 100;
                gameState.questionCount++;
                
                btnElement.classList.add('correct');
                
                // Yadda saxla
                saveGameState();
                updateBalanceUI();
                
                // Növbəti sual
                setTimeout(() => {
                    if (gameState.gameActive) {
                        loadNextQuestion();
                    }
                }, 1000);
            } else {
                // Səhv cavab
                gameState.balance = Math.max(0, gameState.balance - 100);
                
                btnElement.classList.add('wrong');
                
                // Düzgün cavabı göstər
                const allOptions = document.querySelectorAll('.option-btn');
                allOptions.forEach(btn => {
                    if (btn.innerHTML.includes(correct)) {
                        btn.classList.add('correct');
                    }
                });
                
                // Yadda saxla
                saveGameState();
                updateBalanceUI();
                
                // Oyun bitdi
                setTimeout(() => {
                    endGame();
                }, 2000);
            }
        }

        function endGame() {
            gameState.gameActive = false;
            document.getElementById('gameContent').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalPrize').innerText = gameState.balance;
            
            // Leaderboard yenilə
            updateLeaderboard();
        }

        function restartGame() {
            gameState.balance = 0;
            gameState.questionHistory = [];
            gameState.questionCount = 0;
            gameState.difficulty = 'easy';
            
            saveGameState();
            updateBalanceUI();
            
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameContent').classList.remove('hidden');
            
            startGame();
        }

        // ========== LEADERBOARD ==========
        let leaderboardData = [];

        async function updateLeaderboard() {
            // TODO: MongoDB-dən TOP 10 çək
            // İndilik mock data
            leaderboardData = generateMockLeaderboard();
            
            const leaderboardList = document.getElementById('leaderboardList');
            leaderboardList.innerHTML = '';
            
            leaderboardData.slice(0, 10).forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-item';
                div.innerHTML = `
                    <div class="rank">${index + 1}</div>
                    <div class="user-avatar-small">${item.name.charAt(0)}</div>
                    <div class="user-info-small">${item.name}</div>
                    <div class="user-score-small"><i class="fas fa-coins"></i> ${item.score}</div>
                `;
                leaderboardList.appendChild(div);
            });
            
            // İstifadəçinin sırasını tap
            const userRank = leaderboardData.findIndex(u => u.id === user.id) + 1;
            document.getElementById('userRank').innerText = userRank > 0 ? `${userRank}.` : '100+';
        }

        function generateMockLeaderboard() {
            const mock = [];
            for (let i = 1; i <= 15; i++) {
                mock.push({
                    id: i,
                    name: `İstifadəçi ${i}`,
                    score: Math.floor(Math.random() * 5000)
                });
            }
            // İstifadəçini əlavə et
            mock.push({
                id: user.id,
                name: gameState.userName,
                score: gameState.balance
            });
            
            return mock.sort((a, b) => b.score - a.score);
        }

        // ========== UI FUNKSİYALARI ==========
        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('gameContent').classList.add('hidden');
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('gameContent').classList.remove('hidden');
        }

        function updateBalanceUI() {
            document.getElementById('userBalance').innerText = gameState.balance;
        }

        function showGame() {
            document.getElementById('gameBtn').classList.add('active');
            document.getElementById('leaderboardBtn').classList.remove('active');
            document.getElementById('gameArea').classList.remove('hidden');
            document.getElementById('leaderboardSection').classList.add('hidden');
            
            if (!gameState.gameActive && gameState.balance === 0) {
                startGame();
            }
        }

        function showLeaderboard() {
            document.getElementById('leaderboardBtn').classList.add('active');
            document.getElementById('gameBtn').classList.remove('active');
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('leaderboardSection').classList.remove('hidden');
            
            updateLeaderboard();
        }

        // ========== INIT ==========
        async function init() {
            // Telegram UI
            document.getElementById('tgName').innerText = user.first_name + ' ' + (user.last_name || '');
            document.getElementById('tgAvatar').innerText = user.first_name.charAt(0);
            
            // MongoDB bağlantısı
            await connectMongoDB();
            
            // Oyun state yüklə
            loadGameState();
            
            // Oyunu başlat
            startGame();
            
            // Hər 30 saniyədə leaderboard yenilə
            setInterval(updateLeaderboard, 30000);
        }

        init();
    </script>
</body>
</html>
