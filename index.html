<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Checkers Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --gold: #d4af37; --white: #ffffff; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; }
        .btn { width: 80%; padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-match { background: var(--gold); color: black; }
        .btn-room { background: #333; color: white; }
        .btn-locked { background: #111; color: #555; cursor: not-allowed; border: 1px solid #222; }
        
        #game-area { display: none; padding: 10px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .timer-bar { height: 6px; background: #333; width: 100%; border-radius: 3px; overflow: hidden; margin: 10px 0; }
        .timer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #00ff00, #ff0000); transition: 1s linear; }

        #board { 
            display: grid; grid-template-columns: repeat(8, 1fr); 
            width: 92vw; height: 92vw; background: #333; border: 8px solid #1a1a1a; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .cell { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .dark { background: #2c2c2c; }
        .light { background: #4a4a4a; }
        .hint { width: 30%; height: 30%; background: rgba(212, 175, 55, 0.6); border-radius: 50%; box-shadow: 0 0 10px var(--gold); }

        .piece { 
            width: 85%; height: 85%; border-radius: 50%; cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s; z-index: 5;
            position: absolute;
        }
        .piece.white { background: radial-gradient(circle, #fff, #999); box-shadow: 0 4px #666; }
        .piece.black { background: radial-gradient(circle, #444, #000); box-shadow: 0 4px #111; }
        .piece.king::after { content: '👑'; font-size: 20px; display: flex; justify-content: center; align-items: center; height: 100%; }
        
        #captured-panel { 
            position: fixed; right: 0; top: 100px; width: 45px; 
            background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px 0 0 10px;
        }
        .captured-mini { width: 25px; height: 25px; border-radius: 50%; margin: 5px auto; border: 1px solid #555; }

        .win-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; animation: fadeIn 0.5s;
        }
    </style>
</head>
<body>

    <div id="lobby">
        <img id="pfp" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold);">
        <h2 id="welcome-text">Hoş Geldiniz</h2>
        <button class="btn btn-match" onclick="findMatch()" id="txt-match">Eşleşme Bul</button>
        <button class="btn btn-room" onclick="createRoom()" id="txt-room">Oda Kur</button>
        <button class="btn btn-locked" id="txt-ranked">Dərəcəli (Kilitli 🔒)</button>
        <button class="btn btn-room" onclick="toggleLang()" id="txt-lang">Language: AZ</button>
    </div>

    <div id="game-area">
        <div class="status-bar">
            <span id="opp-name">Rakip Aranıyor...</span>
            <span id="opp-timer">30s</span>
        </div>
        <div class="timer-bar"><div id="t-fill-opp" class="timer-fill"></div></div>

        <div id="board"></div>

        <div class="timer-bar"><div id="t-fill-me" class="timer-fill"></div></div>
        <div class="status-bar">
            <span id="my-name">Siz</span>
            <span id="my-timer">30s</span>
        </div>

        <div id="captured-panel"></div>
    </div>

    <div id="win-overlay" class="win-overlay">
        <h1 id="win-title" style="color: var(--gold); font-size: 40px;">GALİBİYET!</h1>
        <button class="btn btn-match" onclick="location.reload()">Tekrar Oyna</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
