<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Həqiqi Lokal AI Çatbot (APİ-SİZ)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import * as webLLM from "https://esm.run/@mlc-ai/web-llm";
        window.webLLM = webLLM;
    </script>
</head>
<body class="bg-[#0b0f19] text-gray-200 min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-800 bg-[#111827]/80 backdrop-blur px-6 py-4 flex flex-col sm:flex-row justify-between items-center sticky top-0 z-40 gap-4">
        <div class="flex items-center space-x-3">
            <div class="bg-gradient-to-tr from-purple-600 to-indigo-600 p-2.5 rounded-xl text-white shadow-lg shadow-indigo-900/40">
                <i class="fas fa-brain text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-base text-white tracking-wide">Xəzər Neural AI</h1>
                <p id="ai-status" class="text-xs text-amber-400 flex items-center gap-1">
                    <i class="fas fa-circle-notch animate-spin"></i> Sistem aktivləşdirilir...
                </p>
            </div>
        </div>
        
        <div id="progress-container" class="w-full sm:w-64 bg-gray-800 h-2.5 rounded-full overflow-hidden">
            <div id="progress-bar" class="bg-indigo-500 h-full w-0 transition-all duration-300"></div>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 max-w-4xl w-full mx-auto custom-scrollbar">
        <div class="flex justify-start">
            <div class="max-w-[80%] rounded-2xl px-4 py-3 text-sm bg-[#111827] border border-gray-800 text-gray-300 rounded-tl-none shadow-lg">
                Salam! Mən şablonlarla işləməyən, tamamilə canlı düşünən lokal süni zəkam. Cihazınıza neyron model yüklənir, bitdikdən sonra tamamilə azad şəkildə söhbət edə bilərik! 😊
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-800 bg-[#111827]/60 backdrop-blur p-4 sticky bottom-0 z-40">
        <div class="max-w-4xl w-full mx-auto flex items-center space-x-3">
            <input type="text" id="user-msg" disabled placeholder="Modelin yüklənməsini gözləyin..." class="flex-1 bg-[#0b0f19] border border-gray-700 focus:border-indigo-500 text-sm text-white rounded-xl px-4 py-3.5 focus:outline-none transition-all placeholder-gray-500 shadow-inner disabled:opacity-50">
            <button id="send-btn" disabled onclick="handleSend()" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all cursor-pointer shadow-lg disabled:opacity-50">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>
    </footer>

    <script type="module">
        const statusText = document.getElementById('ai-status');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const chatContainer = document.getElementById('chat-container');
        const userMsg = document.getElementById('user-msg');
        const sendBtn = document.getElementById('send-btn');

        let engine;
        // Ən yüngül və sürətli işləyən neyron model (Google Gemma-2b-it)
        const selectedModel = "Gemma-2b-it-q4f16_1-MLC"; 

        // Sistem yaddaşını yoxla və mesajları saxla
        let conversationHistory = JSON.parse(localStorage.getItem('neural_chat_history')) || [
            { role: "system", content: "Sen dostcanlı, səmimi bir süni zəkasın. Sənə gələn mesajlara tamamilə təbii və canlı şəkildə Azərbaycan dilində cavab verirsən. Cavabların qısa, aydın və doğma olsun." }
        ];

        async function initNeuralAI() {
            try {
                // Çat mühərrikini yaradırıq
                engine = await window.webLLM.CreateMLCEngine(selectedModel, {
                    initProgressCallback: (report) => {
                        // Yüklənmə faizini ekrana əks etdiririk
                        const progress = Math.round(report.progress * 100);
                        progressBar.style.width = `${progress}%`;
                        statusText.innerHTML = `<i class="fas fa-download animate-bounce mr-1"></i> Model yüklənir: ${progress}%`;
                        
                        if (progress >= 100) {
                            statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse mr-1"></span> Canlı AI Aktivdir`;
                            progressContainer.style.display = 'none';
                            userMsg.removeAttribute('disabled');
                            userMsg.placeholder = "Dostunuzla real vaxtda söhbət edin...";
                            sendBtn.removeAttribute('disabled');
                        }
                    }
                });

                // Əgər keçmiş mesajlar varsa ekrana düz
                renderStoredMessages();

            } catch (error) {
                statusText.innerHTML = `<span class="text-red-500"><i class="fas fa-exclamation-triangle"></i> WebGPU dəstəklənmir!</span>`;
                userMsg.placeholder = "Brauzeriniz və ya cihazınız daxili AI dəstəkləmir.";
                console.error(error);
            }
        }

        window.handleSend = async function() {
            const text = userMsg.value.trim();
            if (!text) return;

            // İstifadəçi mesajını ekrana bas və tarixçəyə yaz
            appendMessage('user', text);
            conversationHistory.push({ role: "user", content: text });
            userMsg.value = "";

            statusText.innerHTML = `<i class="fas fa-spinner animate-spin mr-1"></i> AI düşünür...`;

            try {
                // Real neyron şəbəkəyə sorğu göndərilir (Şablon yoxdur, canlı analiz edilir)
                const reply = await engine.chat.completions.create({
                    messages: conversationHistory
                });

                const aiResponse = reply.choices[0].message.content;
                
                // AI cavabını tarixçəyə yaz və ekrana çıxart
                conversationHistory.push({ role: "assistant", content: aiResponse });
                appendMessage('assistant', aiResponse);
                
                // Yerli yaddaşda saxla (Mesajlar silinməsin)
                localStorage.setItem('neural_chat_history', JSON.stringify(conversationHistory));

                statusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse mr-1"></span> Canlı AI Aktivdir`;

            } catch (err) {
                statusText.innerHTML = `<span class="text-red-500">Cavab alınarkən xəta baş verdi!</span>`;
                console.error(err);
            }
        };

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;
            
            const innerDiv = document.createElement('div');
            innerDiv.className = `max-w-[80%] rounded-2xl px-4 py-3 text-sm tracking-wide ${
                sender === 'user' 
                ? 'bg-gradient-to-br from-indigo-600 to-purple-600 text-white rounded-tr-none shadow-md' 
                : 'bg-[#111827] border border-gray-800 text-gray-200 rounded-tl-none shadow-lg'
            }`;
            innerDiv.innerText = text;
            
            msgDiv.appendChild(innerDiv);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function renderStoredMessages() {
            // İlk sistem mesajından başqa bütün qeyd edilmiş mesajları ekrana vur
            conversationHistory.forEach((msg, idx) => {
                if (idx > 0) {
                    appendMessage(msg.role === 'user' ? 'user' : 'assistant', msg.content);
                }
            });
        }

        // Giriş sahəsində Enter düyməsini dinləyirik
        userMsg.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });

        // Səhifə yüklənəndə neyron şəbəkə mühərrikini işə sal
        window.onload = initNeuralAI;
    </script>
</body>
</html>
