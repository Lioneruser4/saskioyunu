<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFESYONEL 3D HARİTA · Sokak Görünümü</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: #0a0f1f;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Üst arama paneli */
        .search-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .search-container {
            display: flex;
            gap: 10px;
            width: 100%;
            pointer-events: all;
        }

        .search-input {
            flex: 1;
            padding: 16px 25px;
            background: rgba(20, 30, 50, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 168, 255, 0.5);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #00a8ff;
            background: rgba(30, 40, 60, 0.98);
            box-shadow: 0 0 30px rgba(0,168,255,0.3);
        }

        .search-btn {
            padding: 16px 35px;
            background: linear-gradient(135deg, #00a8ff, #0066ff);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,168,255,0.4);
            white-space: nowrap;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,168,255,0.6);
        }

        /* Otomatik tamamlama dropdown */
        .autocomplete-dropdown {
            background: rgba(20, 30, 50, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #2a4a7a;
            border-radius: 20px;
            margin-top: 5px;
            overflow: hidden;
            pointer-events: all;
            max-height: 300px;
            overflow-y: auto;
        }

        .autocomplete-item {
            padding: 12px 20px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #2a3a60;
        }

        .autocomplete-item:hover {
            background: #00a8ff;
            padding-left: 30px;
        }

        /* Kontrol butonları */
        .controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            background: rgba(20, 30, 50, 0.9);
            backdrop-filter: blur(5px);
            border: 2px solid #00a8ff;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: #00a8ff;
            transform: scale(1.1);
        }

        /* Sokak görünümü paneli */
        .streetview-panel {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
            background: rgba(20, 30, 50, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #00a8ff;
            border-radius: 20px;
            padding: 15px;
            color: white;
            max-width: 300px;
            pointer-events: all;
        }

        .streetview-btn {
            background: linear-gradient(135deg, #00a8ff, #0066ff);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .streetview-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,168,255,0.5);
        }

        /* Bilgi paneli */
        .info-panel {
            position: absolute;
            top: 100px;
            left: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            border-left: 4px solid #00a8ff;
            pointer-events: none;
        }

        /* Yükleniyor animasyonu */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 18px;
            display: none;
            backdrop-filter: blur(5px);
            border: 2px solid #00a8ff;
        }

        /* Leaflet özelleştirme */
        .leaflet-control-attribution {
            display: none;
        }
        
        .leaflet-control-zoom {
            display: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Arama Paneli -->
    <div class="search-panel">
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="🌍 Bir yer ara (Bakü, İstanbul, Moskova...)" autocomplete="off">
            <button class="search-btn" onclick="searchLocation()">🔍 ARA</button>
        </div>
        <div id="autocompleteList" class="autocomplete-dropdown"></div>
    </div>

    <!-- Kontrol Butonları -->
    <div class="controls">
        <button class="control-btn" onclick="zoomIn()">+</button>
        <button class="control-btn" onclick="zoomOut()">-</button>
        <button class="control-btn" onclick="toggle3D()">3D</button>
        <button class="control-btn" onclick="getCurrentLocation()">📍</button>
    </div>

    <!-- Sokak Görünümü Paneli -->
    <div class="streetview-panel" id="streetviewPanel">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 24px;">🚗</span>
            <span style="font-weight: bold;">SOKAK GÖRÜNÜMÜ</span>
        </div>
        <div style="font-size: 12px; opacity: 0.7; margin: 5px 0;">Arabaların çektiği gerçek fotoğraflar</div>
        <button class="streetview-btn" onclick="openStreetView()">🚶 SOKAKTA DOLAŞ</button>
    </div>

    <!-- Bilgi Paneli -->
    <div class="info-panel" id="infoPanel">
        🛰️ Profesyonel 3D Harita · Sokak Görünümü
    </div>

    <!-- Yükleniyor -->
    <div class="loading" id="loading">🔍 Yükleniyor...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script>
        // Değişkenler
        let map;
        let marker;
        let currentLat = 40.4093;
        let currentLng = 49.8671;
        let currentZoom = 18;
        let is3D = false;
        let searchTimeout;

        // Haritayı başlat
        function initMap() {
            map = L.map('map', {
                center: [currentLat, currentLng],
                zoom: currentZoom,
                zoomControl: false,
                attributionControl: false,
                fadeAnimation: true,
                zoomAnimation: true,
                markerZoomAnimation: true
            });

            // 1. Katman: Uydu (yüksek çözünürlük)
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 22,
                attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics',
                maxNativeZoom: 22
            }).addTo(map);

            // 2. Katman: Etiketler (şehir isimleri)
            L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/toner-labels/{z}/{x}/{y}{r}.png', {
                opacity: 0.6
            }).addTo(map);

            // İlk marker
            marker = L.marker([currentLat, currentLng], {
                title: 'Bakü'
            }).addTo(map);
            
            marker.bindPopup('📍 <b>Bakü</b><br>Azerbaycan').openPopup();

            // Harita hareket edince bilgi panelini güncelle
            map.on('moveend', updateInfo);
            map.on('zoomend', updateInfo);
        }

        // Bilgi panelini güncelle
        function updateInfo() {
            const center = map.getCenter();
            const zoom = map.getZoom();
            document.getElementById('infoPanel').innerHTML = 
                `🛰️ ${center.lat.toFixed(4)}° N, ${center.lng.toFixed(4)}° E · Zoom ${zoom}`;
        }

        // Arama fonksiyonu (benzer yerlerle birlikte)
        function searchLocation() {
            const query = document.getElementById('searchInput').value;
            
            if (!query || query.length < 2) return;
            
            showLoading();
            
            // Nominatim arama
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=10&addressdetails=1`;
            
            fetch(url, {
                headers: { 'User-Agent': 'ProfesyonelHarita/1.0' }
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                
                if (data && data.length > 0) {
                    // İlk sonuca git
                    const first = data[0];
                    const lat = parseFloat(first.lat);
                    const lon = parseFloat(first.lon);
                    
                    map.setView([lat, lon], 19);
                    
                    if (marker) map.removeLayer(marker);
                    
                    marker = L.marker([lat, lon], {
                        title: first.display_name.split(',')[0]
                    }).addTo(map);
                    
                    marker.bindPopup(`
                        <div style="color:black; padding:5px; max-width:300px;">
                            <b>📍 ${first.display_name}</b><br>
                            ${lat.toFixed(4)}, ${lon.toFixed(4)}
                        </div>
                    `).openPopup();
                    
                    // Sokak görünümü panelini güncelle
                    document.querySelector('.streetview-panel').style.display = 'block';
                }
            })
            .catch(error => {
                hideLoading();
                console.error(error);
            });
        }

        // Otomatik tamamlama
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value;
            
            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                document.getElementById('autocompleteList').innerHTML = '';
                return;
            }
            
            searchTimeout = setTimeout(() => {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&addressdetails=1`;
                
                fetch(url, {
                    headers: { 'User-Agent': 'ProfesyonelHarita/1.0' }
                })
                .then(response => response.json())
                .then(data => {
                    let html = '';
                    data.forEach(place => {
                        html += `<div class="autocomplete-item" onclick="selectPlace('${place.lat}', '${place.lon}', '${place.display_name.replace(/'/g, "\\'")}')">
                            📍 ${place.display_name}
                        </div>`;
                    });
                    document.getElementById('autocompleteList').innerHTML = html;
                });
            }, 300);
        });

        // Otomatik tamamlamadan seç
        function selectPlace(lat, lon, name) {
            document.getElementById('searchInput').value = name.split(',')[0];
            document.getElementById('autocompleteList').innerHTML = '';
            
            map.setView([parseFloat(lat), parseFloat(lon)], 19);
            
            if (marker) map.removeLayer(marker);
            
            marker = L.marker([parseFloat(lat), parseFloat(lon)], {
                title: name
            }).addTo(map);
            
            marker.bindPopup(`<b>${name}</b>`).openPopup();
        }

        // Sokak görünümünü aç
        function openStreetView() {
            const center = map.getCenter();
            const lat = center.lat;
            const lng = center.lng;
            
            // Google Maps Street View (gerçek araba fotoğrafları)
            const streetViewUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lng}`;
            
            // Yeni pencerede aç
            window.open(streetViewUrl, '_blank');
            
            // Veya iframe ile gösterebiliriz (ama boyut sorunu olur)
        }

        // Zoom kontrol
        function zoomIn() {
            map.setZoom(map.getZoom() + 1);
        }

        function zoomOut() {
            map.setZoom(map.getZoom() - 1);
        }

        // 3D mod (eğim)
        function toggle3D() {
            is3D = !is3D;
            if (is3D) {
                map.setZoom(20);
                map.setView(map.getCenter(), 20, {
                    pitch: 45,
                    bearing: 0
                });
            }
        }

        // Bulunduğun konum
        function getCurrentLocation() {
            if (navigator.geolocation) {
                showLoading();
                navigator.geolocation.getCurrentPosition(position => {
                    hideLoading();
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    map.setView([lat, lng], 19);
                    
                    if (marker) map.removeLayer(marker);
                    
                    marker = L.marker([lat, lng], {
                        title: 'Bulunduğun Konum'
                    }).addTo(map);
                    
                    marker.bindPopup('📍 <b>Bulunduğun Konum</b>').openPopup();
                });
            } else {
                alert('Tarayıcın konum desteği yok!');
            }
        }

        // Yükleniyor göster
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // Enter tuşu ile arama
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchLocation();
            }
        });

        // Haritayı başlat
        window.onload = initMap;

        // Tıklama ile marker ekle
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            
            if (marker) map.removeLayer(marker);
            
            marker = L.marker([lat, lng], {
                title: 'Seçilen Konum'
            }).addTo(map);
            
            marker.bindPopup(`
                <div style="color:black;">
                    <b>📍 Seçilen Konum</b><br>
                    ${lat.toFixed(4)}, ${lng.toFixed(4)}
                </div>
            `).openPopup();
        });
    </script>
</body>
</html>
