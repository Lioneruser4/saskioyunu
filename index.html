<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>UniVapp - Universitet Platforması</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Tesseract.js OCR üçün -->
    <script src='https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js'></script>
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4fa;
            color: #1a2b3e;
        }

        .app {
            max-width: 1500px;
            margin: 0 auto;
            padding: 16px 24px;
        }

        /* Navbar */
        .navbar {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            padding: 16px 32px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,20,50,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #0b2b4a, #1e4b8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .badge {
            background: #1e4b8c;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .uni-badge {
            background: #e9eff8;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e4b8c;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #1e4b8c, #0f2f52);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
        }

        /* Tabs - Professional */
        .tabs-wrapper {
            background: white;
            border-radius: 28px;
            padding: 10px 20px 0 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 2px solid #eef2f6;
        }

        .tab {
            padding: 16px 28px;
            background: transparent;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            color: #5a6f8c;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 30px 30px 0 0;
            transition: all 0.2s;
            position: relative;
        }

        .tab i {
            font-size: 1.2rem;
        }

        .tab.active {
            color: #1e4b8c;
            background: #f0f7ff;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #1e4b8c;
            border-radius: 3px 3px 0 0;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 24px;
            margin-bottom: 30px;
        }

        /* Sidebar - Qovluqlar */
        .folders-panel {
            background: white;
            border-radius: 28px;
            padding: 24px 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            height: fit-content;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            padding: 0 8px;
        }

        .panel-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #334e77;
        }

        .new-folder-btn {
            background: #eef5ff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            color: #1e4b8c;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .folder-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 18px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: 0.2s;
            color: #2c3f5c;
        }

        .folder-item:hover {
            background: #f5f9ff;
        }

        .folder-item.active {
            background: #e4edfb;
            color: #1e4b8c;
            font-weight: 500;
        }

        .folder-item i {
            width: 24px;
            color: #7895b8;
        }

        .folder-count {
            margin-left: auto;
            background: #e9f0f9;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        /* Center Content */
        .content-area {
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .content-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a2b3e;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            background: #1e4b8c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-secondary {
            background: #f0f7ff;
            color: #1e4b8c;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        /* Item Cards */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .item-card {
            background: #f8fbfe;
            border-radius: 20px;
            padding: 20px 16px;
            border: 1px solid #e2eaf2;
            transition: 0.2s;
            cursor: pointer;
        }

        .item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(30,75,140,0.1);
            border-color: #1e4b8c30;
        }

        .item-icon {
            width: 48px;
            height: 48px;
            background: #e1ebfa;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e4b8c;
            font-size: 1.5rem;
            margin-bottom: 16px;
        }

        .item-title {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .item-meta {
            font-size: 0.8rem;
            color: #7189a7;
        }

        /* Right Panel - OCR & Details */
        .right-panel {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .camera-section {
            margin-bottom: 28px;
        }

        .camera-btn {
            width: 100%;
            background: linear-gradient(145deg, #0b2b4a, #1e4b8c);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 16px;
            transition: 0.3s;
        }

        .ocr-result {
            background: #f8fbfe;
            border-radius: 20px;
            padding: 18px;
            margin-top: 16px;
        }

        .ocr-text {
            background: white;
            border-radius: 16px;
            padding: 16px;
            min-height: 120px;
            border: 1px solid #e2eaf2;
            margin: 12px 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #1e2f42;
        }

        .text-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .text-actions button {
            background: #e9f1fa;
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            color: #1e4b8c;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* PDF Upload */
        .pdf-upload-area {
            border: 2px dashed #cbd6e8;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .pdf-upload-area:hover {
            border-color: #1e4b8c;
            background: #f5faff;
        }

        .hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Navbar -->
        <div class="navbar">
            <div class="logo">
                <h1>UniVapp</h1>
                <span class="badge">Universitet Platformu</span>
            </div>
            <div class="user-profile">
                <div class="uni-badge">
                    <i class="fas fa-university" style="margin-right: 8px;"></i>Bakı Dövlət Universiteti
                </div>
                <div class="avatar">A</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs-wrapper">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('ana')"><i class="fas fa-home"></i> Ana səhifə</button>
                <button class="tab" onclick="switchTab('dersler')"><i class="fas fa-book-open"></i> Dərslər</button>
                <button class="tab" onclick="switchTab('pdfs')"><i class="fas fa-file-pdf"></i> PDF Kitabxana</button>
                <button class="tab" onclick="switchTab('notlar')"><i class="fas fa-sticky-note"></i> Qeydlərim</button>
                <button class="tab" onclick="switchTab('kamerali')"><i class="fas fa-camera"></i> Kamera OCR</button>
                <button class="tab" onclick="switchTab('teqvim')"><i class="far fa-calendar"></i> Təqvim</button>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Sol Panel - Qovluqlar -->
            <div class="folders-panel">
                <div class="panel-header">
                    <h3><i class="far fa-folder-open" style="margin-right: 10px;"></i>Qovluqlar</h3>
                    <button class="new-folder-btn" onclick="yeniQovluq()"><i class="fas fa-plus"></i></button>
                </div>
                <div id="folderList">
                    <div class="folder-item active" onclick="selectFolder('butun')">
                        <i class="fas fa-college"></i>
                        <span>Bütün dərslər</span>
                        <span class="folder-count" id="totalCount">12</span>
                    </div>
                </div>
            </div>

            <!-- Orta Panel - Məzmun -->
            <div class="content-area" id="contentArea">
                <div class="content-header">
                    <h2 id="currentFolderTitle">Bütün dərslər</h2>
                    <div class="action-buttons">
                        <button class="btn-secondary" onclick="yeniQeyd()"><i class="fas fa-pen"></i>Yeni qeyd</button>
                        <button class="btn-primary" onclick="pdfYukle()"><i class="fas fa-upload"></i>PDF yüklə</button>
                    </div>
                </div>
                <div class="items-grid" id="itemsGrid">
                    <!-- Dinamik doldurulacaq -->
                </div>
            </div>

            <!-- Sağ Panel - Kamera/OCR -->
            <div class="right-panel">
                <div class="camera-section">
                    <h3 style="margin-bottom: 16px;"><i class="fas fa-camera-retro"></i> Kamera ilə çək</h3>
                    <button class="camera-btn" onclick="kameraAc()">
                        <i class="fas fa-camera"></i> Lövhəni çək, yazını çıxart
                    </button>
                    <video id="cameraStream" class="hidden" style="width:100%; border-radius:20px; margin-bottom:15px;" autoplay></video>
                    <canvas id="cameraCanvas" class="hidden"></canvas>
                    
                    <div id="ocrResultArea" class="ocr-result hidden">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span><i class="fas fa-font"></i> Çıxarılan mətn:</span>
                            <button onclick="qovlugaElaveEt()" style="background:none; border:none; color:#1e4b8c; cursor:pointer;"><i class="fas fa-folder-plus"></i></button>
                        </div>
                        <div id="ocrText" class="ocr-text" contenteditable="true">
                            Mətn burada görünəcək...
                        </div>
                        <div class="text-actions">
                            <button onclick="ocrYaddaSaxla()"><i class="fas fa-save"></i> Yadda saxla</button>
                            <button onclick="ocrDuzenle()"><i class="fas fa-edit"></i> Düzəliş</button>
                            <button onclick="ocrSil()"><i class="fas fa-trash"></i> Sil</button>
                        </div>
                    </div>
                </div>

                <!-- PDF Preview -->
                <div id="pdfPreview" class="hidden">
                    <h4><i class="fas fa-file-pdf"></i> PDF önizləmə</h4>
                    <canvas id="pdfCanvas" style="width:100%; margin-top:15px; border-radius:16px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Universitet dataları
        let folders = [
            { id: 1, name: 'Riyaziyyat', count: 4 },
            { id: 2, name: 'Fizika', count: 3 },
            { id: 3, name: 'Proqramlaşdırma', count: 5 },
            { id: 4, name: 'Xətti cəbr', count: 2 }
        ];

        let items = [
            { id: 1, title: 'Riyaziyyat mühazirə 1', type: 'pdf', folder: 'Riyaziyyat', date: '2024-01-15' },
            { id: 2, title: 'Fizika laboratoriya', type: 'note', folder: 'Fizika', date: '2024-01-20' },
            { id: 3, title: 'JavaScript dərsləri', type: 'pdf', folder: 'Proqramlaşdırma', date: '2024-02-01' },
            { id: 4, title: 'Matris hesablamaları', type: 'note', folder: 'Xətti cəbr', date: '2024-02-05' },
            { id: 5, title: 'Kvant fizikası', type: 'pdf', folder: 'Fizika', date: '2024-02-10' }
        ];

        // LocalStorage-dan yüklə
        function loadFromStorage() {
            const saved = localStorage.getItem('univapp_data');
            if(saved) {
                try {
                    const data = JSON.parse(saved);
                    if(data.folders) folders = data.folders;
                    if(data.items) items = data.items;
                } catch(e) {}
            }
            updateUI();
        }

        // LocalStorage-a yadda saxla
        function saveToStorage() {
            localStorage.setItem('univapp_data', JSON.stringify({ folders, items }));
            updateUI();
        }

        // Qovluq seçmə
        let selectedFolder = 'Bütün dərslər';
        
        function selectFolder(folderName) {
            selectedFolder = folderName;
            document.getElementById('currentFolderTitle').innerText = folderName;
            updateItemsGrid();
            
            // Active class
            document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function updateItemsGrid() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';
            
            let filteredItems = items;
            if(selectedFolder !== 'Bütün dərslər') {
                filteredItems = items.filter(item => item.folder === selectedFolder);
            }
            
            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.onclick = () => itemClick(item.id);
                card.innerHTML = `
                    <div class="item-icon"><i class="fas ${item.type === 'pdf' ? 'fa-file-pdf' : 'fa-sticky-note'}"></i></div>
                    <div class="item-title">${item.title}</div>
                    <div class="item-meta">${item.date}</div>
                `;
                grid.appendChild(card);
            });
        }

        function yeniQovluq() {
            const name = prompt('Qovluq adını daxil edin:');
            if(name) {
                folders.push({ id: Date.now(), name, count: 0 });
                saveToStorage();
                renderFolders();
            }
        }

        function renderFolders() {
            const list = document.getElementById('folderList');
            list.innerHTML = `
                <div class="folder-item ${selectedFolder === 'Bütün dərslər' ? 'active' : ''}" onclick="selectFolder('Bütün dərslər')">
                    <i class="fas fa-college"></i><span>Bütün dərslər</span>
                    <span class="folder-count">${items.length}</span>
                </div>
            `;
            
            folders.forEach(f => {
                const itemCount = items.filter(i => i.folder === f.name).length;
                list.innerHTML += `
                    <div class="folder-item ${selectedFolder === f.name ? 'active' : ''}" onclick="selectFolder('${f.name}')">
                        <i class="fas fa-folder"></i><span>${f.name}</span>
                        <span class="folder-count">${itemCount}</span>
                    </div>
                `;
            });
            
            document.getElementById('totalCount').innerText = items.length;
        }

        // Kamera funksiyaları
        let stream = null;
        
        function kameraAc() {
            const video = document.getElementById('cameraStream');
            video.classList.remove('hidden');
            
            if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                    .then(function(videoStream) {
                        stream = videoStream;
                        video.srcObject = videoStream;
                        video.play();
                        
                        // 2 saniyə sonra çək
                        setTimeout(() => {
                            cekVeOCR();
                        }, 2000);
                    })
                    .catch(function(err) {
                        alert('Kamera açılmadı: ' + err);
                    });
            }
        }

        function cekVeOCR() {
            const video = document.getElementById('cameraStream');
            const canvas = document.getElementById('cameraCanvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Kameranı dayandır
            if(stream) {
                stream.getTracks().forEach(track => track.stop());
                video.classList.add('hidden');
            }
            
            // OCR işlə
            canvas.toBlob(function(blob) {
                Tesseract.recognize(blob, 'aze+eng', {
                    logger: m => console.log(m)
                }).then(({ data: { text } }) => {
                    document.getElementById('ocrText').innerText = text;
                    document.getElementById('ocrResultArea').classList.remove('hidden');
                });
            });
        }

        function ocrYaddaSaxla() {
            const text = document.getElementById('ocrText').innerText;
            if(text && text !== 'Mətn burada görünəcək...') {
                const folder = selectedFolder !== 'Bütün dərslər' ? selectedFolder : 'Ümumi';
                items.push({
                    id: Date.now(),
                    title: 'OCR qeyd - ' + new Date().toLocaleDateString('az'),
                    type: 'note',
                    folder: folder,
                    date: new Date().toISOString().split('T')[0],
                    content: text
                });
                saveToStorage();
                alert('Yadda saxlanıldı!');
            }
        }

        function qovlugaElaveEt() {
            const text = document.getElementById('ocrText').innerText;
            if(text && text !== 'Mətn burada görünəcək...') {
                const folderName = prompt('Hansı qovluğa əlavə edilsin?');
                if(folderName) {
                    items.push({
                        id: Date.now(),
                        title: 'OCR - ' + new Date().toLocaleTimeString('az'),
                        type: 'note',
                        folder: folderName,
                        date: new Date().toISOString().split('T')[0],
                        content: text
                    });
                    saveToStorage();
                }
            }
        }

        // PDF yükləmə
        function pdfYukle() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.pdf';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = function(loadEvent) {
                        const folder = selectedFolder !== 'Bütün dərslər' ? selectedFolder : 'PDF-lər';
                        items.push({
                            id: Date.now(),
                            title: file.name,
                            type: 'pdf',
                            folder: folder,
                            date: new Date().toISOString().split('T')[0],
                            data: loadEvent.target.result
                        });
                        saveToStorage();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function yeniQeyd() {
            const text = prompt('Qeydinizi yazın:');
            if(text) {
                const folder = selectedFolder !== 'Bütün dərslər' ? selectedFolder : 'Ümumi';
                items.push({
                    id: Date.now(),
                    title: 'Qeyd - ' + new Date().toLocaleDateString('az'),
                    type: 'note',
                    folder: folder,
                    date: new Date().toISOString().split('T')[0],
                    content: text
                });
                saveToStorage();
            }
        }

        function itemClick(id) {
            const item = items.find(i => i.id === id);
            if(item) {
                if(item.type === 'note') {
                    document.getElementById('ocrText').innerText = item.content || 'Məzmun yoxdur';
                    document.getElementById('ocrResultArea').classList.remove('hidden');
                } else if(item.type === 'pdf' && item.data) {
                    // PDF göstər
                }
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if(tabName === 'kamerali') {
                document.querySelector('.camera-btn').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function ocrDuzenle() {
            document.getElementById('ocrText').focus();
        }

        function ocrSil() {
            document.getElementById('ocrText').innerText = 'Mətn silindi...';
        }

        // Initial render
        loadFromStorage();
        renderFolders();
        updateItemsGrid();
    </script>
</body>
</html>
