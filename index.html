<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sana Özel Kalp</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0a0a0a;
            color: #ff4d6d;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .heart {
            position: relative;
            width: 100px;
            height: 90px;
            animation: beat 1s infinite;
        }

        .heart:before, .heart:after {
            content: "";
            position: absolute;
            left: 50px;
            top: 0;
            width: 50px;
            height: 80px;
            background: #ff4d6d;
            border-radius: 50px 50px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .name-display {
            position: absolute;
            z-index: 10;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="name-display" id="userName">İSİM BURAYA</div>
    <div class="heart"></div>

    <script>
        // URL'den isim almak için (Örn: site.github.io?isim=Ayşe)
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('isim');
        if (name) {
            document.getElementById('userName').innerText = name;
        }
    </script>
</body>
</html>
