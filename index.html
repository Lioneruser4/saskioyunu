<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Lite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
        }

        /* Ana uygulama */
        #app {
            height: 100vh;
            display: flex;
        }

        /* Grup listesi */
        .groups {
            width: 240px;
            background: #1e1f22;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2b2d31;
        }

        .groups h3 {
            padding: 16px;
            color: #949ba4;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .group-item {
            padding: 10px 16px;
            margin: 2px 8px;
            border-radius: 6px;
            color: #949ba4;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .group-item:hover {
            background: #2b2d31;
            color: #dbdee1;
        }

        .group-item.active {
            background: #404249;
            color: white;
        }

        .group-icon {
            width: 32px;
            height: 32px;
            background: #2b2d31;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .lock-icon {
            margin-left: auto;
            font-size: 12px;
        }

        /* Ana içerik */
        .main {
            flex: 1;
            background: #313338;
            display: flex;
            flex-direction: column;
        }

        /* Sohbet başlığı */
        .chat-header {
            padding: 12px 20px;
            background: #313338;
            border-bottom: 1px solid #2b2d31;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-info h2 {
            color: white;
            font-size: 18px;
            margin-bottom: 2px;
        }

        .user-count {
            color: #949ba4;
            font-size: 13px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #2b2d31;
            border-radius: 20px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .connected { background: #23a55a; }
        .connecting { background: #f0b232; }
        .disconnected { background: #da373c; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Mesajlar */
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            background: #2b2d31;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #dbdee1;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 4px;
        }

        .message-author {
            color: white;
            font-weight: 500;
            font-size: 15px;
        }

        .message-time {
            color: #949ba4;
            font-size: 11px;
        }

        .message-text {
            color: #dbdee1;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }

        /* Mesaj girişi */
        .message-input {
            padding: 20px;
            background: #313338;
            border-top: 1px solid #2b2d31;
        }

        .input-wrapper {
            background: #2b2d31;
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            gap: 10px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #5e6778;
        }

        .send-btn {
            background: #5865f2;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn:hover {
            background: #4752c4;
        }

        /* Ses kontrolleri */
        .voice-controls {
            padding: 16px 20px;
            background: #2b2d31;
            display: flex;
            gap: 8px;
            border-top: 1px solid #1e1f22;
        }

        .control-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1e1f22;
            border: none;
            color: #dbdee1;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: #404249;
        }

        .control-btn.active {
            background: #da373c;
            color: white;
        }

        .join-btn {
            background: #23a55a;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-left: auto;
        }

        .join-btn:hover {
            background: #1e8b4c;
        }

        .leave-btn {
            background: #da373c;
        }

        /* Şifre modalı */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #2b2d31;
            padding: 24px;
            border-radius: 8px;
            width: 300px;
        }

        .modal-content h3 {
            color: white;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            background: #1e1f22;
            border: 1px solid #404249;
            border-radius: 4px;
            color: white;
            margin-bottom: 16px;
            outline: none;
        }

        .modal-content input:focus {
            border-color: #5865f2;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-btn.primary {
            background: #5865f2;
            color: white;
        }

        .modal-btn.secondary {
            background: #404249;
            color: #dbdee1;
        }

        .modal-btn:hover {
            opacity: 0.9;
        }

        /* Mobil uyum */
        @media (max-width: 768px) {
            .groups {
                position: fixed;
                left: -240px;
                height: 100%;
                transition: 0.3s;
                z-index: 100;
            }

            .groups.show {
                left: 0;
            }
        }

        /* Tema butonu */
        .theme-btn {
            background: none;
            border: none;
            color: #949ba4;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            transition: 0.2s;
        }

        .theme-btn:hover {
            color: white;
        }

        /* Bağlı kullanıcılar */
        .users-list {
            display: flex;
            gap: 4px;
            margin-left: 10px;
        }

        .user-badge {
            width: 28px;
            height: 28px;
            background: #2b2d31;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #dbdee1;
            border: 2px solid #313338;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simple-peer.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
