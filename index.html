<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVLERİN KILIÇ SAVAŞI · 3 Can · Çift Kılıç Korur</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1e3a4a, #0f2835);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 12px;
        }
        .arena {
            background: #2b4b5e;
            border-radius: 60px;
            padding: 24px;
            box-shadow: 0 40px 50px -15px black, inset 0 -5px 15px #77c4ff;
            border: 5px solid #ffb347;
        }
        .canvas-wrap {
            width: min(900px, 92vw);
            aspect-ratio: 4 / 3;
            background: #124f6e;
            border-radius: 40px;
            padding: 12px;
            box-shadow: inset 0 0 0 6px #b5e2ff, inset 0 0 40px #3184b0;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #3f8db3, #13536b);
            border-radius: 30px;
            border: 5px solid #ffcd7e;
            cursor: crosshair;
        }
        .dashboard {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .emoji-palette {
            background: #153d51;
            border-radius: 70px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 3px solid #fcb13b;
            box-shadow: inset 0 3px 15px #3e9ec9;
        }
        .emoji-palette span {
            color: white;
            font-weight: 800;
            background: #1f6d91;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.3rem;
            text-shadow: 2px 2px 0 #094154;
        }
        .emoji-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
            justify-content: flex-end;
        }
        .emoji-btn {
            font-size: 2.5rem;
            background: #1f7093;
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            box-shadow: 0 7px 0 #073342, 0 8px 15px black;
            transition: 0.06s;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .emoji-btn.selected {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #073342, 0 8px 15px black;
            background: #ffaa2b;
            border: 4px solid #fff6d1;
        }
        .action-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .pro-btn {
            background: #ffdead;
            border: none;
            border-radius: 60px;
            padding: 18px 40px;
            font-weight: 800;
            font-size: 1.5rem;
            color: #02212b;
            box-shadow: 0 9px 0 #8b5d28, 0 12px 25px black;
            flex: 1;
            min-width: 180px;
            border: 3px solid #ffd58c;
            cursor: pointer;
            transition: 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .pro-btn:active {
            transform: translateY(8px);
            box-shadow: 0 3px 0 #8b5d28, 0 12px 25px black;
        }
        .stats-panel {
            background: #1a4a60;
            padding: 18px 30px;
            border-radius: 70px;
            border: 4px solid #ffb951;
            color: #fff3cf;
            font-weight: bold;
            font-size: 1.7rem;
            text-shadow: 3px 3px 0 #09303f;
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .sword-icon-big {
            font-size: 3rem;
            filter: drop-shadow(0 0 15px #ffb347);
            animation: glow 1s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #ffaa33); }
            to { filter: drop-shadow(0 0 25px #ffd966); }
        }
        .footer {
            text-align: center;
            margin-top: 18px;
            color: #cce9ff;
            font-weight: 600;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
<div class="arena">
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="900" height="675"></canvas>
    </div>

    <div class="dashboard">
        <div class="emoji-palette">
            <span>⚔️ TOPUN</span>
            <div class="emoji-grid">
                <button class="emoji-btn selected" data-emoji="🇹🇷">🇹🇷</button>
                <button class="emoji-btn" data-emoji="🇯🇵">🇯🇵</button>
                <button class="emoji-btn" data-emoji="🇩🇪">🇩🇪</button>
                <button class="emoji-btn" data-emoji="🇧🇷">🇧🇷</button>
                <button class="emoji-btn" data-emoji="🇺🇸">🇺🇸</button>
                <button class="emoji-btn" data-emoji="🇬🇧">🇬🇧</button>
                <button class="emoji-btn" data-emoji="🇫🇷">🇫🇷</button>
                <button class="emoji-btn" data-emoji="🇮🇹">🇮🇹</button>
                <button class="emoji-btn" data-emoji="🇪🇸">🇪🇸</button>
                <button class="emoji-btn" data-emoji="🇷🇺">🇷🇺</button>
                <button class="emoji-btn" data-emoji="🇨🇳">🇨🇳</button>
                <button class="emoji-btn" data-emoji="🇮🇳">🇮🇳</button>
                <button class="emoji-btn" data-emoji="🇦🇷">🇦🇷</button>
                <button class="emoji-btn" data-emoji="🇲🇽">🇲🇽</button>
                <button class="emoji-btn" data-emoji="🇰🇷">🇰🇷</button>
            </div>
        </div>

        <div class="action-bar">
            <button class="pro-btn" id="addBallBtn">➕ DEV EKLE</button>
            <button class="pro-btn" id="resetBtn">⟲ YENİ SAVAŞ</button>
        </div>

        <div class="stats-panel">
            <div class="stat-item">⚔️ <span id="swordTimer">0.0s</span></div>
            <div class="stat-item">👑 <span id="ballCount">0</span></div>
            <div class="stat-item">🛡️ <span id="swordCount">0</span></div>
        </div>
    </div>
    <div class="footer">
        ⚔️ KILIÇ 4 SANİYEDE BİR YER DEĞİŞTİRİR · ÇİFT KILIÇ KORUR · ÇARPIŞINDA HIZ PATLAMASI
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 900, CH = 675; // 4:3 oran
        canvas.width = CW; canvas.height = CH;

        // --- Oyun değişkenleri ---
        let balls = [];
        let gameActive = true;
        let selectedEmoji = '🇹🇷';
        
        // Kılıç (BÜYÜK)
        let sword = {
            x: CW/2,
            y: CH/2,
            radius: 40,  // BÜYÜK kılıç
            lastMoveTime: 0,
            moveInterval: 4000, // 4 saniye
        };

        // Rastgele kılıç hareketi
        function moveSwordRandomly() {
            if (!gameActive) return;
            const margin = 70;
            sword.x = margin + Math.random() * (CW - 2 * margin);
            sword.y = margin + Math.random() * (CH - 2 * margin);
            sword.lastMoveTime = performance.now();
            
            // Kılıç hareket edince kimsenin kılıcı kalmasın (yeni kılıç için)
            balls.forEach(b => b.hasSword = false);
        }

        // İlk kılıç
        moveSwordRandomly();

        // --- BÜYÜK TOP sınıfı (radius 28) ---
        class Ball {
            constructor(x, y, emoji) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 12; // ÇOK HIZLI
                this.vy = (Math.random() - 0.5) * 12; // ÇOK HIZLI
                this.radius = 28;  // BÜYÜK TOP
                this.emoji = emoji;
                this.hasSword = false;
                this.health = 3;
                this.speedMultiplier = 1.0;
                this.speedBoostTime = 0;
                this.trail = []; // İz efekti için
            }

            update(deltaTime) {
                // Hız çarpanı zamanla azalsın
                if (this.speedBoostTime > 0) {
                    this.speedBoostTime -= deltaTime;
                    if (this.speedBoostTime <= 0) {
                        this.speedBoostTime = 0;
                        this.speedMultiplier = 1.0;
                    }
                }

                // İz efekti için eski konumları kaydet
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 5) this.trail.shift();

                const currentSpeed = this.speedMultiplier;
                this.x += this.vx * currentSpeed;
                this.y += this.vy * currentSpeed;

                // Duvarlara çarp (seksin - hız artsın)
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = -this.vx * 1.1; // HIZ ARTSIN
                    this.speedMultiplier = Math.min(2.5, this.speedMultiplier * 1.15);
                }
                if (this.x + this.radius > CW) {
                    this.x = CW - this.radius;
                    this.vx = -this.vx * 1.1;
                    this.speedMultiplier = Math.min(2.5, this.speedMultiplier * 1.15);
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy = -this.vy * 1.1;
                    this.speedMultiplier = Math.min(2.5, this.speedMultiplier * 1.15);
                }
                if (this.y + this.radius > CH) {
                    this.y = CH - this.radius;
                    this.vy = -this.vy * 1.1;
                    this.speedMultiplier = Math.min(2.5, this.speedMultiplier * 1.15);
                }

                // Hız sınırı (çok hızlı olabilirler)
                const maxSpeed = 20;
                this.vx = Math.min(maxSpeed, Math.max(-maxSpeed, this.vx));
                this.vy = Math.min(maxSpeed, Math.max(-maxSpeed, this.vy));
            }
        }

        // --- Top ekleme (seçili emoji ile) ---
        function addBall() {
            const x = 100 + Math.random() * (CW - 200);
            const y = 100 + Math.random() * (CH - 200);
            balls.push(new Ball(x, y, selectedEmoji));
            updateUI();
        }

        // --- Emoji seçim ---
        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedEmoji = btn.getAttribute('data-emoji');
            });
        });

        // --- Top-top çarpışması (GELİŞMİŞ) ---
        function handleBallCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    
                    const dx = b2.x - b1.x;
                    const dy = b2.y - b1.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const minDist = b1.radius + b2.radius;
                    
                    if (dist < minDist) {
                        // Çarpışma anı - hız patlaması (İKİSİ DE HIZLANSIN)
                        const boostAmount = 1.6;
                        b1.speedMultiplier = Math.min(2.8, b1.speedMultiplier * boostAmount);
                        b2.speedMultiplier = Math.min(2.8, b2.speedMultiplier * boostAmount);
                        b1.speedBoostTime = 2500; // 2.5 saniye
                        b2.speedBoostTime = 2500;
                        
                        // KILIÇ KONTROLÜ - İKİSİNDE DE VARSA CAN GİTMESİN
                        if (b1.hasSword && b2.hasSword) {
                            // İKİSİNDE DE KILIÇ VAR - CAN GİTMEZ
                            // Sadece hız patlaması olsun
                        } else if (b1.hasSword && !b2.hasSword) {
                            b2.health--;
                            if (b2.health > 0) {
                                b2.speedMultiplier = Math.min(3.0, b2.speedMultiplier * 2.2); // Kaçış hızı
                                b2.speedBoostTime = 2000;
                            }
                        } else if (b2.hasSword && !b1.hasSword) {
                            b1.health--;
                            if (b1.health > 0) {
                                b1.speedMultiplier = Math.min(3.0, b1.speedMultiplier * 2.2);
                                b1.speedBoostTime = 2000;
                            }
                        }
                        
                        // Fizik (esnek çarpışma)
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle);
                        const cos = Math.cos(angle);
                        
                        const v1 = {
                            x: b1.vx * cos + b1.vy * sin,
                            y: b1.vy * cos - b1.vx * sin
                        };
                        const v2 = {
                            x: b2.vx * cos + b2.vy * sin,
                            y: b2.vy * cos - b2.vx * sin
                        };
                        
                        const v1f = v2.x;
                        const v2f = v1.x;
                        
                        b1.vx = v1f * cos - v1.y * sin;
                        b1.vy = v1f * sin + v1.y * cos;
                        b2.vx = v2f * cos - v2.y * sin;
                        b2.vy = v2f * sin + v2.y * cos;
                        
                        // Ayır
                        const overlap = (minDist - dist) / 2;
                        const moveX = (dx / dist) * overlap;
                        const moveY = (dy / dist) * overlap;
                        b1.x -= moveX;
                        b1.y -= moveY;
                        b2.x += moveX;
                        b2.y += moveY;
                    }
                }
            }
        }

        // --- Kılıç etkileşimi (BÜYÜK kılıç) ---
        function handleSwordPickup() {
            for (let ball of balls) {
                const dx = ball.x - sword.x;
                const dy = ball.y - sword.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < ball.radius + sword.radius) {
                    if (!ball.hasSword) {
                        // Kılıcı al
                        ball.hasSword = true;
                        ball.speedMultiplier = Math.min(2.8, ball.speedMultiplier * 1.8);
                        ball.speedBoostTime = 2500;
                        
                        // Kılıç hemen yeni konuma ışınlanmasın, 0.1 saniye sonra
                        setTimeout(() => {
                            if (gameActive) {
                                moveSwordRandomly();
                            }
                        }, 100);
                    }
                }
            }
        }

        // --- Ölü topları temizle ---
        function removeDeadBalls() {
            balls = balls.filter(ball => ball.health > 0);
            updateUI();
        }

        // --- UI güncelleme ---
        function updateUI() {
            document.getElementById('ballCount').textContent = balls.length;
            const swordBalls = balls.filter(b => b.hasSword).length;
            document.getElementById('swordCount').textContent = swordBalls;
        }

        // --- Animasyon döngüsü ---
        let lastUpdate = performance.now();
        
        function animate() {
            const now = performance.now();
            const deltaTime = Math.min(100, now - lastUpdate); // max 100ms
            lastUpdate = now;

            if (gameActive) {
                // Kılıç zamanlayıcı
                if (now - sword.lastMoveTime > sword.moveInterval) {
                    moveSwordRandomly();
                }

                // Topları güncelle (deltaTime ile)
                balls.forEach(ball => ball.update(deltaTime));
                
                // Çarpışmalar
                handleBallCollisions();
                handleSwordPickup();
                removeDeadBalls();

                // Kılıç zamanlayıcı UI
                const timeToMove = Math.max(0, (sword.moveInterval - (now - sword.lastMoveTime)) / 1000);
                document.getElementById('swordTimer').textContent = timeToMove.toFixed(1) + 's';
            }

            draw();
            requestAnimationFrame(animate);
        }

        // --- Çizim (ANİMASYONLU) ---
        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // Arkaplan ızgarası (animasyonlu)
            ctx.strokeStyle = '#7fc4e2';
            ctx.lineWidth = 2;
            const time = Date.now() / 1000;
            
            for (let i = 0; i < CW; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i + Math.sin(time + i/50) * 5, 0);
                ctx.lineTo(i + Math.cos(time + i/50) * 5, CH);
                ctx.strokeStyle = '#ffffff15';
                ctx.stroke();
            }
            
            for (let i = 0; i < CH; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i + Math.cos(time + i/50) * 5);
                ctx.lineTo(CW, i + Math.sin(time + i/50) * 5);
                ctx.stroke();
            }

            // Kılıç (BÜYÜK ve IŞILTILI)
            ctx.save();
            ctx.shadowColor = '#ffaa33';
            ctx.shadowBlur = 50;
            ctx.font = '85px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Twemoji Mozilla", "Android Emoji", Emoji, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Işıltı efekti
            for (let i = 0; i < 3; i++) {
                ctx.shadowBlur = 40 + i * 20;
                ctx.fillStyle = `rgba(255, 220, 100, ${0.3 - i*0.1})`;
                ctx.fillText('⚔️', sword.x + Math.sin(time*5 + i)*3, sword.y + Math.cos(time*5 + i)*3);
            }
            
            ctx.shadowBlur = 60;
            ctx.fillStyle = '#ffe45c';
            ctx.fillText('⚔️', sword.x, sword.y);
            ctx.restore();

            // Toplar (BÜYÜK ve ANİMASYONLU)
            for (let ball of balls) {
                ctx.save();
                
                // İz efekti
                for (let i = 0; i < ball.trail.length; i++) {
                    const t = ball.trail[i];
                    const alpha = i / ball.trail.length * 0.3;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, ball.radius * 0.7, 0, 2 * Math.PI);
                    ctx.fillStyle = `rgba(255, 255, 200, ${alpha})`;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = ball.hasSword ? '#ffaa33' : '#88ccff';
                    ctx.fill();
                }
                
                // Ana gölge
                ctx.shadowColor = '#00000080';
                ctx.shadowBlur = 25;
                ctx.shadowOffsetY = 5;
                
                // Top gövdesi (ışıltılı)
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius + 3, 0, 2 * Math.PI);
                
                // Kılıçlı toplar altın rengi
                if (ball.hasSword) {
                    const gradient = ctx.createRadialGradient(ball.x-10, ball.y-10, 5, ball.x, ball.y, ball.radius+10);
                    gradient.addColorStop(0, '#ffdb7c');
                    gradient.addColorStop(1, '#f0a500');
                    ctx.fillStyle = gradient;
                } else {
                    const gradient = ctx.createRadialGradient(ball.x-10, ball.y-10, 5, ball.x, ball.y, ball.radius+10);
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(1, '#aaddff');
                    ctx.fillStyle = gradient;
                }
                ctx.fill();
                
                // Sağlık çemberleri (BÜYÜK)
                for (let i = 0; i < ball.health; i++) {
                    ctx.beginPath();
                    ctx.arc(ball.x - 20 + i * 20, ball.y - 35, 9, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ff4d4d';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ff0000';
                    ctx.fill();
                    
                    // Can içi parıltı
                    ctx.beginPath();
                    ctx.arc(ball.x - 20 + i * 20, ball.y - 35, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ffffe0';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                }
                
                // Top emojisi (BÜYÜK)
                ctx.font = `45px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Twemoji Mozilla", "Android Emoji", Emoji, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 30;
                ctx.shadowColor = ball.hasSword ? '#ffaa00' : '#004466';
                ctx.fillStyle = 'white';
                ctx.fillText(ball.emoji, ball.x, ball.y - 5);
                
                // Kılıç işareti (kılıçlı toplara)
                if (ball.hasSword) {
                    ctx.font = '40px sans-serif';
                    ctx.fillStyle = '#ffd966';
                    ctx.shadowBlur = 40;
                    ctx.shadowColor = '#ffb347';
                    ctx.fillText('⚔️', ball.x + 25, ball.y - 30);
                }
                
                // Hız göstergesi (çizgi)
                if (ball.speedMultiplier > 1.2) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 5;
                    ctx.shadowBlur = 20;
                    ctx.arc(ball.x, ball.y, ball.radius + 12, 0, 2 * Math.PI);
                    ctx.stroke();
                }
                
                ctx.restore();
            }

            // Merkez yazısı
            ctx.fillStyle = '#ffffff60';
            ctx.font = '30px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('⚔️ KILIÇ ARENASI ⚔️', CW/2, 50);
        }

        // --- Event listeners ---
        document.getElementById('addBallBtn').addEventListener('click', () => {
            addBall();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            balls = [];
            gameActive = true;
            moveSwordRandomly();
            updateUI();
            // 3 top ekle
            for (let i = 0; i < 3; i++) {
                addBall();
            }
        });

        // Başlangıç topları
        for (let i = 0; i < 4; i++) {
            addBall();
        }

        // Animasyonu başlat
        lastUpdate = performance.now();
        animate();
    })();
</script>
</body>
</html>
