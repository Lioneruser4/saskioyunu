<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SASKİ OYUNU - Among Us Tarzı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* Ana oyun container */
        #game-container {
            flex: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #1a1a1a, #0d0d0d);
            position: relative;
            overflow: hidden;
        }

        /* Canvas (oyun alanı) */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
            background: #1e1e1e;
        }

        /* Yan sidebar */
        #sidebar {
            flex: 1;
            background: linear-gradient(135deg, #2b2b4f, #1a1a2f);
            border-left: 3px solid #ff6b6b;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 250px;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
            color: white;
            overflow-y: auto;
        }

        /* Başlık */
        .game-title {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .game-title h1 {
            color: #ff6b6b;
            font-size: 28px;
            text-shadow: 0 0 10px #ff6b6b;
            letter-spacing: 2px;
        }
        
        .game-title p {
            color: #aaa;
            font-size: 12px;
        }

        /* Joystick bölümü */
        #joystick-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #ff6b6b30;
        }

        #joystick-section h2 {
            color: #ff6b6b;
            font-size: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Joystick base */
        #joystick-base {
            width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 20px #ff6b6b50;
            cursor: pointer;
            touch-action: none;
        }

        /* Joystick thumb */
        #joystick-thumb {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #ff3d3d);
            border-radius: 50%;
            position: absolute;
            top: 55px;
            left: 55px;
            cursor: pointer;
            touch-action: none;
            box-shadow: 0 0 15px #ff6b6b;
            transition: box-shadow 0.2s;
        }

        #joystick-thumb:active {
            box-shadow: 0 0 30px #ff6b6b;
        }

        /* Joystick durum */
        #joystick-status {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 20px;
        }

        /* Oyuncu listesi */
        #players-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #ff6b6b30;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #players-section h2 {
            color: #ff6b6b;
            font-size: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #player-count {
            background: #ff6b6b;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* Oyuncu listesi container */
        #players-container {
            flex: 1;
            overflow-y: auto;
            max-height: 300px;
            padding-right: 5px;
        }

        #players-container::-webkit-scrollbar {
            width: 5px;
        }

        #players-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        #players-container::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 10px;
        }

        /* Oyuncu listesi */
        #players {
            list-style: none;
        }

        #players li {
            padding: 12px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-left: 3px solid;
            transition: transform 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #players li:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .player-color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .player-name {
            flex: 1;
        }

        .player-badge {
            background: #ff6b6b;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
        }

        /* Kontrol bilgileri */
        #info-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 15px;
            font-size: 12px;
            color: #aaa;
            border: 1px dashed #ff6b6b50;
        }

        #info-section p {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-icon {
            color: #ff6b6b;
            font-size: 14px;
        }

        /* Bağlantı durumu */
        #connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #4caf50;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
            border: 1px solid #4caf50;
            pointer-events: none;
        }

        /* Mobil uyumluluk */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            
            #sidebar {
                flex-direction: row;
                min-width: 100%;
                height: 200px;
                padding: 10px;
            }
            
            #joystick-section {
                flex: 1;
            }
            
            #players-section {
                flex: 1;
            }
            
            #joystick-base {
                width: 140px;
                height: 140px;
            }
            
            #joystick-thumb {
                width: 50px;
                height: 50px;
                top: 45px;
                left: 45px;
            }
        }

        /* Yükleniyor animasyonu */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #ff6b6b30;
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Yükleniyor ekranı -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>
    
    <!-- Bağlantı durumu -->
    <div id="connection-status">🔴 Bağlanıyor...</div>
    
    <!-- Ana oyun container -->
    <div id="game-container">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
    </div>
    
    <!-- Yan sidebar -->
    <div id="sidebar">
        <div class="game-title">
            <h1>SASKİ OYUNU</h1>
            <p>Among Us Tarzı Çok Oyunculu</p>
        </div>
        
        <!-- Joystick bölümü -->
        <div id="joystick-section">
            <h2>
                <span>🎮</span> 
                Joystick
                <span>🎮</span>
            </h2>
            <div id="joystick-base">
                <div id="joystick-thumb"></div>
            </div>
            <div id="joystick-status">
                Joystick'i sürükleyin
            </div>
        </div>
        
        <!-- Oyuncu listesi bölümü -->
        <div id="players-section">
            <h2>
                <span>👥</span>
                Oyuncular
                <span id="player-count">0</span>
            </h2>
            <div id="players-container">
                <ul id="players">
                    <!-- Oyuncular buraya eklenecek -->
                </ul>
            </div>
        </div>
        
        <!-- Bilgi bölümü -->
        <div id="info-section">
            <p>
                <span class="info-icon">🖱️</span>
                Mouse ile joystick'i sürükleyin
            </p>
            <p>
                <span class="info-icon">📱</span>
                Mobilde parmağınızla sürükleyin
            </p>
            <p>
                <span class="info-icon">🎯</span>
                Diğer oyuncuları görün
            </p>
            <p>
                <span class="info-icon">🔄</span>
                Gerçek zamanlı hareket
            </p>
        </div>
    </div>
    
    <!-- Socket.io kütüphanesi -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Oyun JavaScript'i -->
    <script src="game.js"></script>
</body>
</html>
