<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Saski FPS">
    <meta name="application-name" content="Saski FPS">
    <meta name="theme-color" content="#667eea">
    <meta name="msapplication-TileColor" content="#667eea">
    <meta name="msapplication-config" content="browserconfig.xml">
    <title>Saski FPS Oyunu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        #mainMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 1000;
            min-width: 350px;
        }

        #mainMenu h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .menu-button {
            display: block;
            width: 100%;
            padding: 15px 30px;
            margin: 15px 0;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .menu-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        #userInfo {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            display: none;
        }

        #gameCanvas {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        #healthBar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #fff;
            border-radius: 15px;
            overflow: hidden;
            z-index: 101;
        }

        #healthFill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.3s ease;
            width: 100%;
        }

        #ammo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 101;
        }

        #teamIndicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 101;
        }

        .team-blue {
            background: linear-gradient(45deg, #2196F3, #1976D2);
        }

        .team-red {
            background: linear-gradient(45deg, #f44336, #d32f2f);
        }

        #roomsList {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            max-width: 500px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }

        .room-item {
            background: linear-gradient(45deg, #f5f5f5, #e0e0e0);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .room-info {
            text-align: left;
        }

        .room-name {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }

        .room-players {
            color: #666;
            font-size: 14px;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25px;
            height: 25px;
            pointer-events: none;
            z-index: 102;
            display: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.5);
        }

        #crosshair::before {
            width: 2px;
            height: 25px;
            left: 50%;
            transform: translateX(-50%);
        }

        #crosshair::after {
            width: 25px;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
        }

        .controls-info {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            font-size: 12px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 100;
            display: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 12px;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            #mainMenu {
                padding: 20px;
                min-width: 90%;
                max-width: 350px;
            }

            #mainMenu h1 {
                font-size: 1.8em;
                margin-bottom: 20px;
            }

            .menu-button {
                padding: 12px 20px;
                font-size: 16px;
                margin: 10px 0;
            }

            #healthBar {
                width: 120px;
                height: 18px;
                bottom: 15px;
                left: 15px;
            }

            #ammo {
                font-size: 18px;
                bottom: 15px;
                right: 15px;
            }

            #teamIndicator {
                font-size: 14px;
                padding: 6px 12px;
                top: 15px;
            }

            .controls-info {
                font-size: 11px;
                padding: 6px 10px;
                bottom: 50px;
            }
        }

        @media (max-width: 480px) {
            #mainMenu {
                padding: 15px;
                min-width: 95%;
            }

            #mainMenu h1 {
                font-size: 1.5em;
            }

            .menu-button {
                padding: 10px 16px;
                font-size: 14px;
            }

            #healthBar {
                width: 100px;
                height: 15px;
            }

            #ammo {
                font-size: 16px;
            }

            #teamIndicator {
                font-size: 12px;
            }
        }

        /* Mobile Touch Controls */
        #mobileControls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 103;
            display: none;
        }

        .touch-joystick {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: auto;
            touch-action: none;
        }

        .touch-joystick::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #leftJoystick {
            bottom: 80px;
            left: 20px;
        }

        #rightJoystick {
            bottom: 80px;
            right: 20px;
        }

        .touch-button {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .touch-button:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        #fireButton {
            bottom: 160px;
            right: 80px;
        }

        #jumpButton {
            bottom: 160px;
            left: 80px;
        }

        #reloadButton {
            bottom: 230px;
            right: 80px;
            font-size: 12px;
            width: 50px;
            height: 50px;
        }

        /* Landscape orientation optimizations */
        @media screen and (orientation: landscape) {
            #mainMenu {
                top: 45%;
            }

            .touch-joystick {
                width: 100px;
                height: 100px;
            }

            #leftJoystick {
                bottom: 20px;
                left: 20px;
            }

            #rightJoystick {
                bottom: 20px;
                right: 20px;
            }

            .touch-button {
                width: 50px;
                height: 50px;
                font-size: 16px;
            }

            #fireButton {
                bottom: 80px;
                right: 130px;
            }

            #jumpButton {
                bottom: 80px;
                left: 130px;
            }

            #reloadButton {
                bottom: 140px;
                right: 130px;
                width: 40px;
                height: 40px;
                font-size: 10px;
            }
        }

        /* Prevent zoom on input focus */
        input, textarea, select {
            font-size: 16px;
        }

        /* Fullscreen styles */
        :fullscreen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        :-webkit-full-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        :-moz-full-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        :-ms-fullscreen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <div id="mainMenu">
        <h1>🎮 Saski FPS</h1>
        <button class="menu-button" onclick="findGame()">🔍 Oyun Bul</button>
        <button class="menu-button" onclick="showRooms()">🏠 Odalar</button>
        <button class="menu-button" onclick="createRoom()">➕ Oda Oluştur</button>
    </div>

    <div id="userInfo">
        <div id="userName"></div>
        <div id="userId"></div>
    </div>

    <div id="roomsList">
        <h2>Mevcut Odalar</h2>
        <div id="roomsContainer"></div>
        <button class="menu-button" onclick="backToMenu()" style="margin-top: 20px;">⬅️ Geri</button>
    </div>

    <div id="loading">Bağlanıyor...</div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div id="teamIndicator"></div>
        <div id="healthBar">
            <div id="healthFill"></div>
        </div>
        <div id="ammo">🔫 30 / ∞</div>
        <div id="crosshair"></div>
    </div>

    <div class="controls-info">
        WASD: Hareket | Boşluk: Zıpla | Sol Tık: Ateş Et | F: Odak Değiştir
    </div>

    <div id="mobileControls">
        <div class="touch-joystick" id="leftJoystick"></div>
        <div class="touch-joystick" id="rightJoystick"></div>
        <div class="touch-button" id="fireButton">🔫</div>
        <div class="touch-button" id="jumpButton">⬆️</div>
        <div class="touch-button" id="reloadButton">🔄</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
