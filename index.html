<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 Ball Pool Pro | Profesyonel Bilardo</title>
    
    <!-- Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-primary: #0B1A2F;
            --bg-secondary: #152A3A;
            --bg-card: #1E3A4A;
            --accent: #2E8B57;
            --accent-glow: #3CB371;
            --text: #FFFFFF;
            --text-secondary: #A0B8CC;
            --border: #2C4A5A;
            --success: #27AE60;
            --warning: #F39C12;
            --danger: #E74C3C;
        }

        body {
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Yükleme Ekranı */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .loading-content {
            text-align: center;
        }

        .loading-logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 60px;
            color: white;
            box-shadow: 0 20px 40px rgba(46, 139, 87, 0.3);
            animation: float 3s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .loading-bar {
            width: 300px;
            height: 8px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px auto;
        }

        .loading-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent-glow));
            transition: width 0.3s;
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 16px;
            margin-top: 20px;
        }

        /* Ana Oyun Container */
        .game-container {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            background: var(--bg-secondary);
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.5s, transform 0.5s;
        }

        .game-container.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* Sol Panel - Oyun Alanı */
        .game-area {
            flex: 2;
            background: linear-gradient(135deg, #1E3A4A, #152A3A);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Üst Skor Bar */
        .score-bar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-score {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            position: relative;
        }

        .player-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            object-fit: cover;
        }

        .telegram-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: #0088cc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 2px solid var(--bg-secondary);
        }

        .player-info h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .potted-count {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .potted-count span {
            color: var(--accent);
            font-weight: 700;
            font-size: 18px;
            margin-left: 5px;
        }

        .vs-divider {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .turn-indicator {
            background: var(--accent);
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Bilardo Masası */
        .table-wrapper {
            flex: 1;
            background: #0D5C2E;
            border-radius: 100px 100px 50px 50px;
            padding: 25px;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.6);
            border: 15px solid #8B5A2B;
            margin-bottom: 20px;
            position: relative;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            background: #0D5C2E;
            border-radius: 80px 80px 40px 40px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
            touch-action: none;
            cursor: none;
        }

        /* Vuruş Gücü Çubuğu */
        .power-meter-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 25px;
            border: 1px solid var(--accent);
            display: none;
        }

        .power-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .power-bar-bg {
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
        }

        .power-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #27AE60, #F39C12, #E74C3C);
            transition: width 0.05s;
        }

        /* Sağ Panel - Kontroller */
        .control-panel {
            flex: 0.8;
            background: var(--bg-primary);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-left: 2px solid var(--accent);
        }

        /* Profil Kartı */
        .profile-card {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            position: relative;
        }

        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            border-radius: 30px;
            object-fit: cover;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .rating-badge {
            background: var(--accent);
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-block;
            font-weight: 700;
            margin-top: 10px;
        }

        /* Oyun Modları */
        .mode-selector {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 20px;
        }

        .mode-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mode-btn {
            background: var(--bg-secondary);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 15px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .mode-btn i {
            width: 30px;
            font-size: 20px;
        }

        .mode-btn:hover {
            background: var(--bg-primary);
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .mode-btn.active {
            background: var(--accent);
            border-color: var(--accent-glow);
        }

        /* Zorluk Seviyesi */
        .difficulty-selector {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 20px;
        }

        .difficulty-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .difficulty-btn {
            background: var(--bg-secondary);
            border: none;
            border-radius: 15px;
            padding: 15px 5px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .difficulty-btn.selected {
            background: var(--accent);
            transform: scale(1.05);
        }

        .difficulty-btn.easy { border-bottom: 4px solid #27AE60; }
        .difficulty-btn.medium { border-bottom: 4px solid #F39C12; }
        .difficulty-btn.hard { border-bottom: 4px solid #E74C3C; }

        /* Oyun Kontrolleri */
        .game-controls {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 20px;
        }

        .angle-indicator {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }

        .angle-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
        }

        .control-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .control-btn {
            background: var(--bg-secondary);
            border: none;
            border-radius: 20px;
            padding: 15px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .control-btn.primary {
            background: var(--accent);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Top Listesi */
        .balls-list {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 20px;
            flex: 1;
        }

        .balls-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .ball-item {
            aspect-ratio: 1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            position: relative;
            background: #f1c40f;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .ball-item.potted {
            opacity: 0.3;
            filter: grayscale(1);
        }

        .ball-item::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), transparent 70%);
        }

        /* Mesajlar */
        .message-center {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: var(--bg-card);
            border-left: 5px solid var(--accent);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 10px;
            animation: slideIn 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .game-container {
                flex-direction: column;
                height: auto;
                border-radius: 30px;
            }
            
            .power-meter-container {
                width: 300px;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Yükleme Ekranı -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <i class="fas fa-billiard"></i>
            </div>
            <div class="loading-bar">
                <div class="loading-progress" id="loadingProgress"></div>
            </div>
            <div class="loading-text" id="loadingText">Oyun yükleniyor...</div>
        </div>
    </div>

    <!-- Ana Oyun Container -->
    <div class="game-container" id="gameContainer">
        <!-- Sol Oyun Alanı -->
        <div class="game-area">
            <!-- Skor Bar -->
            <div class="score-bar">
                <div class="player-score">
                    <div class="player-avatar" id="player1Avatar">
                        <span id="player1AvatarText">S</span>
                        <img id="player1AvatarImg" style="display: none;">
                        <div class="telegram-badge" id="player1Badge" style="display: none;">
                            <i class="fab fa-telegram"></i>
                        </div>
                    </div>
                    <div class="player-info">
                        <h4 id="player1Name">Sen</h4>
                        <div class="potted-count">
                            <i class="fas fa-circle"></i> <span id="player1Potted">0</span>
                        </div>
                    </div>
                </div>
                <div class="vs-divider">VS</div>
                <div class="player-score">
                    <div class="player-avatar" id="player2Avatar">
                        <span id="player2AvatarText">B</span>
                    </div>
                    <div class="player-info">
                        <h4 id="player2Name">Bot Kolay</h4>
                        <div class="potted-count">
                            <i class="fas fa-circle"></i> <span id="player2Potted">0</span>
                        </div>
                    </div>
                </div>
                <div class="turn-indicator" id="turnIndicator">SENİN SIRAN</div>
            </div>

            <!-- Bilardo Masası -->
            <div class="table-wrapper">
                <canvas id="gameCanvas"></canvas>
                
                <!-- Vuruş Gücü Çubuğu -->
                <div class="power-meter-container" id="powerMeter">
                    <div class="power-label">
                        <span>Vuruş Gücü</span>
                        <span id="powerPercent">0%</span>
                    </div>
                    <div class="power-bar-bg">
                        <div class="power-bar-fill" id="powerBarFill" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sağ Kontrol Paneli -->
        <div class="control-panel">
            <!-- Profil Kartı -->
            <div class="profile-card">
                <div class="profile-avatar-large" id="profileAvatar">
                    <span id="profileAvatarText">G</span>
                    <img id="profileAvatarImg" style="display: none;">
                </div>
                <div class="profile-name" id="profileName">Misafir Oyuncu</div>
                <div class="rating-badge" id="profileRating">
                    <i class="fas fa-star"></i> 1200
                </div>
            </div>

            <!-- Oyun Modları -->
            <div class="mode-selector">
                <div class="mode-title">OYUN MODU</div>
                <div class="mode-buttons">
                    <button class="mode-btn active" onclick="setGameMode('bot')">
                        <i class="fas fa-robot"></i> Bot ile Oyna
                    </button>
                    <button class="mode-btn" onclick="setGameMode('private')">
                        <i class="fas fa-lock"></i> Özel Oda
                    </button>
                    <button class="mode-btn" onclick="setGameMode('online')">
                        <i class="fas fa-globe"></i> Online
                    </button>
                </div>
            </div>

            <!-- Zorluk Seviyesi (Bot Modu) -->
            <div class="difficulty-selector" id="difficultySelector">
                <div class="mode-title">ZORLUK SEVİYESİ</div>
                <div class="difficulty-buttons">
                    <button class="difficulty-btn easy" onclick="setDifficulty('easy')">
                        🐣 Kolay
                    </button>
                    <button class="difficulty-btn medium selected" onclick="setDifficulty('medium')">
                        ⚡ Orta
                    </button>
                    <button class="difficulty-btn hard" onclick="setDifficulty('hard')">
                        👑 Zor
                    </button>
                </div>
            </div>

            <!-- Oda Kodu (Özel Oda Modu) -->
            <div class="difficulty-selector" id="roomSelector" style="display: none;">
                <div class="mode-title">ODA KODU</div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" class="room-input" id="roomCode" maxlength="4" placeholder="0000" style="flex:1; background: var(--bg-secondary); border: none; border-radius: 15px; padding: 15px; color: white; text-align: center; font-size: 24px; letter-spacing: 5px;">
                    <button class="control-btn primary" onclick="joinRoom()" style="padding: 15px;">
                        <i class="fas fa-sign-in-alt"></i>
                    </button>
                </div>
                <button class="control-btn" onclick="createRoom()" style="margin-top: 10px; width: 100%;">
                    <i class="fas fa-plus"></i> Oda Oluştur
                </button>
            </div>

            <!-- Oyun Kontrolleri -->
            <div class="game-controls">
                <div class="angle-indicator">
                    <div class="angle-value" id="angleDisplay">0°</div>
                    <div style="font-size: 12px; color: var(--text-secondary);">Vuruş Açısı</div>
                </div>
                <div class="control-buttons">
                    <button class="control-btn" onclick="resetWhiteBall()" id="resetBtn">
                        <i class="fas fa-undo-alt"></i> Sıfırla
                    </button>
                    <button class="control-btn primary" onclick="takeShot()" id="shotBtn" disabled>
                        <i class="fas fa-bullseye"></i> VUR
                    </button>
                </div>
            </div>

            <!-- Top Listesi -->
            <div class="balls-list">
                <div class="mode-title">TOPLAR</div>
                <div class="balls-grid" id="ballsGrid">
                    <!-- JavaScript ile doldurulacak -->
                </div>
            </div>
        </div>
    </div>

    <!-- Mesaj Merkezi -->
    <div class="message-center" id="messageCenter"></div>

    <script>
        // ==================== TELEGRAM ENTEGRASYONU ====================
        const tg = window.Telegram?.WebApp;
        const playerData = {
            id: null,
            username: 'Misafir Oyuncu',
            photo: null,
            platform: 'web',
            rating: 1200
        };

        // Telegram kontrolü
        if (tg) {
            tg.ready();
            tg.expand();
            
            const user = tg.initDataUnsafe?.user;
            if (user) {
                playerData.username = user.first_name + (user.last_name ? ' ' + user.last_name : '');
                playerData.photo = user.photo_url;
                playerData.platform = 'telegram';
                playerData.id = user.id;
                
                document.getElementById('player1Badge').style.display = 'flex';
                document.getElementById('profileName').textContent = playerData.username;
                
                if (playerData.photo) {
                    document.getElementById('player1AvatarImg').src = playerData.photo;
                    document.getElementById('player1AvatarImg').style.display = 'block';
                    document.getElementById('player1AvatarText').style.display = 'none';
                    
                    document.getElementById('profileAvatarImg').src = playerData.photo;
                    document.getElementById('profileAvatarImg').style.display = 'block';
                    document.getElementById('profileAvatarText').style.display = 'none';
                }
            }
        }

        // ==================== YÜKLEME EKRANI ====================
        let loadingProgress = 0;
        const loadingInterval = setInterval(() => {
            loadingProgress += Math.random() * 30;
            if (loadingProgress >= 100) {
                loadingProgress = 100;
                clearInterval(loadingInterval);
                
                setTimeout(() => {
                    document.getElementById('loadingScreen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loadingScreen').style.display = 'none';
                        document.getElementById('gameContainer').classList.add('visible');
                    }, 500);
                }, 500);
            }
            
            document.getElementById('loadingProgress').style.width = loadingProgress + '%';
            
            if (loadingProgress < 30) {
                document.getElementById('loadingText').textContent = 'Bilardo masası hazırlanıyor...';
            } else if (loadingProgress < 60) {
                document.getElementById('loadingText').textContent = 'Toplar diziliyor...';
            } else if (loadingProgress < 90) {
                document.getElementById('loadingText').textContent = 'Bot yapay zeka yükleniyor...';
            } else {
                document.getElementById('loadingText').textContent = 'Oyuna hazır!';
            }
        }, 100);

        // ==================== OYUN DEĞİŞKENLERİ ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Oyun durumu
        let gameMode = 'bot';
        let botDifficulty = 'medium';
        let currentPlayer = 'player';
        let gameState = 'aiming'; // aiming, shooting, moving, gameOver
        let gameOver = false;
        
        // Fizik değişkenleri
        let balls = [];
        let whiteBall = null;
        let playerPotted = [];
        let opponentPotted = [];
        
        // Vuruş değişkenleri
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragEnd = { x: 0, y: 0 };
        let shotPower = 0;
        let shotAngle = 0;
        let isAiming = true;
        
        // Masa boyutları
        let tableWidth, tableHeight;
        const pocketRadius = 30;
        const ballRadius = 15;
        const friction = 0.98;
        const minSpeed = 0.5;

        // ==================== OYUNU BAŞLAT ====================
        function initGame() {
            resizeCanvas();
            createBalls();
            updateBallsGrid();
            draw();
            requestAnimationFrame(gameLoop);
            
            // Canvas olayları
            canvas.addEventListener('mousedown', startDrag);
            canvas.addEventListener('mousemove', onDrag);
            canvas.addEventListener('mouseup', endDrag);
            canvas.addEventListener('touchstart', startDrag);
            canvas.addEventListener('touchmove', onDrag);
            canvas.addEventListener('touchend', endDrag);
            
            showMessage('Bot ile oyuna başla!', 'info');
        }

        // Canvas boyutlandır
        function resizeCanvas() {
            const container = document.querySelector('.table-wrapper');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            tableWidth = canvas.width;
            tableHeight = canvas.height;
        }

        // Topları oluştur
        function createBalls() {
            balls = [];
            
            // Beyaz top
            whiteBall = {
                id: 0,
                x: tableWidth * 0.25,
                y: tableHeight / 2,
                vx: 0,
                vy: 0,
                radius: ballRadius,
                color: '#FFFFFF',
                number: 0,
                type: 'white',
                potted: false
            };
            balls.push(whiteBall);

            // Düz toplar (1-7)
            const solidColors = ['#F1C40F', '#3498DB', '#E74C3C', '#9B59B6', '#E67E22', '#2ECC71', '#8B4513'];
            for (let i = 0; i < 7; i++) {
                balls.push({
                    id: i + 1,
                    x: tableWidth * 0.7 + Math.cos(i * 0.8) * ballRadius * 3,
                    y: tableHeight * 0.4 + Math.sin(i * 0.8) * ballRadius * 2,
                    vx: 0,
                    vy: 0,
                    radius: ballRadius,
                    color: solidColors[i],
                    number: i + 1,
                    type: 'solid',
                    potted: false
                });
            }

            // Çizgili toplar (9-15)
            const stripedColors = ['#F1C40F', '#3498DB', '#E74C3C', '#9B59B6', '#E67E22', '#2ECC71', '#8B4513'];
            for (let i = 0; i < 7; i++) {
                balls.push({
                    id: i + 9,
                    x: tableWidth * 0.7 + Math.cos(i * 0.8 + 0.4) * ballRadius * 4,
                    y: tableHeight * 0.6 + Math.sin(i * 0.8 + 0.4) * ballRadius * 2,
                    vx: 0,
                    vy: 0,
                    radius: ballRadius,
                    color: stripedColors[i],
                    number: i + 9,
                    type: 'striped',
                    potted: false,
                    striped: true
                });
            }

            // 8 top
            balls.push({
                id: 8,
                x: tableWidth * 0.7,
                y: tableHeight * 0.5,
                vx: 0,
                vy: 0,
                radius: ballRadius,
                color: '#000000',
                number: 8,
                type: 'black',
                potted: false
            });
        }

        // ==================== OYUN DÖNGÜSÜ ====================
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (gameOver) return;

            let anyMoving = false;
            
            // Top hareketleri
            balls.forEach(ball => {
                if (ball.potted) return;
                
                if (Math.abs(ball.vx) > minSpeed || Math.abs(ball.vy) > minSpeed) {
                    anyMoving = true;
                    
                    // Sürtünme
                    ball.vx *= friction;
                    ball.vy *= friction;
                    
                    // Pozisyon güncelle
                    ball.x += ball.vx;
                    ball.y += ball.vy;
                    
                    // Kenar çarpışmaları
                    if (ball.x - ball.radius < 0) {
                        ball.x = ball.radius;
                        ball.vx *= -0.8;
                    }
                    if (ball.x + ball.radius > tableWidth) {
                        ball.x = tableWidth - ball.radius;
                        ball.vx *= -0.8;
                    }
                    if (ball.y - ball.radius < 0) {
                        ball.y = ball.radius;
                        ball.vy *= -0.8;
                    }
                    if (ball.y + ball.radius > tableHeight) {
                        ball.y = tableHeight - ball.radius;
                        ball.vy *= -0.8;
                    }
                }
            });

            // Top çarpışmaları
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    if (balls[i].potted || balls[j].potted) continue;
                    
                    const dx = balls[j].x - balls[i].x;
                    const dy = balls[j].y - balls[i].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < ballRadius * 2) {
                        // Çarpışma açısı
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle);
                        const cos = Math.cos(angle);
                        
                        // Hız vektörlerini döndür
                        const vx1 = balls[i].vx * cos + balls[i].vy * sin;
                        const vy1 = balls[i].vy * cos - balls[i].vx * sin;
                        const vx2 = balls[j].vx * cos + balls[j].vy * sin;
                        const vy2 = balls[j].vy * cos - balls[j].vx * sin;
                        
                        // Çarpışma sonrası hızlar
                        const vx1Final = vx2;
                        const vx2Final = vx1;
                        
                        // Geri döndür
                        balls[i].vx = vx1Final * cos - vy1 * sin;
                        balls[i].vy = vy1 * cos + vx1Final * sin;
                        balls[j].vx = vx2Final * cos - vy2 * sin;
                        balls[j].vy = vy2 * cos + vx2Final * sin;
                        
                        // Topları ayır
                        const overlap = (ballRadius * 2) - distance;
                        const moveX = Math.cos(angle) * overlap / 2;
                        const moveY = Math.sin(angle) * overlap / 2;
                        
                        balls[i].x -= moveX;
                        balls[i].y -= moveY;
                        balls[j].x += moveX;
                        balls[j].y += moveY;
                    }
                }
            }

            // Cep kontrolü
            checkPockets();

            // Hareket bittiğinde
            if (!anyMoving && gameState === 'moving') {
                endTurn();
            }

            // Bot sırası
            if (currentPlayer === 'bot' && gameMode === 'bot' && !anyMoving && gameState !== 'gameOver') {
                setTimeout(botTakeShot, 500);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Cepleri çiz
            drawPockets();
            
            // Topları çiz
            balls.forEach(ball => {
                if (!ball.potted) {
                    drawBall(ball);
                }
            });
            
            // Nişan çizgisi
            if (currentPlayer === 'player' && isDragging && gameState === 'aiming') {
                drawAimLine();
            }
        }

        function drawBall(ball) {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            
            // Top rengi
            ctx.fillStyle = ball.color;
            ctx.fill();
            
            // Gölge
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = 10;
            
            // Parlaklık
            ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
            
            // Numara
            if (ball.number > 0 && ball.number !== 8) {
                ctx.fillStyle = ball.striped ? 'black' : 'white';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(ball.number, ball.x, ball.y);
            } else if (ball.number === 8) {
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('8', ball.x, ball.y);
            }
            
            ctx.shadowBlur = 0;
        }

        function drawPockets() {
            const pockets = [
                [pocketRadius, pocketRadius],
                [tableWidth/2, pocketRadius],
                [tableWidth - pocketRadius, pocketRadius],
                [pocketRadius, tableHeight - pocketRadius],
                [tableWidth/2, tableHeight - pocketRadius],
                [tableWidth - pocketRadius, tableHeight - pocketRadius]
            ];
            
            ctx.fillStyle = '#000000';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 15;
            
            pockets.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(x, y, pocketRadius, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.shadowBlur = 0;
        }

        function drawAimLine() {
            if (!dragStart || !dragEnd) return;
            
            // Ana çizgi
            ctx.beginPath();
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.moveTo(dragStart.x, dragStart.y);
            ctx.lineTo(dragEnd.x, dragEnd.y);
            ctx.stroke();
            
            // Hedef noktası
            ctx.beginPath();
            ctx.arc(dragEnd.x, dragEnd.y, 10, 0, Math.PI * 2);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            ctx.stroke();
            
            // Beyaz top çevresi
            ctx.beginPath();
            ctx.arc(dragStart.x, dragStart.y, 40, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.stroke();
        }

        // ==================== CEP KONTROLÜ ====================
        function checkPockets() {
            const pockets = [
                [pocketRadius, pocketRadius],
                [tableWidth/2, pocketRadius],
                [tableWidth - pocketRadius, pocketRadius],
                [pocketRadius, tableHeight - pocketRadius],
                [tableWidth/2, tableHeight - pocketRadius],
                [tableWidth - pocketRadius, tableHeight - pocketRadius]
            ];
            
            balls.forEach(ball => {
                if (ball.potted) return;
                
                pockets.forEach(([px, py]) => {
                    const dx = ball.x - px;
                    const dy = ball.y - py;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < pocketRadius) {
                        ball.potted = true;
                        
                        if (ball.id === 0) {
                            // Beyaz top düştü
                            showMessage('Beyaz top düştü! Rakip sırada', 'warning');
                            currentPlayer = 'bot';
                            document.getElementById('turnIndicator').textContent = 'BOT SIRASI';
                            resetWhiteBall();
                        } else {
                            // Skor güncelle
                            if (ball.type === 'solid') {
                                playerPotted.push(ball);
                                document.getElementById('player1Potted').textContent = playerPotted.length;
                                showMessage('Top pot ettin!', 'success');
                            } else {
                                opponentPotted.push(ball);
                                document.getElementById('player2Potted').textContent = opponentPotted.length;
                            }
                            
                            // 8 top kontrolü
                            if (ball.id === 8) {
                                gameOver = true;
                                gameState = 'gameOver';
                                
                                if (playerPotted.length === 7) {
                                    showMessage('🎉 TEBRİKLER! KAZANDIN!', 'success');
                                } else {
                                    showMessage('😢 Kaybettin! Tekrar dene!', 'error');
                                }
                            }
                        }
                        
                        updateBallsGrid();
                    }
                });
            });
        }

        // ==================== VURUŞ MEKANİĞİ ====================
        function startDrag(e) {
            e.preventDefault();
            if (currentPlayer !== 'player' || gameState !== 'aiming') return;
            
            const pos = getMousePos(e);
            
            // Beyaz topa tıklandı mı?
            const dx = pos.x - whiteBall.x;
            const dy = pos.y - whiteBall.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < ballRadius * 2) {
                isDragging = true;
                dragStart = { x: whiteBall.x, y: whiteBall.y };
                dragEnd = pos;
                
                document.getElementById('powerMeter').style.display = 'block';
                document.getElementById('shotBtn').disabled = false;
            }
        }

        function onDrag(e) {
            e.preventDefault();
            if (!isDragging) return;
            
            dragEnd = getMousePos(e);
            
            // Açı hesapla
            const dx = dragEnd.x - dragStart.x;
            const dy = dragEnd.y - dragStart.y;
            shotAngle = Math.atan2(dy, dx);
            
            // Güç hesapla
            const distance = Math.sqrt(dx * dx + dy * dy);
            shotPower = Math.min(100, distance / 5);
            
            // UI güncelle
            document.getElementById('powerBarFill').style.width = shotPower + '%';
            document.getElementById('powerPercent').textContent = Math.round(shotPower) + '%';
            document.getElementById('angleDisplay').textContent = Math.round(shotAngle * 180 / Math.PI) + '°';
        }

        function endDrag(e) {
            e.preventDefault();
            if (!isDragging) return;
            
            isDragging = false;
            
            if (shotPower > 10) {
                takeShot();
            } else {
                document.getElementById('powerMeter').style.display = 'none';
                document.getElementById('shotBtn').disabled = true;
            }
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function takeShot() {
            if (currentPlayer !== 'player' || gameState !== 'aiming') return;
            
            // Beyaz topa vuruş
            whiteBall.vx = Math.cos(shotAngle) * shotPower * 0.5;
            whiteBall.vy = Math.sin(shotAngle) * shotPower * 0.5;
            
            gameState = 'moving';
            currentPlayer = 'bot';
            document.getElementById('turnIndicator').textContent = 'BOT SIRASI';
            document.getElementById('powerMeter').style.display = 'none';
            document.getElementById('shotBtn').disabled = true;
            
            showMessage('Vuruş yapıldı!', 'info');
        }

        // ==================== BOT YAPAY ZEKA ====================
        function botTakeShot() {
            if (currentPlayer !== 'bot' || gameMode !== 'bot') return;
            
            gameState = 'thinking';
            document.getElementById('turnIndicator').textContent = 'BOT DÜŞÜNÜYOR...';
            
            setTimeout(() => {
                // Bot zorluğuna göre vuruş
                let accuracy = 0.7; // medium
                if (botDifficulty === 'easy') accuracy = 0.4;
                if (botDifficulty === 'hard') accuracy = 0.9;
                
                // Hedef top bul
                const targetBalls = balls.filter(b => !b.potted && b.type !== 'white');
                if (targetBalls.length === 0) return;
                
                // Rastgele hedef
                const target = targetBalls[Math.floor(Math.random() * targetBalls.length)];
                
                // Açı hesapla (biraz hata payı ile)
                const dx = target.x - whiteBall.x;
                const dy = target.y - whiteBall.y;
                let angle = Math.atan2(dy, dx);
                
                // Hata payı ekle
                angle += (Math.random() - 0.5) * (1 - accuracy) * 0.5;
                
                // Güç hesapla
                const distance = Math.sqrt(dx * dx + dy * dy);
                let power = Math.min(80, distance * 0.3);
                power *= accuracy + Math.random() * 0.2;
                
                // Vuruş
                whiteBall.vx = Math.cos(angle) * power * 0.3;
                whiteBall.vy = Math.sin(angle) * power * 0.3;
                
                gameState = 'moving';
                currentPlayer = 'player';
                document.getElementById('turnIndicator').textContent = 'SENİN SIRAN';
                
                showMessage('Bot vuruş yaptı!', 'info');
            }, 1000);
        }

        function endTurn() {
            gameState = 'aiming';
            
            // Beyaz top hareket etmiyorsa
            if (Math.abs(whiteBall.vx) < minSpeed && Math.abs(whiteBall.vy) < minSpeed) {
                whiteBall.vx = 0;
                whiteBall.vy = 0;
            }
        }

        // ==================== YARDIMCI FONKSİYONLAR ====================
        function resetWhiteBall() {
            if (currentPlayer !== 'player') return;
            
            whiteBall.x = tableWidth * 0.25;
            whiteBall.y = tableHeight / 2;
            whiteBall.vx = 0;
            whiteBall.vy = 0;
            whiteBall.potted = false;
        }

        function updateBallsGrid() {
            const grid = document.getElementById('ballsGrid');
            grid.innerHTML = '';
            
            const solidBalls = balls.filter(b => b.type === 'solid' && b.number !== 8);
            const stripedBalls = balls.filter(b => b.type === 'striped');
            const blackBall = balls.find(b => b.id === 8);
            
            [...solidBalls, blackBall, ...stripedBalls].forEach(ball => {
                const div = document.createElement('div');
                div.className = `ball-item ${ball.potted ? 'potted' : ''}`;
                div.style.background = ball.color;
                div.textContent = ball.number || '';
                grid.appendChild(div);
            });
        }

        function showMessage(text, type) {
            const center = document.getElementById('messageCenter');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = 'info-circle';
            if (type === 'success') icon = 'check-circle';
            if (type === 'error') icon = 'times-circle';
            if (type === 'warning') icon = 'exclamation-triangle';
            
            toast.innerHTML = `<i class="fas fa-${icon}"></i> ${text}`;
            center.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== MOD DEĞİŞTİRME ====================
        function setGameMode(mode) {
            gameMode = mode;
            
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (mode === 'bot') {
                document.getElementById('difficultySelector').style.display = 'block';
                document.getElementById('roomSelector').style.display = 'none';
            } else if (mode === 'private') {
                document.getElementById('difficultySelector').style.display = 'none';
                document.getElementById('roomSelector').style.display = 'block';
            } else {
                document.getElementById('difficultySelector').style.display = 'none';
                document.getElementById('roomSelector').style.display = 'none';
                showMessage('Online mod yakında!', 'info');
            }
        }

        function setDifficulty(level) {
            botDifficulty = level;
            
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            let botName = 'Bot ';
            if (level === 'easy') botName += 'Kolay 🐣';
            if (level === 'medium') botName += 'Orta ⚡';
            if (level === 'hard') botName += 'Zor 👑';
            
            document.getElementById('player2Name').textContent = botName;
            
            resetGame();
        }

        function resetGame() {
            createBalls();
            playerPotted = [];
            opponentPotted = [];
            currentPlayer = 'player';
            gameState = 'aiming';
            gameOver = false;
            
            document.getElementById('player1Potted').textContent = '0';
            document.getElementById('player2Potted').textContent = '0';
            document.getElementById('turnIndicator').textContent = 'SENİN SIRAN';
            
            updateBallsGrid();
        }

        function createRoom() {
            const code = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('roomCode').value = code;
            showMessage(`Oda kodu: ${code}`, 'success');
        }

        function joinRoom() {
            const code = document.getElementById('roomCode').value;
            if (code.length === 4) {
                showMessage(`${code} kodlu odaya katılındı!`, 'success');
            } else {
                showMessage('Geçerli kod girin!', 'error');
            }
        }

        // Pencere boyutlandırma
        window.addEventListener('resize', () => {
            resizeCanvas();
            createBalls();
        });

        // Oyunu başlat
        initGame();
    </script>
</body>
