<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms Oyunu</title>
    <style>
        body { font-family: Arial, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; }
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        button { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; background: #333; color: #fff; border: none; border-radius: 5px; }
        button:hover { background: #555; }
        #gameCanvas { display: none; border: 1px solid #fff; }
        #sidePanel { position: absolute; right: 0; top: 0; width: 200px; height: 100vh; background: rgba(0,0,0,0.8); padding: 10px; box-sizing: border-box; }
        #rooms { display: none; }
        #rooms div { padding: 10px; background: #333; margin: 5px; cursor: pointer; }
        #createRoom { display: none; }
        #createRoom select { width: 100%; padding: 10px; margin: 10px 0; }
        #health { position: absolute; top: 10px; left: 10px; font-size: 24px; color: #fff; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 24px; display: none; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>Backrooms Oyunu</h1>
        <button id="findGame">Oyun Bul</button>
        <button id="showRooms">Odalar</button>
        <button id="createRoomBtn">Oda Oluştur</button>
    </div>
    <div id="rooms">
        <button id="backToMenu">Geri</button>
        <h2>Odalar</h2>
        <div id="roomList"></div>
    </div>
    <div id="createRoom">
        <button id="backToMenu2">Geri</button>
        <h2>Oda Oluştur</h2>
        <select id="aiType">
            <option value="none">AI Yok</option>
            <option value="random">Rastgele AI</option>
            <option value="user">Kullanıcı AI</option>
        </select>
        <button id="create">Oluştur</button>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="sidePanel">
        <div id="players"></div>
        <button id="startGame" style="display:none;">Oyuna Başla</button>
    </div>
    <div id="health">HP: 100</div>
    <div id="crosshair">+</div>
    <div id="mobileControls" style="display:none; position:absolute; bottom:10px; left:10px; width:150px; height:150px; background:rgba(0,0,0,0.5); border-radius:50%;">
        <div id="joystick" style="position:absolute; width:50px; height:50px; background:#fff; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%);"></div>
    </div>
    <button id="shootBtn" style="display:none; position:absolute; bottom:10px; right:10px; width:100px; height:100px; background:#f00; color:#fff; border:none; border-radius:50%; font-size:18px;">Ateş</button>
    <button id="jumpBtn" style="display:none; position:absolute; bottom:120px; right:10px; width:100px; height:50px; background:#0f0; color:#fff; border:none; border-radius:10px; font-size:18px;">Zıpla</button>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="game.js"></script>
</body>
</html>
