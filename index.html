<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bilardo Pro | Online 8 Ball Pool</title>
    
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-dark: #0a0f1e;
            --bg-card: #1a1f30;
            --bg-hover: #252b3d;
            --accent: #4f9aff;
            --accent-glow: rgba(79, 154, 255, 0.3);
            --text: #ffffff;
            --text-secondary: #8f9bb3;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --border: #2f3545;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e, #141b2b);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* Ana Oyun Container */
        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            background: rgba(26, 31, 48, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(79, 154, 255, 0.2);
        }

        /* ==================== LOBBY EKRANI ==================== */
        .lobby-screen {
            display: block;
        }

        .game-screen {
            display: none;
        }

        /* Header */
        .lobby-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            background: linear-gradient(135deg, #1e2538, #1a1f30);
            border-radius: 30px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .player-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f9aff, #9b59b6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            border: 3px solid var(--accent);
            position: relative;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .platform-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid var(--bg-card);
        }

        .player-info h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .player-stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .rating-badge {
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            padding: 8px 20px;
            border-radius: 30px;
            color: #0a0f1e;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Oyun Modları */
        .game-modes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .mode-card {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .mode-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .mode-card:hover::before {
            left: 100%;
        }

        .mode-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .mode-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a3147, #1e2538);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
            border: 2px solid var(--accent);
        }

        .mode-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .mode-desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .mode-badge {
            background: var(--accent);
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        /* Oda Kodu Giriş */
        .room-code-section {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px dashed var(--accent);
        }

        .room-code-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .code-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .code-input {
            flex: 1;
            background: #0f1423;
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 18px 25px;
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-align: center;
            letter-spacing: 10px;
            outline: none;
        }

        .code-input:focus {
            border-color: var(--accent);
        }

        .join-btn {
            background: var(--accent);
            border: none;
            border-radius: 20px;
            padding: 18px 35px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .join-btn:hover {
            background: #3b7fd9;
            transform: scale(1.02);
        }

        /* Bot Zorluk Seçenekleri */
        .difficulty-selector {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .difficulty-card {
            background: #0f1423;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .difficulty-card:hover {
            border-color: var(--accent);
        }

        .difficulty-card.selected {
            border-color: var(--accent);
            background: linear-gradient(135deg, #1a1f30, #0f1423);
        }

        .difficulty-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .difficulty-name {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .difficulty-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Lobi */
        .lobby-section {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 25px;
        }

        .lobby-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #0f1423;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--accent);
        }

        .players-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #0f1423;
            border-radius: 15px;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .player-row:hover {
            background: #1a1f30;
        }

        .player-row-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .row-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-online {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .status-ingame {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        /* ==================== OYUN EKRANI ==================== */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            background: linear-gradient(135deg, #1e2538, #1a1f30);
            border-radius: 30px;
            margin-bottom: 20px;
        }

        .players-score {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .score-card {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .score-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            position: relative;
        }

        .potted-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--danger);
            border-radius: 20px;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: 700;
        }

        .vs-divider {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
        }

        .turn-indicator {
            background: var(--accent);
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        /* Bilardo Masası */
        .table-container {
            aspect-ratio: 2/1;
            background: #1e4d2b;
            border-radius: 100px 100px 50px 50px;
            padding: 20px;
            border: 15px solid #8b5a2b;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.6);
            margin-bottom: 20px;
            position: relative;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            background: #1e4d2b;
            border-radius: 80px 80px 40px 40px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
            touch-action: none;
        }

        /* Vuruş Kontrolleri */
        .shot-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 30px;
        }

        .power-meter {
            flex: 1;
        }

        .power-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .power-bar {
            height: 20px;
            background: #0f1423;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        .power-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            transition: width 0.1s;
        }

        .angle-indicator {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .angle-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #0f1423;
            border: 3px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .game-btn {
            background: var(--accent);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .game-btn:hover {
            background: #3b7fd9;
            transform: scale(1.05);
        }

        .game-btn.secondary {
            background: #2f3545;
        }

        /* Mesajlar */
        .message-box {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .message {
            background: var(--bg-card);
            border-left: 5px solid var(--accent);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 10px;
            animation: slideIn 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid var(--bg-card);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobil Responsive */
        @media (max-width: 768px) {
            .game-modes {
                grid-template-columns: 1fr;
            }
            
            .game-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .players-score {
                flex-direction: column;
                gap: 15px;
            }
            
            .code-input-group {
                flex-direction: column;
            }
            
            .join-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Mesajlar -->
    <div class="message-box" id="messageBox"></div>

    <div class="game-wrapper">
        <!-- LOBBY EKRANI -->
        <div class="lobby-screen" id="lobbyScreen">
            <!-- Header -->
            <div class="lobby-header">
                <div class="player-profile">
                    <div class="player-avatar" id="playerAvatar">
                        <span id="avatarText">G</span>
                        <img id="avatarImg" class="avatar-img" style="display: none;">
                        <div class="platform-badge" id="platformBadge">
                            <i class="fas fa-globe"></i>
                        </div>
                    </div>
                    <div class="player-info">
                        <h3 id="playerName">Misafir Oyuncu</h3>
                        <div class="player-stats">
                            <span><i class="fas fa-trophy"></i> <span id="playerWins">0</span></span>
                            <span><i class="fas fa-gamepad"></i> <span id="playerGames">0</span></span>
                        </div>
                    </div>
                </div>
                <div class="rating-badge">
                    <i class="fas fa-star"></i>
                    <span id="playerRating">1000</span>
                </div>
            </div>

            <!-- Oyun Modları -->
            <div class="game-modes">
                <div class="mode-card" onclick="selectMode('online')">
                    <div class="mode-icon">
                        <i class="fas fa-globe"></i>
                    </div>
                    <div class="mode-title">ONLINE</div>
                    <div class="mode-desc">Gerçek oyuncularla eşleş</div>
                    <div class="mode-badge" id="onlineCount">0 çevrimiçi</div>
                </div>

                <div class="mode-card" onclick="showPrivateRoom()">
                    <div class="mode-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="mode-title">ÖZEL ODA</div>
                    <div class="mode-desc">Arkadaşlarınla oyna</div>
                    <div class="mode-badge">Kod ile katıl</div>
                </div>

                <div class="mode-card" onclick="showBotOptions()">
                    <div class="mode-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="mode-title">BOT</div>
                    <div class="mode-desc">Yapay zekaya karşı</div>
                    <div class="mode-badge">3 zorluk</div>
                </div>
            </div>

            <!-- Oda Kodu Giriş -->
            <div class="room-code-section" id="roomCodeSection">
                <div class="room-code-title">
                    <i class="fas fa-key"></i>
                    <span>Oda Kodunu Gir</span>
                </div>
                <div class="code-input-group">
                    <input type="text" class="code-input" id="roomCodeInput" maxlength="4" placeholder="0000">
                    <button class="join-btn" onclick="joinPrivateRoom()">
                        <i class="fas fa-sign-in-alt"></i> Katıl
                    </button>
                </div>
            </div>

            <!-- Bot Zorluk Seçenekleri -->
            <div class="difficulty-selector" id="botDifficulty">
                <div class="difficulty-card" onclick="selectDifficulty('easy')">
                    <div class="difficulty-icon">🐣</div>
                    <div class="difficulty-name">Kolay</div>
                    <div class="difficulty-desc">Yeni başlayan</div>
                </div>
                <div class="difficulty-card selected" onclick="selectDifficulty('medium')">
                    <div class="difficulty-icon">⚡</div>
                    <div class="difficulty-name">Orta</div>
                    <div class="difficulty-desc">Deneyimli</div>
                </div>
                <div class="difficulty-card" onclick="selectDifficulty('hard')">
                    <div class="difficulty-icon">👑</div>
                    <div class="difficulty-name">Zor</div>
                    <div class="difficulty-desc">Uzman</div>
                </div>
            </div>

            <!-- Lobi -->
            <div class="lobby-section">
                <div class="lobby-tabs">
                    <button class="tab-btn active" onclick="switchTab('players')">
                        <i class="fas fa-users"></i> Oyuncular
                    </button>
                    <button class="tab-btn" onclick="switchTab('rooms')">
                        <i class="fas fa-door-open"></i> Odalar
                    </button>
                </div>
                <div class="players-list" id="playersList">
                    <!-- Dinamik doldurulacak -->
                </div>
            </div>
        </div>

        <!-- OYUN EKRANI -->
        <div class="game-screen" id="gameScreen">
            <!-- Oyun Header -->
            <div class="game-header">
                <div class="players-score">
                    <div class="score-card">
                        <div class="score-avatar">
                            <span id="gamePlayer1Avatar">S</span>
                            <span class="potted-badge" id="player1Potted">0</span>
                        </div>
                        <div>
                            <div id="gamePlayer1Name">Sen</div>
                            <div style="font-size: 12px; color: #8f9bb3;" id="player1Type">Düz</div>
                        </div>
                    </div>
                    <div class="vs-divider">VS</div>
                    <div class="score-card">
                        <div class="score-avatar">
                            <span id="gamePlayer2Avatar">B</span>
                            <span class="potted-badge" id="player2Potted">0</span>
                        </div>
                        <div>
                            <div id="gamePlayer2Name">Rakip</div>
                            <div style="font-size: 12px; color: #8f9bb3;" id="player2Type">Çizgili</div>
                        </div>
                    </div>
                </div>
                <div class="turn-indicator" id="turnIndicator">Senin Sıran</div>
            </div>

            <!-- Bilardo Masası -->
            <div class="table-container">
                <canvas id="gameCanvas"></canvas>
            </div>

            <!-- Vuruş Kontrolleri -->
            <div class="shot-controls">
                <div class="power-meter">
                    <div class="power-label">
                        <span>Vuruş Gücü</span>
                        <span id="powerValue">50%</span>
                    </div>
                    <div class="power-bar">
                        <div class="power-fill" id="powerFill" style="width: 50%;"></div>
                    </div>
                </div>
                <div class="angle-indicator">
                    <div class="angle-circle" id="angleValue">0°</div>
                    <i class="fas fa-arrow-right"></i>
                </div>
                <button class="game-btn" onclick="takeShot()" id="shotBtn">
                    <i class="fas fa-bullseye"></i> VUR
                </button>
                <button class="game-btn secondary" onclick="exitGame()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== TELEGRAM ENTEGRASYONU ====================
        let tg = window.Telegram?.WebApp;
        let playerData = {
            id: null,
            username: 'Guest',
            photo: null,
            platform: 'web',
            rating: 1000,
            wins: 0,
            games: 0
        };

        // Telegram kontrolü
        if (tg) {
            tg.ready();
            tg.expand();
            
            const initData = tg.initDataUnsafe?.user;
            if (initData) {
                playerData.username = initData.first_name + (initData.last_name ? ' ' + initData.last_name : '');
                playerData.photo = initData.photo_url;
                playerData.platform = 'telegram';
                playerData.id = initData.id;
                
                document.getElementById('platformBadge').innerHTML = '<i class="fab fa-telegram"></i>';
                if (playerData.photo) {
                    document.getElementById('avatarImg').src = playerData.photo;
                    document.getElementById('avatarImg').style.display = 'block';
                    document.getElementById('avatarText').style.display = 'none';
                } else {
                    document.getElementById('avatarText').textContent = playerData.username.charAt(0);
                }
            }
        } else {
            document.getElementById('avatarText').textContent = 'G';
        }

        document.getElementById('playerName').textContent = playerData.username;
        document.getElementById('playerRating').textContent = playerData.rating;

        // ==================== WEB SOCKET BAĞLANTISI ====================
        const ws = new WebSocket('wss://saskioyunu-1-2d6i.onrender.com');
        let currentRoom = null;
        let gameMode = null;
        let botDifficulty = 'medium';

        ws.onopen = () => {
            showMessage('Sunucuya bağlandı', 'success');
            
            // Oyuncu kaydı
            ws.send(JSON.stringify({
                type: 'REGISTER',
                data: playerData
            }));
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log('Sunucu:', data);

            switch(data.type) {
                case 'REGISTER_SUCCESS':
                    playerData.id = data.data.playerId;
                    break;

                case 'LOBBY_UPDATE':
                    updateLobby(data.data);
                    break;

                case 'MATCH_FOUND':
                    showMessage('Rakip bulundu! Oyun başlıyor...', 'success');
                    currentRoom = data.data.roomCode;
                    setTimeout(() => {
                        startGame('online', data.data.opponent);
                    }, 2000);
                    break;

                case 'ROOM_CREATED':
                    currentRoom = data.data.roomCode;
                    showMessage(`Oda oluşturuldu: ${data.data.roomCode}`, 'success');
                    document.getElementById('roomCodeInput').value = data.data.roomCode;
                    break;

                case 'PLAYER_JOINED':
                    updateRoomPlayers(data.data.players);
                    break;

                case 'GAME_START':
                    startGame(data.data.isBotGame ? 'bot' : 'online', null, data.data);
                    break;

                case 'GAME_UPDATE':
                    updateGame(data.data);
                    break;

                case 'GAME_OVER':
                    gameOver(data.data);
                    break;

                case 'PLAYER_LEFT':
                    showMessage('Rakip oyundan ayrıldı', 'warning');
                    exitGame();
                    break;

                case 'PONG':
                    console.log('Pong');
                    break;
            }
        };

        ws.onclose = () => {
            showMessage('Sunucu bağlantısı koptu. Yeniden bağlanılıyor...', 'error');
            setTimeout(() => window.location.reload(), 3000);
        };

        // ==================== LOBBY FONKSİYONLARI ====================
        function selectMode(mode) {
            gameMode = mode;
            
            switch(mode) {
                case 'online':
                    document.getElementById('loadingOverlay').style.display = 'flex';
                    showMessage('Rakip aranıyor...', 'info');
                    
                    ws.send(JSON.stringify({
                        type: 'JOIN_MATCHMAKING',
                        mode: '8ball'
                    }));
                    break;
                    
                case 'private':
                    document.getElementById('roomCodeSection').style.display = 'block';
                    break;
            }
        }

        function showPrivateRoom() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            ws.send(JSON.stringify({
                type: 'CREATE_PRIVATE_ROOM',
                difficulty: botDifficulty
            }));
        }

        function joinPrivateRoom() {
            const code = document.getElementById('roomCodeInput').value;
            if (code.length === 4) {
                document.getElementById('loadingOverlay').style.display = 'flex';
                
                ws.send(JSON.stringify({
                    type: 'JOIN_PRIVATE_ROOM',
                    roomCode: code
                }));
            } else {
                showMessage('Geçerli bir oda kodu girin', 'error');
            }
        }

        function showBotOptions() {
            document.getElementById('botDifficulty').style.display = 'grid';
        }

        function selectDifficulty(level) {
            botDifficulty = level;
            document.querySelectorAll('.difficulty-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            ws.send(JSON.stringify({
                type: 'JOIN_BOT_GAME',
                difficulty: level
            }));
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (tab === 'players') {
                // Oyuncu listesini göster
            } else {
                // Oda listesini göster
            }
        }

        function updateLobby(data) {
            document.getElementById('onlineCount').textContent = data.onlinePlayers.length + ' çevrimiçi';
            
            const playersList = document.getElementById('playersList');
            playersList.innerHTML = '';
            
            data.onlinePlayers.forEach(player => {
                const row = document.createElement('div');
                row.className = 'player-row';
                row.innerHTML = `
                    <div class="player-row-info">
                        <div class="row-avatar">${player.username.charAt(0)}</div>
                        <div>
                            <div style="font-weight: 600;">${player.username}</div>
                            <div style="font-size: 12px; color: #8f9bb3;">${player.rating} rating</div>
                        </div>
                    </div>
                    <div>
                        <span class="status-badge status-${player.status}">
                            ${player.status === 'online' ? '🟢 Çevrimiçi' : '🎮 Oyunda'}
                        </span>
                    </div>
                `;
                playersList.appendChild(row);
            });
            
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // ==================== OYUN FONKSİYONLARI ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameData = null;
        let isMyTurn = false;
        let shotPower = 50;
        let shotAngle = 0;
        let isDragging = false;

        function startGame(type, opponent, data) {
            document.getElementById('lobbyScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            
            if (data) {
                gameData = data;
            }
            
            if (opponent) {
                document.getElementById('gamePlayer2Name').textContent = opponent.username;
            }
            
            resizeCanvas();
            initGame();
        }

        function resizeCanvas() {
            const container = document.querySelector('.table-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        function initGame() {
            // Canvas olayları
            canvas.addEventListener('mousedown', startDrag);
            canvas.addEventListener('mousemove', onDrag);
            canvas.addEventListener('mouseup', endDrag);
            canvas.addEventListener('touchstart', startDrag);
            canvas.addEventListener('touchmove', onDrag);
            canvas.addEventListener('touchend', endDrag);
            
            draw();
        }

        function startDrag(e) {
            e.preventDefault();
            if (!isMyTurn) return;
            
            isDragging = true;
            const pos = getMousePos(e);
            dragStart = pos;
        }

        function onDrag(e) {
            e.preventDefault();
            if (!isDragging || !isMyTurn) return;
            
            const pos = getMousePos(e);
            dragEnd = pos;
            
            // Açı hesapla
            const dx = dragEnd.x - dragStart.x;
            const dy = dragEnd.y - dragStart.y;
            shotAngle = Math.atan2(dy, dx);
            
            // Güç hesapla
            const distance = Math.sqrt(dx*dx + dy*dy);
            shotPower = Math.min(100, distance / 5);
            
            document.getElementById('powerFill').style.width = shotPower + '%';
            document.getElementById('powerValue').textContent = Math.round(shotPower) + '%';
            document.getElementById('angleValue').textContent = Math.round(shotAngle * 180 / Math.PI) + '°';
            
            draw();
        }

        function endDrag(e) {
            e.preventDefault();
            if (!isDragging || !isMyTurn) return;
            
            isDragging = false;
            takeShot();
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function takeShot() {
            if (!isMyTurn) return;
            
            ws.send(JSON.stringify({
                type: 'PLAYER_ACTION',
                action: {
                    ballId: 0,
                    power: shotPower / 100,
                    angle: shotAngle,
                    cueX: dragStart?.x,
                    cueY: dragStart?.y
                }
            }));
            
            isMyTurn = false;
            document.getElementById('turnIndicator').textContent = 'Rakibin Sırası';
        }

        function updateGame(data) {
            gameData = data;
            
            // Sıra kontrolü
            if (data.currentPlayer === playerData.id) {
                isMyTurn = true;
                document.getElementById('turnIndicator').textContent = 'Senin Sıran';
            } else {
                isMyTurn = false;
                document.getElementById('turnIndicator').textContent = 'Rakibin Sırası';
            }
            
            // Skorları güncelle
            updateScores(data);
            
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!gameData?.balls) return;
            
            // Cepleri çiz
            drawPockets();
            
            // Topları çiz
            gameData.balls.forEach(ball => {
                if (!ball.potted) {
                    drawBall(ball);
                }
            });
            
            // Nişan çizgisi
            if (isMyTurn && isDragging && dragStart) {
                drawAimLine();
            }
        }

        function drawBall(ball) {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius || 15, 0, Math.PI * 2);
            
            // Top rengi
            if (ball.type === 'white') {
                ctx.fillStyle = '#ffffff';
            } else if (ball.type === 'black') {
                ctx.fillStyle = '#000000';
            } else {
                ctx.fillStyle = ball.color || '#ffff00';
            }
            
            ctx.fill();
            
            // Parlaklık efekti
            ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
            ctx.shadowBlur = 10;
            
            // Top numarası
            if (ball.number && ball.number !== 0) {
                ctx.fillStyle = ball.type === 'striped' ? '#ffffff' : '#000000';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(ball.number, ball.x, ball.y);
            }
            
            ctx.shadowBlur = 0;
        }

        function drawPockets() {
            const pockets = [
                [50, 50], [canvas.width/2, 50], [canvas.width-50, 50],
                [50, canvas.height-50], [canvas.width/2, canvas.height-50], [canvas.width-50, canvas.height-50]
            ];
            
            ctx.fillStyle = '#000000';
            pockets.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(x, y, 25, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function drawAimLine() {
            if (!dragStart || !dragEnd) return;
            
            ctx.beginPath();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.moveTo(dragStart.x, dragStart.y);
            ctx.lineTo(dragEnd.x, dragEnd.y);
            ctx.stroke();
            
            // Beyaz topun etrafında daire
            ctx.beginPath();
            ctx.arc(dragStart.x, dragStart.y, 30, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            ctx.stroke();
        }

        function updateScores(data) {
            // Oyuncu topları
            const playerBalls = data.balls.filter(b => 
                (playerData.id === data.players[0] && b.type === 'solid') ||
                (playerData.id === data.players[1] && b.type === 'striped')
            );
            
            const pottedCount = playerBalls.filter(b => b.potted).length;
            document.getElementById('player1Potted').textContent = pottedCount;
        }

        function gameOver(data) {
            if (data.winner === playerData.id) {
                showMessage('Tebrikler! Kazandın! 🏆', 'success');
            } else {
                showMessage('Kaybettin! Tekrar dene!', 'error');
            }
            
            setTimeout(exitGame, 3000);
        }

        function exitGame() {
            if (currentRoom) {
                ws.send(JSON.stringify({
                    type: 'LEAVE_ROOM'
                }));
            }
            
            document.getElementById('lobbyScreen').style.display = 'block';
            document.getElementById('gameScreen').style.display = 'none';
            currentRoom = null;
        }

        // ==================== YARDIMCI FONKSİYONLAR ====================
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle'}"></i>
                ${text}
            `;
            box.appendChild(msg);
            
            setTimeout(() => msg.remove(), 3000);
        }

        function updateRoomPlayers(players) {
            showMessage(`${players.length}/2 oyuncu katıldı`, 'info');
        }

        // Pencere yeniden boyutlandığında
        window.addEventListener('resize', () => {
            if (gameData) {
                resizeCanvas();
                draw();
            }
        });

        // Sayfa yüklendiğinde
        window.onload = () => {
            // Ping gönder
            setInterval(() => {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'PING' }));
                }
            }, 30000);
        };
    </script>
</body>
</html>
