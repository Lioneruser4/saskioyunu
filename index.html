<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROFESYONEL FPS - TAKIM SAVAŞI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Arial Black', sans-serif;
        }

        body {
            overflow: hidden;
            background: #000;
        }

        /* Menü */
        #menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0a0f1f, #1a1f2f);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .menu-box {
            background: rgba(20, 30, 40, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #ff4444;
            box-shadow: 0 0 50px rgba(255, 68, 68, 0.3);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .menu-box h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff4444;
        }

        .menu-box h2 {
            color: #8899aa;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .menu-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff4444;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            text-align: center;
        }

        .menu-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: linear-gradient(45deg, #ff4444, #ff8844);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #ff4444;
        }

        .rooms-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .room-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            margin: 5px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .room-item:hover {
            background: #ff4444;
        }

        /* Oyun HUD */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 100;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: white;
            box-shadow: 0 0 10px #ff4444;
        }

        #crosshair::before {
            width: 20px;
            height: 2px;
            top: 19px;
            left: 10px;
        }

        #crosshair::after {
            width: 2px;
            height: 20px;
            left: 19px;
            top: 10px;
        }

        #health-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            background: #333;
            border: 2px solid white;
            border-radius: 15px;
            overflow: hidden;
        }

        #health-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            transition: 0.3s;
        }

        #health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 0 black;
        }

        #ammo {
            position: absolute;
            bottom: 80px;
            right: 50px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid #ff4444;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        #scoreboard {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff4444;
            border-radius: 15px;
            padding: 15px;
            min-width: 250px;
            color: white;
        }

        .score-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }

        .red-score { color: #ff4444; font-size: 24px; }
        .blue-score { color: #4444ff; font-size: 24px; }

        .player-row {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            margin: 2px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        #killfeed {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
        }

        .kill-message {
            background: rgba(0, 0, 0, 0.8);
            border-left: 4px solid #ff4444;
            padding: 10px;
            margin: 5px 0;
            color: white;
            animation: slideIn 0.3s, fadeOut 3s forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Mobil kontroller */
        #mobile-controls {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: auto;
            z-index: 200;
        }

        #joystick {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 2px solid white;
            position: relative;
        }

        #joystick-handle {
            width: 50px;
            height: 50px;
            background: #ff4444;
            border-radius: 25px;
            position: absolute;
            top: 35px;
            left: 35px;
            transition: 0.05s;
        }

        #fire-btn {
            width: 100px;
            height: 100px;
            background: #ff4444;
            border-radius: 50px;
            border: 3px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: white;
            box-shadow: 0 0 30px #ff4444;
        }

        /* Ölüm ekranı */
        #death-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .death-box {
            text-align: center;
            color: white;
        }

        .death-box h1 {
            font-size: 64px;
            color: #ff4444;
            margin-bottom: 20px;
        }

        #respawn-timer {
            font-size: 72px;
            font-weight: bold;
            color: #ff4444;
            margin: 30px 0;
        }

        #respawn-btn {
            padding: 15px 40px;
            background: #ff4444;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #333;
            border-top-color: #ff4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            #mobile-controls { display: flex; }
            #health-bar { width: 300px; }
            #ammo { bottom: 30px; right: 20px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <!-- Menü -->
    <div id="menu">
        <div class="menu-box">
            <h1>⚡ PRO FPS ⚡</h1>
            <h2>TAKIM SAVAŞI</h2>
            
            <input type="text" id="player-name" class="menu-input" placeholder="NICKNAME" value="ASLAN">
            
            <button class="menu-btn" onclick="createRoom()">🔴 ODA OLUŞTUR</button>
            
            <div style="margin: 20px 0; color: white;">— VEYA —</div>
            
            <div class="rooms-list" id="rooms-list">
                <div style="color: #8899aa;">Aktif oda yok</div>
            </div>
        </div>
    </div>

    <!-- Oyun HUD -->
    <div id="hud">
        <div id="crosshair"></div>
        
        <div id="health-bar">
            <div id="health-fill"></div>
            <div id="health-text">100 HP</div>
        </div>
        
        <div id="ammo">
            <span id="ammo-current">12</span>/<span id="ammo-max">12</span>
        </div>
        
        <div id="scoreboard">
            <div class="score-header">
                <span class="red-score" id="red-score">0</span>
                <span>🔴 RED VS BLUE 🔵</span>
                <span class="blue-score" id="blue-score">0</span>
            </div>
            <div id="players-list"></div>
        </div>
        
        <div id="killfeed"></div>
    </div>

    <!-- Mobil Kontroller -->
    <div id="mobile-controls">
        <div id="joystick">
            <div id="joystick-handle"></div>
        </div>
        <div id="fire-btn">🔥</div>
    </div>

    <!-- Ölüm Ekranı -->
    <div id="death-screen">
        <div class="death-box">
            <h1>☠️ ÖLDÜRÜLDÜN ☠️</h1>
            <div id="respawn-timer">3</div>
            <button id="respawn-btn" onclick="respawn()">YENİDEN DOĞ</button>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading">
        <div class="spinner"></div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <script>
        // Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.disableVerticalSwipes();
        }

        // Global değişkenler
        let socket = null;
        let scene, camera, renderer;
        let players = new Map();
        let myPlayerId = null;
        let myTeam = null;
        let mapWalls = [];
        let roomId = null;
        let gameActive = false;
        let respawnTimer = null;

        // Joystick değişkenleri
        let joystickActive = false;
        let joystickVector = { x: 0, y: 0 };
        let isShooting = false;

        // Socket bağlantısı
        function connectSocket() {
            socket = io('https://saskioyunu-1-2d6i.onrender.com');
            
            socket.on('connect', () => {
                console.log('✅ Sunucuya bağlandı');
                document.getElementById('loading').style.display = 'none';
                loadRooms();
            });

            socket.on('rooms-list', (rooms) => {
                updateRoomsList(rooms);
            });

            socket.on('room-created', (id) => {
                roomId = id;
                joinRoom(id);
            });

            socket.on('room-joined', (data) => {
                myPlayerId = data.playerId;
                myTeam = data.team;
                startGame(data);
            });

            socket.on('player-joined', (player) => {
                addPlayer(player);
            });

            socket.on('player-left', (playerId) => {
                removePlayer(playerId);
            });

            socket.on('game-update', (data) => {
                updateGame(data);
            });

            socket.on('player-hit', (data) => {
                if (data.health <= 0) {
                    document.getElementById('death-screen').style.display = 'flex';
                    startRespawnTimer();
                }
                
                document.body.style.backgroundColor = 'rgba(255,0,0,0.3)';
                setTimeout(() => {
                    document.body.style.backgroundColor = '';
                }, 100);
                
                updateHealth(data.health);
            });

            socket.on('player-died', (data) => {
                addKillMessage(data.killerName, data.victimName);
            });

            socket.on('respawned', (data) => {
                document.getElementById('death-screen').style.display = 'none';
                if (myPlayer) {
                    myPlayer.position.set(data.position.x, data.position.y, data.position.z);
                }
                updateHealth(100);
                updateAmmo(data.ammo, 12);
            });

            socket.on('shot-fired', (data) => {
                createMuzzleFlash(data.position);
            });
        }

        // Oda listesini güncelle
        function updateRoomsList(rooms) {
            const container = document.getElementById('rooms-list');
            
            if (rooms.length === 0) {
                container.innerHTML = '<div style="color: #8899aa;">Aktif oda yok</div>';
                return;
            }

            container.innerHTML = rooms.map(room => `
                <div class="room-item" onclick="joinRoom('${room.id}')">
                    <span>🎮 Oda ${room.id.substring(0,4)}</span>
                    <span>${room.players}/${room.maxPlayers} 👤</span>
                </div>
            `).join('');
        }

        // Oda oluştur
        window.createRoom = function() {
            const playerName = document.getElementById('player-name').value || 'Oyuncu';
            document.getElementById('loading').style.display = 'flex';
            socket.emit('create-room', { playerName: playerName });
        };

        // Odaya katıl
        window.joinRoom = function(id) {
            const playerName = document.getElementById('player-name').value || 'Oyuncu';
            document.getElementById('loading').style.display = 'flex';
            roomId = id;
            socket.emit('join-room', {
                roomId: id,
                playerName: playerName
            });
        };

        // Oyunu başlat
        function startGame(data) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            initThree();
            createMap(data.map);
            
            data.players.forEach(player => {
                if (player.id !== myPlayerId) {
                    addPlayer(player);
                }
            });
            
            gameActive = true;
            
            // Skor tablosunu güncelle
            updateScoreboard(data.players, data.scores);
        }

        // Three.js başlat
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Işıklandırma
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            scene.add(directionalLight);

            // Zemin
            const groundGeometry = new THREE.PlaneGeometry(60, 60);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3a6b4b });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = 0;
            ground.receiveShadow = true;
            scene.add(ground);

            // Izgara
            const gridHelper = new THREE.GridHelper(60, 20, 0xff4444, 0x333333);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);

            animate();
        }

        // Harita oluştur
        function createMap(mapData) {
            mapData.walls.forEach(wall => {
                const geometry = new THREE.BoxGeometry(wall.size[0], wall.size[1], wall.size[2]);
                const material = new THREE.MeshStandardMaterial({ color: wall.color });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(wall.pos[0], wall.pos[1], wall.pos[2]);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                mapWalls.push(mesh);
            });
        }

        // Oyuncu ekle
        function addPlayer(playerData) {
            const group = new THREE.Group();

            // Gövde
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 2);
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: playerData.team === 'red' ? 0xff4444 : 0x4444ff 
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1;
            body.castShadow = true;
            group.add(body);

            // Kafa
            const headGeo = new THREE.SphereGeometry(0.4);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 2.2;
            head.castShadow = true;
            group.add(head);

            // Silah
            const weaponGeo = new THREE.BoxGeometry(0.2, 0.2, 1);
            const weaponMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const weapon = new THREE.Mesh(weaponGeo, weaponMat);
            weapon.position.set(0.5, 1.2, 0.8);
            weapon.castShadow = true;
            group.add(weapon);

            group.position.set(playerData.position.x, playerData.position.y, playerData.position.z);

            scene.add(group);
            players.set(playerData.id, group);
        }

        // Oyuncu kaldır
        function removePlayer(playerId) {
            const player = players.get(playerId);
            if (player) {
                scene.remove(player);
                players.delete(playerId);
            }
        }

        // Oyun güncelleme
        function updateGame(data) {
            data.players.forEach(playerUpdate => {
                if (playerUpdate.id === myPlayerId) {
                    if (!myPlayer) {
                        myPlayer = players.get(myPlayerId);
                    }
                    updateHealth(playerUpdate.health);
                } else {
                    const player = players.get(playerUpdate.id);
                    if (player) {
                        player.position.set(
                            playerUpdate.position.x,
                            playerUpdate.position.y,
                            playerUpdate.position.z
                        );
                        player.rotation.y = playerUpdate.rotation.y;
                    }
                }
            });
            
            updateScoreboard(data.players, data.scores);
        }

        // Skor tablosu güncelle
        function updateScoreboard(players, scores) {
            document.getElementById('red-score').textContent = scores.red;
            document.getElementById('blue-score').textContent = scores.blue;

            const list = document.getElementById('players-list');
            list.innerHTML = players
                .sort((a, b) => b.kills - a.kills)
                .map(p => `
                    <div class="player-row" style="border-left: 3px solid ${p.team === 'red' ? '#ff4444' : '#4444ff'}">
                        <span>${p.name}</span>
                        <span>${p.kills}/${p.deaths}</span>
                    </div>
                `).join('');
        }

        // Sağlık güncelle
        function updateHealth(health) {
            const fill = document.getElementById('health-fill');
            const text = document.getElementById('health-text');
            
            fill.style.width = health + '%';
            text.textContent = health + ' HP';
            
            if (health < 30) {
                fill.style.background = 'linear-gradient(90deg, #ff0000, #ff4444)';
            }
        }

        // Mermi güncelle
        function updateAmmo(current, max) {
            document.getElementById('ammo-current').textContent = current;
            document.getElementById('ammo-max').textContent = max;
        }

        // Kill mesajı ekle
        function addKillMessage(killer, victim) {
            const feed = document.getElementById('killfeed');
            const msg = document.createElement('div');
            msg.className = 'kill-message';
            msg.innerHTML = `
                <span style="color: #ff4444">${killer}</span>
                <span style="color: white"> → </span>
                <span style="color: #4444ff">${victim}</span>
            `;
            feed.appendChild(msg);
            
            setTimeout(() => msg.remove(), 3000);
        }

        // Mermi efekti
        function createMuzzleFlash(position) {
            const light = new THREE.PointLight(0xffaa00, 2, 10);
            light.position.set(position.x, position.y + 1.5, position.z);
            scene.add(light);
            
            setTimeout(() => scene.remove(light), 50);
        }

        // Yeniden doğma
        window.respawn = function() {
            socket.emit('respawn');
        };

        function startRespawnTimer() {
            let time = 3;
            const timerEl = document.getElementById('respawn-timer');
            
            if (respawnTimer) clearInterval(respawnTimer);
            
            respawnTimer = setInterval(() => {
                time--;
                timerEl.textContent = time;
                
                if (time <= 0) {
                    clearInterval(respawnTimer);
                    document.getElementById('respawn-btn').click();
                }
            }, 1000);
        }

        // Hareket girdileri
        function sendInput() {
            if (!gameActive || !socket) return;

            socket.emit('player-input', {
                inputs: {
                    forward: keys['KeyW'] || (joystickActive && joystickVector.y < -0.3),
                    backward: keys['KeyS'] || (joystickActive && joystickVector.y > 0.3),
                    left: keys['KeyA'] || (joystickActive && joystickVector.x < -0.3),
                    right: keys['KeyD'] || (joystickActive && joystickVector.x > 0.3),
                    sprint: keys['ShiftLeft'],
                    jump: keys['Space'],
                    shoot: isShooting
                }
            });
        }

        // Klavye kontrolleri
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // Fare kontrolü
        document.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement && gameActive) {
                socket.emit('player-input', {
                    rotation: { x: e.movementX, y: e.movementY }
                });
            }
        });

        // Mobil joystick
        const joystick = document.getElementById('joystick');
        const handle = document.getElementById('joystick-handle');

        joystick.addEventListener('touchstart', (e) => {
            joystickActive = true;
            e.preventDefault();
        });

        joystick.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            e.preventDefault();

            const touch = e.touches[0];
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let deltaX = touch.clientX - centerX;
            let deltaY = touch.clientY - centerY;

            const distance = Math.sqrt(deltaX**2 + deltaY**2);
            const maxDistance = rect.width / 2;

            if (distance > maxDistance) {
                deltaX = (deltaX / distance) * maxDistance;
                deltaY = (deltaY / distance) * maxDistance;
            }

            handle.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            
            joystickVector.x = deltaX / maxDistance;
            joystickVector.y = deltaY / maxDistance;
            
            sendInput();
        });

        joystick.addEventListener('touchend', () => {
            joystickActive = false;
            handle.style.transform = 'translate(0px, 0px)';
            joystickVector = { x: 0, y: 0 };
            sendInput();
        });

        // Ateş butonu
        const fireBtn = document.getElementById('fire-btn');
        fireBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isShooting = true;
            fireBtn.style.transform = 'scale(0.9)';
            sendInput();
        });
        
        fireBtn.addEventListener('touchend', () => {
            isShooting = false;
            fireBtn.style.transform = 'scale(1)';
            sendInput();
        });

        // Her frame'de input gönder
        setInterval(sendInput, 50);

        // Animasyon döngüsü
        function animate() {
            requestAnimationFrame(animate);
            
            if (camera && myPlayer) {
                // Kamerayı oyuncuya ata
                camera.position.copy(myPlayer.position);
                camera.position.y += 1.5;
            }
            
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        // Pencere boyutu değişince
        window.addEventListener('resize', () => {
            if (camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        // Oda listesini yükle
        function loadRooms() {
            socket.emit('get-rooms');
        }

        // Bağlantıyı başlat
        connectSocket();
    </script>
</body>
</html>
