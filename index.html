<!DOCTYPE html>
<html lang="az" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M…ôl…ôk AI ‚Äď S…ôsli S√ľni Z…ôka</title>
    <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/lib/index.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --bubble-user: #007aff;
            --bubble-bot: #e9e9eb;
            --blue: #007aff;
            --radius: 22px;
            --transition: 0.25s;
        }
        [data-theme="dark"] {
            --bg: #000;
            --surface: #1c1c1e;
            --text: #f5f5f7;
            --bubble-bot: #2c2c2e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app {
            width:100%; max-width:480px; height:100dvh;
            background:var(--surface);
            display:flex; flex-direction:column;
            box-shadow:0 0 40px rgba(0,0,0,0.1);
            overflow:hidden;
            border-radius: 24px;
        }
        .navbar {
            padding:12px 16px; display:flex; align-items:center;
            justify-content:space-between;
            border-bottom:1px solid rgba(0,0,0,0.05);
        }
        .nav-left { display:flex; align-items:center; gap:10px; }
        .avatar {
            width:40px; height:40px; border-radius:50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display:flex; align-items:center; justify-content:center;
            font-size:20px; color:white;
        }
        .status { color:#34c759; font-size:12px; }
        .icon-btn {
            width:36px; height:36px; border-radius:50%; border:none;
            background:rgba(0,0,0,0.05); cursor:pointer;
            font-size:18px; display:flex; align-items:center;
            justify-content:center;
        }
        .chat-area {
            flex:1; overflow-y:auto; padding:16px;
            display:flex; flex-direction:column; gap:8px;
        }
        .msg {
            max-width:85%; padding:10px 14px; border-radius:var(--radius);
            animation: fade 0.3s ease;
        }
        @keyframes fade { from { opacity:0; transform:translateY(10px); } }
        .bot { align-self:flex-start; background:var(--bubble-bot); }
        .user { align-self:flex-end; background:var(--bubble-user); color:#fff; }
        .input-row {
            display:flex; padding:12px; gap:8px; align-items:center;
            border-top:1px solid rgba(0,0,0,0.05);
        }
        input {
            flex:1; border:none; background:rgba(0,0,0,0.05);
            padding:12px 16px; border-radius:24px; font-size:15px;
            outline:none;
        }
        .mic-btn, .send-btn {
            width:44px; height:44px; border-radius:50%; border:none;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; background:var(--blue); color:#fff;
            font-size:18px; transition:0.2s;
        }
        .mic-btn.recording { background:#ff3b30; animation:pulse 1s infinite; }
        @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
    </style>
</head>
<body>
<div class="app">
    <div class="navbar">
        <div class="nav-left">
            <div class="avatar">‚ú®</div>
            <div><strong>M…ôl…ôk</strong><br><span class="status" id="status">y√ľkl…ônir...</span></div>
        </div>
        <div style="display:flex; gap:6px;">
            <button class="icon-btn" onclick="toggleTheme()">ūüĆô</button>
            <button class="icon-btn" onclick="clearChat()">ūüóĎÔłŹ</button>
        </div>
    </div>
    <div class="chat-area" id="chat"></div>
    <div class="input-row">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()">ūüé§</button>
        <input type="text" id="userInput" placeholder="Yaz..." onkeydown="if(event.key==='Enter')sendText()">
        <button class="send-btn" onclick="sendText()">‚ě§</button>
    </div>
</div>
<script>
// === KONFńįQ ===
const MODEL_NAME = "gemma-2-2b-it"; // 2 milyard parametr, optimal
const STORAGE_KEY = "melek_local_v1";
let engine = null;
let userName = localStorage.getItem("melek_user_name") || "";
let chatHistory = JSON.parse(localStorage.getItem("melek_chat") || "[]");

const chatDiv = document.getElementById("chat");
const statusSpan = document.getElementById("status");
const micBtn = document.getElementById("micBtn");
let recognition = null;
let isRecording = false;

// === ńįLK Y√úKL∆ŹM∆Ź ===
async function init() {
    showMessage("bot", "‚ö° Model y√ľkl…ônir... Bu bir ne√ß…ô d…ôqiq…ô √ß…ôk…ô bil…ôr.");
    try {
        engine = await webllm.CreateMLCEngine(MODEL_NAME, {
            temperature: 0.7,
            maxSteps: 4096,
        });
        statusSpan.textContent = "onlayn ūüüĘ";
        document.getElementById("status").style.color = "#34c759";
        showMessage("bot", "‚úÖ HazńĪram! M…ôn M…ôl…ôk…ôm ‚ú®");
        if (!userName) {
            showMessage("bot", "S…ônin adńĪn n…ôdir, dostum?");
        } else {
            showMessage("bot", `XoŇü g…ôldin, ${userName}! ūüėä`);
        }
    } catch(e) {
        statusSpan.textContent = "x…ôta ‚ĚĆ";
        showMessage("bot", "Model y√ľkl…ôn…ô bilm…ôdi. Yeni Android/iOS lazńĪmdńĪr.");
    }
    renderChat();
}

// === S√ĖHB∆ŹT ===
function renderChat() {
    chatDiv.innerHTML = "";
    chatHistory.forEach(m => {
        const div = document.createElement("div");
        div.className = `msg ${m.role}`;
        div.textContent = m.content;
        chatDiv.appendChild(div);
    });
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showMessage(role, content) {
    chatHistory.push({ role, content });
    localStorage.setItem("melek_chat", JSON.stringify(chatHistory));
    renderChat();
}

async function sendText() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text || !engine) return;
    input.value = "";
    showMessage("user", text);
    
    // AdńĪ √∂yr…ôn
    if (!userName && text.length < 30) {
        userName = text;
        localStorage.setItem("melek_user_name", userName);
        showMessage("bot", `TanńĪŇü olduńüuma Ňüad, ${userName}! ūüéČ`);
        return;
    }
    
    // Sistem promptu
    const systemMsg = `S…ôn M…ôl…ôk. Dost, Ňüirin, komik. 
    Sahibin Xaliq Mustadayev (@xaliqmustafayev).
    ńįstifad…ô√ßi adńĪ ${userName || "dostum"}.
    Onun dili: az…ôrbaycanca. QńĪsa, emojili danńĪŇü.`;
    
    const messages = [
        { role: "system", content: systemMsg },
        ...chatHistory.slice(-10)
    ];
    
    try {
        const reply = await engine.chat.completions.create({ messages });
        showMessage("bot", reply.choices[0].message.content);
        speakText(reply.choices[0].message.content);
    } catch(e) {
        showMessage("bot", "ūüėĶ Beynim getdi, t…ôkrar yaz.");
    }
}

// === S∆ŹS ===
function toggleMic() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert("S…ôsli giriŇü d…ôst…ôkl…ônmir.");
        return;
    }
    if (!recognition) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'az-AZ';
        recognition.interimResults = false;
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById("userInput").value = transcript;
            sendText();
            stopMic();
        };
        recognition.onerror = (e) => stopMic();
    }
    if (isRecording) {
        recognition.stop();
        stopMic();
    } else {
        recognition.start();
        micBtn.classList.add("recording");
        micBtn.textContent = "ūüĒī";
        isRecording = true;
    }
}
function stopMic() {
    micBtn.classList.remove("recording");
    micBtn.textContent = "ūüé§";
    isRecording = false;
}
function speakText(text) {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'az-AZ';
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }
}

function toggleTheme() {
    const html = document.documentElement;
    const cur = html.getAttribute("data-theme");
    html.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
    localStorage.setItem("melek_theme", cur === "dark" ? "light" : "dark");
}
function clearChat() {
    if(confirm("S√∂hb…ôt silinsin?")) {
        chatHistory = [];
        localStorage.setItem("melek_chat", "[]");
        renderChat();
    }
}
(function loadTheme() {
    const t = localStorage.getItem("melek_theme") || "light";
    document.documentElement.setAttribute("data-theme", t);
})();

init();
</script>
</body>
</html>
