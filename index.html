<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔴 CANLI MÜHARİBƏ İZLƏMƏ – REAL OSINT</title>
    
    <!-- Leaflet Xəritə -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            position: fixed;
        }

        #map {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* TV STİLİ XƏBƏR LENTİ */
        #news-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #cc0000;
            color: white;
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 -5px 20px rgba(255,0,0,0.5);
            border-top: 2px solid #ff6666;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        #ticker-content {
            display: inline-block;
            animation: ticker 35s linear infinite;
            font-size: 22px;
            font-weight: bold;
            padding-left: 100%;
        }

        .ticker-item {
            display: inline-block;
            padding-right: 60px;
            color: white;
        }

        .ticker-item::before {
            content: "🚨";
            margin-right: 10px;
            font-size: 24px;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* ANLIQ XƏBƏR PANELİ (Sağ Üst) */
        #breaking-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.95);
            border-left: 8px solid #ff0000;
            border-radius: 15px;
            padding: 20px;
            color: white;
            max-width: 400px;
            width: calc(100% - 40px);
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid #ff4444;
        }

        .breaking-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .red-dot {
            width: 16px;
            height: 16px;
            background: #ff0000;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .breaking-title {
            font-size: 24px;
            font-weight: bold;
            color: #ff0000;
            margin: 10px 0;
            line-height: 1.3;
        }

        .breaking-location {
            font-size: 18px;
            margin: 5px 0;
            color: #ffaa00;
        }

        .breaking-time {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }

        /* STATİSTİKA PANELİ (Sol Üst) */
        #stats-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #ff4444;
            border-radius: 15px;
            padding: 15px;
            color: white;
            min-width: 220px;
            max-width: 300px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 15px;
        }

        .stat-value {
            color: #ff4444;
            font-weight: bold;
        }

        #country-stats {
            margin-top: 12px;
            max-height: 180px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding-top: 8px;
        }

        .country-stat {
            display: flex;
            justify-content: space-between;
            padding: 6px 5px;
            font-size: 14px;
            border-bottom: 1px dashed #333;
        }
        
        .country-stat:last-child {
            border-bottom: none;
        }

        /* MENU DÜYMƏSİ (Yenilə) */
        #menu-btn {
            position: absolute;
            bottom: 70px;
            right: 20px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            background: #ff4444;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 0 30px #ff4444;
            border: 2px solid white;
            transition: transform 0.2s;
        }
        #menu-btn:active {
            transform: scale(0.9);
        }

        /* MOBİL ÜÇÜN YAN TUTMA DƏSTƏYİ */
        @media (orientation: landscape) and (max-width: 900px) {
            #stats-panel {
                top: 10px;
                left: 10px;
                max-width: 250px;
                font-size: 13px;
            }
            #breaking-panel {
                top: 10px;
                right: 10px;
                max-width: 350px;
                padding: 15px;
            }
            .breaking-title {
                font-size: 18px;
            }
        }
        
        @media (max-width: 600px) {
            #breaking-panel {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
                padding: 15px;
            }
            #stats-panel {
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
            }
            #news-ticker {
                height: 40px;
                font-size: 16px;
            }
            #menu-btn {
                width: 50px;
                height: 50px;
                font-size: 26px;
                bottom: 60px;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- XƏBƏR LENTİ (Qırmızı TV Lenti) -->
    <div id="news-ticker">
        <div id="ticker-content">Məlumat yüklənir...</div>
    </div>

    <!-- ANLIQ XƏBƏR PANELİ -->
    <div id="breaking-panel">
        <div class="breaking-header">
            <span class="red-dot"></span>
            <span>🔴 SON DƏQİQƏ</span>
        </div>
        <div class="breaking-title" id="breaking-title">Məlumat yüklənir...</div>
        <div class="breaking-location" id="breaking-location"></div>
        <div class="breaking-time" id="breaking-time"></div>
    </div>

    <!-- STATİSTİKA PANELİ -->
    <div id="stats-panel">
        <div style="font-size: 18px; margin-bottom: 10px; color: #ff4444; display: flex; align-items: center; gap: 8px;">
            <span>📊 CANLI MƏLUMAT</span>
            <span style="font-size: 10px; background:#ff4444; color:white; padding:2px 6px; border-radius:10px;">Hər 30san</span>
        </div>
        <div class="stat-row">
            <span>Ümumi hadisələr:</span>
            <span class="stat-value" id="total-events">0</span>
        </div>
        <div class="stat-row">
            <span>Son yenilənmə:</span>
            <span class="stat-value" id="last-update">-</span>
        </div>
        
        <div id="country-stats">
            <div style="text-align:center; color:#666; padding:10px;">Məlumat gözlənilir...</div>
        </div>
    </div>

    <!-- YENİLƏ DÜYMƏSİ -->
    <div id="menu-btn" onclick="forceRefresh()">🔄</div>

    <script>
        // ===========================================
        // 1. SƏNİN CANLI API-İN (Render)
        // ===========================================
        const API_URL = 'https://saskioyunu-2rxd.onrender.com/api/live-war-data';
        
        let map;
        let markers = [];
        let lastNewsTitles = []; // Təkrarın qarşısını almaq üçün

        // Telegram tam ekran
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.expand();
            document.body.classList.add('telegram-view');
        }

        // ===========================================
        // 2. XƏRİTƏNİ BAŞLAT
        // ===========================================
        function initMap() {
            map = L.map('map', {
                center: [30, 35], // Orta Şərq və Ukrayna mərkəzli
                zoom: 2.5,
                zoomControl: false,
                attributionControl: false
            });

            // Qaranlıq xəritə (worldmonitor stilində)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
        }

        // ===========================================
        // 3. MƏLUMATLARI ÇƏK VƏ GÖSTƏR (ƏSAS FUNKSİYA)
        // ===========================================
        async function fetchAndDisplayData() {
            try {
                // API-dən məlumatları çək
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`API xətası: ${response.status}`);
                }
                const data = await response.json();
                
                // ** ƏGƏR MƏLUMAT GƏLMƏYİBSƏ **
                if (!data || !data.news || data.news.length === 0) {
                    document.getElementById('breaking-title').innerText = 'Məlumat tapılmadı (API boş)';
                    return;
                }

                // -------------------------------------------------
                // A. XƏBƏR LENTİNİ YENİLƏ (TV STİLİ)
                // -------------------------------------------------
                if (data.news && data.news.length > 0) {
                    // Təkrarları filterlə
                    const newNews = data.news.filter(n => !lastNewsTitles.includes(n.title));
                    if (newNews.length > 0) {
                        // Son 10 xəbəri yadda saxla
                        lastNewsTitles = [...newNews.map(n => n.title), ...lastNewsTitles].slice(0, 10);
                        
                        // Lent üçün HTML yarat
                        const tickerContent = newNews.map(n => 
                            `<span class="ticker-item">🚨 ${n.title}</span>`
                        ).join('');
                        
                        // Mövcud lentin sonuna əlavə et (kəsmədən)
                        const currentTicker = document.getElementById('ticker-content');
                        if (currentTicker.innerHTML === 'Məlumat yüklənir...') {
                            currentTicker.innerHTML = tickerContent;
                        } else {
                            currentTicker.innerHTML += tickerContent;
                        }
                        
                        // ** ANLIQ XƏBƏR PANELİNİ YENİLƏ (ilk xəbər) **
                        const latest = data.news[0]; // API-dən gələn ən təzə xəbər
                        document.getElementById('breaking-title').innerText = latest.title;
                        document.getElementById('breaking-location').innerHTML = 
                            `📍 ${latest.country ? latest.country.toUpperCase() : 'Bilinmir'}`;
                        document.getElementById('breaking-time').innerText = 
                            latest.date ? new Date(latest.date).toLocaleString('az-AZ', { hour: '2-digit', minute: '2-digit', hour12: false }) : new Date().toLocaleTimeString('az-AZ');
                    }
                }

                // -------------------------------------------------
                // B. XƏRİTƏDƏKİ MARKERLARI YENİLƏ (münaqişələr)
                // -------------------------------------------------
                if (data.conflicts && data.conflicts.length > 0) {
                    // Köhnə markerları təmizlə
                    markers.forEach(m => map.removeLayer(m));
                    markers = [];
                    
                    // Hər bir hadisə üçün marker yarat
                    data.conflicts.forEach(event => {
                        if (event.lat && event.lng && !isNaN(event.lat) && !isNaN(event.lng)) {
                            // Ölüm sayına görə rəng və ölçü
                            const fatalities = event.fatalities || 0;
                            let color = '#ffaa00'; // az
                            if (fatalities > 20) color = '#ff0000'; // çox
                            else if (fatalities > 5) color = '#ff6600'; // orta
                            
                            const radius = Math.min(5 + (fatalities * 0.5), 18);
                            
                            const marker = L.circleMarker([event.lat, event.lng], {
                                radius: radius,
                                color: color,
                                weight: 2,
                                fillColor: color,
                                fillOpacity: 0.7,
                                pulse: true
                            }).addTo(map);
                            
                            // Popup məlumatı
                            marker.bindPopup(`
                                <b>${event.country || 'Bilinmir'}</b><br>
                                <b>Yer:</b> ${event.location || event.region || 'Bilinmir'}<br>
                                <b>Tip:</b> ${event.type || 'Münaqişə'}<br>
                                <b>Ölən:</b> ${fatalities}<br>
                                <b>Mənbə:</b> ${event.source || 'API'}<br>
                                <small>${event.date ? new Date(event.date).toLocaleString('az-AZ') : ''}</small>
                            `);
                            
                            markers.push(marker);
                        }
                    });
                }

                // -------------------------------------------------
                // C. STATİSTİKANİ YENİLƏ
                // -------------------------------------------------
                document.getElementById('total-events').innerText = data.conflicts?.length || 0;
                document.getElementById('last-update').innerText = 
                    new Date().toLocaleTimeString('az-AZ', { hour: '2-digit', minute: '2-digit', second:'2-digit' });

                // Ölkə statistikası (hansı ölkədə nə qədər hadisə)
                if (data.conflicts) {
                    const countryCount = {};
                    data.conflicts.forEach(e => {
                        if (e.country) {
                            const countryName = e.country.split(',')[0].trim(); // Sadə ad
                            countryCount[countryName] = (countryCount[countryName] || 0) + 1;
                        }
                    });

                    // İrana xüsusi diqqət
                    const iranCount = data.conflicts.filter(e => 
                        e.country?.toLowerCase().includes('iran')).length;
                    if (iranCount > 0) {
                        console.log(`🇮🇷 İRAN: ${iranCount} hadisə`);
                    }

                    // Statistikaları HTML-ə çevir
                    const sortedCountries = Object.entries(countryCount)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 12); // max 12 ölkə

                    if (sortedCountries.length > 0) {
                        const countryHtml = sortedCountries.map(([country, count]) => `
                            <div class="country-stat">
                                <span>${country}</span>
                                <span style="color:#ff4444; font-weight:bold;">${count}</span>
                            </div>
                        `).join('');
                        document.getElementById('country-stats').innerHTML = countryHtml;
                    } else {
                        document.getElementById('country-stats').innerHTML = '<div style="text-align:center; color:#666;">Məlumat yoxdur</div>';
                    }
                }

            } catch (error) {
                console.error('Məlumat çəkilə bilmədi:', error);
                document.getElementById('breaking-title').innerText = '⚠️ API xətası';
                document.getElementById('country-stats').innerHTML = `<div style="color:#ff4444; text-align:center;">Bağlantı xətası:<br>${error.message}</div>`;
            }
        }

        // ===========================================
        // 4. ƏL İLƏ YENİLƏ (Düyməyə basanda)
        // ===========================================
        function forceRefresh() {
            document.getElementById('breaking-title').innerText = 'Yenilənir...';
            fetchAndDisplayData();
        }

        // ===========================================
        // 5. AVTOMATİK YENİLƏMƏ
        // ===========================================
        window.onload = () => {
            initMap();
            fetchAndDisplayData(); // İlk dəfə yüklə
            
            // Hər 30 saniyədə bir yenilə
            setInterval(fetchAndDisplayData, 30000);
            
            // Ekran dəyişəndə xəritəni tənzimlə
            window.addEventListener('resize', () => {
                if (map) map.invalidateSize();
            });
            window.addEventListener('orientationchange', () => {
                setTimeout(() => map.invalidateSize(), 200);
            });
        };
    </script>
</body>
</html>
