<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hareket Takip Kamera - GitHub.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Seçimi engelleyerek hafif performans artışı */
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Courier New', monospace;
            padding: 16px;
        }

        .container {
            background: #11151f;
            border-radius: 2rem;
            padding: 1rem;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .video-wrapper {
            position: relative;
            border-radius: 1.2rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
        }

        canvas, video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        video {
            filter: brightness(1.02) contrast(1.05);
            z-index: 1;
        }

        canvas {
            z-index: 2;
            pointer-events: none; /* canvas sadece gösterim için, etkileşim video üzerinden */
        }

        .info-panel {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 0.7rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            font-weight: 600;
            color: #eef5ff;
            text-shadow: 0 1px 2px black;
            font-size: 0.9rem;
        }

        .stats span {
            color: #4affb5;
            font-weight: bold;
            font-size: 1.2rem;
            margin-left: 6px;
            background: #00000066;
            padding: 0px 8px;
            border-radius: 40px;
        }

        button {
            background: #2c3e66;
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 2rem;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            transition: all 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.96);
            background: #1f2c46;
        }

        .status {
            background: #1e2a3a;
            padding: 5px 14px;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #bbe1ff;
        }

        .fps-meter {
            font-family: monospace;
            font-weight: bold;
            background: #000000aa;
            padding: 4px 12px;
            border-radius: 2rem;
        }

        @media (max-width: 700px) {
            .stats { gap: 0.8rem; font-size: 0.7rem;}
            .stats span { font-size: 1rem;}
            .info-panel { padding: 0.5rem 1rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="container">
        <div class="video-wrapper" style="position: relative; width: 85vw; max-width: 1100px; aspect-ratio: 16 / 9; margin: 0 auto;">
            <video id="video" autoplay playsinline muted style="width:100%; height:100%; object-fit: cover;"></video>
            <canvas id="overlayCanvas" style="width:100%; height:100%; object-fit: cover;"></canvas>
        </div>
        <div class="info-panel">
            <div class="stats">
                <div>🎯 HEDEFLER: <span id="objectCount">0</span></div>
                <div>⚡ HAREKET SKOR: <span id="motionScore">0</span></div>
            </div>
            <div class="status" id="camStatus">📷 KAMERA BAŞLATILIYOR...</div>
            <div class="fps-meter" id="fpsDisplay">⚡ 0 FPS</div>
            <button id="resetBtn">⟳ YENİDEN BAŞLAT</button>
        </div>
        <div style="font-size: 11px; text-align: center; margin-top: 12px; color:#7f8c9a;">✨ Hareketli nesneleri anında takip eder — yeşil çerçeveler ile işaretler ✨</div>
    </div>
</div>

<script>
    (function(){
        // ---- DOM ELEMANLARI ----
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlayCanvas');
        const ctx = canvas.getContext('2d');
        const objectCountSpan = document.getElementById('objectCount');
        const motionScoreSpan = document.getElementById('motionScore');
        const camStatusDiv = document.getElementById('camStatus');
        const fpsDisplaySpan = document.getElementById('fpsDisplay');
        const resetBtn = document.getElementById('resetBtn');

        // ---- PERFORMANS AYARLARI (gecikmesiz takip) ----
        let animationFrameId = null;
        let processingFrame = false;       // Çakışma önleme
        let lastTimestamp = 0;
        let frameCount = 0;
        let fps = 0;
        
        // ---- HAREKET ALGILAMA DEĞİŞKENLERİ ----
        let previousFrame = null;           // gri tonlamalı önceki kare (ImageData)
        let motionData = null;              // eşiklenmiş fark haritası (ImageData)
        
        // ayarlar (hızlı & hassas)
        const BLUR_SIZE = 3;                // küçük gürültü azaltma (performans için çok büyük değil)
        const MOTION_THRESHOLD = 28;        // piksel fark eşiği (0-255) - düşük gecikme
        const MIN_CONTOUR_AREA = 280;       // minimum takip edilecek alan (piksel) - küçük hareketleri de yakala
        const MAX_OBJECTS = 12;              // maksimum takip sayısı
            
        // çerçeve boyutları
        let width = 0, height = 0;
        let active = true;

        // ---- KAMERA BAŞLAT (düşük gecikmeli ayarlar) ----
        async function initCamera() {
            try {
                camStatusDiv.innerHTML = "📷 İzin isteniyor...";
                // Düşük gecikme için ideal ayarlar: resolution 640x480 veya mevcut ideal, fakat hızlı işlem için max 720p
                // Mobil ve masaüstünde en düşük gecikmeyi sağlamak için ideal çözünürlük: 640x480 veya cihazın desteklediği hızlı mod.
                // "advanced" constraint ile düşük gecikme tercihi.
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640, max: 800 },
                        height: { ideal: 480, max: 600 },
                        frameRate: { ideal: 30, max: 60 },
                        facingMode: "environment" // arka kamera öncelikli (tablet/telefon)
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                await video.play();
                
                // video metadata yüklendiğinde canvas boyutlarını ayarla
                video.addEventListener('loadedmetadata', () => {
                    // videonun gerçek görüntü boyutları
                    width = video.videoWidth;
                    height = video.videoHeight;
                    
                    // canvas elementinin boyutlarını tam eşitle (çözünürlük takibi için)
                    canvas.width = width;
                    canvas.height = height;
                    // video elementinin boyut CSS ile kontrol ediliyor, ama çizim buffer'ı tam boy olmalı
                    
                    // önceki frame buffer'ları temizle
                    if(previousFrame) previousFrame = null;
                    
                    camStatusDiv.innerHTML = "✅ TAKİP AKTİF | HAREKET BEKLENİYOR";
                    
                    // ilk kareyi bekleyerek işlem döngüsünü başlat
                    if(animationFrameId) cancelAnimationFrame(animationFrameId);
                    animationFrameId = requestAnimationFrame(detectMotionLoop);
                });
                
            } catch (err) {
                console.error("Kamera hatası:", err);
                camStatusDiv.innerHTML = "❌ KAMERA ERİŞİM HATASI | İzin verin";
                alert("Kamera erişimi gerekli! Lütfen izin verin ve sayfayı yenileyin.");
            }
        }
        
        // ---- HIZLI GRAYSCALE DÖNÜŞÜMÜ (ImageData -> Uint8Array) ----
        function toGrayscaleFast(imageData) {
            const data = imageData.data;
            const len = data.length;
            // yeni bir Uint8ClampedArray oluştur (gri ton, her piksel 1 byte)
            const gray = new Uint8Array(imageData.width * imageData.height);
            for (let i = 0, j = 0; i < len; i += 4, j++) {
                // luminance formülü: 0.299R + 0.587G + 0.114B
                // tamsayı hızı için shift & toplama tercih edilebilir, ancak modern JS yeterince hızlı
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                // gri = (r*0.299 + g*0.587 + b*0.114)
                gray[j] = (r * 0.299 + g * 0.587 + b * 0.114) | 0;
            }
            return gray;
        }
        
        // ----- Basit Kutu (blur) ile gürültü azaltma: 3x3 ortalama filtresi (performans optimizasyonu) -----
        function applyFastBlur(gray, w, h) {
            // ortalama blur 3x3, sınırlarda koruma
            const blurred = new Uint8Array(w * h);
            for (let y = 1; y < h-1; y++) {
                const rowOff = y * w;
                for (let x = 1; x < w-1; x++) {
                    let sum = 0;
                    let idx = rowOff + x;
                    // 3x3 kernel
                    sum += gray[idx - w - 1]; // üst sol
                    sum += gray[idx - w];     // üst
                    sum += gray[idx - w + 1]; // üst sağ
                    sum += gray[idx - 1];     // sol
                    sum += gray[idx];         // merkez
                    sum += gray[idx + 1];     // sağ
                    sum += gray[idx + w - 1]; // alt sol
                    sum += gray[idx + w];     // alt
                    sum += gray[idx + w + 1]; // alt sağ
                    blurred[idx] = (sum / 9) | 0;
                }
            }
            // sınır kopyalama (basit)
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    if (y === 0 || y === h-1 || x === 0 || x === w-1) {
                        blurred[y*w + x] = gray[y*w + x];
                    }
                }
            }
            return blurred;
        }
        
        // ----- Hareket farkı hesapla (Frame differencing) ve binary maske oluştur (Uint8Array)-----
        function computeMotionMask(prevGray, currGray, w, h, threshold) {
            const mask = new Uint8Array(w * h);
            let motionPixelCount = 0;
            const totalPixels = w * h;
            for (let i = 0; i < totalPixels; i++) {
                const diff = Math.abs(currGray[i] - prevGray[i]);
                if (diff > threshold) {
                    mask[i] = 255;
                    motionPixelCount++;
                } else {
                    mask[i] = 0;
                }
            }
            return { mask, motionPixelCount };
        }
        
        // ----- Bileşen Etiketleme (Connected Components) hızlı 2-pass (basit union-find) -----
        // Bu fonksiyon binary mask üzerinde bağlı bileşenleri bulur, her bileşenin bounding box'ını döndürür
        function findConnectedComponents(mask, w, h, minArea) {
            const parent = new Array(w * h);
            for (let i = 0; i < w*h; i++) parent[i] = i;
            
            function find(a) {
                while(parent[a] !== a) {
                    parent[a] = parent[parent[a]];
                    a = parent[a];
                }
                return a;
            }
            function union(a,b) {
                const ra = find(a);
                const rb = find(b);
                if(ra !== rb) parent[rb] = ra;
            }
            
            // first pass: 4-komşuluk (hızlı bağlantı, yeterli)
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = y * w + x;
                    if (mask[idx] === 255) {
                        // sol komşu
                        if (x > 0 && mask[idx-1] === 255) union(idx, idx-1);
                        // üst komşu
                        if (y > 0 && mask[idx-w] === 255) union(idx, idx-w);
                    }
                }
            }
            
            // component toplama ve bounding box hesaplama
            const compMap = new Map(); // root -> {minX,minY,maxX,maxY, count}
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = y * w + x;
                    if (mask[idx] === 255) {
                        const root = find(idx);
                        if (!compMap.has(root)) {
                            compMap.set(root, {
                                minX: x, maxX: x,
                                minY: y, maxY: y,
                                count: 1
                            });
                        } else {
                            const box = compMap.get(root);
                            box.minX = Math.min(box.minX, x);
                            box.maxX = Math.max(box.maxX, x);
                            box.minY = Math.min(box.minY, y);
                            box.maxY = Math.max(box.maxY, y);
                            box.count++;
                        }
                    }
                }
            }
            
            // bounding box listesi (alan minArea üzeri)
            const boxes = [];
            for (let [_, box] of compMap.entries()) {
                const area = (box.maxX - box.minX + 1) * (box.maxY - box.minY + 1);
                if (area >= minArea && box.count >= 8) { // en az 8 piksel ile anlamlı
                    boxes.push({
                        x: box.minX,
                        y: box.minY,
                        w: box.maxX - box.minX + 1,
                        h: box.maxY - box.minY + 1,
                        area: area,
                        pixelCount: box.count
                    });
                }
            }
            // büyükten küçüğe sıralama (isteğe bağlı) ama karışıklık olmasın
            boxes.sort((a,b) => b.area - a.area);
            if(boxes.length > MAX_OBJECTS) boxes.length = MAX_OBJECTS;
            return boxes;
        }
        
        // ---- ÇERÇEVE ÇİZİM: yeşil dikdörtgenler ile takip ----
        function drawTrackingBoxes(boxes, motionScore) {
            if(!ctx) return;
            ctx.clearRect(0, 0, width, height);
            if(!boxes.length) {
                // hiçbir hedef yoksa hafif yazı göster
                ctx.font = "bold 18px 'Segoe UI'";
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#88aaffcc";
                ctx.shadowColor = "black";
                ctx.fillText("⚡ hareket bekleniyor...", 20, 40);
                ctx.shadowBlur = 0;
                return;
            }
            
            // her bir takip edilen nesneyi çerçevele
            for(let i=0; i<boxes.length; i++) {
                const b = boxes[i];
                // neon yeşil çerçeve, kalın
                ctx.beginPath();
                ctx.strokeStyle = "#1eff6e";
                ctx.lineWidth = Math.max(2, Math.min(5, Math.floor(b.w / 20) + 2));
                ctx.shadowBlur = 0;
                ctx.strokeRect(b.x, b.y, b.w, b.h);
                // köşe vurgusu
                ctx.fillStyle = "#1eff6ecc";
                ctx.font = `bold ${Math.max(12, Math.floor(b.h/5))}px monospace`;
                ctx.shadowBlur = 4;
                ctx.fillText(`●`, b.x+3, b.y+15);
                ctx.font = "bold 13px monospace";
                ctx.fillStyle = "#ffffffdd";
                ctx.fillText(`${i+1}`, b.x+5, b.y+14);
            }
            
            // eğer çok fazla hareket varsa skor göstergesi çiz
            if(motionScore > 1200) {
                ctx.font = "bold 14px monospace";
                ctx.fillStyle = "#ffd966";
                ctx.fillText("🔥 YOĞUN HAREKET", width-130, 30);
            }
        }
        
        // ---- ANA İŞLEME DÖNGÜSÜ (gecikmesiz, hızlı frameler) ----
        let frameSkipGuard = false;
        async function detectMotionLoop(timestamp) {
            if (!active) return;
            if (!video.videoWidth || !video.videoHeight) {
                // video hazır değil, tekrar dene
                animationFrameId = requestAnimationFrame(detectMotionLoop);
                return;
            }
            
            // Eğer önceki kare işleniyorsa atla (frame drop yaparak gecikmeyi önle)
            if (processingFrame) {
                animationFrameId = requestAnimationFrame(detectMotionLoop);
                return;
            }
            
            processingFrame = true;
            
            // FPS hesaplama
            frameCount++;
            const now = performance.now();
            if (now - lastTimestamp >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTimestamp = now;
                fpsDisplaySpan.innerText = `⚡ ${fps} FPS`;
            }
            
            try {
                // Canvas'a video karesini çizip ImageData al (hızlı yakalama)
                // Geçici canvas oluşturmak yerine doğrudan video üzerinden imagedata almak daha hızlı değil.
                // OffscreenCanvas kullanarak daha hızlı işlem:
                const offCanvas = new OffscreenCanvas(width, height);
                const offCtx = offCanvas.getContext('2d');
                offCtx.drawImage(video, 0, 0, width, height);
                const currentImageData = offCtx.getImageData(0, 0, width, height);
                
                // gri tonlamaya çevir
                const currGray = toGrayscaleFast(currentImageData);
                
                // ilk frame durumu: sadece kaydet
                if (previousFrame === null) {
                    previousFrame = currGray;
                    processingFrame = false;
                    animationFrameId = requestAnimationFrame(detectMotionLoop);
                    return;
                }
                
                // blur ile gürültü azalt (hızlı)
                const currBlurred = applyFastBlur(currGray, width, height);
                const prevBlurred = applyFastBlur(previousFrame, width, height);
                
                // hareket maskesi oluştur
                const { mask, motionPixelCount } = computeMotionMask(prevBlurred, currBlurred, width, height, MOTION_THRESHOLD);
                
                // hareket skorunu güncelle (UI)
                motionScoreSpan.innerText = motionPixelCount;
                
                // bağlı bileşenler (nesneleri) bul
                let boxes = [];
                if (motionPixelCount > 40) {  // yeterli hareket varsa takip et
                    boxes = findConnectedComponents(mask, width, height, MIN_CONTOUR_AREA);
                }
                
                // UI güncelleme: hedef sayısı
                objectCountSpan.innerText = boxes.length;
                
                // CANVAS üzerine çizim yap (takip çerçeveleri)
                drawTrackingBoxes(boxes, motionPixelCount);
                
                // bir sonraki frame için şimdiki kareyi kaydet (referans)
                previousFrame = currBlurred;
                
            } catch(err) {
                console.warn("İşleme hatası:", err);
            } finally {
                processingFrame = false;
            }
            
            // döngüyü devam ettir
            animationFrameId = requestAnimationFrame(detectMotionLoop);
        }
        
        // ---- YENİDEN BAŞLAT (kamera ve frame sıfırlama) ----
        function fullReset() {
            if(animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            // mevcut stream'i durdur
            if(video.srcObject) {
                const tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                video.srcObject = null;
            }
            previousFrame = null;
            processingFrame = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            objectCountSpan.innerText = "0";
            motionScoreSpan.innerText = "0";
            fpsDisplaySpan.innerText = "⚡ 0 FPS";
            camStatusDiv.innerHTML = "🔄 SIFIRLANIYOR...";
            setTimeout(() => {
                initCamera();
            }, 100);
        }
        
        resetBtn.addEventListener('click', () => {
            fullReset();
        });
        
        // sayfa kapanırken stream'i serbest bırak
        window.addEventListener('beforeunload', () => {
            if(video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
        });
        
        // Başlat
        initCamera();
    })();
</script>
</body>
</html>
