    :root {

<script>
    // ===== CONFIG & STATE =====
    const CONFIG = {
        SERVER_URL: 'wss://saskioyunu-1-2d6i.onrender.com',
        CANVAS_WIDTH: window.innerWidth,
        CANVAS_HEIGHT: window.innerHeight
    };

    let gameState = {
        playerId: null,
        username: 'Player_' + Math.random().toString(36).substr(2, 9),
        currentRoomId: null,
        isConnected: false,
        gameManager: null,
        keys: {}
    };

    let gameSocket = null;

    // ===== TELEGRAM WEB APP INTEGRATION =====
    window.addEventListener('load', () => {
        if (window.Telegram?.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();

            if (tg.initDataUnsafe?.user) {
                const user = tg.initDataUnsafe.user;
                gameState.username = user.first_name || user.username || 'Player';
                document.getElementById('username-input').value = gameState.username;
            }
        } else {
            console.log('Telegram WebApp yüklenmedi. Demo modunda çalışıyor.');
        }

        connectToServer();
        setupEventListeners();
    });

    // ===== SERVER CONNECTION =====
    function connectToServer() {
        gameSocket = new WebSocket(CONFIG.SERVER_URL);

        gameSocket.onopen = () => {
            gameState.isConnected = true;
            gameState.playerId = 'player_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

            gameSocket.send(JSON.stringify({
                type: 'INIT',
                clientId: gameState.playerId,
                userData: {
                    username: gameState.username
                }
            }));

            console.log('✅ Sunucuya bağlandı');
        };

        gameSocket.onmessage = handleMessage;

        gameSocket.onerror = (error) => {
            console.error('❌ WebSocket hata:', error);
            alert('Sunucuya bağlanılamadı. Lütfen sayfayı yenileyin.');
        };

        gameSocket.onclose = () => {
            console.log('⚠️ Bağlantı kesildi');
            gameState.isConnected = false;
            setTimeout(connectToServer, 3000);
        };

        window.gameSocket = gameSocket;
    }

    function handleMessage(event) {
        try {
            const message = JSON.parse(event.data);

            switch (message.type) {
                case 'INIT_SUCCESS':
                    gameState.playerId = message.clientId;
                    break;

                case 'ROOMS_LIST':
                    displayRooms(message.rooms);
                    break;

                case 'ROOM_CREATED':
                    startGame(
                        message.room.id,
                        message.roomData,
                        message.players,
                        true,
                        message.room.monsterType === 'Bot'
                    );
                    break;

                case 'PLAYER_JOINED':
                    if (gameState.gameManager) {
                        gameState.gameManager.players.set(message.player.id, {
                            ...message.player,
                            animation: 'idle',
                            animationFrame: 0,
                            canJump: false,
                            hasKey: false,
                            isMonster: false
                        });
                    }
                    break;

                case 'PLAYER_UPDATED':
                    if (gameState.gameManager) {
                        const player = gameState.gameManager.players.get(message.player.id);
                        if (player) {
                            player.x = message.player.x;
                            player.y = message.player.y;
                            player.vx = message.player.vx;
                            player.vy = message.player.vy;
                            player.animation = message.player.animation;
                            player.username = message.player.username;
                            player.avatar = message.player.avatar;
                        }
                    }
                    break;

                case 'MONSTER_UPDATED':
                    if (gameState.gameManager && gameState.gameManager.monster) {
                        gameState.gameManager.monster.x = message.x;
                        gameState.gameManager.monster.y = message.y;
                        gameState.gameManager.monster.animation = message.animation;
                    }
                    break;

                case 'KEY_COLLECTED':
                    if (gameState.gameManager) {
                        const collector = gameState.gameManager.players.get(message.collectingPlayerId);
                        if (collector) {
                            collector.hasKey = true;
                        }
                    }
                    break;

                case 'PLAYER_CAUGHT':
                    if (gameState.gameManager) {
                        const caughtPlayer = gameState.gameManager.players.get(message.playerId);
                        if (caughtPlayer) {
                            caughtPlayer.alive = false;
                            console.log(`⚠️ ${caughtPlayer.username} yakalandı!`);
                        }
                    }
                    break;

                case 'PLAYERS_ESCAPED':
                    if (gameState.gameManager) {
                        gameState.gameManager.handleGameOver(message.escapedPlayers);
                    }
                    break;

                case 'GAME_OVER':
                    if (gameState.gameManager) {
                        gameState.gameManager.handleGameOver(message.survivors);
                    }
                    break;

                case 'GAME_STARTED':
                    break;

                case 'NEW_ROOM_CREATED':
                    refreshRoomsList();
                    break;

                case 'PLAYER_LEFT':
                    if (gameState.gameManager) {
                        gameState.gameManager.players.delete(message.playerId);
                    }
                    break;
            }
        } catch (err) {
            console.error('Message parse hatası:', err);
        }
    }

    // ===== UI FUNCTIONS =====
    function setupEventListeners() {
        document.getElementById('find-game-btn').addEventListener('click', showRoomsList);
        document.getElementById('create-room-btn').addEventListener('click', createNewRoom);
        document.getElementById('username-input').addEventListener('change', (e) => {
            gameState.username = e.target.value || 'Player';
        });
    }

    function showRoomsList() {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('rooms-screen').classList.remove('hidden');
        refreshRoomsList();
    }

    function refreshRoomsList() {
        if (!gameState.isConnected) return;

        gameSocket.send(JSON.stringify({
            type: 'GET_ROOMS'
        }));
    }

    function displayRooms(rooms) {
        const container = document.getElementById('rooms-list');

        if (rooms.length === 0) {
            container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--secondary);">Hiç oda yok. Oluşturun! 🎮</p>';
            return;
        }

        container.innerHTML = rooms.map(room => `
            <div class="room-card">
                <h3>Oda #${room.id}</h3>
                <p><span>👤 Yaratıcı:</span> <strong>${room.creatorName}</strong></p>
                <p><span>👥 Oyuncular:</span> <strong>${room.playerCount}/${room.maxPlayers}</strong></p>
                <p><span>🤖 Canavar:</span> <strong>${room.monsterType}</strong></p>
                <p><span>⏱️ Durum:</span> <strong>${room.gameStarted ? '🎮 Oynanıyor' : '⏸️ Hazırlanıyor'}</strong></p>
                <button onclick="joinRoom(${room.id})" ${room.isFull ? 'disabled' : ''}>
                    ${room.isFull ? 'ODA DOLU ❌' : 'KATIL ✅'}
                </button>
            </div>
        `).join('');
    }

    function createNewRoom() {
        gameState.username = document.getElementById('username-input').value || gameState.username;

        if (!gameState.isConnected) {
            alert('Sunucuya bağlanılamadı. Lütfen bekleyin...');
            return;
        }

        document.getElementById('menu-screen').classList.add('hidden');

        gameSocket.send(JSON.stringify({
            type: 'CREATE_ROOM',
            username: gameState.username,
            avatar: '👤'
        }));
    }

    function joinRoom(roomId) {
        gameState.username = document.getElementById('username-input').value || gameState.username;

        if (!gameState.isConnected) {
            alert('Sunucuya bağlanılamadı. Lütfen bekleyin...');
            return;
        }

        document.getElementById('rooms-screen').classList.add('hidden');

        gameSocket.send(JSON.stringify({
            type: 'JOIN_ROOM',
            roomId: roomId,
            username: gameState.username,
            avatar: '👤'
        }));
    }

    function goBackToMenu() {
        document.getElementById('rooms-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }

    function startGame(roomId, roomData, players, isCreator, isAIMonster) {
        gameState.currentRoomId = roomId;

        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('rooms-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');

        const canvas = document.getElementById('gameCanvas');
        canvas.width = CONFIG.CANVAS_WIDTH;
        canvas.height = CONFIG.CANVAS_HEIGHT;

        gameState.gameManager = new GameManager(canvas);
        gameState.gameManager.initializeGame(
            roomId,
            roomData,
            players,

    function showStartGamePrompt(roomId, isAIMonster = true) {
        const choice = confirm(`

        gameSocket.send(JSON.stringify({

    // ===== MOBILE CONTROLS - PUBG STYLE JOYSTICK =====
    function setupMobileControls() {
        const mobileControls = document.getElementById('mobile-controls');
        const hudControls = document.getElementById('hud-controls');
        
        // Landscape modu kontrol
        const checkOrientation = () => {
            if (window.innerWidth > window.innerHeight) {
                mobileControls.classList.add('landscape');
                hudControls.classList.add('landscape');
            } else {
                mobileControls.classList.remove('landscape');
                hudControls.classList.remove('landscape');
            }
        };

        window.addEventListener('orientationchange', checkOrientation);
        window.addEventListener('resize', checkOrientation);
        checkOrientation();

        // ===== LEFT JOYSTICK =====
        const joystickArea = document.getElementById('joystick-area');
        const joystickStick = document.getElementById('joystick-stick');
        
        let isJoystickActive = false;
        const joystickRadius = 65;

        const updateJoystickPosition = (e) => {
            if (!isJoystickActive) return;

            const touch = e.touches[0];
            const rect = joystickArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let x = touch.clientX - centerX;
            let y = touch.clientY - centerY;

            const distance = Math.hypot(x, y);
            if (distance > joystickRadius) {
                x = (x / distance) * joystickRadius;
                y = (y / distance) * joystickRadius;
            }

            joystickStick.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;

            // Hareket yönü hesapla
            const normalizedX = x / joystickRadius;
            const normalizedY = y / joystickRadius;

            // WASD tuşlarına çevir
            gameState.keys['w'] = normalizedY < -0.3;
            gameState.keys['a'] = normalizedX < -0.3;
            gameState.keys['s'] = normalizedY > 0.3;
            gameState.keys['d'] = normalizedX > 0.3;
        };

        joystickArea.addEventListener('touchstart', (e) => {
            isJoystickActive = true;
            joystickStick.classList.add('active');
            updateJoystickPosition(e);
        });

        joystickArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            updateJoystickPosition(e);
        });

        joystickArea.addEventListener('touchend', () => {
            isJoystickActive = false;
            joystickStick.classList.remove('active');
            joystickStick.style.transform = 'translate(-50%, -50%)';
            gameState.keys['w'] = false;
            gameState.keys['a'] = false;
            gameState.keys['s'] = false;
            gameState.keys['d'] = false;
        });

        // ===== ACTION BUTTONS =====
        const jumpBtn = document.getElementById('btn-jump');
        const sprintBtn = document.getElementById('btn-sprint');
        const shootBtn = document.getElementById('btn-shoot');
        const menuBtn = document.getElementById('btn-menu');

        jumpBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            gameState.keys['space'] = true;
        });
        jumpBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            gameState.keys['space'] = false;
        });

        sprintBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            gameState.keys['shift'] = true;
        });
        sprintBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            gameState.keys['shift'] = false;
        });

        shootBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            // Future action
        });

        menuBtn.addEventListener('click', () => {
            if (confirm('Oyunu bırakmak istediğinize emin misiniz?')) {
                location.reload();
            }
        });

        // HUD Status güncellemesi
        setInterval(() => {
            const hudStatus = document.getElementById('hud-status');
            if (gameState.gameManager && gameState.gameManager.players.get(gameState.playerId)) {
                const player = gameState.gameManager.players.get(gameState.playerId);
                hudStatus.textContent = `👤 ${player.username.substring(0, 12)} | ${player.alive ? '✅ Alive' : '❌ Dead'}`;
            }
        }, 500);
    }

    // ===== RESPONSIVE =====
    window.addEventListener('resize', () => {
        CONFIG.CANVAS_WIDTH = window.innerWidth;
        CONFIG.CANVAS_HEIGHT = window.innerHeight;

        const canvas = document.getElementById('gameCanvas');
        if (canvas) {
            canvas.width = CONFIG.CANVAS_WIDTH;
            canvas.height = CONFIG.CANVAS_HEIGHT;
        }
    });
</script>
