#ui {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}

#crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,200,0.8);
}
#crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

#hud {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: #c8b560; font-size: 13px; letter-spacing: 2px; text-align: center;
  text-shadow: 0 0 10px #c8b560;
}

#danger {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(255,0,0,0.35) 100%);
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}

#startScreen {
  position: fixed; inset: 0; background: #111100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; color: #c8b560;
}
#startScreen h1 {
  font-size: clamp(36px, 8vw, 80px); letter-spacing: 12px;
  text-shadow: 0 0 40px #c8b560, 0 0 80px #a09040;
  margin-bottom: 20px; animation: flicker 3s infinite;
}
#startScreen p {
  font-size: 14px; letter-spacing: 3px; color: #807040;
  margin-bottom: 40px; text-align: center; padding: 0 20px;
}
#startBtn {
  padding: 14px 40px; font-size: 16px; letter-spacing: 4px;
  background: transparent; border: 2px solid #c8b560;
  color: #c8b560; cursor: pointer; font-family: inherit;
  transition: all 0.3s; text-transform: uppercase;
}
#startBtn:hover { background: #c8b560; color: #111100; }

/* Mobile Controls */
#mobileControls {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 220px;
  pointer-events: none; z-index: 20; display: none;
}
#joystick {
  position: absolute; bottom: 30px; left: 30px;
  width: 120px; height: 120px; pointer-events: all;
}
#joystickBase {
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(200,181,96,0.15); border: 2px solid rgba(200,181,96,0.4);
  position: relative;
}
#joystickThumb {
  width: 50px; height: 50px; border-radius: 50%;
  background: rgba(200,181,96,0.6); border: 2px solid #c8b560;
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  transition: none;
}
#lookPad {
  position: absolute; bottom: 30px; right: 30px;
  width: 150px; height: 150px; border-radius: 50%;
  background: rgba(200,181,96,0.08); border: 2px solid rgba(200,181,96,0.2);
  pointer-events: all;
}
#jumpBtn {
  position: absolute; bottom: 150px; right: 30px;
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(200,181,96,0.2); border: 2px solid #c8b560;
  color: #c8b560; font-size: 22px; display: flex;
  align-items: center; justify-content: center;
  pointer-events: all; user-select: none; cursor: pointer;
}

@keyframes flicker {
  0%,95%,100%{opacity:1} 96%{opacity:0.4} 97%{opacity:1} 98%{opacity:0.6}
}

#gameOver {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; color: #ff2200;
}
#gameOver h2 { font-size: 48px; letter-spacing: 8px; text-shadow: 0 0 30px #ff2200; margin-bottom: 20px; }
#gameOver p  { color: #888; letter-spacing: 2px; margin-bottom: 30px; }
#retryBtn {
  padding: 12px 32px; font-size: 14px; letter-spacing: 3px;
  background: transparent; border: 2px solid #ff2200;
  color: #ff2200; cursor: pointer; font-family: inherit;
  transition: all 0.3s;
}
#retryBtn:hover { background: #ff2200; color: #000; }
