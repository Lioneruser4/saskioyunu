<!-- index.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms - Kaçış</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            overflow: hidden;
            background: #000;
            color: white;
        }
        
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        #menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: all;
            z-index: 100;
            transition: opacity 0.5s;
        }
        
        #menu-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .menu-title {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 2rem;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { text-shadow: 0 0 40px rgba(255, 215, 0, 0.8); }
        }
        
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 300px;
        }
        
        .menu-btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
            pointer-events: all;
        }
        
        .menu-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }
        
        .menu-btn.primary {
            background: #ffd700;
            color: #1a1a2e;
        }
        
        .menu-btn.primary:hover {
            background: #ffed4d;
        }
        
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #key-status {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2rem;
            border-left: 4px solid #ffd700;
        }
        
        #key-status.has-key {
            border-left-color: #00ff00;
            color: #00ff00;
        }
        
        #player-count {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2rem;
        }
        
        #chaser-selector {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid #ffd700;
            display: none;
            pointer-events: all;
            z-index: 200;
            width: 90%;
            max-width: 400px;
        }
        
        #chaser-selector.active {
            display: block;
        }
        
        .chaser-title {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #ffd700;
        }
        
        .chaser-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .chaser-option {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .chaser-option:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }
        
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            display: none;
        }
        
        #mobile-controls.active {
            display: flex;
        }
        
        .joystick-area {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            pointer-events: all;
        }
        
        .action-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 35px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            pointer-events: all;
            cursor: pointer;
            margin: 10px;
        }
        
        @media (max-width: 768px) {
            .menu-title {
                font-size: 2.5rem;
                letter-spacing: 0.5rem;
            }
            
            .menu-buttons {
                width: 250px;
            }
        }
        
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
    </div>
    
    <div id="ui-container">
        <div id="menu-screen">
            <h1 class="menu-title">BACKROOMS</h1>
            <div class="menu-buttons">
                <button class="menu-btn primary" onclick="joinGame()">OYUN BUL</button>
                <button class="menu-btn" onclick="showRooms()">ODALAR</button>
                <button class="menu-btn" onclick="createRoom()">ODA OLUŞTUR</button>
            </div>
        </div>
        
        <div id="hud" style="display: none;">
            <div id="key-status">🔑 Anahtar yok</div>
            <div id="player-count">👥 0 oyuncu</div>
        </div>
        
        <div id="chaser-selector">
            <h3 class="chaser-title">KOVALAYICI SEÇ</h3>
            <div class="chaser-options">
                <div class="chaser-option" onclick="selectChaser('ai')">🤖 Yapay Zeka</div>
                <div class="chaser-option" onclick="selectChaser('random')">🎲 Rastgele Oyuncu</div>
                <div class="chaser-option" onclick="selectChaser('none')">❌ Kovalayıcı Yok</div>
            </div>
        </div>
        
        <div id="mobile-controls">
            <div class="joystick-area" id="movement-joystick"></div>
            <div style="display: flex; flex-direction: column;">
                <div class="action-btn" id="jump-btn">⬆️</div>
                <div class="action-btn" id="interact-btn">🔑</div>
            </div>
        </div>
    </div>
    
    <canvas id="game-canvas"></canvas>
    
    <!-- Socket.io -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // Game state
        let socket = null;
        let scene, camera, renderer;
        let playerId = null;
        let players = {};
        let rooms = {};
        let currentRoom = null;
        let keys = {};
        let chasers = {};
        let gameActive = false;
        let hasKey = false;
        let animations = {};
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let playerModel = null;
        
        // Movement controls
        const moveState = {
            forward: false,
            backward: false,
            left: false,
            right: false,
            jump: false
        };
        
        // Telegram WebApp integration
        const telegram = window.Telegram?.WebApp;
        let telegramId = null;
        
        if (telegram) {
            telegram.ready();
            telegramId = telegram.initDataUnsafe?.user?.id || 'guest_' + Math.random().toString(36).substr(2, 9);
        } else {
            telegramId = 'guest_' + Math.random().toString(36).substr(2, 9);
        }
        
        // Initialize game
        function init() {
            // Three.js setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            // Add some basic walls for testing
            createTestRoom();
            
            // Start animation loop
            animate();
            
            // Setup controls
            setupControls();
            
            // Connect to server
            connectToServer();
            
            // Hide loading screen after a delay
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
            }, 1000);
        }
        
        function createTestRoom() {
            // Floor
            const floorGeometry = new THREE.PlaneGeometry(20, 20);
            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a3a });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = 0;
            floor.receiveShadow = true;
            scene.add(floor);
            
            // Walls
            const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x4a4a6a });
            
            // Back wall
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(20, 5, 0.5), wallMaterial);
            backWall.position.set(0, 2.5, -10);
            backWall.castShadow = true;
            backWall.receiveShadow = true;
            scene.add(backWall);
            
            // Front wall
            const frontWall = new THREE.Mesh(new THREE.BoxGeometry(20, 5, 0.5), wallMaterial);
            frontWall.position.set(0, 2.5, 10);
            frontWall.castShadow = true;
            frontWall.receiveShadow = true;
            scene.add(frontWall);
            
            // Left wall
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 20), wallMaterial);
            leftWall.position.set(-10, 2.5, 0);
            leftWall.castShadow = true;
            leftWall.receiveShadow = true;
            scene.add(leftWall);
            
            // Right wall
            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 20), wallMaterial);
            rightWall.position.set(10, 2.5, 0);
            rightWall.castShadow = true;
            rightWall.receiveShadow = true;
            scene.add(rightWall);
            
            // Add some pillars
            const pillarMaterial = new THREE.MeshStandardMaterial({ color: 0x5a5a7a });
            for (let i = -2; i <= 2; i+=2) {
                for (let j = -2; j <= 2; j+=2) {
                    const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 0.5), pillarMaterial);
                    pillar.position.set(i * 3, 2, j * 3);
                    pillar.castShadow = true;
                    pillar.receiveShadow = true;
                    scene.add(pillar);
                }
            }
            
            // Add key (golden cube)
            const keyGeometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const keyMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x442200 });
            const key = new THREE.Mesh(keyGeometry, keyMaterial);
            key.position.set(5, 1, 5);
            key.castShadow = true;
            scene.add(key);
            keys.key1 = key;
        }
        
        function connectToServer() {
            const serverUrl = 'https://saskioyunu-1-2d6i.onrender.com';
            
            socket = io(serverUrl, {
                reconnection: true,
                reconnectionAttempts: Infinity,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                timeout: 20000
            });
            
            socket.on('connect', () => {
                console.log('Sunucuya bağlandı!', socket.id);
                playerId = socket.id;
                
                socket.emit('player-join', {
                    id: playerId,
                    telegramId: telegramId,
                    name: telegram?.initDataUnsafe?.user?.first_name || 'Oyuncu'
                });
            });
            
            socket.on('disconnect', () => {
                console.log('Sunucu bağlantısı koptu, yeniden bağlanılıyor...');
            });
            
            socket.on('reconnect', () => {
                console.log('Sunucuya yeniden bağlandı!');
                if (currentRoom) {
                    socket.emit('rejoin-room', { roomId: currentRoom, playerId: playerId });
                }
            });
            
            socket.on('game-state', (state) => {
                players = state.players || {};
                rooms = state.rooms || {};
                updatePlayerCount();
            });
            
            socket.on('room-created', (roomData) => {
                currentRoom = roomData.id;
                showChaserSelector();
            });
            
            socket.on('room-joined', (roomData) => {
                currentRoom = roomData.id;
                gameActive = true;
                document.getElementById('menu-screen').classList.add('hidden');
                document.getElementById('hud').style.display = 'flex';
                
                if (window.innerWidth <= 768) {
                    document.getElementById('mobile-controls').classList.add('active');
                }
                
                // Load room data
                loadRoom(roomData);
            });
            
            socket.on('player-moved', (data) => {
                if (players[data.id]) {
                    players[data.id].position = data.position;
                    players[data.id].rotation = data.rotation;
                }
            });
            
            socket.on('key-collected', (data) => {
                if (data.playerId === playerId) {
                    hasKey = true;
                    document.getElementById('key-status').textContent = '🔑 Anahtar alındı!';
                    document.getElementById('key-status').classList.add('has-key');
                }
                
                if (keys[data.keyId]) {
                    scene.remove(keys[data.keyId]);
                    delete keys[data.keyId];
                }
            });
            
            socket.on('chaser-selected', (data) => {
                chasers[data.roomId] = data.chaserId;
            });
            
            socket.on('player-caught', (data) => {
                if (data.playerId === playerId) {
                    alert('Yakalandın! Oyun bitti.');
                    resetGame();
                }
            });
            
            socket.on('game-won', (data) => {
                if (data.playerId === playerId) {
                    alert('Tebrikler! Anahtarla kaçtın!');
                    resetGame();
                }
            });
        }
        
        function loadRoom(roomData) {
            // Clear existing room objects
            // This would load the actual room layout from server data
            console.log('Oda yükleniyor:', roomData);
        }
        
        function joinGame() {
            socket.emit('find-game');
        }
        
        function showRooms() {
            socket.emit('get-rooms', (roomsList) => {
                // Display rooms list (simplified)
                alert('Aktif odalar: ' + Object.keys(roomsList).length);
            });
        }
        
        function createRoom() {
            document.getElementById('chaser-selector').classList.add('active');
        }
        
        function selectChaser(type) {
            document.getElementById('chaser-selector').classList.remove('active');
            
            socket.emit('create-room', {
                chaserType: type,
                playerId: playerId
            });
        }
        
        function resetGame() {
            gameActive = false;
            hasKey = false;
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('hud').style.display = 'none';
            document.getElementById('mobile-controls').classList.remove('active');
            document.getElementById('key-status').classList.remove('has-key');
            document.getElementById('key-status').textContent = '🔑 Anahtar yok';
            
            // Reset camera position
            camera.position.set(0, 2, 5);
        }
        
        function updatePlayerCount() {
            document.getElementById('player-count').textContent = `👥 ${Object.keys(players).length} oyuncu`;
        }
        
        // Movement controls
        function setupControls() {
            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (!gameActive) return;
                
                switch(e.code) {
                    case 'KeyW':
                        moveState.forward = true;
                        break;
                    case 'KeyS':
                        moveState.backward = true;
                        break;
                    case 'KeyA':
                        moveState.left = true;
                        break;
                    case 'KeyD':
                        moveState.right = true;
                        break;
                    case 'Space':
                        e.preventDefault();
                        moveState.jump = true;
                        break;
                }
            });
            
            document.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW':
                        moveState.forward = false;
                        break;
                    case 'KeyS':
                        moveState.backward = false;
                        break;
                    case 'KeyA':
                        moveState.left = false;
                        break;
                    case 'KeyD':
                        moveState.right = false;
                        break;
                    case 'Space':
                        moveState.jump = false;
                        break;
                }
            });
            
            // Mouse look
            document.addEventListener('mousemove', (e) => {
                if (!gameActive || document.pointerLockElement !== document.body) return;
                
                const sensitivity = 0.002;
                const deltaX = e.movementX * sensitivity;
                const deltaY = e.movementY * sensitivity;
                
                camera.rotation.y -= deltaX;
                camera.rotation.x -= deltaY;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            });
            
            // Click to lock pointer
            document.getElementById('game-canvas').addEventListener('click', () => {
                if (gameActive) {
                    document.body.requestPointerLock();
                }
            });
            
            // Mobile controls (simplified)
            let touchStartX = 0;
            let touchStartY = 0;
            
            document.getElementById('movement-joystick').addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            });
            
            document.getElementById('movement-joystick').addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const deltaX = touch.clientX - touchStartX;
                const deltaY = touch.clientY - touchStartY;
                
                moveState.forward = deltaY < -20;
                moveState.backward = deltaY > 20;
                moveState.left = deltaX < -20;
                moveState.right = deltaX > 20;
            });
            
            document.getElementById('movement-joystick').addEventListener('touchend', () => {
                moveState.forward = false;
                moveState.backward = false;
                moveState.left = false;
                moveState.right = false;
            });
            
            document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                moveState.jump = true;
            });
            
            document.getElementById('jump-btn').addEventListener('touchend', (e) => {
                e.preventDefault();
                moveState.jump = false;
            });
            
            document.getElementById('interact-btn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                // Check for nearby key
                checkKeyPickup();
            });
            
            // Window resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function checkKeyPickup() {
            if (!gameActive || !hasKey) return;
            
            // Simple distance check to key
            for (let keyId in keys) {
                const key = keys[keyId];
                const distance = camera.position.distanceTo(key.position);
                
                if (distance < 2) {
                    socket.emit('collect-key', { keyId: keyId, playerId: playerId, roomId: currentRoom });
                    break;
                }
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameActive) {
                // Handle movement
                const speed = 0.1;
                velocity.x = 0;
                velocity.z = 0;
                
                if (moveState.forward) velocity.z -= speed;
                if (moveState.backward) velocity.z += speed;
                if (moveState.left) velocity.x -= speed;
                if (moveState.right) velocity.x += speed;
                
                // Apply rotation to movement direction
                if (velocity.length() > 0) {
                    velocity.applyEuler(new THREE.Euler(0, camera.rotation.y, 0));
                    
                    // Simple collision detection with walls
                    const newPos = camera.position.clone().add(velocity);
                    
                    // Check boundaries (simplified)
                    if (Math.abs(newPos.x) < 9.5 && Math.abs(newPos.z) < 9.5) {
                        camera.position.copy(newPos);
                    }
                }
                
                // Jump (simplified)
                if (moveState.jump && camera.position.y <= 2.1) {
                    velocity.y = 0.2;
                }
                
                // Gravity
                if (camera.position.y > 2) {
                    velocity.y -= 0.01;
                    camera.position.y += velocity.y;
                } else {
                    camera.position.y = 2;
                    velocity.y = 0;
                }
                
                // Send position to server
                if (socket && socket.connected) {
                    socket.emit('player-move', {
                        position: {
                            x: camera.position.x,
                            y: camera.position.y,
                            z: camera.position.z
                        },
                        rotation: {
                            x: camera.rotation.x,
                            y: camera.rotation.y,
                            z: camera.rotation.z
                        }
                    });
                }
            }
            
            renderer.render(scene, camera);
        }
        
        // Start the game
        window.onload = init;
    </script>
</body>
</html>
