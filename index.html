<!DOCTYPE html>
<html>
<head>
<meta charset="windows-1254">
<title>Musteri Takip Sistemi</title>
<hta:application id="MusteriTakip" applicationname="MusteriTakip" border="thin" caption="yes" maximizebutton="yes" minimizebutton="yes" sysmenu="yes" navigable="no" showintaskbar="yes" singleinstance="yes" windowstate="maximized">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#eef2f7;padding:20px}
.container{max-width:1400px;margin:0 auto}
.header{background:white;border-radius:14px;padding:15px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;border-left:5px solid #2c7da0}
h1{font-size:22px;color:#2c7da0}
.btn{padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.btn-mavi{background:#2c7da0;color:white}
.btn-boz{background:#e9ecef;color:#2c7da0;border:1px solid #dee2e6}
.btn-yesil{background:#28a745;color:white;width:42px;height:38px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;border:none;cursor:pointer;font-size:16px}
.panel{background:white;border-radius:14px;padding:18px;margin-bottom:20px}
.input-grup{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:15px}
input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:13px;outline:none}
input:focus{border-color:#2c7da0}
.qovluqlar{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.qovluq-item{background:#f8f9fa;border:1px solid #e9ecef;padding:6px 16px;border-radius:25px;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:8px}
.qovluq-item.active{background:#2c7da0;color:white}
.sil-qovluq{cursor:pointer;font-size:14px;opacity:0.6}
.table-wrapper{background:white;border-radius:14px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:14px 12px;background:#f8f9fa;border-bottom:2px solid #e9ecef}
td{padding:12px;border-bottom:1px solid #f0f0f0}
.musteri-ad{background:none;border:none;color:#2c7da0;font-weight:600;cursor:pointer;font-size:14px}
.kucuk-btn{padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-size:11px;margin:2px}
.btn-gelis{background:#e7f3f8;color:#2c7da0}
.btn-bilgi{background:#e9ecef;color:#2c7da0}
.btn-sil{background:#ffe0e0;color:#dc3545}
.badge{background:#f8f9fa;padding:3px 8px;border-radius:12px;font-size:11px;display:inline-block;margin-top:4px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-ic{background:white;border-radius:18px;width:90%;max-width:550px;max-height:80vh;overflow-y:auto;padding:22px}
.modal-baslik{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;border-bottom:2px solid #2c7da0;padding-bottom:10px}
.kapat{font-size:26px;cursor:pointer;color:#888}
.log-list{background:#f8f9fa;border-radius:12px;padding:10px;max-height:200px;overflow-y:auto;margin-bottom:15px}
.log-item{padding:6px 0;border-bottom:1px solid #e9ecef;font-size:12px}
.toplam-kutu{background:#e7f3f8;padding:12px;border-radius:12px;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🏥 MUSTERI TAKIP SISTEMI</h1>
<div><button class="btn btn-boz" id="statBtn">📊 STATISTIKA</button>
<button class="btn btn-mavi" id="yedekBtn">💾 YEDEK AL</button>
<button class="btn btn-boz" id="yukleBtn">📂 YEDEK YUKLE</button></div></div>
<div class="panel"><div class="input-grup"><input type="text" id="yeniQovluq" placeholder="Yeni qovluq adi"><button class="btn btn-mavi" id="qovluqElave">+ QOVLUQ YARAT</button></div><div class="qovluqlar" id="qovluqListesi"></div></div>
<div class="panel"><div class="input-grup"><input type="text" id="musteriAd" placeholder="Musteri adi"><input type="text" id="musteriTel" placeholder="Telefon"><button class="btn btn-mavi" id="musteriElave">+ MUSTERI ELAVE ET</button></div></div>
<div class="table-wrapper"><table><thead><tr><th>MUSTERI</th><th>TELEFON</th><th>GELIS</th><th>PUL</th><th>STATISTIKA</th><th>EMELIYYAT</th></tr></thead><tbody id="cedvelGovde"></tbody></table></div></div>
<script>
var musteriler=[],qovluqlar=[],seciliQovluq="all";
function tarixSaat(){var n=new Date(),g=n.getDate().toString().padStart(2,'0'),a=(n.getMonth()+1).toString().padStart(2,'0'),sa=n.getHours().toString().padStart(2,'0'),d=n.getMinutes().toString().padStart(2,'0');return g+'/'+a+' '+sa+':'+d;}
function bugunTarix(){var n=new Date();return n.getDate().toString().padStart(2,'0')+'/'+(n.getMonth()+1).toString().padStart(2,'0');}
function umumiPul(p){var t=0;for(var i=0;i<p.length;i++){var m=p[i].match(/(\d+)/);if(m)t+=parseInt(m[1]);}return t;}
function bugunGelis(v){var b=bugunTarix(),s=0;for(var i=0;i<v.length;i++)if(v[i].substring(0,5)===b)s++;return s;}
function filtreli(){if(seciliQovluq==="all")return musteriler;var r=[];for(var i=0;i<musteriler.length;i++)if(musteriler[i].qovluqId===seciliQovluq)r.push(musteriler[i]);return r;}
function kaydet(){localStorage.setItem('MusteriTakip',JSON.stringify({musteriler:musteriler,qovluqlar:qovluqlar,seciliQovluq:seciliQovluq}));}
function yukle(){var k=localStorage.getItem('MusteriTakip');if(k){var d=JSON.parse(k);musteriler=d.musteriler||[];qovluqlar=d.qovluqlar||[];seciliQovluq=d.seciliQovluq||"all";}if(qovluqlar.length===0){qovluqlar=[{id:"q1",name:"Umumi"}];seciliQovluq="q1";}}
function cedvelGoster(){var t=document.getElementById('cedvelGovde'),f=filtreli();if(f.length===0){t.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;">📭 Musteri yoxdur</td></tr>';return;}var h='';for(var i=0;i<f.length;i++){var m=f[i],bg=bugunGelis(m.visits),tg=m.visits.length,tp=umumiPul(m.payments),ps=m.payments.length;h+='<tr><td><button class="musteri-ad" onclick="detayGoster(\''+m.id+'\')">'+m.name+'</button></td><td>'+(m.phone||'-')+'</td><td><button class="kucuk-btn btn-gelis" onclick="gelisElave(\''+m.id+'\')">✅ GELIS +1</button><div class="badge">Bugun: '+bg+' | Umumi: '+tg+'</div></td><td><button class="btn-yesil" onclick="pulElave(\''+m.id+'\',20)">💰</button><div class="badge">'+ps+' defe</div></td><td><div class="badge">📊 '+tg+' gelis</div></td><td><button class="kucuk-btn btn-bilgi" onclick="detayGoster(\''+m.id+'\')">ℹ️ BILGI</button><button class="kucuk-btn btn-sil" onclick="musteriSil(\''+m.id+'\')">🗑️ SIL</button></td></tr>';}t.innerHTML=h;}
function qovluqGoster(){var c=document.getElementById('qovluqListesi');c.innerHTML='';var a=document.createElement('div');a.className='qovluq-item'+(seciliQovluq==='all'?' active':'');a.innerHTML='📁 BUTUN MUSTERILER';a.onclick=function(){seciliQovluq='all';kaydet();qovluqGoster();cedvelGoster();};c.appendChild(a);for(var i=0;i<qovluqlar.length;i++){var q=qovluqlar[i],d=document.createElement('div');d.className='qovluq-item'+(seciliQovluq===q.id?' active':'');d.innerHTML=q.name+'<span class="sil-qovluq" data-id="'+q.id+'">✖</span>';d.onclick=function(e,qid){return function(){if(e.target.classList.contains('sil-qovluq'))return;seciliQovluq=qid;kaydet();qovluqGoster();cedvelGoster();};}(event,q.id);var s=d.querySelector('.sil-qovluq');s.onclick=function(e,qid){return function(){e.stopPropagation();if(qovluqlar.length===1){alert('En azi bir qovluq qalmalidir!');return;}var ilk=null;for(var j=0;j<qovluqlar.length;j++)if(qovluqlar[j].id!==qid){ilk=qovluqlar[j];break;}for(var k=0;k<musteriler.length;k++)if(musteriler[k].qovluqId===qid)musteriler[k].qovluqId=ilk.id;var yeni=[];for(var j=0;j<qovluqlar.length;j++)if(qovluqlar[j].id!==qid)yeni.push(qovluqlar[j]);qovluqlar=yeni;if(seciliQovluq===qid)seciliQovluq=ilk.id;kaydet();qovluqGoster();cedvelGoster();};}(event,q.id);c.appendChild(d);}}
window.gelisElave=function(id){for(var i=0;i<musteriler.length;i++)if(musteriler[i].id===id){musteriler[i].visits.push(tarixSaat());kaydet();cedvelGoster();break;}};
window.pulElave=function(id,m){for(var i=0;i<musteriler.length;i++)if(musteriler[i].id===id){musteriler[i].payments.push(tarixSaat()+' - '+m+' AZN');kaydet();cedvelGoster();break;}};
window.musteriSil=function(id){if(confirm('Bu musterini silmek isteyirsiniz?')){var y=[];for(var i=0;i<musteriler.length;i++)if(musteriler[i].id!==id)y.push(musteriler[i]);musteriler=y;kaydet();cedvelGoster();qovluqGoster();}};
window.detayGoster=function(id){var m=null;for(var i=0;i<musteriler.length;i++)if(musteriler[i].id===id){m=musteriler[i];break;}if(!m)return;var tp=umumiPul(m.payments),gh='',ph='';for(var i=0;i<m.visits.length;i++)gh+='<div class="log-item">🕒 '+m.visits[i]+'</div>';if(m.visits.length===0)gh='<div class="log-item">Gelis yoxdur</div>';for(var i=0;i<m.payments.length;i++)ph+='<div class="log-item">💰 '+m.payments[i]+'</div>';if(m.payments.length===0)ph='<div class="log-item">Pul yoxdur</div>';var qa='Umumi';for(var i=0;i<qovluqlar.length;i++)if(qovluqlar[i].id===m.qovluqId){qa=qovluqlar[i].name;break;}var md=document.createElement('div');md.className='modal';md.innerHTML='<div class="modal-ic"><div class="modal-baslik"><h3>👤 '+m.name+'</h3><span class="kapat" onclick="this.parentElement.parentElement.parentElement.remove()">&times;</span></div><p><strong>📞 Telefon:</strong> '+(m.phone||'Yoxdur')+'</p><p><strong>📁 Qovluq:</strong> '+qa+'</p><h4>📅 GELISLER ('+m.visits.length+')</h4><div class="log-list">'+gh+'</div><h4>💰 PULLAR ('+m.payments.length+')</h4><div class="log-list">'+ph+'</div><div class="toplam-kutu"><strong>📊 UMUMI</strong><br>Gelis sayi: '+m.visits.length+'<br>Umumi pul: <span style="font-size:20px;">'+tp+' AZN</span></div><button class="btn btn-mavi" style="margin-top:15px;width:100%;" onclick="this.parentElement.parentElement.remove()">BAGLA</button></div>';document.body.appendChild(md);};
window.statistikaGoster=function(){var tm=musteriler.length,tg=0,tp=0,bg=0,b=bugunTarix();for(var i=0;i<musteriler.length;i++){var m=musteriler[i];tg+=m.visits.length;tp+=umumiPul(m.payments);for(var j=0;j<m.visits.length;j++)if(m.visits[j].substring(0,5)===b)bg++;}var qs='';for(var i=0;i<qovluqlar.length;i++){var q=qovluqlar[i],qm=[],qg=0,qp=0;for(var j=0;j<musteriler.length;j++)if(musteriler[j].qovluqId===q.id)qm.push(musteriler[j]);for(var j=0;j<qm.length;j++){qg+=qm[j].visits.length;qp+=umumiPul(qm[j].payments);}qs+='<div class="log-item"><strong>📁 '+q.name+'</strong>: '+qm.length+' musteri, '+qg+' gelis, '+qp+' AZN</div>';}var md=document.createElement('div');md.className='modal';md.innerHTML='<div class="modal-ic"><div class="modal-baslik"><h3>📊 UMUMI STATISTIKA</h3><span class="kapat" onclick="this.parentElement.parentElement.parentElement.remove()">&times;</span></div><div class="toplam-kutu" style="background:#2c7da0;color:white;"><strong>📈 SISTEM UMUMI</strong><br>Musteri sayi: '+tm+'<br>Umumi gelis: '+tg+'<br>Umumi pul: '+tp+' AZN<br>Bugunku gelis: '+bg+'</div><h4>📁 QOVLUQLAR UZRE</h4><div class="log-list">'+qs+'</div><button class="btn btn-mavi" style="margin-top:15px;width:100%;" onclick="this.parentElement.parentElement.remove()">BAGLA</button></div>';document.body.appendChild(md);};
function qovluqYarat(){var ad=document.getElementById('yeniQovluq').value.trim();if(!ad){alert('Qovluq adi daxil edin!');return;}qovluqlar.push({id:'q'+Date.now(),name:ad});seciliQovluq=qovluqlar[qovluqlar.length-1].id;document.getElementById('yeniQovluq').value='';kaydet();qovluqGoster();cedvelGoster();}
function musteriYarat(){var ad=document.getElementById('musteriAd').value.trim(),tel=document.getElementById('musteriTel').value.trim();if(!ad){alert('Musteri adi daxil edin!');return;}var hedef=seciliQovluq;if(hedef==='all'){if(qovluqlar.length>0)hedef=qovluqlar[0].id;else{alert('Once qovluq yaradin!');return;}}musteriler.push({id:'m'+Date.now()+Math.random(),name:ad,phone:tel,qovluqId:hedef,visits:[],payments:[]});document.getElementById('musteriAd').value='';document.getElementById('musteriTel').value='';kaydet();cedvelGoster();qovluqGoster();}
function yedekAl(){var data={musteriler:musteriler,qovluqlar:qovluqlar,seciliQovluq:seciliQovluq};var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='musteriler_yedek_'+new Date().toISOString().slice(0,19)+'.json';a.click();URL.revokeObjectURL(a.href);alert('Yedek fayli endirildi!');}
function yedekYukle(){var inp=document.createElement('input');inp.type='file';inp.accept='application/json';inp.onchange=function(e){var f=e.target.files[0];var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);musteriler=d.musteriler||[];qovluqlar=d.qovluqlar||[];seciliQovluq=d.seciliQovluq||(qovluqlar[0]?qovluqlar[0].id:'all');if(qovluqlar.length===0)qovluqlar=[{id:'q1',name:'Umumi'}];kaydet();qovluqGoster();cedvelGoster();alert('Yedek yuklendi!');}catch(err){alert('Xeta!');}};r.readAsText(f);};inp.click();}
window.onload=function(){yukle();qovluqGoster();cedvelGoster();document.getElementById('qovluqElave').onclick=qovluqYarat;document.getElementById('musteriElave').onclick=musteriYarat;document.getElementById('statBtn').onclick=function(){statistikaGoster();};document.getElementById('yedekBtn').onclick=yedekAl;document.getElementById('yukleBtn').onclick=yedekYukle;document.getElementById('yeniQovluq').onkeypress=function(e){if(e.key==='Enter')qovluqYarat();};document.getElementById('musteriAd').onkeypress=function(e){if(e.key==='Enter')musteriYarat();};};
</script>
</body>
</html>
