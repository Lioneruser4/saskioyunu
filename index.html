<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BACKROOMS - The Hunt</title>
    <style>
        * {
            user-select: none;
            touch-action: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Ana game container - yan ekran için 16/9 oranı, PC'de ortalanır */
        .game-container {
            background: #000;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #1a1f2a;
            cursor: crosshair;
        }

        /* UI overlay - modern glassmorphism */
        .ui-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            pointer-events: none;
        }

        button {
            pointer-events: auto;
            background: rgba(20, 25, 40, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: gold;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.96);
            background: gold;
            color: black;
        }

        .top-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            pointer-events: none;
        }

        .top-info {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            pointer-events: auto;
            border-left: 3px solid gold;
        }

        .settings-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: none;
            padding: 8px 18px;
            font-size: 0.9rem;
            border-radius: 40px;
        }

        .room-list {
            position: absolute;
            top: 80px;
            left: 16px;
            right: 16px;
            background: rgba(10, 12, 22, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px;
            z-index: 25;
            max-height: 60%;
            overflow-y: auto;
            border: 1px solid rgba(255,215,0,0.4);
            pointer-events: auto;
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .room-card {
            background: #1e2436;
            padding: 12px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid gold;
            cursor: pointer;
            transition: 0.1s;
        }

        .room-card:active {
            background: #2a3248;
        }

        .close-panel {
            background: crimson;
            border: none;
            padding: 8px;
            margin-top: 8px;
            color: white;
        }

        @media (max-width: 768px) {
            button { padding: 10px 20px; font-size: 0.9rem; }
            .top-info { font-size: 0.7rem; padding: 5px 12px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <div class="top-bar">
        <div class="top-info" id="playerNameDisplay">👤 İsim yok</div>
        <div class="top-info" id="roomStatus">🏠 Oda yok</div>
        <button class="settings-btn" id="fullscreenBtn">🖥️ Tam Ekran</button>
    </div>

    <div class="ui-panel">
        <button id="joinGameBtn">🎮 OYUN BUL / BAŞLA</button>
        <button id="listRoomsBtn">📋 ODALAR</button>
        <button id="createRoomBtn">✨ YENİ ODA KUR</button>
    </div>

    <div id="roomListPanel" class="room-list">
        <h3 style="margin:0 0 8px 0; color:gold;">🔹 MEVCUT ODALAR</h3>
        <div id="roomsContainer"></div>
        <button class="close-panel" id="closeRoomPanel">Kapat</button>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
