<!-- index.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BACKROOMS - MOBILE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --tg-bg: #0a0c10;
            --tg-text: #ffffff;
            --tg-button: #8774e1;
            --tg-hint: #8b8e9b;
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --danger: #fd79a8;
            --warning: #fdcb6e;
            --dark: #2d3436;
            --light: #f5f6fa;
        }

        body {
            background: var(--tg-bg);
            color: var(--tg-text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            touch-action: none;
        }

        /* Telegram WebApp uyumluluğu */
        body.telegram {
            --tg-bg: var(--tg-theme-bg-color, #0a0c10);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --tg-button: var(--tg-theme-button-color, #8774e1);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Canvas - Oyun alanı */
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        /* UI Overlay */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Ana Menü */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0f0f1a 0%, #1a1b2e 100%);
            display: flex;
            flex-direction: column;
            pointer-events: all;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
        }

        #main-menu.hidden {
            transform: translateY(100%);
        }

        /* Header - Kullanıcı Bilgileri */
        .menu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            margin-bottom: 24px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 10px 16px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 700;
            font-size: 16px;
            color: white;
        }

        .user-status {
            font-size: 12px;
            color: #4cd137;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .user-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4cd137;
            border-radius: 4px;
            display: inline-block;
        }

        .menu-title {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .menu-subtitle {
            color: var(--tg-hint);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Ana Butonlar */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .btn {
            padding: 18px 24px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.05);
            color: white;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: all;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #a363d9);
            border: none;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Odalar Bölümü */
        .rooms-section {
            flex: 1;
            margin-top: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgba(255,255,255,0.8);
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
            padding: 4px;
        }

        /* Oda Kartı */
        .room-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            cursor: pointer;
            pointer-events: all;
            transition: all 0.2s;
        }

        .room-card:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.08);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .room-name {
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .room-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-ai {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            border: 1px solid #ff4757;
        }

        .badge-player {
            background: rgba(0, 206, 201, 0.2);
            color: #00cec9;
            border: 1px solid #00cec9;
        }

        .room-creator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .creator-avatar {
            width: 20px;
            height: 20px;
            border-radius: 10px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .room-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .player-count {
            color: #4cd137;
            font-weight: 600;
        }

        /* HUD - Oyun İçi */
        #game-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        #game-hud.active {
            display: block;
        }

        /* Üst HUD */
        .hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .hud-card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 12px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .hud-card i {
            color: var(--warning);
        }

        .hud-players {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-avatar-mini {
            width: 30px;
            height: 30px;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid white;
        }

        .player-avatar-mini.monster {
            background: linear-gradient(135deg, #ff4757, #c0392b);
        }

        /* Oyuncu Etiketleri (3D'de gösterilecek) */
        .player-name-tag {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000;
        }

        .player-name-tag.monster {
            background: rgba(255, 71, 87, 0.9);
            border-color: #ff4757;
        }

        /* Mobil Kontroller */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            z-index: 50;
        }

        .joystick-container {
            width: 100px;
            height: 100px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            pointer-events: all;
            position: relative;
        }

        .joystick {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 25px;
            position: absolute;
            top: 25px;
            left: 25px;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.5);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            pointer-events: all;
        }

        .action-btn {
            width: 70px;
            height: 70px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .action-btn:active {
            transform: scale(0.9);
            background: var(--primary);
        }

        /* Loading */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--tg-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 20px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Canavar Seçim Ekranı */
        #monster-selector {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 350px;
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 200;
            display: none;
            pointer-events: all;
        }

        #monster-selector.active {
            display: block;
        }

        .selector-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .monster-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .monster-option {
            padding: 18px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .monster-option:active {
            background: rgba(255,71,87,0.2);
            border-color: #ff4757;
        }

        .monster-icon {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .monster-info {
            flex: 1;
        }

        .monster-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .monster-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-spinner"></div>
        <div style="font-size: 18px; font-weight: 600;">BACKROOMS</div>
        <div style="color: rgba(255,255,255,0.5);">Sunucuya bağlanıyor...</div>
    </div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <div id="ui-overlay">
            <!-- Ana Menü -->
            <div id="main-menu">
                <div class="menu-header">
                    <div class="user-profile" id="user-profile">
                        <div class="user-avatar" id="user-avatar">👤</div>
                        <div class="user-info">
                            <span class="user-name" id="user-name">Yükleniyor...</span>
                            <span class="user-status">Çevrimiçi</span>
                        </div>
                    </div>
                    <div style="font-size: 24px;">🏆</div>
                </div>

                <div class="menu-title">BACKROOMS</div>
                <div class="menu-subtitle">Kaçış başlasın</div>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="quick-play-btn">
                        <span>⚡</span> OYUN BAŞLA
                    </button>
                    <button class="btn btn-secondary" id="create-room-btn">
                        <span>➕</span> ODA OLUŞTUR
                    </button>
                </div>

                <div class="rooms-section">
                    <div class="section-title">
                        <span>AKTİF ODALAR</span>
                        <span style="color: var(--tg-hint);" id="room-count">0</span>
                    </div>
                    <div class="rooms-list" id="rooms-list">
                        <!-- Odalar buraya dinamik eklenecek -->
                        <div class="room-card">
                            <div class="room-header">
                                <div class="room-name">
                                    <span>🚪 Oda #1</span>
                                    <span class="room-badge badge-ai">🤖 YAPAY ZEKA</span>
                                </div>
                                <div class="room-creator">
                                    <div class="creator-avatar">A</div>
                                    <span>Ahmet</span>
                                </div>
                            </div>
                            <div class="room-stats">
                                <div class="stat"><span>👥</span> <span class="player-count">3/10</span></div>
                                <div class="stat"><span>🎮</span> Oynanıyor</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Canavar Seçici -->
            <div id="monster-selector">
                <div class="selector-title">KOVALAYICI SEÇ</div>
                <div class="monster-options">
                    <div class="monster-option" onclick="selectMonster('ai')">
                        <div class="monster-icon">🤖</div>
                        <div class="monster-info">
                            <div class="monster-name">Yapay Zeka</div>
                            <div class="monster-desc">Akıllı ve acımasız</div>
                        </div>
                    </div>
                    <div class="monster-option" onclick="selectMonster('player')">
                        <div class="monster-icon">👤</div>
                        <div class="monster-info">
                            <div class="monster-name">Rastgele Oyuncu</div>
                            <div class="monster-desc">Bir oyuncu canavar olacak</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Oyun HUD -->
            <div id="game-hud">
                <div class="hud-top">
                    <div class="hud-card">
                        <span>🔑</span>
                        <span id="key-status">Anahtar Yok</span>
                    </div>
                    <div class="hud-players" id="hud-players">
                        <!-- Oyuncular dinamik -->
                    </div>
                </div>
            </div>

            <!-- Mobil Kontroller -->
            <div id="mobile-controls">
                <div class="joystick-container" id="joystick-area">
                    <div class="joystick" id="joystick"></div>
                </div>
                <div class="action-buttons">
                    <div class="action-btn" id="jump-btn">⬆️</div>
                    <div class="action-btn" id="interact-btn">🔑</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
