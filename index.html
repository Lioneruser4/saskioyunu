<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Saski Mafia - Vampir Köylü</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            color: #f0f3fa;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        /* Ana container */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
        }
        /* HEADER */
        .header {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 100px;
            background: #2a2f3f;
            object-fit: cover;
            border: 2px solid #ffd966;
        }
        .username {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .room-code {
            background: #1e2438;
            padding: 6px 14px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        /* lobby & oda */
        .screen {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            transition: all 0.2s;
        }
        .hidden {
            display: none;
        }
        /* kartlar */
        .lobby-card, .room-panel {
            background: rgba(20, 25, 40, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        button {
            background: #3b4b6e;
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin: 4px;
        }
        button:active { transform: scale(0.97); background: #2c3a55; }
        .primary-btn { background: #7c3aed; box-shadow: 0 4px 12px rgba(124,58,237,0.4);}
        .danger-btn { background: #b91c1c; }
        .success-btn { background: #10b981; }
        .vote-btn { background: #f59e0b; }
        input, select {
            background: #0f1422;
            border: 1px solid #2d3748;
            padding: 12px 16px;
            border-radius: 40px;
            color: white;
            width: 100%;
            margin: 8px 0;
        }
        .players-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }
        .player-card {
            background: #1e1f2c;
            border-radius: 24px;
            padding: 10px;
            width: 90px;
            text-align: center;
            transition: 0.1s;
            border: 1px solid #2e3a5e;
        }
        .player-card.dead { opacity: 0.5; filter: grayscale(0.5); background: #1a1111; }
        .player-card.selected { border: 3px solid #facc15; background: #2a2f44; }
        .role-icon { font-size: 1.7rem; margin: 5px 0; }
        .vote-timer {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            background: #00000070;
            border-radius: 60px;
            padding: 8px;
        }
        .chat-area {
            background: #0b0e18cc;
            border-radius: 28px;
            padding: 12px;
            margin-top: 16px;
            max-height: 200px;
            overflow-y: auto;
        }
        .message { margin: 6px 0; font-size: 0.85rem; word-break: break-word; }
        .chat-input-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .sound-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #000000aa;
            border-radius: 50px;
            padding: 8px;
            display: flex;
            gap: 10px;
            z-index: 30;
        }
        .sound-btn { background: #2d3748; border-radius: 40px; padding: 8px 12px; font-size: 0.7rem;}
        .animation-overlay {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }
        .death-skull {
            font-size: 5rem;
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0% { transform: translate(0,0);}
            25% { transform: translate(5px,5px);}
            75% { transform: translate(-5px,-3px);}
        }
        .waiting-spinner {
            border: 6px solid #3b4b6e;
            border-top: 6px solid #facc15;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .flex-between { display: flex; justify-content: space-between; align-items: center;}
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="user-info">
            <img id="userAvatar" class="avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default">
            <span id="userName" class="username">Oyuncu</span>
        </div>
        <div class="room-code" id="roomCodeDisplay">---</div>
        <button id="leaveRoomBtn" style="background:#4a2c2c;">Çık</button>
    </div>
    <div id="lobbyScreen" class="screen">
        <div class="lobby-card">
            <h2>🏰 Mafia - Vampir Köylü</h2>
            <input type="text" id="roomNameInput" placeholder="Oda Adı / Kodu">
            <input type="password" id="roomPassword" placeholder="Şifre (opsiyonel)">
            <button id="createRoomBtn" class="primary-btn">➕ Oda Oluştur (Admin)</button>
            <button id="joinRoomBtn">🔑 Odaya Katıl</button>
            <hr>
            <h3>📋 Mevcut Odalar</h3>
            <div id="roomsList"></div>
        </div>
    </div>
    <div id="gameScreen" class="screen hidden">
        <div class="room-panel">
            <div class="flex-between"><h3 id="phaseTitle">⚔️ Oyun Bekliyor</h3><span id="timerSpan" class="vote-timer">--</span></div>
            <div id="playersContainer" class="players-grid"></div>
            <div id="actionArea">
                <!-- oy eylemleri buraya gelir -->
            </div>
            <div id="chatPanel" class="chat-area">
                <div id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Sohbet..." maxlength="100">
                    <button id="sendChatBtn">📨</button>
                </div>
            </div>
        </div>
    </div>
    <div class="sound-controls">
        <button id="muteAllBtn" class="sound-btn">🔇 Tümü Kapalı</button>
        <button id="unmuteAllBtn" class="sound-btn">🔊 Tümü Aç</button>
    </div>
    <div id="animationOverlay" class="animation-overlay hidden">
        <div id="animContent"></div>
    </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="/game.js"></script>
</body>
</html>
