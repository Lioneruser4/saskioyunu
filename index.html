<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meyve Patlatma - Sonsuz Eğlence</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #2b5e3b 0%, #1d7a3b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
            touch-action: pan-y pinch-zoom;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            background: #f5e7d3;
            border-radius: 40px 40px 30px 30px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.5);
            padding: 20px 15px 25px;
            border: 4px solid #b48b5a;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: #fcead8;
            padding: 10px 15px;
            border-radius: 60px;
            border: 2px solid #d4a76a;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .score-box {
            background: #7b4f2e;
            color: #ffefc0;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #4f3620;
            box-shadow: inset 0 -3px 0 #4f3620;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .score-box span {
            font-size: 1rem;
            background: #dba959;
            color: #3b2c1a;
            padding: 4px 10px;
            border-radius: 20px;
            text-shadow: none;
            box-shadow: inset 0 -2px 0 #a57c3d;
        }

        .level-box {
            background: #d9b382;
            color: #402d1b;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.3rem;
            border: 2px solid #aa7c48;
            box-shadow: inset 0 -2px 0 #7b5a36;
        }

        .board-wrapper {
            background: #d6b185;
            padding: 15px 10px;
            border-radius: 40px;
            border: 3px solid #b48b5a;
            box-shadow: inset 0 0 0 2px #efd7b6;
            margin-bottom: 15px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            aspect-ratio: 1 / 1;
            background: #b48b5a;
            padding: 8px;
            border-radius: 30px;
            box-shadow: inset 0 0 0 3px #8b633a;
        }

        .cell {
            background: #fcf2e1;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 2px #ab8a5e, inset 0 -3px 0 rgba(0,0,0,0.2);
            transition: 0.1s transform;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            aspect-ratio: 1 / 1;
        }

        .fruit {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            font-size: 0; /* Emoji yok, gerçek meyve stilleri */
        }

        /* Meyve tasarımları - gerçek meyve görünümü */
        .fruit-apple {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            position: relative;
        }
        .fruit-apple::after {
            content: "";
            position: absolute;
            width: 15%;
            height: 15%;
            background: #6b4f32;
            border-radius: 40% 40% 0 0;
            top: -8%;
            left: 45%;
            transform: rotate(-10deg);
        }
        .fruit-apple::before {
            content: "";
            position: absolute;
            width: 20%;
            height: 10%;
            background: #27ae60;
            border-radius: 50%;
            top: -12%;
            left: 40%;
            transform: rotate(-15deg);
        }

        .fruit-banana {
            background: linear-gradient(145deg, #f4d03f, #f1c40f);
            border-radius: 50% 50% 40% 40%;
            transform: rotate(15deg);
            position: relative;
        }
        .fruit-banana::after {
            content: "";
            position: absolute;
            width: 30%;
            height: 20%;
            background: #7d3c1b;
            border-radius: 50%;
            top: 10%;
            right: 5%;
        }

        .fruit-orange {
            background: radial-gradient(circle at 35% 35%, #f39c12, #e67e22);
            position: relative;
        }
        .fruit-orange::after {
            content: "";
            position: absolute;
            width: 15%;
            height: 15%;
            background: #2ecc71;
            border-radius: 50%;
            top: 5%;
            right: 20%;
        }

        .fruit-strawberry {
            background: #e74c3c;
            border-radius: 45% 45% 50% 50%;
            position: relative;
        }
        .fruit-strawberry::after {
            content: "⚫";
            position: absolute;
            font-size: 10px;
            color: #2c2c2c;
            top: 30%;
            left: 20%;
            transform: scale(1.2);
        }
        .fruit-strawberry::before {
            content: "";
            position: absolute;
            width: 25%;
            height: 15%;
            background: #27ae60;
            border-radius: 40%;
            top: -8%;
            left: 35%;
        }

        .fruit-grape {
            background: #8e44ad;
            border-radius: 50%;
            position: relative;
        }
        .fruit-grape::after {
            content: "";
            position: absolute;
            width: 40%;
            height: 40%;
            background: #9b59b6;
            border-radius: 50%;
            top: -10%;
            right: -5%;
            opacity: 0.8;
        }
        .fruit-grape::before {
            content: "";
            position: absolute;
            width: 30%;
            height: 30%;
            background: #6c3483;
            border-radius: 50%;
            bottom: -5%;
            left: -5%;
        }

        .fruit-watermelon {
            background: #2ecc71;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }
        .fruit-watermelon::after {
            content: "";
            position: absolute;
            width: 90%;
            height: 45%;
            background: #e67e22;
            bottom: 0;
            border-radius: 0 0 50% 50%;
        }
        .fruit-watermelon::before {
            content: "⚫";
            position: absolute;
            font-size: 10px;
            color: #2c3e50;
            z-index: 2;
            top: 40%;
            left: 20%;
        }

        .fruit-pear {
            background: linear-gradient(145deg, #f7dc6f, #e5c76b);
            border-radius: 60% 60% 50% 50%;
            transform: rotate(-5deg);
        }

        .fruit-peach {
            background: radial-gradient(circle at 35% 35%, #ffb6c1, #f58b9f);
            border-radius: 55% 45% 50% 50%;
            position: relative;
        }
        .fruit-peach::after {
            content: "";
            position: absolute;
            width: 20%;
            height: 15%;
            background: #a0522d;
            border-radius: 40%;
            top: 5%;
            left: 40%;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
        }

        button {
            background: #ffb142;
            border: none;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 12px 25px;
            border-radius: 50px;
            color: #3d2b13;
            border-bottom: 5px solid #cc7f2a;
            box-shadow: 0 5px 0 #8f5720;
            transition: 0.05s linear;
            cursor: pointer;
            touch-action: manipulation;
            flex: 1;
            max-width: 180px;
        }

        button:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            box-shadow: 0 2px 0 #8f5720;
        }

        .lobby {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
            background: #eacba4;
            padding: 15px;
            border-radius: 40px;
            border: 3px solid #b48b5a;
        }

        .lobby h3 {
            color: #4d2f16;
            font-size: 1.3rem;
            text-align: center;
        }

        .level-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-height: 150px;
            overflow-y: auto;
            padding: 5px;
        }

        .level-btn {
            background: #fef5e7;
            border: 3px solid #ac7339;
            border-radius: 40px;
            padding: 10px 18px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #563e1f;
            flex: 0 0 auto;
            box-shadow: 0 4px 0 #8b5e32;
            transition: 0.05s;
        }

        .level-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #8b5e32;
        }

        .footer-text {
            text-align: center;
            margin-top: 12px;
            color: #fceedb;
            text-shadow: 2px 2px 0 #6b4c2c;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="score-box">🍬<span id="scoreDisplay">0</span></div>
        <div class="level-box" id="levelDisplay">Seviye 1</div>
    </div>

    <div class="board-wrapper">
        <div class="board" id="gameBoard"></div>
    </div>

    <div class="controls">
        <button id="newGameBtn">🔄 Yeni</button>
        <button id="nextLevelBtn">➡️ Sonraki</button>
    </div>

    <div class="lobby">
        <h3>🍒 Seviye Lobi 🍊</h3>
        <div class="level-selector" id="levelLobby"></div>
    </div>
    <div class="footer-text">👇 Meyveye dokun ve kaydır 👇</div>
</div>

<script>
    (function() {
        // Oyun sabitleri
        const ROWS = 8;
        const COLS = 8;
        const FRUIT_TYPES = 7; // 7 farklı meyve

        // Meyve sınıfları (görsel CSS)
        const fruitClasses = [
            'fruit-apple',
            'fruit-banana',
            'fruit-orange',
            'fruit-strawberry',
            'fruit-grape',
            'fruit-watermelon',
            'fruit-pear',
            'fruit-peach'
        ];

        // Oyun durumu
        let board = [];
        let currentLevel = 1;
        let score = 0;
        let baseScore = 0; // level bazlı score sabiti

        let selectedRow = -1, selectedCol = -1;
        let touchMoved = false;
        let gameBoardElement = document.getElementById('gameBoard');
        let scoreDisplay = document.getElementById('scoreDisplay');
        let levelDisplay = document.getElementById('levelDisplay');

        // Başlangıç
        function initBoard(level) {
            // level'e göre rastgelelik, daha yüksek level daha çeşitli ama karışık
            const diversity = Math.min(7, 4 + Math.floor(level / 2));
            board = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push(Math.floor(Math.random() * diversity) % FRUIT_TYPES);
                }
                board.push(row);
            }
            // patlamaları temizle (başlangıçta patlama olmasın)
            while (scanAndCrush(true)) { }
            fillVacancies();
        }

        // Tahtayı render et
        function renderBoard() {
            gameBoardElement.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    const fruitValue = board[r][c];
                    if (fruitValue !== -1) { // -1 boşluk olursa doldur
                        const fruitDiv = document.createElement('div');
                        fruitDiv.className = `fruit ${fruitClasses[fruitValue % fruitClasses.length]}`;
                        cell.appendChild(fruitDiv);
                    } else {
                        // boş hücre (ani boşluklarda gözükmesin)
                        cell.style.background = '#eedbba';
                    }

                    // Olaylar (mouse ve touch)
                    cell.addEventListener('touchstart', handleTouchStart, { passive: false });
                    cell.addEventListener('touchmove', handleTouchMove, { passive: false });
                    cell.addEventListener('touchend', handleTouchEnd);
                    cell.addEventListener('touchcancel', handleTouchEnd);
                    
                    // Mouse için (debug / hybrid)
                    cell.addEventListener('mousedown', handleMouseDown);
                    cell.addEventListener('mousemove', handleMouseMove);
                    cell.addEventListener('mouseup', handleMouseUp);
                    cell.addEventListener('mouseleave', handleMouseLeave);

                    gameBoardElement.appendChild(cell);
                }
            }
        }

        // ------ PATLATMA VE DOLDURMA MEKANİĞİ ------
        function checkMatch(r, c, type) {
            if (type === -1) return false;
            let horizontal = 1;
            // sağa
            for (let i = c + 1; i < COLS && board[r][i] === type; i++) horizontal++;
            // sola
            for (let i = c - 1; i >= 0 && board[r][i] === type; i--) horizontal++;
            
            let vertical = 1;
            for (let i = r + 1; i < ROWS && board[i] && board[i][c] === type; i++) vertical++;
            for (let i = r - 1; i >= 0 && board[i] && board[i][c] === type; i--) vertical++;
            
            return horizontal >= 3 || vertical >= 3;
        }

        function scanAndCrush(justCheck = false) {
            let crushed = false;
            const crushMask = Array(ROWS).fill().map(() => Array(COLS).fill(false));

            // Yatay
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS - 2; c++) {
                    const val = board[r][c];
                    if (val === -1) continue;
                    if (board[r][c + 1] === val && board[r][c + 2] === val) {
                        let end = c + 2;
                        while (end + 1 < COLS && board[r][end + 1] === val) end++;
                        for (let k = c; k <= end; k++) crushMask[r][k] = true;
                    }
                }
            }
            // Dikey
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS - 2; r++) {
                    const val = board[r][c];
                    if (val === -1) continue;
                    if (board[r + 1][c] === val && board[r + 2][c] === val) {
                        let end = r + 2;
                        while (end + 1 < ROWS && board[end + 1][c] === val) end++;
                        for (let k = r; k <= end; k++) crushMask[k][c] = true;
                    }
                }
            }

            // ezilenleri -1 yap ve puan ekle
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (crushMask[r][c] && board[r][c] !== -1) {
                        if (!justCheck) {
                            board[r][c] = -1;
                            score += 10 + currentLevel * 2;
                            crushed = true;
                        } else {
                            return true; // patlama var
                        }
                    }
                }
            }

            if (justCheck) return false; // eğer justCheck modunda ise ve döngüye girmediyse false
            if (crushed) updateScore();
            return crushed;
        }

        function fillVacancies() {
            for (let c = 0; c < COLS; c++) {
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (board[r][c] === -1) {
                        for (let k = r - 1; k >= 0; k--) {
                            if (board[k][c] !== -1) {
                                board[r][c] = board[k][c];
                                board[k][c] = -1;
                                break;
                            }
                        }
                        if (board[r][c] === -1) {
                            // üstte dolu yoksa yeni meyve
                            board[r][c] = Math.floor(Math.random() * FRUIT_TYPES);
                        }
                    }
                }
            }
        }

        // döngü: patlat - doldur - patlat kalmayana kadar
        function settleBoard() {
            let anyCrush = false;
            while (scanAndCrush(false)) {
                anyCrush = true;
                fillVacancies();
            }
            if (anyCrush) updateScore();
            renderBoard();
        }

        // Yer değiştir ve patlama kontrolü
        function trySwap(r1, c1, r2, c2) {
            if (r1 < 0 || r1 >= ROWS || c1 < 0 || c1 >= COLS || r2 < 0 || r2 >= ROWS || c2 < 0 || c2 >= COLS) return false;
            if (Math.abs(r1 - r2) + Math.abs(c1 - c2) !== 1) return false; // komşu değil
            if (board[r1][c1] === -1 || board[r2][c2] === -1) return false;

            // swap
            [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];

            // patlama var mı?
            const match1 = checkMatch(r1, c1, board[r1][c1]);
            const match2 = checkMatch(r2, c2, board[r2][c2]);

            if (match1 || match2) {
                settleBoard();
                return true;
            } else {
                // geri swap
                [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
                return false;
            }
        }

        // ------ OLAY YÖNETİCİLERİ (dokunma ve kaydırma) ------
        let startRow, startCol;

        function handleTouchStart(e) {
            e.preventDefault();
            const cell = e.target.closest('.cell');
            if (!cell) return;
            startRow = parseInt(cell.dataset.row);
            startCol = parseInt(cell.dataset.col);
            selectedRow = startRow;
            selectedCol = startCol;
            touchMoved = false;
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (selectedRow === -1 || selectedCol === -1) return;
            const touch = e.touches[0];
            const element = document.elementFromPoint(touch.clientX, touch.clientY);
            const cell = element?.closest('.cell');
            if (!cell) return;
            
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            if (row === selectedRow && col === selectedCol) return;

            // komşuluk kontrolü
            if (Math.abs(row - selectedRow) + Math.abs(col - selectedCol) === 1) {
                e.preventDefault();
                touchMoved = true;
                // swap dene
                trySwap(selectedRow, selectedCol, row, col);
                // seçimi sıfırla
                selectedRow = -1;
                selectedCol = -1;
            }
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            if (!touchMoved && selectedRow !== -1 && selectedCol !== -1) {
                // sadece tıklama, seçimi göster veya herhangi bir işlem yapma
                // (opsiyonel olarak seçili efekti verilebilir, şimdilik pasif)
            }
            selectedRow = -1;
            selectedCol = -1;
        }

        // Mouse olayları (test için, touch öncelikli)
        function handleMouseDown(e) {
            e.preventDefault();
            const cell = e.target.closest('.cell');
            if (!cell) return;
            startRow = parseInt(cell.dataset.row);
            startCol = parseInt(cell.dataset.col);
            selectedRow = startRow;
            selectedCol = startCol;
            touchMoved = false;
        }

        function handleMouseMove(e) {
            if (selectedRow === -1 || selectedCol === -1) return;
            e.preventDefault();
            const cell = e.target.closest('.cell');
            if (!cell) return;
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            if (row === selectedRow && col === selectedCol) return;
            if (Math.abs(row - selectedRow) + Math.abs(col - selectedCol) === 1) {
                touchMoved = true;
                trySwap(selectedRow, selectedCol, row, col);
                selectedRow = -1;
                selectedCol = -1;
            }
        }

        function handleMouseUp(e) {
            selectedRow = -1;
            selectedCol = -1;
        }
        function handleMouseLeave(e) {
            selectedRow = -1;
            selectedCol = -1;
        }

        // ----- PUAN & LOBİ -----
        function updateScore() {
            scoreDisplay.innerText = score;
        }

        function loadLevel(level) {
            currentLevel = level;
            initBoard(level);
            renderBoard();
            levelDisplay.innerText = `Seviye ${level}`;
        }

        function resetGame() {
            score = 0;
            updateScore();
            loadLevel(1);
        }

        // lobi oluştur
        function buildLobby() {
            const lobbyDiv = document.getElementById('levelLobby');
            lobbyDiv.innerHTML = '';
            for (let i = 1; i <= 20; i++) { // 20 seviye lobisi
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.innerText = i;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadLevel(i);
                });
                lobbyDiv.appendChild(btn);
            }
        }

        // Sonraki level
        function nextLevel() {
            loadLevel(currentLevel + 1);
        }

        // Sayfa yüklendi
        window.addEventListener('load', () => {
            buildLobby();
            resetGame();

            document.getElementById('newGameBtn').addEventListener('click', (e) => {
                e.preventDefault();
                resetGame();
            });

            document.getElementById('nextLevelBtn').addEventListener('click', (e) => {
                e.preventDefault();
                nextLevel();
            });

            // mobil kaydırmayı engelleme (sayfa dışı)
            document.body.addEventListener('touchmove', (e) => {
                if (e.target.closest('.board')) e.preventDefault();
            }, { passive: false });
        });

    })();
</script>
</body>
</html>
