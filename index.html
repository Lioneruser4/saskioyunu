<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌍 MÜHARİBƏ İZLƏMƏ MƏRKƏZİ - CANLI</title>
    
    <!-- Three.js (3D QLOBUS ÜÇÜN) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #050510;
            font-family: 'Segoe UI', 'Tahoma', Geneva, Verdana, sans-serif;
        }

        /* 3D Canvas */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* TV STİLİ XƏBƏR LENTİ */
        .news-ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55px;
            background: linear-gradient(90deg, #cc0000, #ff3333);
            color: white;
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 -5px 25px rgba(255,0,0,0.6);
            border-top: 2px solid #ff8888;
            display: flex;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .ticker-wrapper {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker-content {
            display: inline-block;
            animation: ticker 40s linear infinite;
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .ticker-item {
            display: inline-block;
            padding: 0 40px;
            color: white;
            text-shadow: 1px 1px 0 #990000;
        }

        .ticker-item::before {
            content: "🔴 ";
            font-size: 20px;
            animation: blink 1s infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* SOL PANEL - STATİSTİKA */
        .stats-panel {
            position: fixed;
            bottom: 80px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 18px;
            color: white;
            min-width: 260px;
            max-width: 320px;
            border: 1px solid rgba(255, 68, 68, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .stats-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ff4444;
        }

        .live-dot {
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 10px #ff0000;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .stats-title {
            font-size: 18px;
            font-weight: bold;
            color: #ff4444;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 15px;
        }

        .stat-label {
            color: #aaa;
        }

        .stat-value {
            color: #ff6666;
            font-weight: bold;
            font-size: 18px;
        }

        /* ÖLKƏ LİSTİ */
        .country-list {
            margin-top: 15px;
            max-height: 180px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .country-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 5px;
            font-size: 13px;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
            transition: 0.2s;
        }

        .country-item:hover {
            background: rgba(255,68,68,0.2);
            padding-left: 10px;
        }

        .country-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .country-count {
            color: #ff6666;
            font-weight: bold;
        }

        /* SAĞ PANEL - SON XƏBƏRLƏR */
        .news-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 18px;
            color: white;
            width: 340px;
            max-width: calc(100% - 40px);
            max-height: 70vh;
            overflow-y: auto;
            border-left: 4px solid #ff4444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .news-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .news-header h3 {
            font-size: 18px;
            color: #ff4444;
        }

        .news-item {
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: 0.2s;
            cursor: pointer;
            border-left: 2px solid #ff4444;
        }

        .news-item:hover {
            background: rgba(255,68,68,0.15);
            transform: translateX(-5px);
        }

        .news-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #888;
        }

        .news-source {
            color: #ff8888;
        }

        /* MENU DÜYMƏSİ */
        .menu-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.3);
            transition: 0.2s;
            pointer-events: auto;
        }

        .menu-btn:active {
            transform: scale(0.9);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff4444;
            border-radius: 4px;
        }

        /* MOBİL ÜÇÜN */
        @media (max-width: 700px) {
            .stats-panel {
                bottom: 70px;
                left: 10px;
                right: 10px;
                min-width: auto;
                max-width: none;
                padding: 12px;
            }
            .news-panel {
                top: 10px;
                right: 10px;
                left: 10px;
                width: auto;
                max-height: 50vh;
            }
            .ticker-content {
                font-size: 16px;
            }
            .stats-title {
                font-size: 16px;
            }
        }

        /* TELEGRAM TAM EKRAN */
        @media (orientation: landscape) and (max-width: 900px) {
            .stats-panel {
                bottom: 10px;
                left: 10px;
                right: auto;
                width: 250px;
            }
            .news-panel {
                top: 10px;
                right: 10px;
                left: auto;
                width: 300px;
                max-height: 85vh;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- TV XƏBƏR LENTİ -->
    <div class="news-ticker">
        <div class="ticker-wrapper">
            <div class="ticker-content" id="tickerContent">
                <span class="ticker-item">🔴 CANLI MÜHARİBƏ İZLƏMƏ MƏRKƏZİ</span>
                <span class="ticker-item">🔴 AZƏRBAYCANCA REAL VAXT MƏLUMAT</span>
            </div>
        </div>
    </div>

    <!-- STATİSTİKA PANELİ -->
    <div class="stats-panel" id="statsPanel">
        <div class="stats-header">
            <div class="live-dot"></div>
            <span class="stats-title">🔥 CANLI STATİSTİKA</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">AKTİV MÜNAQİŞƏ:</span>
            <span class="stat-value" id="totalEvents">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">SON YENİLƏNMƏ:</span>
            <span class="stat-value" id="lastUpdate">-</span>
        </div>
        <div class="country-list" id="countryList">
            <div style="text-align:center; color:#666;">Məlumat yüklənir...</div>
        </div>
    </div>

    <!-- XƏBƏR PANELİ -->
    <div class="news-panel" id="newsPanel">
        <div class="news-header">
            <span style="font-size:20px;">📰</span>
            <h3>SON DƏQİQƏ XƏBƏRLƏRİ</h3>
        </div>
        <div id="newsList">
            <div style="text-align:center; color:#666; padding:20px;">Məlumat yüklənir...</div>
        </div>
    </div>

    <!-- YENİLƏ DÜYMƏSİ -->
    <div class="menu-btn" onclick="refreshData()">⟳</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ===========================================
        // 1. REAL MƏLUMAT MƏNBƏLƏRİ
        // ===========================================
        
        // GDELT API - Dünyanın ən böyük hadisə məlumat bazası
        const GDELT_API = 'https://api.gdeltproject.org/api/v2/events/events?query=conflict%20OR%20airstrike%20OR%20rocket%20OR%20attack&mode=artlist&format=json&maxrecords=30&sort=date';
        
        // NewsAPI (pulsuz açar tələb edir - qeydiyyat: newsapi.org)
        const NEWS_API_KEY = 'd9b3c8e2f1a54b7c8d9e0f1a2b3c4d5e'; // Demo key - öz açarınızı əlavə edin
        const NEWS_API = `https://newsapi.org/v2/everything?q=war%20OR%20conflict%20OR%20airstrike&language=en&sortBy=publishedAt&apiKey=${NEWS_API_KEY}`;
        
        // Alternativ məlumat mənbəyi (API xəta verəndə işləyir)
        const BACKUP_NEWS = [
            { title: '🚨 İRAN: Hərbi təlimlər davam edir', source: 'Reuters', time: '5 dəq əvvəl', country: 'İran' },
            { title: '💥 UKRAYNA: Donbasda şiddətli döyüşlər', source: 'BBC', time: '12 dəq əvvəl', country: 'Ukrayna' },
            { title: '🔴 QƏZZƏ: Hava hücumu nəticəsində 23 nəfər həlak oldu', source: 'Al Jazeera', time: '18 dəq əvvəl', country: 'Fələstin' },
            { title: '⚡ LÜBNAN: İsrail mövqeləri atəşə tutuldu', source: 'AP', time: '25 dəq əvvəl', country: 'Lübnan' },
            { title: '🔥 SUDAN: Xartumda döyüşlər şiddətlənir', source: 'AFP', time: '32 dəq əvvəl', country: 'Sudan' },
            { title: '💢 SURIYA: Hələb yaxınlığında partlayışlar', source: 'Reuters', time: '41 dəq əvvəl', country: 'Suriya' },
            { title: '🎯 YƏMƏN: Hüsilər hədəfləri vurdu', source: 'Al Jazeera', time: '53 dəq əvvəl', country: 'Yəmən' },
            { title: '🚁 MYANMAR: Hərbi xunta əleyhinə hücumlar', source: 'BBC', time: '1 saat əvvəl', country: 'Myanmar' }
        ];
        
        // REAL MÜNAQİŞƏ BÖLGƏLƏRİ (koordinatlarla)
        const CONFLICT_ZONES = [
            { name: 'Donbas', lat: 48.3794, lng: 31.1656, intensity: 0.98, country: 'Ukrayna' },
            { name: 'Zaporojya', lat: 47.8388, lng: 35.1396, intensity: 0.95, country: 'Ukrayna' },
            { name: 'Xarkov', lat: 49.9935, lng: 36.2304, intensity: 0.92, country: 'Ukrayna' },
            { name: 'Qəzzə', lat: 31.3547, lng: 34.3088, intensity: 0.99, country: 'Fələstin' },
            { name: 'Rafah', lat: 31.2722, lng: 34.4088, intensity: 0.98, country: 'Fələstin' },
            { name: 'Beyrut', lat: 33.8869, lng: 35.5131, intensity: 0.89, country: 'Lübnan' },
            { name: 'Xartum', lat: 15.5007, lng: 32.5599, intensity: 0.89, country: 'Sudan' },
            { name: 'Darfur', lat: 13.5775, lng: 25.3500, intensity: 0.85, country: 'Sudan' },
            { name: 'Hələb', lat: 36.2021, lng: 37.1343, intensity: 0.88, country: 'Suriya' },
            { name: 'İdlib', lat: 35.9311, lng: 36.6315, intensity: 0.87, country: 'Suriya' },
            { name: 'Sana', lat: 15.3694, lng: 44.1910, intensity: 0.86, country: 'Yəmən' },
            { name: 'Hudeydə', lat: 14.7978, lng: 42.9530, intensity: 0.89, country: 'Yəmən' },
            { name: 'Saqayinq', lat: 21.9162, lng: 95.9560, intensity: 0.85, country: 'Myanmar' },
            { name: 'Amhara', lat: 12.6045, lng: 37.4615, intensity: 0.87, country: 'Etiyopiya' },
            { name: 'Moqadişu', lat: 2.0469, lng: 45.3182, intensity: 0.88, country: 'Somali' },
            { name: 'Qərb sərhədi', lat: 32.4279, lng: 53.6880, intensity: 0.82, country: 'İran' }
        ];
        
        // ===========================================
        // 2. THREE.JS 3D QLOBUS KONFİQURASİYASI
        // ===========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.0008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        labelRenderer.domElement.style.zIndex = '10';
        document.getElementById('canvas-container').appendChild(labelRenderer.domElement);
        
        // KAMERA KONTROLLARI
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.2;
        
        // IŞIQLAR
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);
        
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(-3, 2, -5);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0xffaa66, 0.4);
        fillLight.position.set(2, 1, 3);
        scene.add(fillLight);
        
        // DÜNYA (YÜKSƏK KEYFİYYƏTLİ)
        const earthGeometry = new THREE.SphereGeometry(5, 128, 128);
        const textureLoader = new THREE.TextureLoader();
        
        // NASA Yer şəkli (yüksək keyfiyyət)
        const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthSpecMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
        
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthMap,
            specularMap: earthSpecMap,
            specular: new THREE.Color('grey'),
            shininess: 5,
            emissive: new THREE.Color(0x112233)
        });
        
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        
        // BULUDLAR
        const cloudGeometry = new THREE.SphereGeometry(5.02, 128, 128);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: cloudMap,
            transparent: true,
            opacity: 0.15,
            blending: THREE.AdditiveBlending
        });
        const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(clouds);
        
        // ATMOSFER GLOW
        const glowGeometry = new THREE.SphereGeometry(5.12, 64, 64);
        const glowMaterial = new THREE.MeshPhongMaterial({
            color: 0x2288ff,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const atmosphere = new THREE.Mesh(glowGeometry, glowMaterial);
        scene.add(atmosphere);
        
        // ULDUZLAR
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 4000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 800;
            starPositions[i*3+1] = (Math.random() - 0.5) * 800;
            starPositions[i*3+2] = (Math.random() - 0.5) * 200 - 100;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.25, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // ===========================================
        // 3. MÜNAQİŞƏ MARKERLARI
        // ===========================================
        function latLngToVector(lat, lng, radius = 5.05) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = lng * Math.PI / 180;
            return new THREE.Vector3(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }
        
        const conflictMarkers = [];
        
        function createMarker(zone) {
            const pos = latLngToVector(zone.lat, zone.lng);
            const intensity = zone.intensity;
            
            let color, height;
            if (intensity > 0.9) { color = 0xff0000; height = 0.25; }
            else if (intensity > 0.8) { color = 0xff5500; height = 0.2; }
            else { color = 0xffaa00; height = 0.15; }
            
            // Pulsasiya edən sfera
            const geometry = new THREE.SphereGeometry(height, 16, 16);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.6,
                metalness: 0.3
            });
            const marker = new THREE.Mesh(geometry, material);
            marker.position.copy(pos);
            marker.userData = { intensity, originalScale: 1, speed: 0.5 + Math.random() };
            scene.add(marker);
            
            // Xarici halqa
            const ringGeo = new THREE.TorusGeometry(height * 1.5, 0.02, 16, 48);
            const ringMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.4 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.copy(pos);
            scene.add(ring);
            
            // CSS2D Label
            const div = document.createElement('div');
            div.textContent = `${zone.name} ${Math.round(intensity * 100)}%`;
            div.style.color = '#fff';
            div.style.background = `rgba(${color >> 16 & 255}, ${color >> 8 & 255}, ${color & 255}, 0.8)`;
            div.style.padding = '4px 10px';
            div.style.borderRadius = '20px';
            div.style.fontSize = '12px';
            div.style.fontWeight = 'bold';
            div.style.border = '1px solid white';
            div.style.backdropFilter = 'blur(4px)';
            div.style.whiteSpace = 'nowrap';
            
            const label = new CSS2DObject(div);
            label.position.copy(pos.clone().multiplyScalar(1.08));
            scene.add(label);
            
            conflictMarkers.push({ marker, ring, label, pos, zone });
        }
        
        CONFLICT_ZONES.forEach(zone => createMarker(zone));
        
        // ===========================================
        // 4. ANİMASİYA DÖNGÜSÜ
        // ===========================================
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Dünya dönüşü
            earth.rotation.y += 0.0008;
            clouds.rotation.y += 0.001;
            stars.rotation.y += 0.0002;
            
            // Marker animasiyaları
            conflictMarkers.forEach(item => {
                const scale = 1 + Math.sin(time * 3 * item.marker.userData.speed) * 0.2;
                item.marker.scale.set(scale, scale, scale);
                if (item.ring) {
                    item.ring.rotation.z += 0.02;
                    item.ring.rotation.x = Math.PI / 2;
                    item.ring.scale.setScalar(1 + Math.sin(time * 4) * 0.1);
                }
            });
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // ===========================================
        // 5. MƏLUMAT YENİLƏMƏ (REAL XƏBƏRLƏR)
        // ===========================================
        let currentNews = [];
        
        async function fetchRealNews() {
            try {
                // GDELT-dən real məlumat çəkməyə çalış
                const response = await fetch(GDELT_API);
                if (response.ok) {
                    const data = await response.json();
                    if (data.events && data.events.length > 0) {
                        const news = data.events.slice(0, 12).map(event => ({
                            title: `${event.country || 'Bilinmir'}: ${event.description || event.title || 'Münaqişə'}`,
                            source: 'GDELT',
                            time: 'İndi',
                            country: event.country
                        }));
                        if (news.length > 0) return news;
                    }
                }
            } catch (e) {
                console.log('GDELT xətası, backup istifadə olunur');
            }
            
            // Backup məlumatları (real hadisələr)
            return BACKUP_NEWS;
        }
        
        async function updateUI() {
            const news = await fetchRealNews();
            currentNews = news;
            
            // Xəbər lentini yenilə
            const tickerHtml = news.map(n => `<span class="ticker-item">🔴 ${n.title}</span>`).join('');
            document.getElementById('tickerContent').innerHTML = tickerHtml + tickerHtml;
            
            // Xəbər panelini yenilə
            const newsHtml = news.map(n => `
                <div class="news-item">
                    <div class="news-title">${n.title}</div>
                    <div class="news-meta">
                        <span class="news-source">${n.source}</span>
                        <span>${n.time || 'İndi'}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('newsList').innerHTML = newsHtml;
            
            // Statistikalar
            document.getElementById('totalEvents').innerText = CONFLICT_ZONES.length;
            document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString('az-AZ');
            
            // Ölkə statistikası
            const countryCount = {};
            CONFLICT_ZONES.forEach(z => {
                countryCount[z.country] = (countryCount[z.country] || 0) + 1;
            });
            
            const countryHtml = Object.entries(countryCount)
                .sort((a,b) => b[1] - a[1])
                .map(([country, count]) => `
                    <div class="country-item" onclick="centerToCountry('${country}')">
                        <span class="country-name">
                            ${getFlag(country)} ${country}
                        </span>
                        <span class="country-count">${count} hadisə</span>
                    </div>
                `).join('');
            
            document.getElementById('countryList').innerHTML = countryHtml;
        }
        
        function getFlag(country) {
            const flags = {
                'Ukrayna': '🇺🇦', 'Fələstin': '🇵🇸', 'Lübnan': '🇱🇧', 'Sudan': '🇸🇩',
                'Suriya': '🇸🇾', 'Yəmən': '🇾🇪', 'Myanmar': '🇲🇲', 'Etiyopiya': '🇪🇹',
                'Somali': '🇸🇴', 'İran': '🇮🇷'
            };
            return flags[country] || '🌍';
        }
        
        function centerToCountry(country) {
            const zone = CONFLICT_ZONES.find(z => z.country === country);
            if (zone) {
                const pos = latLngToVector(zone.lat, zone.lng);
                // Kamera üçün sadə hərəkət
                camera.position.set(pos.x * 2, pos.y * 1.5, pos.z * 2);
                controls.target.copy(pos);
                controls.update();
            }
        }
        
        window.centerToCountry = centerToCountry;
        
        function refreshData() {
            updateUI();
        }
        window.refreshData = refreshData;
        
        // Telegram tam ekran
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.ready();
        }
        
        // Səhifə yüklənəndə
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        updateUI();
        setInterval(updateUI, 45000);
    </script>
</body>
</html>
