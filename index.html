<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GameHub - Çok Oyunlu Eğlence</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0b2b3b 0%, #1a4a5f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            touch-action: pan-x pan-y; 
        }

        /* Ana container - ekran dönüşüne uyumlu */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            background: #0a2f3a;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: #0f3b44;
            border-radius: 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255,255,255,0.2);
            width: auto;
            height: auto;
            max-width: 98%;
            max-height: 85%;
            cursor: pointer;
            touch-action: none;
        }

        .menu-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: all 0.3s ease;
        }

        .menu-title {
            font-size: 3.5rem;
            font-weight: bold;
            color: #FFD966;
            text-shadow: 0 5px 0 #B45309;
            margin-bottom: 2rem;
            letter-spacing: 4px;
        }

        .game-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin: 20px;
        }

        .game-card {
            background: #2c1e2f;
            padding: 20px 30px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            border: none;
            box-shadow: 0 12px 0 #5a2e3e;
            cursor: pointer;
            transition: 0.07s linear;
            text-align: center;
            min-width: 200px;
        }

        .game-card:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0 #5a2e3e;
        }

        .score-bar {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            background: #000000aa;
            color: #f9f3c1;
            padding: 8px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(4px);
            z-index: 15;
            font-family: monospace;
        }

        .back-btn {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: #ff8c42;
            border: none;
            font-size: 1.2rem;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 15;
            color: white;
            box-shadow: 0 4px 0 #8b3c00;
            cursor: pointer;
        }

        .status-text {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #00000099;
            color: #adff9e;
            padding: 6px 15px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            pointer-events: none;
        }

        @media (max-width: 700px) {
            .game-card { font-size: 1.2rem; padding: 12px 20px; min-width: 140px; }
            .menu-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div class="score-bar" id="scoreDisplay">Skor: 0</div>
    <button class="back-btn" id="backToMenuBtn">🏠 Menü</button>
    <div class="status-text" id="gameStatusText">Oyuncu Hazır</div>
    <!-- Ana Menü -->
    <div id="mainMenu" class="menu-panel">
        <div class="menu-title">⚡ GAME HUB ⚡</div>
        <div class="game-buttons">
            <button class="game-card" data-game="catch">🤚 TOP YAKALA (Botlu)</button>
            <button class="game-card" data-game="volley">🏐 VOLEYBOL SEKTİRME</button>
        </div>
        <div style="margin-top: 30px; color:#ccc; font-size: 0.9rem;">🔥 Ekran döndürmeye tam uyumlu | Skorlu | Animasyonlu</div>
    </div>
</div>

<script>
    (function(){
        // ------ Canvas ve Bağlam ------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const statusDiv = document.getElementById('gameStatusText');
        const backBtn = document.getElementById('backToMenuBtn');
        const menuDiv = document.getElementById('mainMenu');

        let activeGame = null;  // 'catch' or 'volley'
        let score = 0;
        let animationId = null;
        let canvasWidth = 900, canvasHeight = 600;
        
        // resize fonksiyonu (yan çevirmeye uygun)
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const maxWidth = window.innerWidth - 20;
            const maxHeight = window.innerHeight - 100;
            let ratio = canvasWidth / canvasHeight;
            let newWidth = maxWidth;
            let newHeight = newWidth / ratio;
            if(newHeight > maxHeight) {
                newHeight = maxHeight;
                newWidth = newHeight * ratio;
            }
            canvas.style.width = `${newWidth}px`;
            canvas.style.height = `${newHeight}px`;
        }
        window.addEventListener('resize', () => resizeCanvas());
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 30));
        
        // ----- TOP YAKALA OYUNU (Bot düşman + animasyon karakter) -----
        class CatchGame {
            constructor() {
                this.playerX = canvasWidth/2;
                this.radius = 28;
                this.balls = [];
                this.botX = canvasWidth/2 + 110;
                this.botRadius = 28;
                this.botScore = 0;
                this.gameActive = true;
                this.spawnCounter = 0;
                this.particles = [];
                // karakter animasyonu için basit göz hareketi
                this.eyeWink = 0;
            }
            
            start() {
                this.balls = [];
                this.botScore = 0;
                this.score = 0;
                this.spawnCounter = 0;
                this.particles = [];
                this.gameActive = true;
            }
            
            update(mouseX, mouseY, isTouching) {
                if(!this.gameActive) return;
                // oyuncu hareketi (mouse / touch)
                if(isTouching && mouseX !== undefined) {
                    let newX = Math.min(Math.max(mouseX, this.radius+5), canvasWidth - this.radius-5);
                    this.playerX = newX;
                }
                
                // bot AI: topa doğru hareket et (yakalamak için)
                let nearest = null;
                let minDist = Infinity;
                for(let b of this.balls) {
                    let dx = b.x - this.botX;
                    if(Math.abs(dx) < minDist) {
                        minDist = Math.abs(dx);
                        nearest = b;
                    }
                }
                if(nearest) {
                    let move = (nearest.x - this.botX) * 0.12;
                    this.botX += Math.min(12, Math.max(-12, move));
                }
                this.botX = Math.min(Math.max(this.botX, this.botRadius+5), canvasWidth - this.botRadius-5);
                
                // topları güncelle
                for(let i=0; i<this.balls.length; i++) {
                    let b = this.balls[i];
                    b.y += b.vy;
                    if(b.y + b.r >= canvasHeight) {
                        // yere düştü -> skor yok, top sil
                        this.balls.splice(i,1);
                        i--;
                        continue;
                    }
                    // çarpışma oyuncu
                    let dxp = b.x - this.playerX;
                    let dyp = b.y - (canvasHeight-40);
                    let dist = Math.hypot(dxp, dyp);
                    if(dist < b.r + this.radius && b.y + b.r > canvasHeight-55) {
                        // yakaladı!
                        this.score++;
                        this.addParticles(b.x, b.y, '#FFD966');
                        this.balls.splice(i,1);
                        i--;
                        continue;
                    }
                    // bot yakalama
                    let dxb = b.x - this.botX;
                    let dyb = b.y - (canvasHeight-40);
                    let distBot = Math.hypot(dxb, dyb);
                    if(distBot < b.r + this.botRadius && b.y + b.r > canvasHeight-55) {
                        this.botScore++;
                        this.addParticles(b.x, b.y, '#6C91B2');
                        this.balls.splice(i,1);
                        i--;
                        continue;
                    }
                }
                // spawn mantığı
                this.spawnCounter++;
                if(this.spawnCounter > 38 && this.balls.length < 8) {
                    this.spawnCounter = 0;
                    let randX = 40 + Math.random() * (canvasWidth-80);
                    this.balls.push({
                        x: randX, y: 25, r: 14, vy: 2.3 + Math.random()*1.5,
                    });
                }
                // göz kırpma animasyonu
                this.eyeWink = (this.eyeWink+1) % 60;
            }
            
            addParticles(x,y,color) {
                for(let i=0;i<6;i++) {
                    this.particles.push({x:x, y:y, vx:(Math.random()-0.5)*4, vy:(Math.random()-1)*3, life:1, color:color});
                }
            }
            
            updateParticles() {
                for(let i=0;i<this.particles.length;i++) {
                    let p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.04;
                    if(p.life <=0) {
                        this.particles.splice(i,1);
                        i--;
                    }
                }
            }
            
            draw() {
                ctx.clearRect(0,0,canvasWidth,canvasHeight);
                // zemin
                ctx.fillStyle = '#1f6d49';
                ctx.fillRect(0, canvasHeight-45, canvasWidth, 45);
                ctx.fillStyle = '#c99e6f';
                ctx.fillRect(0, canvasHeight-48, canvasWidth, 6);
                
                // çizgiler
                ctx.beginPath();
                ctx.strokeStyle = '#F4E9CD';
                ctx.lineWidth = 3;
                ctx.setLineDash([12,20]);
                ctx.moveTo(0, canvasHeight-70);
                ctx.lineTo(canvasWidth, canvasHeight-70);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // toplar
                for(let b of this.balls) {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r-1, 0, Math.PI*2);
                    ctx.fillStyle = '#F2542D';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r-3, 0, Math.PI*2);
                    ctx.fillStyle = '#FF8C42';
                    ctx.fill();
                }
                
                // Oyuncu karakter (animasyonlu surat)
                ctx.shadowBlur=0;
                ctx.beginPath();
                ctx.arc(this.playerX, canvasHeight-40, this.radius, 0, Math.PI*2);
                ctx.fillStyle = '#4B8BBE';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.playerX-12, canvasHeight-48, 6, 0, Math.PI*2);
                ctx.arc(this.playerX+12, canvasHeight-48, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle='#1f2f3a';
                let wink = (this.eyeWink<8) ? 2 : 0;
                ctx.beginPath();
                ctx.arc(this.playerX-12, canvasHeight-48+ wink, 3, 0, Math.PI*2);
                ctx.arc(this.playerX+12, canvasHeight-48+ wink, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.playerX, canvasHeight-28, 8, 0.1, Math.PI - 0.1);
                ctx.fillStyle = '#7c4a2e';
                ctx.fill();
                
                // Bot karakter
                ctx.beginPath();
                ctx.arc(this.botX, canvasHeight-40, this.botRadius, 0, Math.PI*2);
                ctx.fillStyle = '#AF5A41';
                ctx.fill();
                ctx.fillStyle='white';
                ctx.beginPath();
                ctx.arc(this.botX-10, canvasHeight-48, 5, 0, Math.PI*2);
                ctx.arc(this.botX+10, canvasHeight-48, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle='#2c2b2b';
                ctx.beginPath();
                ctx.arc(this.botX-10, canvasHeight-47, 2.8, 0, Math.PI*2);
                ctx.arc(this.botX+10, canvasHeight-47, 2.8, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle='#dcac73';
                ctx.beginPath();
                ctx.rect(this.botX-8, canvasHeight-30, 16, 6);
                ctx.fill();
                
                // partiküller
                for(let p of this.particles) {
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4,0,Math.PI*2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                
                // skor tablosu
                ctx.font = "bold 22px 'Segoe UI'";
                ctx.fillStyle = "#E9F5DB";
                ctx.fillText(`SEN: ${this.score}`, 20, 55);
                ctx.fillText(`BOT: ${this.botScore}`, canvasWidth-120, 55);
                if(this.botScore >= 10 || this.score>=10) {
                    let msg = (this.score>=10) ? "🏆 KAZANDIN! 🏆" : "😈 Bot Kazandı..";
                    ctx.font = "bold 36 system-ui";
                    ctx.fillStyle = "gold";
                    ctx.shadowBlur=6;
                    ctx.fillText(msg, canvasWidth/2-130, canvasHeight/2);
                    ctx.shadowBlur=0;
                    this.gameActive = false;
                }
            }
            
            getScore() { return this.score; }
        }
        
        // ------ VOLEYBOL SEKTİRME OYUNU (topu havada tut, bot rakibi) ------
        class VolleyGame {
            constructor() {
                this.playerX = canvasWidth/2 - 70;
                this.botX = canvasWidth/2 + 70;
                this.ball = { x: canvasWidth/2, y: 300, vx: 1.8, vy: -5, radius: 12 };
                this.playerHitCooldown = 0;
                this.botHitCooldown = 0;
                this.score = 0;
                this.botScore = 0;
                this.gameActive = true;
                this.particles = [];
            }
            
            start() {
                this.ball = { x: canvasWidth/2, y: 300, vx: (Math.random() -0.5)*2.5, vy: -4, radius: 12 };
                this.score = 0;
                this.botScore = 0;
                this.playerHitCooldown = 0;
                this.botHitCooldown = 0;
                this.gameActive = true;
                this.particles = [];
            }
            
            update(mouseX, mouseY, isTouching) {
                if(!this.gameActive) return;
                if(isTouching && mouseX) {
                    this.playerX = Math.min(Math.max(mouseX, 50), canvasWidth-50);
                }
                // bot AI (topa doğru)
                let diff = this.ball.x - this.botX;
                this.botX += Math.min(12, Math.max(-12, diff*0.08));
                this.botX = Math.min(Math.max(this.botX, 50), canvasWidth-50);
                
                this.ball.x += this.ball.vx;
                this.ball.y += this.ball.vy;
                this.ball.vy += 0.25; // yerçekimi
                
                // sınırlar
                if(this.ball.x - this.ball.radius <= 0) { this.ball.x = this.ball.radius; this.ball.vx = -this.ball.vx*0.9; }
                if(this.ball.x + this.ball.radius >= canvasWidth) { this.ball.x = canvasWidth-this.ball.radius; this.ball.vx = -this.ball.vx*0.9; }
                
                // yere düşme kontrolü
                if(this.ball.y + this.ball.radius >= canvasHeight-35) {
                    // top yere düştü kimin bölgesine?
                    if(this.ball.x < canvasWidth/2) this.botScore++;
                    else this.score++;
                    this.resetBall(true);
                }
                
                // Oyuncu vuruşu (sektirme)
                if(this.playerHitCooldown <=0 && this.checkCollision(this.playerX, canvasHeight-45, 35, this.ball)) {
                    let angle = (this.ball.x - this.playerX) * 0.18;
                    this.ball.vx = angle + (Math.random()-0.5)*1.2;
                    this.ball.vy = -7.2 - Math.abs(angle)*0.3;
                    this.playerHitCooldown = 12;
                    this.addSpark(this.ball.x, this.ball.y);
                }
                // bot vuruşu
                if(this.botHitCooldown <=0 && this.checkCollision(this.botX, canvasHeight-45, 35, this.ball)) {
                    let angle = (this.ball.x - this.botX) * 0.15;
                    this.ball.vx = angle + (Math.random()-0.5)*1;
                    this.ball.vy = -7.5;
                    this.botHitCooldown = 12;
                    this.addSpark(this.ball.x, this.ball.y);
                }
                if(this.playerHitCooldown>0) this.playerHitCooldown--;
                if(this.botHitCooldown>0) this.botHitCooldown--;
                
                // Üst sınır
                if(this.ball.y - this.ball.radius <= 20) this.ball.vy = -this.ball.vy*0.7;
                
                // partikül
                for(let i=0;i<this.particles.length;i++) {
                    this.particles[i].life -= 0.04;
                    if(this.particles[i].life<=0) this.particles.splice(i,1);
                }
                if(this.score >= 7 || this.botScore>=7) this.gameActive=false;
            }
            
            checkCollision(paddleX, paddleY, paddleW, ball) {
                let dx = ball.x - paddleX;
                let dy = ball.y - paddleY;
                let combined = ball.radius + paddleW/2;
                return Math.abs(dx) < combined && Math.abs(dy) < 25 && ball.vy > 0;
            }
            
            resetBall(randomize) {
                this.ball.x = canvasWidth/2;
                this.ball.y = 250;
                this.ball.vx = (Math.random()-0.5)*2.8;
                this.ball.vy = -3.8;
            }
            addSpark(x,y) {
                for(let i=0;i<5;i++) this.particles.push({x:x,y:y,life:1, offsetX:(Math.random()-0.5)*6, offsetY:(Math.random()-0.5)*6});
            }
            
            draw() {
                ctx.clearRect(0,0,canvasWidth,canvasHeight);
                ctx.fillStyle = '#233e42';
                ctx.fillRect(0,0,canvasWidth,canvasHeight);
                // file
                ctx.beginPath();
                ctx.strokeStyle = '#DDD';
                ctx.lineWidth = 3;
                ctx.setLineDash([8,12]);
                ctx.moveTo(canvasWidth/2, 30);
                ctx.lineTo(canvasWidth/2, canvasHeight-50);
                ctx.stroke();
                ctx.setLineDash([]);
                // zemin
                ctx.fillStyle='#567d46';
                ctx.fillRect(0, canvasHeight-40, canvasWidth, 40);
                
                // oyuncu raket
                ctx.fillStyle = '#3c9bd9';
                ctx.shadowBlur=0;
                ctx.fillRect(this.playerX-25, canvasHeight-53, 50, 20);
                ctx.fillStyle = '#FFC857';
                ctx.fillRect(this.playerX-15, canvasHeight-63, 30, 12);
                // bot raket
                ctx.fillStyle = '#dc6b4a';
                ctx.fillRect(this.botX-25, canvasHeight-53, 50, 20);
                ctx.fillStyle = '#c0a36b';
                ctx.fillRect(this.botX-15, canvasHeight-63, 30, 12);
                
                // top
                ctx.beginPath();
                ctx.arc(this.ball.x, this.ball.y, this.ball.radius,0,Math.PI*2);
                ctx.fillStyle = '#FFB347';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.ball.x, this.ball.y, 4,0,Math.PI*2);
                ctx.fillStyle = '#E67E22';
                ctx.fill();
                
                for(let p of this.particles){
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x+(p.offsetX||0), p.y+(p.offsetY||0), 5,0,Math.PI*2);
                    ctx.fillStyle='#FFE484';
                    ctx.fill();
                }
                ctx.globalAlpha=1;
                ctx.font = "bold 24px monospace";
                ctx.fillStyle = "#F9E0BB";
                ctx.fillText(`Oyuncu: ${this.score}`, 30, 70);
                ctx.fillText(`Bot: ${this.botScore}`, canvasWidth-150, 70);
                if(!this.gameActive){
                    let winMsg = (this.score>=7)?"✨ MUHTEŞEM ZAFER! ✨":"💀 Bot galip geldi...";
                    ctx.font="bold 34px system-ui";
                    ctx.fillStyle='#FFD966';
                    ctx.shadowBlur=8;
                    ctx.fillText(winMsg, canvasWidth/2-150, canvasHeight/2);
                    ctx.shadowBlur=0;
                }
            }
            getScore(){return this.score;}
        }
        
        let currentGame = null;
        let mouseX = canvasWidth/2, mouseY = canvasHeight/2;
        let isPointerDown = false;
        
        function handleMove(e) {
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                isPointerDown = true;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
                isPointerDown = (e.buttons === 1);
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            mouseX = Math.min(Math.max(canvasX, 0), canvasWidth);
            mouseY = Math.min(Math.max(canvasY, 0), canvasHeight);
        }
        
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mousedown', (e) => { isPointerDown=true; handleMove(e); });
        window.addEventListener('mouseup', () => isPointerDown=false);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isPointerDown=true; handleMove(e); });
        canvas.addEventListener('touchend', () => isPointerDown=false);
        
        function updateScoreUI() {
            if(currentGame) scoreSpan.innerText = `Skor: ${currentGame.getScore()}`;
            else scoreSpan.innerText = `Skor: 0`;
        }
        
        function gameLoop() {
            if(!activeGame || !currentGame) {
                ctx.clearRect(0,0,canvasWidth,canvasHeight);
                ctx.fillStyle = '#0c3a44';
                ctx.fillRect(0,0,canvasWidth,canvasHeight);
                ctx.fillStyle = 'white';
                ctx.font = '24px sans-serif';
                ctx.fillText("Oyuna başlamak için menüden seçim yap", 150, canvasHeight/2);
                requestAnimationFrame(gameLoop);
                return;
            }
            if(currentGame && currentGame.update) currentGame.update(mouseX, mouseY, isPointerDown);
            if(currentGame && currentGame.updateParticles) currentGame.updateParticles();
            if(currentGame && currentGame.draw) currentGame.draw();
            updateScoreUI();
            if(activeGame==='catch' && currentGame && !currentGame.gameActive) statusDiv.innerText = "Oyun Bitti - Menüden yeniden başlat";
            else if(activeGame==='volley' && currentGame && !currentGame.gameActive) statusDiv.innerText = "Set Bitti - Menü dön";
            else statusDiv.innerText = activeGame==='catch' ? "🤚 Topları yakala! Botla yarış" : "🏐 Topu sektir, bot rakibini yen!";
            requestAnimationFrame(gameLoop);
        }
        
        function startGame(gameType) {
            activeGame = gameType;
            if(gameType === 'catch') {
                currentGame = new CatchGame();
                currentGame.start();
            } else if(gameType === 'volley') {
                currentGame = new VolleyGame();
                currentGame.start();
            }
            score = 0;
            updateScoreUI();
            menuDiv.style.display = 'none';
            resizeCanvas();
        }
        
        document.querySelectorAll('[data-game]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let game = btn.getAttribute('data-game');
                startGame(game);
            });
        });
        
        backBtn.addEventListener('click', () => {
            activeGame = null;
            currentGame = null;
            menuDiv.style.display = 'flex';
            resizeCanvas();
        });
        
        resizeCanvas();
        // başlangıçta boş ekran
        activeGame = null;
        currentGame = null;
        menuDiv.style.display = 'flex';
        gameLoop();
    })();
</script>
</body>
</html>
