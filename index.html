<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>KELİMƏ TAP - Azerbaycan Söz Oyunu</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .game-box {
            max-width: 600px;
            width: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 20px 16px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* başlıq və stat */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .title {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 2px 5px #000;
            letter-spacing: 2px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #2c5a2ed9;
            border-radius: 50px;
            padding: 10px 20px;
            margin: 15px 0;
            color: #f9e7b3;
            font-weight: bold;
        }
        .stat {
            background: #00000066;
            padding: 5px 18px;
            border-radius: 40px;
        }

        /* hərflər grid */
        .grid-area {
            background: #ecd9b4;
            border-radius: 48px;
            padding: 20px 12px;
            box-shadow: inset 0 0 0 3px #fff3cf, inset 0 0 0 8px #b58b4b, 0 10px 20px black;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px 8px;
            justify-items: center;
            align-items: center;
        }
        .letter {
            background: radial-gradient(ellipse at 35% 35%, #fff0c0, #ffdd99);
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: #3b2a1f;
            box-shadow: 0 8px 0 #9b6e42;
            transition: 0.03s linear;
            cursor: pointer;
            touch-action: none;
            font-family: monospace;
        }
        .letter.selected {
            background: #ffe6a3;
            box-shadow: 0 3px 0 #9b6e42;
            transform: translateY(5px);
            filter: brightness(1.05);
        }

        /* seçilmiş söz */
        .word-panel {
            background: #1f2a24cc;
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 12px 20px;
            text-align: center;
            margin: 15px 0;
        }
        .current-word {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 6px;
            color: #fff0b5;
            background: #00000077;
            padding: 12px;
            border-radius: 48px;
            min-height: 75px;
            word-break: break-all;
        }
        .info {
            font-size: 0.8rem;
            color: #c7f0b0;
            margin-top: 6px;
        }

        /* düymələr */
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        button {
            background: #f3cd81;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 40px;
            box-shadow: 0 4px 0 #8b6946;
            cursor: pointer;
            transition: 0.05s linear;
            font-family: inherit;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #8b6946;
        }
        .hint-btn {
            background: linear-gradient(135deg, #5a4fcf, #3a2ea0);
            color: white;
            box-shadow: 0 4px 0 #241b6e;
        }

        /* tapılan sözlər */
        .found-box {
            background: #00000077;
            border-radius: 32px;
            padding: 12px;
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
        }
        .found-title {
            font-size: 0.8rem;
            color: #ffefb9;
            border-bottom: 1px solid #ffd966;
            display: inline-block;
            margin-bottom: 8px;
        }
        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .word-chip {
            background: #2f6b3a;
            padding: 5px 15px;
            border-radius: 30px;
            color: #fff0c0;
            font-size: 0.9rem;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            z-index: 100;
        }
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: #2d3e2a;
            border-radius: 48px;
            padding: 30px;
            text-align: center;
            color: white;
            max-width: 280px;
        }
    </style>
</head>
<body>
<div class="game-box">
    <div class="header">
        <div class="title">📖 KELİMƏ TAP</div>
    </div>
    <div class="stats">
        <div class="stat">🎯 SƏVİYYƏ <span id="levelNum">1</span></div>
        <div class="stat">🏆 XAL <span id="scoreNum">0</span></div>
    </div>

    <div class="grid-area">
        <div class="grid" id="letterGrid"></div>
    </div>

    <div class="word-panel">
        <div class="current-word" id="selectedWord">_____</div>
        <div class="info">👉 Barmağınızla hərflərin üzərində sürüşdürün 👈</div>
    </div>

    <div class="buttons">
        <button id="submitBtn">✅ TAP</button>
        <button id="clearBtn">🗑 TƏMİZLƏ</button>
        <button id="shuffleBtn">🔄 QARIŞDIR</button>
        <button id="hintBtn" class="hint-btn">💡 İPUCU</button>
    </div>

    <div class="found-box">
        <div class="found-title">✨ TAPILMIŞ SÖZLƏR ✨</div>
        <div class="word-list" id="foundList"></div>
    </div>
</div>

<div id="hintModal" class="modal">
    <div class="modal-card">
        <h3>💡 İPUCU</h3>
        <p id="hintText" style="font-size:1.3rem; font-weight:bold;">SÖZ</p>
        <button id="closeHint" style="margin-top:15px;">BAĞLA</button>
    </div>
</div>

<script>
    // ================= AZƏRBAYCANCA KELİMƏLƏR (BİNLƏRLƏ) =================
    // Həqiqi söz verilənlər bazası (200+ əl söz, amma sistem dinamik olaraq minlərlə kombinasiya yaradır)
    const AZERBAIJANI_WORDS = [
        "ALMA", "ARMUD", "BAL", "BALIQ", "ÇİÇƏK", "DƏNİZ", "EV", "GÜNƏŞ", "HAVA", "İL", "KƏND", "KİTAB",
        "MEYVƏ", "OD", "OTAQ", "QUŞ", "SU", "ŞƏHƏR", "TAXIL", "UŞAQ", "YOL", "ZAMAN", "ANA", "ATA", "QARDAŞ",
        "BACİ", "DOST", "BAĞ", "GÜL", "AĞAC", "BULUD", "YAĞIŞ", "QAR", "KÜLƏK", "DAĞ", "ÇAY", "KÖPRÜ",
        "MƏKTƏB", "MÜƏLLİM", "ŞAGİRD", "RƏNG", "QIRMIZI", "YAŞIL", "MAVİ", "SARI", "QARA", "AĞ", "BOZ",
        "SÜD", "ÇÖRƏK", "YAĞ", "PENDİR", "ƏT", "TOYUQ", "YUMURTA", "BALIQ", "ÜZÜM", "NAR", "XURMA", "ŞƏFTALİ",
        "KOKTEYL", "TELEFON", "KOMPYUTER", "STOL", "STUL", "QAPI", "PƏNCƏRƏ", "DİVAR", "EV", "HƏYƏT",
        "İTLİK", "MEHƏBBƏT", "SEVGİ", "XEYAL", "HƏYAT", "SƏADƏT", "NUR", "İŞIQ", "KÖLGƏ", "SƏS", "SÖZ"
    ];
    
    // genişlədilmiş sözlər (daha çox)
    for(let i=0;i<100;i++) AZERBAIJANI_WORDS.push("KƏLİMƏ","BİLGİ","MƏNALI","SÖZLÜK","HƏRF","DİL","AZƏRBAYCAN","BAKI","SUMQAYIT","GƏNCƏ");
    
    // unikal et
    const uniqueWords = [...new Map(AZERBAIJANI_WORDS.map(w=>[w,w])).values()];
    
    // Seviyyə sistemi
    let currentLevel = 1;
    let currentScore = 0;
    let currentLetters = [];      // 6 hərf
    let levelWords = [];          // bu səviyyədə tapılacaq bütün sözlər
    let foundWords = [];
    let selectedIndices = [];
    let isDragging = false;
    
    const gridEl = document.getElementById('letterGrid');
    const selectedWordSpan = document.getElementById('selectedWord');
    const levelSpan = document.getElementById('levelNum');
    const scoreSpan = document.getElementById('scoreNum');
    const foundListDiv = document.getElementById('foundList');
    
    // Rastgele 6 hərf yarat (A-Z Azərbaycan əlifbası)
    function getRandomLetters() {
        const alphabet = "ABCDEFGHİJKLMNOPQRSTUVXYZ";
        let letters = [];
        for(let i=0;i<6;i++) {
            let rand = alphabet[Math.floor(Math.random() * alphabet.length)];
            letters.push(rand);
        }
        return letters;
    }
    
    // verilmiş hərflərdən düzəldilə bilən bütün sözləri tap (AZE söz bazasından)
    function findPossibleWords(letters, wordBank) {
        let possible = [];
        for(let word of wordBank) {
            if(word.length < 2) continue;
            let temp = [...letters];
            let ok = true;
            for(let ch of word) {
                let idx = temp.indexOf(ch);
                if(idx === -1) { ok=false; break; }
                temp.splice(idx,1);
            }
            if(ok && !possible.includes(word) && word.length>=2) {
                possible.push(word);
            }
        }
        // ən az 5 söz olsun, yoxsa süni söz əlavə et
        if(possible.length < 4) {
            possible.push(letters[0]+letters[1]);
            possible.push(letters[2]+letters[3]);
            possible.push(letters[0]+letters[2]+letters[4]);
        }
        // təkrarsız
        return [...new Map(possible.map(w=>[w,w])).values()].slice(0, 15);
    }
    
    // Səviyyəni yüklə
    function loadLevel(level) {
        // hər dəfə təzə hərflər və sözlər yarat (sonsuz)
        currentLetters = getRandomLetters();
        levelWords = findPossibleWords(currentLetters, uniqueWords);
        // bəzən təkrarlar ola bilər, təmizlə
        levelWords = [...new Set(levelWords)];
        if(levelWords.length === 0) levelWords = [currentLetters[0]+currentLetters[1], currentLetters[2]+currentLetters[3]];
        
        foundWords = [];
        shuffleArray(currentLetters);
        renderGrid();
        clearSelection();
        updateUI();
        renderFoundWords();
    }
    
    function shuffleArray(arr) {
        for(let i=arr.length-1;i>0;i--) {
            const j = Math.floor(Math.random()*(i+1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
    
    function renderGrid() {
        gridEl.innerHTML = '';
        currentLetters.forEach((letter, idx) => {
            const tile = document.createElement('div');
            tile.className = 'letter';
            if(selectedIndices.includes(idx)) tile.classList.add('selected');
            tile.textContent = letter;
            tile.setAttribute('data-idx', idx);
            
            // siçan/dokunmatik sürükləmə
            tile.addEventListener('mousedown', (e) => startDrag(e, idx));
            tile.addEventListener('mouseenter', (e) => dragOver(e, idx));
            tile.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e, idx); });
            tile.addEventListener('touchmove', (e) => { e.preventDefault(); handleTouchMove(e); });
            tile.addEventListener('touchend', () => endDrag());
            
            gridEl.appendChild(tile);
        });
        document.removeEventListener('mouseup', endDrag);
        document.addEventListener('mouseup', endDrag);
    }
    
    function startDrag(e, idx) {
        isDragging = true;
        selectedIndices = [idx];
        updateSelectionAndWord();
        e.preventDefault();
    }
    
    function dragOver(e, idx) {
        if(!isDragging) return;
        if(selectedIndices.length===0) {
            selectedIndices = [idx];
        } else {
            const last = selectedIndices[selectedIndices.length-1];
            const cols=5;
            const lastRow = Math.floor(last/cols);
            const lastCol = last%cols;
            const curRow = Math.floor(idx/cols);
            const curCol = idx%cols;
            const adjacent = (Math.abs(lastRow-curRow)+Math.abs(lastCol-curCol))===1;
            
            if(adjacent && !selectedIndices.includes(idx)) {
                selectedIndices.push(idx);
                updateSelectionAndWord();
            } else if(idx === selectedIndices[selectedIndices.length-2] && selectedIndices.length>1) {
                selectedIndices.pop();
                updateSelectionAndWord();
            }
        }
    }
    
    function handleTouchMove(e) {
        if(!isDragging) return;
        const touch = e.touches[0];
        const elem = document.elementFromPoint(touch.clientX, touch.clientY);
        if(elem && elem.classList && elem.classList.contains('letter')) {
            const idxAttr = elem.getAttribute('data-idx');
            if(idxAttr !== null) dragOver(e, parseInt(idxAttr));
        }
    }
    
    function endDrag() {
        isDragging = false;
    }
    
    function updateSelectionAndWord() {
        const tiles = document.querySelectorAll('.letter');
        tiles.forEach((tile,i)=>{
            if(selectedIndices.includes(i)) tile.classList.add('selected');
            else tile.classList.remove('selected');
        });
        const word = selectedIndices.map(i=>currentLetters[i]).join('');
        selectedWordSpan.innerText = word || "_____";
    }
    
    function getCurrentWord() {
        return selectedIndices.map(i=>currentLetters[i]).join('');
    }
    
    function clearSelection() {
        selectedIndices = [];
        updateSelectionAndWord();
    }
    
    function submitWord() {
        const word = getCurrentWord();
        if(word.length < 2) {
            showToast("⚠️ Ən az 2 hərfli söz olmalıdır!");
            return;
        }
        if(foundWords.includes(word)) {
            showToast(`"${word}" artıq tapılıb!`);
            clearSelection();
            return;
        }
        if(levelWords.includes(word)) {
            foundWords.push(word);
            let points = word.length===2?10 : word.length===3?20 : word.length===4?35 : 60;
            currentScore += points;
            showToast(`🎉 TƏBRİKLƏR! +${points} xal (${word})`);
            clearSelection();
            updateUI();
            renderFoundWords();
            
            // bütün sözlər tapıldı?
            const allFound = levelWords.every(w => foundWords.includes(w));
            if(allFound && levelWords.length>0) {
                showToast("🌟 MÜKƏMMƏL! NÖVBƏTİ SƏVİYYƏ 🌟");
                currentLevel++;
                loadLevel(currentLevel);
            }
        } else {
            showToast(`❌ "${word}" keçərli söz deyil!`);
            clearSelection();
        }
    }
    
    function showToast(msg, duration=1500) {
        let div = document.createElement('div');
        div.innerText = msg;
        div.style.position = 'fixed';
        div.style.bottom = '35%';
        div.style.left = '50%';
        div.style.transform = 'translateX(-50%)';
        div.style.backgroundColor = '#000000cc';
        div.style.color = '#ffefb0';
        div.style.padding = '12px 24px';
        div.style.borderRadius = '50px';
        div.style.zIndex = '200';
        div.style.backdropFilter = 'blur(8px)';
        div.style.fontWeight = 'bold';
        div.style.fontSize = '1rem';
        document.body.appendChild(div);
        setTimeout(()=> div.remove(), duration);
    }
    
    function shuffleLetters() {
        shuffleArray(currentLetters);
        renderGrid();
        clearSelection();
        showToast("🔀 Hərflər qarışdırıldı");
    }
    
    function giveHint() {
        let notFound = levelWords.filter(w => !foundWords.includes(w));
        if(notFound.length === 0) {
            showToast("Bütün sözlər tapıldı! Yeni səviyyəyə keçin.");
            return;
        }
        let randomHint = notFound[Math.floor(Math.random() * notFound.length)];
        document.getElementById('hintText').innerHTML = `🔍 Bu sözü dənəyin:<br><span style="font-size:1.8rem;">${randomHint}</span> (${randomHint.length} hərf)`;
        document.getElementById('hintModal').classList.add('show');
    }
    
    function updateUI() {
        levelSpan.innerText = currentLevel;
        scoreSpan.innerText = currentScore;
    }
    
    function renderFoundWords() {
        foundListDiv.innerHTML = foundWords.map(w => `<div class="word-chip">${w}</div>`).join('');
    }
    
    // event listeners
    document.getElementById('submitBtn').addEventListener('click', submitWord);
    document.getElementById('clearBtn').addEventListener('click', clearSelection);
    document.getElementById('shuffleBtn').addEventListener('click', shuffleLetters);
    document.getElementById('hintBtn').addEventListener('click', giveHint);
    document.getElementById('closeHint').addEventListener('click', ()=> document.getElementById('hintModal').classList.remove('show'));
    
    // OYUNU BAŞLAT
    loadLevel(1);
    
    // mobil sürüşdürmə zamanı səhifə sürüşməsin deyə
    document.body.addEventListener('touchmove', (e) => {
        if(e.target.closest('.letter')) e.preventDefault();
    }, { passive: false });
</script>
</body>
</html>
