<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Saski FPS">
    <meta name="application-name" content="Saski FPS">
    <meta name="theme-color" content="#667eea">
    <meta name="msapplication-TileColor" content="#667eea">
    <meta name="msapplication-config" content="browserconfig.xml">
    <title>Saski FPS Oyunu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        #mainMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 1000;
            min-width: 350px;
        }

        #mainMenu h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .menu-button {
            display: block;
            width: 100%;
            padding: 15px 30px;
            margin: 15px 0;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .menu-button:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .menu-button:hover:before {
            left: 100%;
        }

        .menu-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .menu-button:active {
            transform: translateY(0);
        }

        /* Rooms List */
        #roomsList {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            z-index: 1000;
            overflow-y: auto;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .rooms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .rooms-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-button {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        #roomsContainer {
            max-height: 400px;
            overflow-y: auto;
        }

        .room-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .room-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .room-info {
            flex: 1;
        }

        .room-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .room-players {
            font-size: 14px;
            opacity: 0.7;
        }

        /* Game Canvas */
        #gameCanvas {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* HUD */
        #hud {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .health-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 200px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .health-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        #healthFill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4CAF50, #66BB6A);
            transition: all 0.3s ease;
            border-radius: 10px;
        }

        .health-text {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .ammo-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            font-weight: 600;
        }

        #teamIndicator {
            position: absolute;
            top: 80px;
            left: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .team-blue {
            background: rgba(33, 150, 243, 0.8);
            color: white;
        }

        .team-red {
            background: rgba(244, 67, 54, 0.8);
            color: white;
        }

        #crosshair {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 101;
        }

        /* Mobile Controls */
        #mobileControls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 102;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .touch-joystick {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .touch-button {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }

        .touch-button:active {
            transform: scale(0.9);
            background: linear-gradient(45deg, #764ba2, #667eea);
        }

        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            text-align: center;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            z-index: 10000;
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #mainMenu {
                width: 90%;
                padding: 30px 20px;
            }

            .game-title {
                font-size: 36px;
            }

            .menu-button {
                padding: 15px 20px;
                font-size: 16px;
            }

            #roomsList {
                width: 95%;
                padding: 20px;
            }

            .health-container, .ammo-container {
                padding: 10px;
            }

            .touch-joystick {
                width: 100px;
                height: 100px;
            }

            .touch-button {
                width: 70px;
                height: 70px;
                font-size: 20px;
            }
        }

        /* Prevent zoom on input focus */
        input, textarea, select {
            font-size: 16px;
        }

        /* Fullscreen styles */
        :fullscreen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        :-webkit-full-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        :-moz-full-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        :-ms-fullscreen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <div id="mainMenu">
        <h1>🎮 Saski FPS</h1>
        <button class="menu-button" onclick="findGame()">🔍 Oyun Bul</button>
        <button class="menu-button" onclick="showRooms()">🏠 Odalar</button>
        <button class="menu-button" onclick="createRoom()">➕ Oda Oluştur</button>
    </div>

    <div id="userInfo">
        <div id="userName"></div>
        <div id="userId"></div>
    </div>

    <div id="roomsList">
        <h2>Mevcut Odalar</h2>
        <div id="roomsContainer"></div>
        <button class="menu-button" onclick="backToMenu()" style="margin-top: 20px;">⬅️ Geri</button>
    </div>

    <div id="loading">Bağlanıyor...</div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div id="teamIndicator"></div>
        <div id="healthBar">
            <div id="healthFill"></div>
        </div>
        <div id="ammo">🔫 30 / ∞</div>
        <div id="crosshair"></div>
    </div>

    <div class="controls-info">
        WASD: Hareket | Boşluk: Zıpla | Sol Tık: Ateş Et | F: Odak Değiştir
    </div>

    <div id="mobileControls">
        <div class="touch-joystick" id="leftJoystick"></div>
        <div class="touch-joystick" id="rightJoystick"></div>
        <div class="touch-button" id="fireButton">🔫</div>
        <div class="touch-button" id="jumpButton">⬆️</div>
        <div class="touch-button" id="reloadButton">🔄</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
