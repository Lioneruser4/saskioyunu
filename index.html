<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SaskiOyunu 🎮</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg: #0a0a0f;
    --surface: #13131f;
    --surface2: #1c1c2e;
    --border: #2a2a45;
    --accent: #7c4dff;
    --accent2: #00e5ff;
    --green: #00e676;
    --red: #ff1744;
    --text: #e0e0ff;
    --muted: #7070a0;
  }
  html,body { width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif; touch-action:manipulation; }

  /* ===================== SCREENS ===================== */
  .screen { position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s; }
  .screen.hidden { opacity:0;pointer-events:none; }

  /* ===================== LOADING ===================== */
  #loadingScreen { background:var(--bg);z-index:100; }
  .logo { font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,#7c4dff,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem; }
  .loader-bar { width:200px;height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:1.5rem; }
  .loader-fill { height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;animation:load 2s forwards; }
  @keyframes load { to { width:100%; } }

  /* ===================== LOBBY ===================== */
  #lobbyScreen { background:radial-gradient(ellipse at 50% 0%, #1a0a3a 0%, var(--bg) 70%);padding:1rem;overflow-y:auto;justify-content:flex-start;padding-top:2rem; }
  .lobby-header { text-align:center;margin-bottom:1.5rem; }
  .lobby-title { font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#7c4dff,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
  .player-badge { display:inline-flex;align-items:center;gap:.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:2rem;padding:.4rem 1rem;margin-top:.5rem;font-size:.85rem;color:var(--muted); }
  .player-badge strong { color:var(--text); }

  .lobby-section { width:100%;max-width:480px;margin:0 auto .8rem; }
  .section-label { font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:.5rem; }

  /* Big Action Buttons */
  .btn-row { display:grid;grid-template-columns:1fr 1fr;gap:.6rem;width:100%;max-width:480px;margin:0 auto .8rem; }
  .btn { padding:.85rem 1rem;border:none;border-radius:.8rem;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;position:relative;overflow:hidden; }
  .btn::after { content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);opacity:0;transition:opacity .1s; }
  .btn:active::after { opacity:1; }
  .btn-primary { background:linear-gradient(135deg,#7c4dff,#4527a0);color:#fff;box-shadow:0 4px 20px rgba(124,77,255,.35); }
  .btn-secondary { background:linear-gradient(135deg,#00b0ff,#0064b7);color:#fff; }
  .btn-success { background:linear-gradient(135deg,#00e676,#00a040);color:#000;grid-column:1/-1; }
  .btn-danger { background:linear-gradient(135deg,#ff1744,#b71c1c);color:#fff; }
  .btn-full { grid-column:1/-1; }
  .btn-outline { background:transparent;border:1px solid var(--border);color:var(--text); }

  /* Room List */
  .room-list { display:flex;flex-direction:column;gap:.5rem;max-height:280px;overflow-y:auto; }
  .room-item { display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:.7rem;padding:.7rem 1rem;cursor:pointer;transition:border-color .15s; }
  .room-item:active { border-color:var(--accent); }
  .room-info { flex:1; }
  .room-name { font-weight:700;font-size:.9rem; }
  .room-meta { font-size:.75rem;color:var(--muted);margin-top:.1rem; }
  .room-count { font-size:.8rem;color:var(--muted);white-space:nowrap;margin-left:.5rem; }
  .badge-lock { font-size:.75rem;margin-left:.3rem; }

  /* Create room modal */
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem; }
  .modal-overlay.hidden { display:none; }
  .modal { background:var(--surface2);border:1px solid var(--border);border-radius:1rem;padding:1.5rem;width:100%;max-width:360px; }
  .modal h3 { margin-bottom:1rem;font-size:1.1rem; }
  .input-field { width:100%;background:var(--surface);border:1px solid var(--border);border-radius:.6rem;padding:.7rem 1rem;color:var(--text);font-size:.95rem;outline:none;margin-bottom:.7rem; }
  .input-field:focus { border-color:var(--accent); }
  .modal-btns { display:grid;grid-template-columns:1fr 1fr;gap:.6rem; }

  /* ===================== GAME SCREEN ===================== */
  #gameScreen { background:#000;padding:0; }
  #gameCanvas { display:block;touch-action:none; }

  /* HUD */
  #hud { position:fixed;top:0;left:0;right:0;z-index:50;pointer-events:none; }
  #topHud { display:flex;align-items:center;justify-content:space-between;padding:.4rem .6rem;background:linear-gradient(180deg,rgba(0,0,0,.8) 0%,transparent 100%); }
  #healthBar { display:flex;align-items:center;gap:.4rem; }
  .hp-label { font-size:.7rem;color:var(--green);font-weight:700; }
  .hp-track { width:90px;height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden; }
  .hp-fill { height:100%;background:linear-gradient(90deg,#ff1744,#ff6d00,#00e676);width:100%;transition:width .2s;transform-origin:left; }
  #statsHud { font-size:.7rem;color:rgba(255,255,255,.7);display:flex;gap:.8rem; }
  #roomNameTag { font-size:.7rem;color:var(--accent2); }
  #leaveBtn { pointer-events:all;background:rgba(255,50,50,.2);border:1px solid rgba(255,50,50,.4);color:#ff6b6b;font-size:.7rem;padding:.3rem .6rem;border-radius:.4rem;cursor:pointer; }

  /* Kill feed */
  #killFeed { position:fixed;top:3rem;right:.5rem;z-index:50;pointer-events:none;display:flex;flex-direction:column;gap:.2rem;align-items:flex-end; }
  .kill-entry { background:rgba(0,0,0,.6);border-left:3px solid var(--red);padding:.2rem .5rem;border-radius:.2rem;font-size:.68rem;animation:killAnim 3s forwards; }
  @keyframes killAnim { 0%{opacity:1;transform:translateX(20px)} 80%{opacity:1;transform:translateX(0)} 100%{opacity:0} }

  /* Respawn overlay */
  #respawnOverlay { position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);pointer-events:none; }
  #respawnOverlay.hidden { display:none; }
  #respawnText { font-size:1.5rem;font-weight:700;color:var(--red);text-shadow:0 0 20px red; }

  /* Chat */
  #chatContainer { position:fixed;bottom:80px;left:.5rem;z-index:50;width:200px;max-width:calc(50vw - 1rem); }
  #chatMessages { display:flex;flex-direction:column;gap:.15rem;margin-bottom:.3rem;max-height:100px;overflow-y:auto; }
  .chat-msg { font-size:.68rem;background:rgba(0,0,0,.55);border-radius:.3rem;padding:.15rem .35rem;word-break:break-word; }
  .chat-msg .cn { color:var(--accent2);font-weight:700; }
  #chatInputRow { display:flex;gap:.3rem;pointer-events:all; }
  #chatInput { flex:1;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:.4rem;padding:.3rem .5rem;color:#fff;font-size:.75rem;outline:none;min-width:0; }
  #chatSend { background:var(--accent);border:none;color:#fff;border-radius:.4rem;padding:.3rem .5rem;font-size:.7rem;cursor:pointer;pointer-events:all; }

  /* Minimap */
  #minimap { position:fixed;top:2.8rem;right:.5rem;z-index:50;pointer-events:none; }
  #minimapCanvas { border:1px solid rgba(255,255,255,.2);border-radius:.3rem; }

  /* ===================== MOBILE CONTROLS ===================== */
  #mobileControls { position:fixed;bottom:0;left:0;right:0;height:80px;z-index:55;display:flex;align-items:center;justify-content:space-between;padding:0 .5rem;background:linear-gradient(0deg,rgba(0,0,0,.9) 0%,transparent 100%);pointer-events:none; }

  /* D-Pad left */
  #dpad { display:flex;gap:.4rem;pointer-events:all; }
  .ctrl-btn { width:52px;height:52px;border-radius:.7rem;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .1s; }
  .ctrl-btn:active, .ctrl-btn.pressed { background:rgba(255,255,255,.25); }

  /* Action buttons right */
  #actionBtns { display:grid;grid-template-columns:1fr 1fr;gap:.4rem;pointer-events:all; }
  .action-btn { width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .1s; }
  .action-btn:active, .action-btn.pressed { opacity:.7; }
  #btnJump  { background:rgba(0,200,100,.25);border-color:rgba(0,200,100,.5); }
  #btnAtk   { background:rgba(255,50,50,.25);border-color:rgba(255,50,50,.5); }
  #btnShoot { background:rgba(0,150,255,.25);border-color:rgba(0,150,255,.5); }
  #btnChat  { background:rgba(200,200,0,.25);border-color:rgba(200,200,0,.5);border-radius:.7rem; }

  /* ===================== SCORE TABLE ===================== */
  #scoreBoard { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:80;background:rgba(10,10,20,.95);border:1px solid var(--border);border-radius:1rem;padding:1rem;width:300px;max-height:70vh;overflow-y:auto;display:none; }
  #scoreBoard h3 { text-align:center;margin-bottom:.7rem;font-size:1rem; }
  .score-row { display:flex;justify-content:space-between;padding:.35rem .5rem;border-radius:.4rem;font-size:.8rem; }
  .score-row:nth-child(even) { background:rgba(255,255,255,.04); }
  .score-row.me { background:rgba(124,77,255,.2); }

  /* Responsive desktop */
  @media (min-width:768px) {
    #mobileControls { height:90px; }
    .ctrl-btn, .action-btn { width:60px;height:60px; }
  }

  /* Empty state */
  .empty-state { text-align:center;color:var(--muted);padding:1.5rem;font-size:.85rem; }
  .pulse { animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  
  /* notification */
  #notif { position:fixed;top:.8rem;left:50%;transform:translateX(-50%);z-index:300;background:rgba(255,80,80,.9);color:#fff;padding:.5rem 1.2rem;border-radius:2rem;font-size:.85rem;transition:opacity .3s;pointer-events:none; }
  #notif.hidden { opacity:0; }
</style>
</head>
<body>

<!-- ===================== LOADING SCREEN ===================== -->
<div id="loadingScreen" class="screen">
  <div class="logo">🎮 SaskiOyunu</div>
  <div style="color:var(--muted);font-size:.9rem">Yükleniyor...</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<!-- ===================== LOBBY SCREEN ===================== -->
<div id="lobbyScreen" class="screen hidden">
  <div class="lobby-header">
    <div class="lobby-title">🎮 SaskiOyunu</div>
    <div class="player-badge">👤 <strong id="playerNameDisplay">Player</strong></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-success btn-full" id="joinPublicBtn">🌍 Dünyaya Katıl</button>
    <button class="btn btn-primary" id="quickJoinBtn">⚡ Hızlı Katıl</button>
    <button class="btn btn-secondary" id="createRoomBtn">➕ Oda Oluştur</button>
  </div>

  <div class="lobby-section">
    <div class="section-label">Aktif Odalar <span id="roomCountBadge" style="color:var(--accent2)"></span></div>
    <div class="room-list" id="roomList">
      <div class="empty-state pulse">Odalar yükleniyor...</div>
    </div>
  </div>

  <div style="text-align:center;margin-top:.5rem;">
    <button class="btn btn-outline" style="padding:.4rem 1rem;font-size:.8rem;" id="refreshBtn">🔄 Yenile</button>
  </div>
</div>

<!-- ===================== GAME SCREEN ===================== -->
<div id="gameScreen" class="screen hidden">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="topHud">
      <div id="healthBar">
        <div class="hp-label">❤️</div>
        <div class="hp-track"><div class="hp-fill" id="hpFill"></div></div>
        <div class="hp-label" id="hpText">100</div>
      </div>
      <div id="statsHud">
        <span>🗡️ <span id="killCount">0</span></span>
        <span>💀 <span id="deathCount">0</span></span>
      </div>
      <div id="roomNameTag"></div>
      <button id="leaveBtn">⬅ Çık</button>
    </div>
  </div>

  <div id="killFeed"></div>
  <canvas id="minimapCanvas" width="100" height="60" style="display:none;"></canvas>
  <div id="minimap"><canvas id="minimapCanvas2" width="100" height="55"></canvas></div>

  <div id="respawnOverlay" class="hidden">
    <div id="respawnText">☠️ Yeniden doğuyorsunuz...</div>
  </div>

  <!-- Chat -->
  <div id="chatContainer">
    <div id="chatMessages"></div>
    <div id="chatInputRow">
      <input id="chatInput" type="text" placeholder="Mesaj..." maxlength="100">
      <button id="chatSend">📨</button>
    </div>
  </div>

  <!-- Scoreboard -->
  <div id="scoreBoard">
    <h3>🏆 Skor Tablosu</h3>
    <div id="scoreList"></div>
  </div>

  <!-- Mobile Controls -->
  <div id="mobileControls">
    <div id="dpad">
      <div class="ctrl-btn" id="btnLeft">◀</div>
      <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div id="actionBtns">
      <div class="action-btn" id="btnJump">🦘</div>
      <div class="action-btn" id="btnAtk">⚔️</div>
      <div class="action-btn" id="btnShoot">🏹</div>
      <div class="action-btn" id="btnChat">💬</div>
    </div>
  </div>
</div>

<!-- ===================== MODALS ===================== -->
<!-- Create Room -->
<div class="modal-overlay hidden" id="createRoomModal">
  <div class="modal">
    <h3>➕ Oda Oluştur</h3>
    <input class="input-field" id="newRoomName" placeholder="Oda adı..." maxlength="30">
    <input class="input-field" id="newRoomPass" type="password" placeholder="Şifre (opsiyonel)">
    <div class="modal-btns">
      <button class="btn btn-primary" id="confirmCreateRoom">Oluştur</button>
      <button class="btn btn-outline" id="cancelCreateRoom">İptal</button>
    </div>
  </div>
</div>

<!-- Join Room Password -->
<div class="modal-overlay hidden" id="joinPasswordModal">
  <div class="modal">
    <h3>🔒 Şifre Gerekli</h3>
    <input class="input-field" id="joinPassInput" type="password" placeholder="Oda şifresi...">
    <div class="modal-btns">
      <button class="btn btn-primary" id="confirmJoinPass">Gir</button>
      <button class="btn btn-outline" id="cancelJoinPass">İptal</button>
    </div>
  </div>
</div>

<!-- Notification -->
<div id="notif" class="hidden"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
